<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بىلىك بالىلار ئويۇنلىرى</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <div class="logo-box">
                <i class="fas fa-gem glow-icon"></i>
            </div>
            <h1>بىلىك بالىلار ئويۇنلىرى</h1>
            <p>تارىخ، مەرىپەت ۋە ئەقىل-پاراسەت دۇنياسىغا خۇش كەلدىڭىز! مىللىتىمىزنىڭ ئۈمىدى سىلەر.</p>
        </header>

        <main>
            <div class="game-grid" id="gameGrid">
                <!-- Games will be injected here via JS to allow easy expansion without touching HTML -->
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <i class="fas fa-book-open footer-logo"></i>
                <p>بىلىك تەتقىقات مەركىزى تەرىپىدىن ياسالدى</p>
            </div>
        </footer>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
