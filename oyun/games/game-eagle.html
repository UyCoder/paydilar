<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ئاسمان بۈركۈتى - مۇستەقىللىق پەرۋازى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: linear-gradient(to bottom, #87ceeb, #e0f6ff); overflow: hidden; font-family: 'Tajawal', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; left: 20px; font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 5; pointer-events: none; line-height: 1.5; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; color: white; text-align: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); }
        h1 { font-size: 3.5rem; color: #f1c40f; margin: 0 0 20px 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        p { font-size: 1.5rem; max-width: 600px; line-height: 1.6; margin-bottom: 30px; }
        .btn { padding: 15px 50px; font-size: 1.8rem; background: #3498db; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 15px rgba(52,152,219,0.4); text-transform: uppercase; font-weight: bold; }
        .back-btn { position: absolute; bottom: 20px; right: 20px; color: white; text-decoration: none; font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui">
        ئېگىزلىك: <span id="score">0</span>m <br>
        جان: <span id="lives">❤️❤️❤️</span>
    </div>
    <div id="overlay">
        <h1>ئاسمان بۈركۈتى</h1>
        <p>ئاي-يۇلتۇزلۇق كۆك بايرىقىمىزنى تۇتۇپ، شەرقىي تۈركىستاننىڭ ئېگىز تاغلىرى ئۈستىدە پەرۋاز قىلىڭ. ئېكراننى چېكىپ قانتىڭىزنى قېقىڭ، قىزىل توسالغۇلاردىن قېچىڭ!</p>
        <button class="btn" onclick="startGame()">پەرۋاز قىلىش</button>
    </div>
    <a href="../index.html" class="back-btn">← قايتىش</a>
    
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let bird, pipes, score, gameActive = false, frame = 0, speed = 1.5;
        let audioCtx;
        let lives = 5; // 5 lives for kids

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            let now = audioCtx.currentTime;
            if(type === 'flap') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if(type === 'score') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if(type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        function init() {
            bird = { x: canvas.width/3, y: canvas.height/2, radius: 15, vy: 0, gravity: 0.15, jump: -5 };
            pipes = [];
            score = 0;
            frame = 0;
            speed = 1.5;
            lives = 5;
            updateUI();
        }

        function flap() {
            if(gameActive) {
                bird.vy = bird.jump;
                playSound('flap');
            }
        }

        window.addEventListener('mousedown', () => { initAudio(); flap(); });
        window.addEventListener('touchstart', e => { 
            initAudio();
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
                e.preventDefault(); flap(); 
            }
        }, {passive: false});

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            init();
            gameActive = true;
            animate();
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = '❤️'.repeat(Math.max(0, lives));
        }

        function gameOver() {
            gameActive = false;
            playSound('hit');
            document.getElementById('overlay').style.display = 'flex';
            document.querySelector('#overlay h1').innerText = "يىقىلماڭ!";
            document.querySelector('#overlay p').innerText = `سىز ${score} مېتىر ئېگىزلىككە يەتتىڭىز. بايرىقىمىز ھامان ئېگىزلەردە لەپىلدەيدۇ، قايتا ئۇچۇڭ!`;
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (bird.vy * 0.1)));
            ctx.rotate(rotation);
            
            // Draw Bird body
            ctx.fillStyle = '#e67e22'; // Golden eagle
            ctx.beginPath();
            ctx.ellipse(0, 0, 20, 15, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Draw flag pole & flag
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.lineTo(0, -40);
            ctx.stroke();
            
            ctx.fillStyle = '#3498db'; // East Turkestan Blue
            ctx.fillRect(0, -40, 30, 20);
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(15, -30, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background mountains effect
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            ctx.lineTo(100 - (frame%1000), canvas.height-200);
            ctx.lineTo(300 - (frame%1000), canvas.height-100);
            ctx.lineTo(500 - (frame%1000), canvas.height-300);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();

            bird.vy += bird.gravity;
            bird.y += bird.vy;

            if (bird.y + bird.radius > canvas.height) {
                bird.y = canvas.height - bird.radius;
                bird.vy = -6; // bounce back up
                playSound('hit');
                lives--;
                updateUI();
                if(lives <= 0) gameOver();
            }
            if (bird.y - bird.radius < 0) {
                bird.y = bird.radius;
                bird.vy = 0;
            }

            if (frame % 200 === 0) {
                let gap = 450; // Extremely large gap
                let minH = 50;
                let maxH = canvas.height - gap - minH;
                let topH = Math.random() * maxH + minH;
                pipes.push({ x: canvas.width, y: 0, w: 60, h: topH, passed: false, hit: false });
                pipes.push({ x: canvas.width, y: topH + gap, w: 60, h: canvas.height - topH - gap, hit: false });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                let p = pipes[i];
                p.x -= speed;
                
                // Draw Red Pillars
                let gradient = ctx.createLinearGradient(p.x, 0, p.x + p.w, 0);
                gradient.addColorStop(0, '#c0392b');
                gradient.addColorStop(0.5, '#e74c3c');
                gradient.addColorStop(1, '#c0392b');
                ctx.fillStyle = gradient;
                ctx.fillRect(p.x, p.y, p.w, p.h);

                // Collision (forgiving hitbox)
                if (!p.hit && bird.x + 5 > p.x && bird.x - 5 < p.x + p.w &&
                    bird.y + 5 > p.y && bird.y - 5 < p.y + p.h) {
                    p.hit = true;
                    lives--;
                    playSound('hit');
                    updateUI();
                    
                    // Flash red to indicate hit
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    if(lives <= 0) gameOver();
                }

                if (i % 2 === 0 && p.x + p.w < bird.x && !p.passed) {
                    score++;
                    playSound('score');
                    updateUI();
                    p.passed = true;
                }

                if (p.x + p.w < 0) {
                    pipes.splice(i, 1);
                }
            }

            drawBird();
            frame++;
            if(frame % 3000 === 0) speed += 0.1; // Almost never speeds up
        }
    </script>
</body>
</html>
