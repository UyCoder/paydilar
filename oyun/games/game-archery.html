<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏹 ئوقيا ئېتىش: نىشاننى كۆزلە</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #2d6a4f; font-family: 'Tajawal', sans-serif; color: white; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #score { font-size: 2.8rem; font-weight: 800; color: #ffeb3b; }
        #combo-text { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: 900; color: #ffeb3b; display: none; pointer-events: none; text-shadow: 0 0 20px rgba(255,235,59,0.8); z-index: 50; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .btn { padding: 18px 60px; font-size: 1.8rem; background: linear-gradient(135deg, #ffeb3b, #fbc02d); color: #1b5e20; border: none; border-radius: 50px; cursor: pointer; }
        h1 { font-size: 4rem; margin-bottom: 10px; color: #ffeb3b; }
        p { font-size: 1.4rem; max-width: 650px; text-align: center; line-height: 1.6; }
        #back-btn { position: absolute; bottom: 20px; left: 20px; padding: 12px 24px; background: rgba(255,255,255,0.4); border: 2px solid #ffeb3b; color: #1b5e20; border-radius: 15px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">ئۇتۇق: 0</div></div>
    <div id="combo-text">ئورۇنلۇق!</div>
    <div id="overlay">
        <h1>🏹 ئوقيا ئېتىش</h1>
        <p>نىشانلارنى كۆزلەپ چىكىڭ! <br> "ئالتۇن نىشان" 200 نومۇر بېرىدۇ. <br> نىشانلار بەك چوڭ ۋە ئاسان.</p>
        <button class="btn" onclick="startGame()">باشلاش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>

    <script>
        let scene, camera, renderer, targets = [], arrows = [];
        let score = 0, gameActive = false, audioCtx;
        const clock = new THREE.Clock();

        function initAudio() { 
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
        }

        function playShoot() { 
            if (!audioCtx) return; 
            const o = audioCtx.createOscillator(); 
            const g = audioCtx.createGain(); 
            o.type = 'sawtooth'; 
            o.frequency.setValueAtTime(400, audioCtx.currentTime); 
            o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1); 
            g.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); 
            o.connect(g); g.connect(audioCtx.destination); 
            o.start(); o.stop(audioCtx.currentTime + 0.2); 
        }

        function playHit() {
            if (!audioCtx) return; 
            const o = audioCtx.createOscillator(); 
            const g = audioCtx.createGain(); 
            o.type = 'square'; 
            o.frequency.setValueAtTime(800, audioCtx.currentTime); 
            o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1); 
            g.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
            o.connect(g); g.connect(audioCtx.destination); 
            o.start(); o.stop(audioCtx.currentTime + 0.1);
        }

        function init() {
            scene = new THREE.Scene(); 
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            new THREE.TextureLoader().load('pics/archery_bg.png', (t) => scene.background = t);
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient); 
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            camera.position.z = 10;
            
            window.addEventListener('mousedown', shoot);
            window.addEventListener('touchstart', e => { 
                if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
                    shoot(e.touches[0]); e.preventDefault(); 
                }
            }, { passive: false });
        }

        function createBeautifulTarget(isGolden) {
            const group = new THREE.Group();
            
            // Rings
            const colors = isGolden ? [0xffeb3b, 0xfbc02d, 0xffeb3b, 0xfbc02d] : [0xffffff, 0x000000, 0x2196f3, 0xf44336, 0xffeb3b];
            const sizeStep = 2 / colors.length;
            
            for(let i=0; i<colors.length; i++) {
                const r = 2 - (i * sizeStep);
                const geo = new THREE.CylinderGeometry(r, r, 0.1, 32);
                const mat = new THREE.MeshPhongMaterial({ color: colors[i] });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = i * 0.02; // stack slightly to avoid z-fighting
                mesh.castShadow = true;
                group.add(mesh);
            }
            
            // Stand
            const standGeo = new THREE.CylinderGeometry(0.1, 0.1, 3);
            const standMat = new THREE.MeshPhongMaterial({color: 0x5d4037});
            const stand = new THREE.Mesh(standGeo, standMat);
            stand.rotation.z = Math.PI / 2;
            stand.position.y = -0.5;
            stand.position.z = -1.5;
            group.add(stand);

            return group;
        }

        function spawnTarget() {
            const isGolden = Math.random() < 0.25;
            const target = createBeautifulTarget(isGolden);
            target.rotation.x = Math.PI / 2; 
            target.position.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 6, -15);
            target.userData = { isGolden: isGolden, speed: (Math.random() - 0.5) * 0.05, hit: false };
            scene.add(target); 
            targets.push(target);
        }

        function showCombo(txt) { 
            const el = document.getElementById('combo-text'); 
            el.innerText = txt; 
            el.style.display = 'block'; 
            setTimeout(() => el.style.display = 'none', 800); 
        }

        function createArrow() {
            const group = new THREE.Group();
            // Shaft
            const shaftGeo = new THREE.CylinderGeometry(0.05, 0.05, 2);
            const shaftMat = new THREE.MeshPhongMaterial({color: 0x8d6e63});
            const shaft = new THREE.Mesh(shaftGeo, shaftMat);
            shaft.rotation.x = Math.PI / 2;
            group.add(shaft);
            // Tip
            const tipGeo = new THREE.ConeGeometry(0.1, 0.3);
            const tipMat = new THREE.MeshPhongMaterial({color: 0x95a5a6});
            const tip = new THREE.Mesh(tipGeo, tipMat);
            tip.position.z = -1;
            tip.rotation.x = -Math.PI / 2;
            group.add(tip);
            // Feathers
            const featherGeo = new THREE.BoxGeometry(0.3, 0.3, 0.05);
            const featherMat = new THREE.MeshPhongMaterial({color: 0xffffff});
            const f1 = new THREE.Mesh(featherGeo, featherMat);
            f1.position.z = 0.9;
            group.add(f1);

            return group;
        }

        function shoot(e) {
            if (!gameActive) return;
            initAudio(); playShoot();
            
            const mouse = new THREE.Vector2();
            if(e.clientX !== undefined) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            }

            const raycaster = new THREE.Raycaster(); 
            raycaster.setFromCamera(mouse, camera);

            // Create arrow
            const arrow = createArrow();
            arrow.position.copy(camera.position);
            arrow.position.y -= 1; // start slightly below camera
            
            // Arrow direction
            const dir = raycaster.ray.direction.clone();
            arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,-1), dir);
            
            arrow.userData = { velocity: dir.multiplyScalar(40), active: true };
            scene.add(arrow);
            arrows.push(arrow);
        }

        function startGame() {
            initAudio(); 
            document.getElementById('overlay').style.display = 'none';
            score = 0; gameActive = true; 
            document.getElementById('score').innerText = `ئۇتۇق: 0`;
            targets.forEach(t => scene.remove(t)); targets = [];
            arrows.forEach(a => scene.remove(a)); arrows = [];
            for(let i=0; i<4; i++) spawnTarget();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (gameActive) {
                if (targets.length < 4) spawnTarget();
                
                // Move targets
                targets.forEach(t => { 
                    if(!t.userData.hit) {
                        t.position.x += t.userData.speed; 
                        if (Math.abs(t.position.x) > 10) t.userData.speed *= -1; 
                    } else {
                        t.position.y -= 10 * dt; // fall down after hit
                    }
                });

                // Clean up fallen targets
                for(let i=targets.length-1; i>=0; i--) {
                    if(targets[i].position.y < -10) {
                        scene.remove(targets[i]);
                        targets.splice(i, 1);
                    }
                }

                // Move arrows
                for(let i=arrows.length-1; i>=0; i--) {
                    let a = arrows[i];
                    if(!a.userData.active) continue;

                    a.position.addScaledVector(a.userData.velocity, dt);

                    // Check collision
                    const arrowBox = new THREE.Box3().setFromObject(a);
                    for(let j=0; j<targets.length; j++) {
                        let t = targets[j];
                        if(t.userData.hit) continue;
                        
                        const targetBox = new THREE.Box3().setFromObject(t);
                        if(arrowBox.intersectsBox(targetBox)) {
                            // HIT!
                            playHit();
                            score += t.userData.isGolden ? 200 : 50; 
                            document.getElementById('score').innerText = `ئۇتۇق: ${score}`;
                            showCombo(t.userData.isGolden ? "مەرگەن!" : "ئورۇنلۇق!");
                            
                            t.userData.hit = true;
                            a.userData.active = false;
                            scene.remove(a);
                            arrows.splice(i, 1);
                            break;
                        }
                    }

                    // Remove if too far
                    if(a && a.position.z < -50) {
                        scene.remove(a);
                        arrows.splice(i, 1);
                    }
                }
            }
            renderer.render(scene, camera);
        }
        init(); animate();
    </script>
</body>
</html>
