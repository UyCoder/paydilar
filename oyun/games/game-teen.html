<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ ئالماس شەھەر: كەلگۈسىگە سەپەر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon-blue: #00f2ff; --neon-gold: #ffeb3b; --neon-pink: #ff00ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #050505; font-family: 'Tajawal', sans-serif; color: white; touch-action: none; user-select: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
        .ui-left, .ui-right { display: flex; flex-direction: column; gap: 4px; }
        .ui-box { background: rgba(5,5,5,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(0,242,255,0.3); padding: 6px 14px; border-radius: 8px; }
        .ui-box .label { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .ui-box .value { font-size: 1.5rem; font-weight: 900; }
        #score-box .value { color: var(--neon-blue); text-shadow: 0 0 15px rgba(0,242,255,0.5); }
        #speed-box .value { color: var(--neon-gold); font-size: 0.9rem; }
        #lives-box .value { color: #ff4757; font-size: 1.1rem; }
        #combo-indicator { font-size: 0.9rem; color: #ffeb3b; display: none; margin-top: 4px; }
        
        #combo-text { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: 900; color: var(--neon-pink); display: none; pointer-events: none; text-shadow: 0 0 40px var(--neon-pink), 0 4px 20px rgba(0,0,0,0.5); z-index: 50; font-style: italic; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(20px); }
        .overlay-box { background: rgba(10,10,20,0.95); border: 1px solid rgba(0,242,255,0.2); border-radius: 20px; padding: 2.5rem; text-align: center; max-width: 500px; width: 90%; animation: popIn 0.5s ease-out; clip-path: polygon(3% 0, 100% 0, 97% 100%, 0 100%); }
        @keyframes popIn { from{opacity:0;transform:scale(0.8)translateY(20px)} to{opacity:1;transform:scale(1)translateY(0)} }
        .overlay-box h1 { font-size: 3.5rem; margin-bottom: 10px; background: linear-gradient(135deg, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .overlay-box p { font-size: 1.2rem; color: #888; line-height: 1.6; margin-bottom: 1.5rem; }
        .final-stats { display: flex; justify-content: center; gap: 25px; margin: 1rem 0 1.5rem; }
        .final-stat { text-align: center; }
        .final-stat .v { font-size: 2rem; font-weight: 900; color: var(--neon-blue); }
        .final-stat .l { font-size: 0.8rem; color: #666; }
        .btn { padding: 16px 60px; font-size: 1.8rem; background: linear-gradient(135deg, #0066cc, #00f2ff); color: white; border: none; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 900; box-shadow: 0 0 30px rgba(0,242,255,0.4); transition: all 0.2s; clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%); }
        .btn:active { transform: scale(0.95); }
        #back-btn { position: fixed; bottom: 20px; left: 20px; padding: 10px 20px; background: rgba(0,242,255,0.1); border: 1px solid var(--neon-blue); color: var(--neon-blue); border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 0.9rem; z-index: 10; backdrop-filter: blur(8px); }
        
        /* Touch controls */
        #touch-area { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; touch-action: none; }
        #touch-indicator { position: fixed; width: 60px; height: 60px; border: 2px solid rgba(0,242,255,0.5); border-radius: 50%; pointer-events: none; z-index: 4; display: none; }
        
        @media (max-width: 768px) { .overlay-box { padding: 1.5rem; } .overlay-box h1 { font-size: 2.2rem; } .btn { padding: 14px 40px; font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div id="touch-indicator"></div>
    <div id="ui">
        <div class="ui-left">
            <div class="ui-box" id="score-box"><div class="label">نومۇر</div><div class="value" id="score-val">0000</div></div>
            <div id="combo-indicator">🔥 <span id="combo-count">0</span> قاتار</div>
        </div>
        <div class="ui-right">
            <div class="ui-box" id="speed-box"><div class="label">سۈرئەت</div><div class="value" id="speed-val">1.0x</div></div>
            <div class="ui-box" id="lives-box"><div class="label">ھايات</div><div class="value" id="lives-val">❤️❤️❤️</div></div>
        </div>
    </div>
    <div id="combo-text">GREAT!</div>
    
    <div id="overlay">
        <div class="overlay-box">
            <h1 id="end-title">⚡ ئالماس شەھەر</h1>
            <p id="end-desc">كەلگۈسى شەھەرنىڭ توسالغۇلىرىدىن ئۆتۈپ، مەدەنىيەت كودلىرىنى يىغىڭ!<br>[W,A,S,D] ياكى ئېكراننى سۆرەش ئارقىلىق باشقۇرۇڭ.</p>
            <div class="final-stats" id="final-stats" style="display:none">
                <div class="final-stat"><div class="v" id="f-score">0</div><div class="l">نومۇر</div></div>
                <div class="final-stat"><div class="v" id="f-coins">0</div><div class="l">كود</div></div>
            </div>
            <button class="btn" onclick="startGame()">سەپەرنى باشلاش</button>
        </div>
    </div>
    <a id="back-btn" href="../index.html">← كۈتۈپخانا</a>

    <script>
        let scene, camera, renderer, player, road, obstacles = [], coins = [], particles = [], neonPillars = [];
        let score = 0, speed = 0.5, lives = 3, coinsCollected = 0, gameActive = false, clock = new THREE.Clock(), comboCount = 0;
        let targetX = 0, targetY = 0, invTime = 0, highScore = parseInt(localStorage.getItem('teen_high')||'0');
        let audioCtx, keys = {};

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(type) {
            if (!audioCtx) return; try {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
                const t = audioCtx.currentTime;
                if (type==='coin') { o.type='sine'; o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.12); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15); }
                else if (type==='hit') { o.type='sawtooth'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(80,t+0.2); g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25); }
                else if (type==='lose') { o.type='sawtooth'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(100,t+0.6); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.7); }
                else if (type==='combo') { o.type='triangle'; o.frequency.setValueAtTime(600,t); o.frequency.setValueAtTime(800,t+0.1); o.frequency.setValueAtTime(1000,t+0.2); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25); }
                o.start(t); o.stop(t+0.7);
            } catch(e) {}
        }

        function addParticles(x,y,z,color,count=12) {
            for (let i=0; i<count; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.06+Math.random()*0.08, 3,3), new THREE.MeshBasicMaterial({color, transparent:true, opacity:1}));
                p.position.set(x+(Math.random()-0.5)*0.5, y+(Math.random()-0.5)*0.5, z+(Math.random()-0.5)*0.5);
                p.userData = {vx:(Math.random()-0.5)*0.2, vy:Math.random()*0.15+0.05, vz:(Math.random()-0.5)*0.2, life:1};
                scene.add(p); particles.push(p);
            }
        }
        function updateParticles() {
            for (let i=particles.length-1; i>=0; i--) {
                const p=particles[i]; p.position.x+=p.userData.vx; p.position.y+=p.userData.vy; p.position.z+=p.userData.vz;
                p.userData.vy-=0.005; p.userData.life-=0.03; p.material.opacity=Math.max(0,p.userData.life);
                if (p.userData.life<=0) { scene.remove(p); p.geometry.dispose(); p.material.dispose(); particles.splice(i,1); }
            }
        }

        function showCombo(txt) { const el = document.getElementById('combo-text'); el.innerText = txt; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 1000); }

        function init() {
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(0x0a0520);
            scene.fog = new THREE.FogExp2(0x0a0520, 0.025);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); document.body.appendChild(renderer.domElement);

            // Lights
            scene.add(new THREE.AmbientLight(0x4040ff, 0.3));
            const p1 = new THREE.PointLight(0x00f2ff, 2, 50); p1.position.set(0, 8, -10); scene.add(p1);
            const p2 = new THREE.PointLight(0xff00ff, 1, 30); p2.position.set(5, 5, -20); scene.add(p2);

            // Neon floor grid
            const grid = new THREE.GridHelper(120, 30, 0x00f2ff, 0x330066);
            grid.position.z = -50; scene.add(grid); road = grid;
            
            // Neon pillars on sides
            for (let i=0; i<10; i++) {
                const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3, 0.2), new THREE.MeshBasicMaterial({color:0x00f2ff, transparent:true, opacity:0.4}));
                pillar.position.set(i%2===0 ? -8 : 8, 1.5, -10 - i*8);
                scene.add(pillar); neonPillars.push(pillar);
                // Glow sphere on top
                const glow = new THREE.Mesh(new THREE.SphereGeometry(0.3, 6,6), new THREE.MeshBasicMaterial({color:0xff00ff, transparent:true, opacity:0.5}));
                glow.position.set(pillar.position.x, 3.2, pillar.position.z);
                scene.add(glow); neonPillars.push(glow);
            }

            // Player - Cyber Ship
            const pGrp = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.3, 1.8), new THREE.MeshPhongMaterial({ color: 0x00f2ff, emissive: 0x0044aa, emissiveIntensity: 0.5 }));
            body.position.y = 0.2; pGrp.add(body);
            // Cockpit
            const cockpit = new THREE.Mesh(new THREE.SphereGeometry(0.4, 6,6), new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x00f2ff, emissiveIntensity: 0.3 }));
            cockpit.position.set(0, 0.4, -0.3); pGrp.add(cockpit);
            // Wings
            for (let s of [-1,1]) {
                const wing = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.05, 0.8), new THREE.MeshPhongMaterial({ color: 0x00f2ff, emissive: 0x0066cc }));
                wing.position.set(s*0.8, 0, 0.1); pGrp.add(wing);
                // Wing tip glow
                const tip = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4,4), new THREE.MeshBasicMaterial({color:0xff00ff}));
                tip.position.set(s*1.15, 0, 0.1); pGrp.add(tip);
            }
            // Engine glow - back
            for (let s of [-1,1]) {
                const eglow = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 4), new THREE.MeshBasicMaterial({color:0x00f2ff, transparent:true, opacity:0.5}));
                eglow.position.set(s*0.3, 0, 1.0); eglow.rotation.x = Math.PI/2; pGrp.add(eglow);
            }
            player = pGrp; scene.add(player);
            player.position.y = 0.5;

            camera.position.set(0, 5, 9); camera.lookAt(0, 0.5, -8);

            // Keyboard controls
            window.addEventListener('keydown', e => { keys[e.key] = true; });
            window.addEventListener('keyup', e => { keys[e.key] = false; });
            
            // Touch controls - drag based
            let touchStartX = 0, touchStartY = 0;
            const touchArea = document.getElementById('touch-area');
            touchArea.addEventListener('touchstart', e => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                const ind = document.getElementById('touch-indicator');
                ind.style.display = 'block';
                ind.style.left = (touchStartX - 30) + 'px';
                ind.style.top = (touchStartY - 30) + 'px';
            });
            touchArea.addEventListener('touchmove', e => {
                const dx = (e.touches[0].clientX - touchStartX) / window.innerWidth * 16;
                const dy = (e.touches[0].clientY - touchStartY) / window.innerHeight * 8;
                targetX = Math.max(-5, Math.min(5, dx));
                targetY = Math.max(-2, Math.min(4, -dy));
                const ind = document.getElementById('touch-indicator');
                ind.style.left = (touchStartX + dx*10 - 30) + 'px';
                ind.style.top = (touchStartY + dy*10 - 30) + 'px';
                e.preventDefault();
            }, { passive: false });
            touchArea.addEventListener('touchend', () => {
                targetX = 0; targetY = 0.5;
                document.getElementById('touch-indicator').style.display = 'none';
            });

            window.addEventListener('resize', ()=>{camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight);});
        }

        function spawnObstacle() {
            const type = Math.floor(Math.random()*3);
            let geo, mat, posX, posY;
            if (type === 0) {
                // Wall - tall
                geo = new THREE.BoxGeometry(10, 2.5, 1);
                mat = new THREE.MeshPhongMaterial({ color: 0xff00ff, emissive: 0x660066, transparent: true, opacity: 0.8 });
                posX = 0; posY = 1.25;
            } else if (type === 1) {
                // Side barrier
                geo = new THREE.BoxGeometry(1, 0.5, 2);
                mat = new THREE.MeshPhongMaterial({ color: 0x00f2ff, emissive: 0x004466 });
                posX = (Math.random()>0.5?5:-5); posY = 0.25;
            } else {
                // Moving block
                geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                mat = new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0x881111 });
                posX = (Math.random()-0.5)*8; posY = 0.4;
            }
            const obs = new THREE.Mesh(geo, mat);
            obs.position.set(posX, posY, -100);
            obs.userData = { type, startX: posX };
            obs.castShadow = true;
            scene.add(obs); obstacles.push(obs);
        }

        function spawnCoin() {
            const geo = new THREE.TorusGeometry(0.5, 0.12, 8, 24);
            const mat = new THREE.MeshPhongMaterial({ color: 0xffeb3b, emissive: 0xaa8800, emissiveIntensity: 0.5 });
            const coin = new THREE.Mesh(geo, mat);
            coin.position.set((Math.random()-0.5)*6, 0.8 + Math.random()*2, -100);
            coin.userData = { isGood: Math.random() < 0.8 };
            coin.rotation.x = Math.PI/2;
            scene.add(coin); coins.push(coin);
        }

        function startGame() {
            initAudio(); document.getElementById('overlay').style.display = 'none';
            score = 0; speed = 0.3; lives = 3; coinsCollected = 0; comboCount = 0; invTime = 0;
            document.getElementById('end-title').innerText = '⚡ ئالماس شەھەر';
            document.getElementById('end-desc').innerHTML = 'كەلگۈسى شەھەرنىڭ توسالغۇلىرىدىن ئۆتۈپ، مەدەنىيەت كودلىرىنى يىغىڭ!<br>[W,A,S,D] ياكى ئېكراننى سۆرەش ئارقىلىق باشقۇرۇڭ.';
            document.getElementById('final-stats').style.display = 'none';
            obstacles.forEach(o => scene.remove(o)); coins.forEach(c => scene.remove(c));
            obstacles = []; coins = [];
            particles.forEach(p => { scene.remove(p); p.geometry.dispose(); p.material.dispose(); }); particles = [];
            gameActive = true;
            targetX = 0; targetY = 0.5;
            updateUI();
        }

        function updateUI() {
            document.getElementById('score-val').innerText = Math.floor(score).toString().padStart(4, '0');
            document.getElementById('speed-val').innerText = (speed*2).toFixed(1) + 'x';
            document.getElementById('lives-val').innerText = '❤️'.repeat(Math.max(0,lives));
            document.getElementById('combo-count').innerText = comboCount;
            document.getElementById('combo-indicator').style.display = comboCount >= 3 ? 'block' : 'none';
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (gameActive) {
                const dt = clock.getDelta();
                speed = Math.min(1.5, speed + 0.00005);
                score += speed * 0.5;
                if (invTime > 0) invTime--;
                updateUI();

                if (Math.random() < 0.015) spawnObstacle();
                if (Math.random() < 0.04) spawnCoin();

                // Keyboard control
                if (keys['a'] || keys['ArrowLeft']) targetX = -4;
                else if (keys['d'] || keys['ArrowRight']) targetX = 4;
                else if (!keys['a'] && !keys['d'] && !keys['ArrowLeft'] && !keys['ArrowRight']) {
                    if (targetX > 0.01) targetX = Math.max(0, targetX - 0.3);
                    else if (targetX < -0.01) targetX = Math.min(0, targetX + 0.3);
                    else targetX = 0;
                }
                
                if (keys['w'] || keys['ArrowUp']) targetY = 3;
                else if (keys['s'] || keys['ArrowDown']) targetY = -1;
                else if (!keys['w'] && !keys['s'] && !keys['ArrowUp'] && !keys['ArrowDown']) {
                    targetY += (0.5 - targetY) * 0.1;
                }

                player.position.x += (targetX - player.position.x) * 0.12;
                player.position.y += (targetY - player.position.y) * 0.12;
                player.rotation.z = -(player.position.x * 0.08);
                player.rotation.x = (player.position.y - 0.5) * -0.15;

                // Road scroll
                road.position.z += speed;
                if (road.position.z > 0) road.position.z = -50;

                // Neon pillars animation
                neonPillars.forEach((p, i) => {
                    p.position.z += speed * 0.8;
                    if (p.position.z > 10) p.position.z = -80 - Math.random()*10;
                    if (i % 2 === 0) p.material.opacity = 0.3 + Math.sin(Date.now()*0.003 + i)*0.2;
                });

                // Obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const o = obstacles[i];
                    o.position.z += speed * 1.5;
                    if (o.userData.type === 2) o.position.x = o.userData.startX + Math.sin(o.position.z*0.1)*4;
                    
                    if (o.position.distanceTo(player.position) < 2 && Math.abs(o.position.z - player.position.z) < 1.5) {
                        if (invTime <= 0) {
                            lives--;
                            invTime = 60;
                            playSound('hit');
                            addParticles(o.position.x, o.position.y, o.position.z, 0xff4444, 15);
                            updateUI();
                            if (lives <= 0) {
                                gameActive = false; playSound('lose');
                                const high = Math.max(highScore, Math.floor(score));
                                localStorage.setItem('teen_high', high.toString());
                                document.getElementById('overlay').style.display = 'flex';
                                document.getElementById('end-title').innerText = '⚡ سىستېما كاشىلا';
                                document.getElementById('end-desc').innerText = `${Math.floor(score)} نومۇر يىغدىڭىز!`;
                                document.getElementById('final-stats').style.display = 'flex';
                                document.getElementById('f-score').innerText = Math.floor(score);
                                document.getElementById('f-coins').innerText = coinsCollected;
                            }
                        }
                        scene.remove(o); obstacles.splice(i, 1);
                        continue;
                    }
                    if (o.position.z > 20) { scene.remove(o); obstacles.splice(i, 1); score += 5; }
                }

                // Coins
                for (let i = coins.length - 1; i >= 0; i--) {
                    const c = coins[i];
                    c.position.z += speed * 1.2;
                    c.rotation.z += 0.08;
                    c.position.y += Math.sin(Date.now()*0.005 + c.position.x)*0.005;
                    
                    if (c.position.distanceTo(player.position) < 2 && Math.abs(c.position.z - player.position.z) < 1.5) {
                        score += 50;
                        coinsCollected++;
                        comboCount++;
                        playSound('coin');
                        addParticles(c.position.x, c.position.y, c.position.z, 0xffeb3b, 10);
                        scene.remove(c); coins.splice(i, 1);
                        if (comboCount > 0 && comboCount % 5 === 0) {
                            showCombo(`🔥 ${comboCount} قاتار!`);
                            playSound('combo');
                        }
                        updateUI();
                        continue;
                    }
                    if (c.position.z > 20) { scene.remove(c); coins.splice(i, 1); }
                }

                updateParticles();

                // Player engine glow pulse
                player.children.forEach(c => {
                    if (c.type === 'ConeGeometry' || (c.geometry && c.geometry.type === 'ConeGeometry')) {
                        c.material.opacity = 0.3 + Math.random()*0.4;
                    }
                });
            } else {
                updateParticles();
                // Still animate pillars
                neonPillars.forEach((p, i) => {
                    if (i % 2 === 0) p.material.opacity = 0.3 + Math.sin(Date.now()*0.003 + i)*0.2;
                });
            }
            
            renderer.render(scene, camera);
        }

        init(); animate();
    </script>
</body>
</html>
