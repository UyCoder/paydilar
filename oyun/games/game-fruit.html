<!DOCTYPE html>
<html lang="ug">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍇 ئۇيغۇر مېۋى بازىرى</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;touch-action:none;user-select:none}
canvas{display:block}
#ui{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none;z-index:5;gap:6px}
#ui>div{background:rgba(0,0,0,0.78);backdrop-filter:blur(14px);border:2px solid rgba(255,180,50,0.55);padding:8px 14px;border-radius:20px;text-align:center;color:#fff;min-width:72px}
.lbl{font-size:0.68rem;color:#ffd060;letter-spacing:1px;font-weight:700}
.val{font-size:2rem;font-weight:900;color:#fff}
.val.combo{color:#ff6600;text-shadow:0 0 28px #ff660099;animation:cblink 0.22s}
@keyframes cblink{0%,100%{transform:scale(1)}50%{transform:scale(1.28)}}
#level-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:6;pointer-events:none;background:linear-gradient(135deg,#ff7a20,#ffb840);color:#1a0800;font-weight:900;padding:8px 26px;border-radius:26px;font-size:1rem;box-shadow:0 4px 22px rgba(255,120,0,0.65);white-space:nowrap;border:2px solid rgba(255,255,255,0.28)}
#pow-row{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);z-index:6;pointer-events:none;display:flex;gap:12px}
.pi{background:rgba(0,0,0,0.72);border:2px solid rgba(255,255,255,0.22);padding:8px 16px;border-radius:16px;font-size:1.7rem;opacity:0.38;transition:all 0.25s;backdrop-filter:blur(8px)}
.pi.on{opacity:1;border-color:#ffd060;box-shadow:0 0 22px #ffd060;animation:pp 0.5s infinite alternate}
@keyframes pp{from{transform:scale(1)}to{transform:scale(1.18)}}
.overlay-dark{position:fixed;inset:0;background:rgba(10,4,0,0.92);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(18px)}
.overlay-dark.hidden{display:none}
.fancy-box{background:linear-gradient(148deg,#2a1400,#4a2800);border:3px solid rgba(255,160,40,0.6);border-radius:34px;padding:2.5rem;text-align:center;max-width:520px;width:92%;animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);box-shadow:0 22px 70px rgba(255,130,0,0.32)}
@keyframes popIn{from{opacity:0;transform:scale(0.38) rotate(-6deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.fact-icon{font-size:4.2rem;margin-bottom:8px;animation:bncA 1.1s infinite}
@keyframes bncA{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.fact-title{font-size:2rem;font-weight:900;color:#ffd060;margin-bottom:12px;text-shadow:0 0 22px #ffd06077}
.fact-body{color:#f2ddb0;font-size:1.05rem;line-height:1.85;direction:rtl;text-align:right;background:rgba(255,150,0,0.1);padding:14px 17px;border-radius:14px;border-right:4px solid #ff8020;margin-bottom:16px}
.big-btn{padding:15px 52px;font-size:1.4rem;background:linear-gradient(135deg,#ff7a20,#ffd060);color:#1a0800;border:none;border-radius:50px;cursor:pointer;font-weight:900;box-shadow:0 8px 28px rgba(255,120,0,0.55);transition:transform 0.15s,box-shadow 0.15s;display:inline-block;margin:4px}
.big-btn:hover{transform:scale(1.06);box-shadow:0 14px 38px rgba(255,120,0,0.75)}
.big-btn:active{transform:scale(0.93)}
.game-title{font-size:2.4rem;font-weight:900;color:#ffd060;margin:6px 0;text-shadow:0 0 22px #ffd06055}
.game-desc{color:#c09060;font-size:1.05rem;line-height:1.85;margin:10px 0 20px;direction:rtl;text-align:right}
.stats-row{display:flex;justify-content:center;gap:12px;margin:14px 0;flex-wrap:wrap}
.stat-c{background:rgba(255,150,0,0.13);border-radius:16px;padding:12px 18px;text-align:center;min-width:80px;border:1px solid rgba(255,150,0,0.22)}
.stat-c .sv{font-size:2rem;font-weight:900;color:#ffd060}
.stat-c .sl{font-size:0.78rem;color:#c09060;margin-top:2px}
#back-btn{position:fixed;bottom:18px;left:18px;padding:10px 22px;background:rgba(0,0,0,0.72);border:2px solid rgba(255,255,255,0.22);color:#fff;border-radius:16px;text-decoration:none;font-size:0.9rem;z-index:10;backdrop-filter:blur(8px)}
</style>
</head>
<body>
<div id="ui">
  <div><div class="lbl">نومۇر</div><div class="val" id="score">0</div></div>
  <div><div class="lbl">كومبو</div><div class="val" id="combo">×0</div></div>
  <div><div class="lbl">جان</div><div class="val" id="lives">❤️❤️❤️</div></div>
</div>
<div id="level-badge">باسقۇچ 1 · ئۈزۈملۈك</div>
<div id="pow-row">
  <div class="pi" id="pi-slow">⚡</div>
  <div class="pi" id="pi-fire">🔥</div>
  <div class="pi" id="pi-star">⭐</div>
</div>

<div id="lvl-popup" class="overlay-dark hidden">
  <div class="fancy-box">
    <div class="fact-icon" id="lp-icon">🍇</div>
    <div class="fact-title" id="lp-title">باسقۇچ 2!</div>
    <div class="fact-body" id="lp-fact"></div>
    <button class="big-btn" onclick="resumeGame()">داۋام ئەتمەك ▶</button>
  </div>
</div>

<div id="overlay" class="overlay-dark">
  <div class="fancy-box">
    <div style="font-size:4.2rem;animation:bncA 1.1s infinite">🍇✨</div>
    <div class="game-title">ئۇيغۇر مېۋى بازىرى</div>
    <div class="game-desc" id="overlay-desc">بارمىقىڭىزنى سىزىپ مېۋىلەرنى كېسىڭ! قۇۋۋەت تاختاچىسى يىغىپ سۈپىر كۈچ ئالىڭ! بومبىدىن ساقلىنىڭ! 7 باسقۇچنى بېسىپ ئۆتەلەمسىز؟</div>
    <div id="final-stats" class="stats-row" style="display:none">
      <div class="stat-c"><div class="sv" id="f-score">0</div><div class="sl">نومۇر</div></div>
      <div class="stat-c"><div class="sv" id="f-sliced">0</div><div class="sl">كەسىلگەن</div></div>
      <div class="stat-c"><div class="sv" id="f-best">0</div><div class="sl">ئەڭ ياخشى</div></div>
    </div>
    <button class="big-btn" id="start-btn" onclick="startGame()">⚔️ باشلاش</button>
    <div style="color:#9a7040;font-size:0.85rem;margin-top:10px">بارماق ياكى مائۇسنى سىزىڭ!</div>
  </div>
</div>

<canvas id="c"></canvas>
<a id="back-btn" href="../index.html">← كەينىگە</a>

<script>
const c=document.getElementById('c'), ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
window.addEventListener('resize',resize); resize();

const FRUITS=[
  {emoji:'🍇',name:'ئۈزۈم',clr:'#aa55cc',pts:15,r:34,w:1.2},
  {emoji:'🍑',name:'شەپتەل',clr:'#ff8c60',pts:12,r:32,w:1},
  {emoji:'🍎',name:'ئالما',clr:'#ee4444',pts:10,r:30,w:1},
  {emoji:'🍈',name:'قوغۇن',clr:'#eecb20',pts:20,r:40,w:1.5,rare:true},
  {emoji:'🫐',name:'توت',clr:'#7040a0',pts:18,r:28,w:0.8},
  {emoji:'🍋',name:'لىمون',clr:'#f9e830',pts:12,r:30,w:0.9},
  {emoji:'🍓',name:'توت',clr:'#ee3344',pts:22,r:28,w:0.7,rare:true},
  {emoji:'🥭',name:'ئەنجىر',clr:'#ee9920',pts:25,r:36,w:1,rare:true},
  {emoji:'🍊',name:'ئاپيىلسىن',clr:'#ff7030',pts:14,r:30,w:1},
  {emoji:'🍒',name:'گىلاس',clr:'#cc2230',pts:30,r:24,w:0.6,rare:true},
];
const PWR_TYPES=[
  {emoji:'⚡',id:'slow',clr:'#40eeff'},
  {emoji:'🔥',id:'fire',clr:'#ff5500'},
  {emoji:'⭐',id:'star',clr:'#ffd700'},
];
const LEVEL_DATA=[
  {name:'ئۈزۈملۈك',   bgA:'#4a1a00',bgB:'#8a3810'},
  {name:'شەپتەل باغ', bgA:'#5a2200',bgB:'#9a4510'},
  {name:'قوغۇن تەر',  bgA:'#1a3a10',bgB:'#2c6020'},
  {name:'توت باغ',    bgA:'#280840',bgB:'#4a1870'},
  {name:'ئاپيىلسىن',  bgA:'#4a2800',bgB:'#8a5010'},
  {name:'گىلاس باغ',  bgA:'#380808',bgB:'#681010'},
  {name:'مېۋە بازىرى',bgA:'#2a1800',bgB:'#5a3810'},
];
const FACTS=[
  {icon:'🍑',title:'باسقۇچ 2 — شەپتەل باغ',     fact:'تۇرپان شەپتىلى دۇنياغا مەشھۇر! ئادەتتىكى شەپتەلدىن نەچچە قات چوڭ بولۇپ، تاتلىقى ئالاھىدە!'},
  {icon:'🍈',title:'باسقۇچ 3 — قوغۇن تەر',      fact:'ئۇيغۇر قوغۇنى دۇنيانىڭ ئەڭ شىرىن مېۋىلىرىنىڭ بىرى! تۇرپان قوغۇنى ئالاھىدە مەشھۇر!'},
  {icon:'🫐',title:'باسقۇچ 4 — توت باغ',        fact:'ئۇيغۇر توتى ئىپەك يولى ئارقىلىق جاھانغا تارقالغان! توت دەرىخىدىن ئىپەك ئىشلەيدۇ!'},
  {icon:'🍊',title:'باسقۇچ 5 — ئاپيىلسىن باغ', fact:'ئۇيغۇر يۇرتى مىڭ خىل مېۋىگە ئىگە! ھەر يىل مول ھوسۇل يىغىلىدۇ!'},
  {icon:'🍒',title:'باسقۇچ 6 — گىلاس باغ',     fact:'قەشقەر ۋە خوتەن گىلاسى بەك ئىستىمال قىلىنىدۇ! دادىل تامتۈر قىلىدۇ!'},
  {icon:'🥭',title:'باسقۇچ 7 — مېۋە بازىرى',   fact:'ئۇيغۇر مېۋى باغلىرى 2000 يىلدىن ئارتۇق تارىخقا ئىگە! تۇرپان مېۋىسىغا مەشھۇر!'},
];
const LV_SCORES=[0,200,500,1000,1800,2800,4200];

let active=false, paused=false, score=0, comboCount=0, lives=3, slicedCount=0, bestScore=0, lv=1;
let fruits=[], pwrs=[], parts=[], juice=[];
let swipe=false, swipePts=[], swipeT=0, spawnT=0, fr=0, audioCtx=null;
let powSlow=0, powFire=0, powStar=0, screenFlash=0;
try{bestScore=parseInt(localStorage.getItem('fruitBest3'))||0;}catch(e){}

function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tone(f,d,t,v){if(!audioCtx)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d);}catch(e){}}
function sfxSlice(){tone(700+Math.random()*500,0.13,'sine',0.14);}
function sfxCombo(){tone(1400,0.09,'sine',0.14);setTimeout(()=>tone(1800,0.09,'sine',0.12),80);}
function sfxBomb(){tone(80,0.4,'sawtooth',0.2);setTimeout(()=>tone(60,0.3,'sawtooth',0.15),100);}
function sfxLv(){[0,100,200,300].forEach((d,i)=>setTimeout(()=>tone([660,880,1100,1400][i],0.24,'sine',0.13),d));}
function sfxPwr(){tone(440,0.1,'sine',0.1);setTimeout(()=>tone(660,0.1,'sine',0.1),100);setTimeout(()=>tone(880,0.15,'sine',0.1),200);}

c.addEventListener('mousedown',e=>{if(!active)return;initAudio();swipe=true;swipePts=[{x:e.clientX,y:e.clientY}];swipeT=Date.now();})
c.addEventListener('mousemove',e=>{if(swipe){swipePts.push({x:e.clientX,y:e.clientY});if(swipePts.length>12)swipePts.shift();}})
c.addEventListener('mouseup',()=>{if(swipe){swipe=false;checkSwipe();}})
c.addEventListener('touchstart',e=>{if(!active)return;if(e.target.tagName==='BUTTON'||e.target.tagName==='A')return;initAudio();swipe=true;swipePts=[{x:e.touches[0].clientX,y:e.touches[0].clientY}];swipeT=Date.now();},{passive:true})
c.addEventListener('touchmove',e=>{if(swipe){swipePts.push({x:e.touches[0].clientX,y:e.touches[0].clientY});if(swipePts.length>12)swipePts.shift();}},{passive:true})
c.addEventListener('touchend',()=>{if(swipe){swipe=false;checkSwipe();}})

function checkSwipe(){
  if(swipePts.length<2)return;
  if(powFire>0){
    for(let i=fruits.length-1;i>=0;i--){if(!fruits[i].bomb)sliceFruit(i);}
    return;
  }
  let hitAny=false;
  for(let i=fruits.length-1;i>=0;i--){
    const f=fruits[i]; if(f.bomb)continue;
    for(const p of swipePts){if(Math.hypot(p.x-f.x,p.y-f.y)<f.r+12){hitAny=true;sliceFruit(i);break;}}
  }
  for(let i=pwrs.length-1;i>=0;i--){
    const pw=pwrs[i];
    for(const p of swipePts){if(Math.hypot(p.x-pw.x,p.y-pw.y)<pw.r+14){sfxPwr();activatePwr(pw.id);pwrs.splice(i,1);break;}}
  }
  for(let i=fruits.length-1;i>=0;i--){
    const f=fruits[i]; if(!f.bomb)continue;
    for(const p of swipePts){
      if(Math.hypot(p.x-f.x,p.y-f.y)<f.r+8){
        sfxBomb(); lives--; comboCount=0; screenFlash=20;
        spawnParts(f.x,f.y,'#ff4444',35); spawnJuice(f.x,f.y,'#ff3322',20);
        fruits.splice(i,1);
        document.getElementById('lives').textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));
        if(lives<=0)endGame(); updateUI(); break;
      }
    }
  }
  if(!hitAny&&comboCount>0){comboCount=0;updateUI();}
}

function activatePwr(id){
  if(id==='slow')powSlow=350;
  if(id==='fire')powFire=200;
  if(id==='star')powStar=350;
  updatePwrUI();
}
function updatePwrUI(){
  document.getElementById('pi-slow').className='pi'+(powSlow>0?' on':'');
  document.getElementById('pi-fire').className='pi'+(powFire>0?' on':'');
  document.getElementById('pi-star').className='pi'+(powStar>0?' on':'');
}

function sliceFruit(idx){
  const f=fruits[idx]; sfxSlice();
  const mult=powStar>0?3:1;
  const pts=Math.floor(f.pts*(1+comboCount*0.25)*mult);
  score+=pts; slicedCount++; comboCount++;
  spawnParts(f.x,f.y,f.clr,18); spawnJuice(f.x,f.y,f.clr,12);
  popText(f.x,f.y,'+'+pts,f.clr);
  fruits.splice(idx,1);
  if(comboCount>1)sfxCombo();
  updateUI();
  if(comboCount>=3)comboBanner(comboCount);
  checkLv();
}

function popText(x,y,txt,clr){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;pointer-events:none;z-index:55;font-size:1.8rem;font-weight:900;color:${clr};text-shadow:0 0 12px ${clr};left:${x}px;top:${y}px;transform:translateX(-50%);animation:ptA 0.9s ease-out forwards;font-family:'UKIJ Tuz Tom','UKIJ Tuz',Arial,sans-serif`;
  el.textContent=txt; document.body.appendChild(el);
  if(!document.getElementById('ptAnim')){const s=document.createElement('style');s.id='ptAnim';s.textContent='@keyframes ptA{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(0.7)}55%{opacity:1;transform:translateX(-50%) translateY(-42px) scale(1.25)}100%{opacity:0;transform:translateX(-50%) translateY(-95px) scale(1)}}';document.head.appendChild(s);}
  setTimeout(()=>el.remove(),950);
}
function comboBanner(n){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;pointer-events:none;z-index:55;font-size:3.4rem;font-weight:900;color:#ff7700;text-shadow:0 0 50px #ff4400,0 0 30px #ff8800;animation:cbA 1s ease-out forwards;left:50%;top:36%;transform:translateX(-50%);font-family:Arial,sans-serif';
  el.textContent='🔥 '+n+'× كومبو!';
  if(!document.getElementById('cbAnim')){const s=document.createElement('style');s.id='cbAnim';s.textContent='@keyframes cbA{0%{opacity:1;transform:translateX(-50%) scale(0.3)}40%{opacity:1;transform:translateX(-50%) scale(1.45)}100%{opacity:0;transform:translateX(-50%) scale(1)}}';document.head.appendChild(s);}
  document.body.appendChild(el); setTimeout(()=>el.remove(),1100);
}

function spawnParts(x,y,clr,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=4+Math.random()*9;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,clr,r:3+Math.random()*6});}}
function spawnJuice(x,y,clr,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;juice.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,life:1,clr,r:5+Math.random()*8});}}

function startGame(){
  initAudio();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('lvl-popup').classList.add('hidden');
  score=0; comboCount=0; lives=3; slicedCount=0; lv=1; paused=false;
  fruits=[]; pwrs=[]; parts=[]; juice=[]; spawnT=0; fr=0;
  powSlow=0; powFire=0; powStar=0; screenFlash=0;
  active=true;
  document.getElementById('lives').textContent='❤️❤️❤️';
  document.getElementById('level-badge').textContent='باسقۇچ 1 · '+LEVEL_DATA[0].name;
  document.getElementById('final-stats').style.display='none';
  document.querySelector('.game-title').textContent='ئۇيغۇر مېۋى بازىرى';
  document.getElementById('start-btn').textContent='🔄 قايتا باشلاش';
  updateUI(); updatePwrUI();
  requestAnimationFrame(loop);
}

function spawnFruit(){
  const sm=powSlow>0?0.45:1;
  const bombChance=Math.min(0.07+lv*0.014,0.16);
  const isBomb=Math.random()<bombChance&&fruits.length>1;
  if(isBomb){
    const x=100+Math.random()*(c.width-200);
    fruits.push({x,y:c.height+55,vx:(Math.random()-0.5)*4,vy:-(8+Math.random()*4)*sm,rot:0,rotV:(Math.random()-0.5)*0.14,r:28,bomb:true,clr:'#ff4444',emoji:'💣'});
    return;
  }
  if(Math.random()<0.055&&pwrs.length<2){
    const pt=PWR_TYPES[Math.floor(Math.random()*PWR_TYPES.length)];
    const x=80+Math.random()*(c.width-160);
    pwrs.push({...pt,x,y:c.height+55,vx:(Math.random()-0.5)*2,vy:-(7+Math.random()*3)*sm,rot:0,rotV:(Math.random()-0.5)*0.1,r:30});
    return;
  }
  const type=FRUITS[Math.floor(Math.random()*FRUITS.length)];
  const x=80+Math.random()*(c.width-160);
  fruits.push({...type,x,y:c.height+55,vx:(Math.random()-0.5)*3,vy:-(7+Math.random()*4+lv*0.22)*sm,rot:0,rotV:(Math.random()-0.5)*0.17});
}

function loop(){
  if(!active||paused)return;
  requestAnimationFrame(loop);
  fr++; spawnT++;
  if(powSlow>0){powSlow--;if(powSlow===0)updatePwrUI();}
  if(powFire>0){powFire--;if(powFire===0)updatePwrUI();}
  if(powStar>0){powStar--;if(powStar===0)updatePwrUI();}
  if(screenFlash>0)screenFlash--;
  const rate=Math.max(16,44-lv*3);
  if(spawnT%rate===0&&fruits.length+pwrs.length<15)spawnFruit();
  for(let i=fruits.length-1;i>=0;i--){const f=fruits[i];f.x+=f.vx;f.y+=f.vy;f.vy+=0.26;f.rot+=f.rotV;if(f.y>c.height+85){fruits.splice(i,1);if(!f.bomb&&comboCount>0){comboCount=0;updateUI();}}}
  for(let i=pwrs.length-1;i>=0;i--){const pw=pwrs[i];pw.x+=pw.vx;pw.y+=pw.vy;pw.vy+=0.2;pw.rot+=pw.rotV;if(pw.y>c.height+85)pwrs.splice(i,1);}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.22;p.life-=0.019;if(p.life<=0)parts.splice(i,1);}
  for(let i=juice.length-1;i>=0;i--){const j=juice[i];j.x+=j.vx;j.y+=j.vy;j.vy+=0.28;j.life-=0.024;if(j.life<=0)juice.splice(i,1);}
  draw();
}

function checkLv(){
  for(let i=LV_SCORES.length-1;i>0;i--){
    if(score>=LV_SCORES[i]&&i>=lv&&lv<7){
      lv=i+1; sfxLv();
      document.getElementById('level-badge').textContent='باسقۇچ '+lv+' · '+LEVEL_DATA[Math.min(lv-1,LEVEL_DATA.length-1)].name;
      const fd=FACTS[Math.min(lv-2,FACTS.length-1)];
      document.getElementById('lp-icon').textContent=fd.icon;
      document.getElementById('lp-title').textContent=fd.title;
      document.getElementById('lp-fact').textContent=fd.fact;
      paused=true; document.getElementById('lvl-popup').classList.remove('hidden');
      break;
    }
  }
}
function resumeGame(){document.getElementById('lvl-popup').classList.add('hidden');paused=false;requestAnimationFrame(loop);}
function updateUI(){
  document.getElementById('score').textContent=score;
  const ce=document.getElementById('combo');
  ce.textContent='×'+comboCount;
  ce.className='val'+(comboCount>=3?' combo':'');
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  const ld=LEVEL_DATA[Math.min(lv-1,LEVEL_DATA.length-1)];

  // Background gradient
  const bg=ctx.createLinearGradient(0,0,0,c.height);
  bg.addColorStop(0,ld.bgA); bg.addColorStop(1,ld.bgB);
  ctx.fillStyle=bg; ctx.fillRect(0,0,c.width,c.height);

  // Decorative arch patterns
  ctx.strokeStyle='rgba(255,180,60,0.1)'; ctx.lineWidth=2;
  for(let i=0;i<6;i++){ctx.beginPath();ctx.arc(c.width/2,0,(i+1)*c.width*0.22,0,Math.PI);ctx.stroke();}

  // Animated background stars/sparkles
  for(let i=0;i<50;i++){
    const sx=(i*163.5+fr*0.15)%c.width, sy=(i*89.3)%(c.height*0.55);
    const ss=0.4+Math.sin(fr*0.06+i)*0.45;
    ctx.globalAlpha=0.25+ss*0.35;
    ctx.fillStyle='rgba(255,230,120,0.8)';
    ctx.beginPath(); ctx.arc(sx,sy,1+ss*0.8,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Floating lanterns
  for(let i=0;i<7;i++){
    const lx=(i*c.width/6+fr*0.12)%c.width;
    const ly=c.height*0.15+Math.sin(fr*0.018+i)*28;
    ctx.save(); ctx.globalAlpha=0.18;
    ctx.fillStyle='#ff8030'; ctx.beginPath(); ctx.ellipse(lx,ly,10,16,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd060'; ctx.beginPath(); ctx.ellipse(lx,ly-10,5,5,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Screen flash (bomb hit)
  if(screenFlash>0){ctx.fillStyle=`rgba(255,0,0,${screenFlash/22})`;ctx.fillRect(0,0,c.width,c.height);}
  // Star power yellow tint
  if(powStar>0){ctx.fillStyle=`rgba(255,220,0,${0.045+Math.sin(fr*0.18)*0.02})`;ctx.fillRect(0,0,c.width,c.height);}
  // Slow-mo blue tint
  if(powSlow>0){ctx.fillStyle=`rgba(40,200,255,${0.035+Math.sin(fr*0.18)*0.015})`;ctx.fillRect(0,0,c.width,c.height);}

  // Swipe trail — rainbow glow
  if(swipe&&swipePts.length>1){
    ctx.save();
    ctx.shadowColor='rgba(255,230,100,0.8)'; ctx.shadowBlur=24;
    const g=ctx.createLinearGradient(swipePts[0].x,swipePts[0].y,swipePts[swipePts.length-1].x,swipePts[swipePts.length-1].y);
    g.addColorStop(0,'rgba(255,100,0,0)'); g.addColorStop(0.4,'rgba(255,200,0,0.85)'); g.addColorStop(1,'rgba(255,255,255,0.98)');
    ctx.strokeStyle=g; ctx.lineWidth=5; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); swipePts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=18; ctx.shadowBlur=0;
    ctx.beginPath(); swipePts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
    ctx.restore();
  }

  // Juice splats
  for(const j of juice){ctx.globalAlpha=j.life*0.65;ctx.fillStyle=j.clr;ctx.beginPath();ctx.arc(j.x,j.y,j.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;

  // Power-up items
  for(const pw of pwrs){
    ctx.save(); ctx.translate(pw.x,pw.y); ctx.rotate(pw.rot);
    const pg=ctx.createRadialGradient(0,0,5,0,0,pw.r+14);
    pg.addColorStop(0,pw.clr+'77'); pg.addColorStop(1,'transparent');
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(0,0,pw.r+16,0,Math.PI*2); ctx.fill();
    ctx.shadowColor=pw.clr; ctx.shadowBlur=28+Math.sin(fr*0.14)*12;
    ctx.fillStyle=pw.clr+'55'; ctx.beginPath(); ctx.arc(0,0,pw.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.font=(pw.r*1.55)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pw.emoji,0,3); ctx.restore();
  }

  // Fruits
  for(const f of fruits){
    ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.rot);
    if(f.bomb){
      const bs=1+Math.sin(fr*0.22)*0.09; ctx.scale(bs,bs);
      ctx.shadowColor='#ff4444'; ctx.shadowBlur=32;
      ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(0,0,f.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#666'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,-f.r); ctx.quadraticCurveTo(7,-f.r-14,13,-f.r-20); ctx.stroke();
      const sk=5+Math.sin(fr*0.28)*3;
      ctx.fillStyle='#ff9900'; ctx.shadowColor='#ff9900'; ctx.shadowBlur=16;
      ctx.beginPath(); ctx.arc(13,-f.r-20,sk,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.font='24px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💣',0,3);
    }else{
      ctx.shadowColor=f.clr; ctx.shadowBlur=30+Math.sin(fr*0.09)*10;
      const g=ctx.createRadialGradient(0,0,f.r*0.3,0,0,f.r+14);
      g.addColorStop(0,f.clr+'77'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,f.r+16,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=f.clr; ctx.beginPath(); ctx.arc(0,0,f.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.beginPath(); ctx.arc(-f.r*0.28,-f.r*0.28,f.r*0.38,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.font=(f.r*1.38)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(f.emoji,0,3);
    }
    ctx.shadowBlur=0; ctx.restore();
  }

  // Particles
  for(const p of parts){ctx.globalAlpha=p.life;ctx.fillStyle=p.clr;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}

function endGame(){
  active=false;
  try{if(score>bestScore){bestScore=score;localStorage.setItem('fruitBest3',bestScore);}}catch(e){}
  document.getElementById('overlay').classList.remove('hidden');
  document.querySelector('.game-title').textContent='🏆 مۇبارەك!';
  document.getElementById('overlay-desc').textContent='سىز '+slicedCount+' مېۋە كەستىڭىز! باسقۇچ '+lv+' گە يەتتىڭىز!';
  document.getElementById('final-stats').style.display='flex';
  document.getElementById('f-score').textContent=score;
  document.getElementById('f-sliced').textContent=slicedCount;
  document.getElementById('f-best').textContent=bestScore;
  document.getElementById('start-btn').textContent='🔄 قايتا باشلاش';
}
</script>
