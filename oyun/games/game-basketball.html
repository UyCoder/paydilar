<!DOCTYPE html>
<html lang="ug">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏀 خانلىق كۇبوكى</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;touch-action:none;user-select:none}
canvas{display:block}
#ui{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:5;pointer-events:none;gap:5px}
#ui>div{background:rgba(0,0,0,0.82);backdrop-filter:blur(12px);border:2px solid rgba(255,180,0,0.35);padding:7px 12px;border-radius:18px;text-align:center;color:#fff;min-width:62px}
.lbl{font-size:0.62rem;color:#ffaa22;letter-spacing:1px;font-weight:700}
.val{font-size:1.85rem;font-weight:900;color:#fff}
.val.hot{color:#ff6600;text-shadow:0 0 22px #ff6600;animation:hotA 0.25s infinite alternate}
@keyframes hotA{from{transform:scale(1)}to{transform:scale(1.18)}}
#timer-bar{position:absolute;top:72px;left:16px;right:16px;height:5px;background:rgba(0,0,0,0.4);border-radius:3px;z-index:5;pointer-events:none}
#timer-fill{height:100%;border-radius:3px;background:#ffaa22;box-shadow:0 0 10px #ffaa22;transition:width 0.1s linear}
#round-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:6;pointer-events:none;background:linear-gradient(135deg,#6b2200,#cc4400);color:#ffd040;font-weight:900;padding:7px 24px;border-radius:24px;font-size:0.92rem;box-shadow:0 4px 18px rgba(180,60,0,0.5);white-space:nowrap;border:2px solid rgba(255,200,60,0.3)}
#pwr-bar{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px;pointer-events:none}
.pwr-tag{background:rgba(0,0,0,0.78);border-radius:20px;padding:5px 13px;font-size:0.9rem;color:#fff;border:2px solid;white-space:nowrap}
#hint{position:absolute;bottom:84px;left:50%;transform:translateX(-50%);font-size:1rem;color:rgba(255,255,255,0.35);pointer-events:none;z-index:5;text-align:center;white-space:nowrap}
.overlay-dark{position:fixed;inset:0;background:rgba(5,2,0,0.96);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(20px)}
.overlay-dark.hidden{display:none}
.fancy-box{background:linear-gradient(148deg,#120800,#241200);border:3px solid rgba(200,100,0,0.55);border-radius:32px;padding:2.3rem;text-align:center;max-width:520px;width:92%;animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);box-shadow:0 22px 70px rgba(160,60,0,0.4)}
@keyframes popIn{from{opacity:0;transform:scale(0.35) rotate(-6deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.fact-icon{font-size:3.8rem;margin-bottom:6px;animation:bncA 1.1s infinite}
@keyframes bncA{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.fact-title{font-size:1.8rem;font-weight:900;color:#ffd040;margin-bottom:10px;text-shadow:0 0 20px #ffd04044}
.fact-body{color:#f5d8a0;font-size:1rem;line-height:1.85;direction:rtl;text-align:right;background:rgba(180,80,0,0.1);padding:12px 15px;border-radius:13px;border-right:4px solid #cc5500;margin-bottom:14px}
.big-btn{padding:13px 46px;font-size:1.3rem;background:linear-gradient(135deg,#994400,#ff6600);color:#fff;border:none;border-radius:50px;cursor:pointer;font-weight:900;box-shadow:0 8px 26px rgba(200,80,0,0.5);transition:transform 0.15s;display:inline-block;margin:3px}
.big-btn:hover{transform:scale(1.06)}
.big-btn:active{transform:scale(0.93)}
.big-btn.gold{background:linear-gradient(135deg,#cc8800,#ffcc22);color:#180800;box-shadow:0 8px 26px rgba(200,150,0,0.45)}
.game-title{font-size:2.2rem;font-weight:900;color:#ffd040;margin:6px 0;text-shadow:0 0 20px #ffd04044}
.game-desc{color:#aa7040;font-size:1rem;line-height:1.85;margin:9px 0 16px;direction:rtl;text-align:right}
.stats-row{display:flex;justify-content:center;gap:10px;margin:11px 0;flex-wrap:wrap}
.stat-c{background:rgba(180,80,0,0.12);border-radius:13px;padding:10px 15px;text-align:center;min-width:75px;border:1px solid rgba(200,100,0,0.22)}
.stat-c .sv{font-size:1.9rem;font-weight:900;color:#ffd040}
.stat-c .sl{font-size:0.73rem;color:#aa7040;margin-top:2px}
#back-btn{position:fixed;bottom:16px;left:16px;padding:9px 19px;background:rgba(0,0,0,0.7);border:2px solid rgba(255,255,255,0.2);color:#fff;border-radius:13px;text-decoration:none;font-size:0.87rem;z-index:10;backdrop-filter:blur(8px)}
</style>
</head>
<body>
<div id="ui">
  <div><div class="lbl">نومۇر</div><div class="val" id="score-val">0</div></div>
  <div><div class="lbl">ئۇدا</div><div class="val" id="streak-val">0</div></div>
  <div><div class="lbl">ۋاقىت</div><div class="val" id="timer-val">35</div></div>
  <div><div class="lbl">توغرىلىق</div><div class="val" id="acc-val">-</div></div>
</div>
<div id="timer-bar"><div id="timer-fill" style="width:100%"></div></div>
<div id="round-badge">دەۋر 1 · قەشقەر مەيدانى</div>
<div id="pwr-bar"></div>
<div id="hint">توپنى تارتىپ قويۇپ بېرىڭ</div>

<div id="fact-popup" class="overlay-dark hidden">
  <div class="fancy-box">
    <div class="fact-icon" id="fp-icon">🏀</div>
    <div class="fact-title" id="fp-title">دەۋر 1</div>
    <div class="fact-body" id="fp-fact"></div>
    <button class="big-btn gold" id="fp-btn" onclick="startRound()">🏀 باشلاش!</button>
  </div>
</div>

<div id="overlay" class="overlay-dark">
  <div class="fancy-box">
    <div style="font-size:3.8rem;animation:bncA 1.1s infinite">🏀🏆</div>
    <div class="game-title">خانلىق كۇبوكى</div>
    <div class="game-desc" id="ov-desc">7 شەھەرنى ئايلىنىپ ئۇيغۇر خانلىقىنىڭ ئەڭ ياخشى تۇپچىسى بول! ئۇتۇمنىڭ تارتىپ قويۇپ بېرىڭ. ئۇدا ئۇتسىڭىز ئوت توپ كۈچى پەيدا بولىدۇ!</div>
    <div id="final-stats" class="stats-row" style="display:none">
      <div class="stat-c"><div class="sv" id="f-score">0</div><div class="sl">نومۇر</div></div>
      <div class="stat-c"><div class="sv" id="f-streak">0</div><div class="sl">ئەڭ ئۇدا</div></div>
      <div class="stat-c"><div class="sv" id="f-acc">-</div><div class="sl">توغرىلىق</div></div>
      <div class="stat-c"><div class="sv" id="f-best">0</div><div class="sl">ئەڭ يۇقىرى</div></div>
    </div>
    <button class="big-btn gold" id="start-btn" onclick="initGame()">🏀 جەڭگە كىر!</button>
  </div>
</div>

<canvas id="c"></canvas>
<a id="back-btn" href="../index.html">← كەينىگە</a>

<script>
const c=document.getElementById('c'), ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
window.addEventListener('resize',()=>{resize();if(round<ROUNDS.length)resetShot();});
resize();

const ROUNDS=[
  {name:'قەشقەر مەيدانى',   s1:'#100805',s2:'#281508',ac:'#cc6600',hw:120,hspd:0,   mov:false,dur:35},
  {name:'تۇرپان ئارنىسى',  s1:'#050a18',s2:'#0a1a30',ac:'#0066aa',hw:108,hspd:1.0, mov:true, dur:32},
  {name:'ئۈرۈمچى كۇبوكى', s1:'#050a08',s2:'#0a1810',ac:'#008844',hw:98, hspd:1.6, mov:true, dur:29},
  {name:'خوتەن بۇيرۇقى',   s1:'#100505',s2:'#280a08',ac:'#cc0044',hw:90, hspd:2.2, mov:true, dur:27},
  {name:'ئاقسۇ چولپانى',   s1:'#100510',s2:'#200a20',ac:'#8800cc',hw:84, hspd:2.9, mov:true, dur:25},
  {name:'ئىلى قالئىسى',    s1:'#050810',s2:'#0a1220',ac:'#4488ff',hw:78, hspd:3.6, mov:true, dur:23},
  {name:'ئوردۇبالىق نومۇسى',s1:'#080505',s2:'#181010',ac:'#ffcc00',hw:72, hspd:4.4, mov:true, dur:20},
];
const FACTS=[
  {icon:'🏰',title:'قەشقەر — يىپەك يولىنىڭ يۈرىكى',
   fact:'قەشقەر شەھىرى 2000 يىلدىن ئارتۇق تارىخقا ئىگە! ئىپەك يولىنىڭ ئەڭ چوڭ ۋە ئەڭ مەشھۇر شەھىرى. ئۇيغۇر سودىگەرلىرى بۇ شەھەردىن چىقىپ كۆرە، روم، ھىند ۋە خىتايغا بارغان!'},
  {icon:'🍇',title:'تۇرپان — ئۈزۈم ۋە ئىلىم مەركىزى',
   fact:'تۇرپاندىكى مىڭ ئۆي غارلىرى دۇنيانىڭ ئەڭ چوڭ رەسساملىق مۇزىيى! ئۈزۈم باغلىرى ۋە «ئالتۇن مېرىك» ئۈزۈمى بىلەن مەشھۇر. تۇرپان قەدىمىدىن ئۇيغۇر ئىلىم-مەرىپىتىنىڭ مەركىزى بولغان!'},
  {icon:'📜',title:'ئۇيغۇر يازمىسى — 1500 يىللىق شانلىق تارىخ',
   fact:'ئۇيغۇر يازمىسى 1500 يىلدىن ئارتۇق تارىخقا ئىگە! بۇ يازما مۇغۇل، مانجۇ، ئۆزبەك قاتارلىق 10 دىن ئارتۇق تىلنى يازىشتا ئاساس بولغان. دۇنيانىڭ ئەڭ مۇھىم يازمىلىرىدىن بىرى ئۇيغۇر يازمىسى!'},
  {icon:'🕌',title:'خوتەن — يىپەك ۋە قادىمىي مەدەنىيەت',
   fact:'خوتەن شەھىرى قەدىمىدىن يىپەك ئىستېھسالى بىلەن مەشھۇر! يىپەك يولىنىڭ ئەڭ مۇھىم نۇقتىلىرىدىن بىرى. خوتەن نەپىس تاشى — «خوتەن يۈ تىشى» دۇنياغا مەشھۇر ئۇيغۇر قىممەتلىك تاشى!'},
  {icon:'📚',title:'قۇتادغۇبىلىگ — مىلادى 1069-يىل',
   fact:'«قۇتادغۇبىلىگ» 1069-يىلى يۇسۇپ خاس ھاجىپ تەرىپىدىن يازىلغان! دۇنيانىڭ ئەڭ قەدىمىي تۈركىي ئەدەبىيات شاھئەسىرى ئۇيغۇر تىلىدا يازىلغان. بۇ كىتاب 20 دىن ئارتۇق مۇزىيدە ساقلانمەقتە!'},
  {icon:'🎶',title:'ئون ئىككى مۇقام — ئۇنېسكو مىراسى',
   fact:'ئۇيغۇر ئون ئىككى مۇقامى 336 ساعات ئىجرا ۋاقتى بار دۇنيانىڭ ئەڭ ئۇزۇن مۇزىكا مىراسى! 2005-يىلى ئۇنېسكو تەرىپىدىن «مادىدىسىز مەدەنىيەت مىراسى» دەپ تونۇلغان. ئۇيغۇر مۇزىكىسى بۈگۈن پۈتۈن دۇنياغا يايرىغان!'},
  {icon:'🏆',title:'ئوردۇبالىق — ئۇيغۇر خانلىقىنىڭ پايتەختى',
   fact:'ئوردۇبالىق ئۇيغۇر خانلىقى (744-840 مىلادى) نىڭ پايتەختى ئىدى! «ئوردۇبالىق» سۆزى «شاھارلىق ئوردا» دەگەنلىكنى بىلدۈرىدۇ. بۇ شەھەر بۈگۈن موڭغۇلىيادىكى ئوخون دەرياسى بويىدا يېتىشىدۇ!'},
];

const GRAV=0.45;
let ball,hoop,parts,confettis,scoreTexts,powerUps;
let score,streak,bestStreak,totalShots,successShots,round,roundDur,roundStart;
let firePow=0,magnetPow=0,megaPow=0,slowPow=0;
let dragging=false,dragSX=0,dragSY=0,dragEX=0,dragEY=0;
let netSway=0,netAnimating=false,netTimer=0,netBX=0,netBY=0;
let fr=0,audioCtx=null,gameState='menu',timerInterval=null;
let bestScore=0,totalShotsAll=0,successShotsAll=0;
try{bestScore=parseInt(localStorage.getItem('bball2_best'))||0;}catch(e){}

function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function tone(f,d,t,v){if(!audioCtx)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d);}catch(e){}}
function sfxShoot(){tone(280,0.07,'sawtooth',0.08);}
function sfxSwish(){tone(820,0.09,'sine',0.1);setTimeout(()=>tone(1200,0.07,'sine',0.08),60);}
function sfxBank(){tone(600,0.08,'square',0.1);setTimeout(()=>tone(800,0.08,'square',0.08),80);}
function sfxBounce(){tone(380,0.06,'triangle',0.07);}
function sfxMiss(){tone(180,0.2,'sawtooth',0.09);}
function sfxPower(){[0,100,200,300].forEach((d,i)=>setTimeout(()=>tone([500,700,900,1200][i],0.14,'sine',0.1),d));}
function sfxWave(){[0,120,240,370].forEach((d,i)=>setTimeout(()=>tone([600,800,1100,1500][i],0.2,'sine',0.11),d));}

function initGame(){
  initAudio();
  document.getElementById('overlay').classList.add('hidden');
  score=0;streak=0;bestStreak=0;totalShots=0;successShots=0;round=0;
  totalShotsAll=0;successShotsAll=0;
  firePow=0;magnetPow=0;megaPow=0;slowPow=0;
  parts=[];confettis=[];scoreTexts=[];powerUps=[];
  document.getElementById('final-stats').style.display='none';
  showFact(0);
}

function showFact(r){
  gameState='fact';
  if(timerInterval)clearInterval(timerInterval);
  const fd=FACTS[r];
  document.getElementById('fp-icon').textContent=fd.icon;
  document.getElementById('fp-title').textContent=fd.title;
  document.getElementById('fp-fact').textContent=fd.fact;
  document.getElementById('fp-btn').textContent=r===0?'🏀 مەيداننى باس!':'▶ داۋاملاش!';
  document.getElementById('fact-popup').classList.remove('hidden');
}

function startRound(){
  document.getElementById('fact-popup').classList.add('hidden');
  sfxWave();
  const rd=ROUNDS[round];
  roundDur=rd.dur;
  document.getElementById('round-badge').textContent='دەۋر '+(round+1)+' · '+rd.name;
  document.getElementById('timer-val').textContent=roundDur;
  document.getElementById('timer-fill').style.background=rd.ac;
  document.getElementById('timer-fill').style.boxShadow='0 0 10px '+rd.ac;
  document.getElementById('timer-fill').style.width='100%';
  dragging=false; ball={x:0,y:0,vx:0,vy:0,r:24,angle:0,spin:0,shooting:false,bankShot:false,fire:false};
  hoop={x:0,y:0,w:rd.hw,h:10,dir:1,spd:rd.hspd,moving:rd.mov,netJiggle:0};
  netSway=0; netAnimating=false;
  resetShot();
  gameState='playing';
  roundStart=Date.now();
  timerInterval=setInterval(()=>{
    if(gameState!=='playing')return;
    const elapsed=Math.floor((Date.now()-roundStart)/1000);
    const left=Math.max(0,roundDur-elapsed);
    document.getElementById('timer-val').textContent=left;
    document.getElementById('timer-fill').style.width=(left/roundDur*100)+'%';
    document.getElementById('timer-val').className='val'+(left<=8?' hot':'');
    if(left<=0){clearInterval(timerInterval);endRound();}
  },250);
  requestAnimationFrame(loop);
}

function resetShot(){
  ball.x=c.width*0.15;
  ball.y=c.height-130;
  ball.vx=0;ball.vy=0;ball.spin=0;
  ball.shooting=false;ball.bankShot=false;
  ball.fire=firePow>0||streak>=3;
  ball.r=megaPow>0?33:24;
  dragging=false;
  const rd=ROUNDS[round];
  hoop.w=Math.max(rd.hw-Math.min(score/40,22),52);
  hoop.x=Math.max(c.width*0.38, Math.min(c.width-160, c.width*0.55+Math.random()*(c.width*0.25)));
  hoop.y=c.height*0.22+Math.random()*(c.height*0.2);
  hoop.spd=rd.hspd*(1+score/800);
  hoop.dir=Math.random()<0.5?1:-1;
}

function endRound(){
  gameState='between';
  round++;
  totalShotsAll+=totalShots;successShotsAll+=successShots;
  totalShots=0;successShots=0;streak=0;
  firePow=0;magnetPow=0;megaPow=0;slowPow=0;
  updatePwrUI();
  if(round>=ROUNDS.length){setTimeout(showFinal,400);}
  else{setTimeout(()=>showFact(round),500);}
}

function showFinal(){
  try{if(score>bestScore){bestScore=score;localStorage.setItem('bball2_best',bestScore);}}catch(e){}
  gameState='menu';
  document.getElementById('overlay').classList.remove('hidden');
  document.querySelector('.game-title').textContent='🏆 خانلىق كۇبوكى ئۇتتىڭىز!';
  const acc=totalShotsAll>0?Math.round(successShotsAll/totalShotsAll*100):0;
  document.getElementById('ov-desc').textContent='مۇبارەك! 7 شەھەردىن ئۆتتىڭىز! ھەقىقىي ئۇيغۇر چولپانى!';
  document.getElementById('final-stats').style.display='flex';
  document.getElementById('f-score').textContent=score;
  document.getElementById('f-streak').textContent=bestStreak+'×';
  document.getElementById('f-acc').textContent=acc+'%';
  document.getElementById('f-best').textContent=bestScore;
  document.getElementById('start-btn').textContent='🔄 قايتا باشلاش';
}

/* ═════════ INPUT ═════════ */
const getXY=(e)=>e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};
c.addEventListener('mousedown',e=>{if(gameState!=='playing'||ball.shooting||netAnimating)return;const{x,y}=getXY(e);if(Math.hypot(ball.x-x,ball.y-y)<120){dragging=true;dragSX=x;dragSY=y;dragEX=x;dragEY=y;}});
c.addEventListener('mousemove',e=>{if(dragging){const{x,y}=getXY(e);dragEX=x;dragEY=y;}});
c.addEventListener('mouseup',releaseShot);
c.addEventListener('touchstart',e=>{e.preventDefault();if(gameState!=='playing'||ball.shooting||netAnimating)return;const{x,y}=getXY(e);if(Math.hypot(ball.x-x,ball.y-y)<130){dragging=true;dragSX=x;dragSY=y;dragEX=x;dragEY=y;}},{passive:false});
c.addEventListener('touchmove',e=>{e.preventDefault();if(dragging){const{x,y}=getXY(e);dragEX=x;dragEY=y;}},{passive:false});
c.addEventListener('touchend',e=>{e.preventDefault();releaseShot();},{passive:false});

function releaseShot(){
  if(!dragging)return;
  dragging=false;ball.shooting=true;
  const dx=dragSX-dragEX, dy=dragSY-dragEY;
  const spd=slowPow>0?0.55:1.0;
  ball.vx=dx*0.115*spd; ball.vy=dy*0.115*spd;
  ball.spin=dx*0.018;
  sfxShoot();
  document.getElementById('hint').style.opacity='0';
  totalShots++;
}

/* ═════════ LOOP ═════════ */
let loopRunning=false;
function loop(){
  requestAnimationFrame(loop);
  fr++;
  if(gameState==='menu'||gameState==='fact'){
    drawBackground(); drawConfetti();
    return;
  }
  ctx.clearRect(0,0,c.width,c.height);
  drawBackground();

  // Move hoop
  if(hoop.moving&&ball.shooting){
    hoop.y+=hoop.spd*hoop.dir;
    if(hoop.y>c.height-280||hoop.y<c.height*0.12)hoop.dir*=-1;
  }

  // Magnet
  if(magnetPow>0&&ball.shooting){
    const cx=hoop.x+hoop.w/2, cy=hoop.y;
    const dist=Math.hypot(ball.x-cx,ball.y-cy);
    if(dist<260){ball.vx+=(cx-ball.x)*0.025;ball.vy+=(cy-ball.y)*0.025;}
  }

  // Ball physics
  if(ball.shooting){
    ball.vy+=GRAV;
    ball.x+=ball.vx; ball.y+=ball.vy;
    ball.angle+=ball.spin;

    // Backboard
    const bbX=hoop.x+hoop.w+3, bbW=16;
    const bbY=hoop.y-55, bbH=70;
    if(ball.vy>0&&ball.x+ball.r>bbX&&ball.x-ball.r<bbX+bbW&&ball.y+ball.r>bbY&&ball.y-ball.r<bbY+bbH){
      ball.vx=-Math.abs(ball.vx)*0.62; ball.vy-=1.2; ball.x=bbX-ball.r-1;
      ball.bankShot=true; sfxBank();
      addParticles(ball.x,ball.y,'rgba(255,255,255,0.5)',5);
    }

    // Rim bounce
    if(ball.vy>0){
      if(Math.abs(ball.x-hoop.x)<ball.r+4&&ball.y+ball.r>hoop.y&&ball.y-ball.r<hoop.y+hoop.h){
        ball.vx=Math.abs(ball.vx)*0.48;ball.vy=-Math.abs(ball.vy)*0.42;ball.spin*=-0.5;sfxBounce();netSway=5;
      }
      if(Math.abs(ball.x-(hoop.x+hoop.w))<ball.r+4&&ball.y+ball.r>hoop.y&&ball.y-ball.r<hoop.y+hoop.h){
        ball.vx=-Math.abs(ball.vx)*0.48;ball.vy=-Math.abs(ball.vy)*0.42;ball.spin*=-0.5;sfxBounce();netSway=-5;
      }
    }

    // SCORE detection
    if(ball.vy>0&&ball.x>hoop.x+8&&ball.x<hoop.x+hoop.w-8&&ball.y+ball.r>hoop.y+hoop.h&&ball.y<hoop.y+hoop.h+12){
      successShots++;
      let pts=12+streak*6;
      if(ball.fire)pts=Math.round(pts*2);
      if(ball.bankShot)pts=Math.round(pts*1.5);
      score+=pts;streak++;
      if(streak>bestStreak)bestStreak=streak;
      ball.fire=streak>=3;
      if(streak===3){addScoreText(hoop.x+hoop.w/2,hoop.y-30,'🔥 ئوت توپ!','#ff6600',32);sfxPower();}
      else if(streak===5){magnetPow=6;addScoreText(hoop.x+hoop.w/2,hoop.y-30,'🧲 ماگنىت!','#00ccff',28);sfxPower();}
      else if(streak===8){megaPow=4;addScoreText(hoop.x+hoop.w/2,hoop.y-30,'🔵 چوڭ توپ!','#4488ff',28);addConfetti(50);sfxPower();}
      else if(streak===12){slowPow=5;addScoreText(hoop.x+hoop.w/2,hoop.y-30,'⏱ ئاستا!','#aa55ff',28);sfxPower();}
      else{const lbl=ball.bankShot?'🏦 +'+pts:ball.fire?'🔥 +'+pts:'+'+pts;addScoreText(hoop.x+hoop.w/2,hoop.y-24,lbl,ball.bankShot?'#ffd040':ball.fire?'#ff8800':'#ffffff',ball.bankShot?34:28);}
      if(streak>=3&&streak%3===0)addConfetti(30);
      ball.shooting=false;netAnimating=true;netTimer=22;netBX=hoop.x+hoop.w/2;netBY=hoop.y+hoop.h;netSway=16;
      sfxSwish();
      addParticles(hoop.x+hoop.w/2,hoop.y+hoop.h+8,'#ffd040',18);
      addParticles(hoop.x+hoop.w/2,hoop.y+hoop.h+8,'#ffffff',8);
      if(magnetPow>0)magnetPow--;if(megaPow>0)megaPow--;if(slowPow>0)slowPow--;
      updateUI();updatePwrUI();
      setTimeout(()=>{if(gameState==='playing')resetShot();},620);
    }

    // Out of bounds
    if(ball.y>c.height+80||ball.x<-100||ball.x>c.width+100){
      if(ball.shooting){
        streak=0;ball.shooting=false;sfxMiss();updateUI();
        setTimeout(()=>{if(gameState==='playing')resetShot();},420);
      }
    }
  }

  // Net animation
  if(netAnimating){
    netBY+=2.5;netBX+=netSway*0.08;netSway*=0.88;
    netTimer--;if(netTimer<=0)netAnimating=false;
  }

  // Power-ups floating
  for(let i=powerUps.length-1;i>=0;i--){
    const p=powerUps[i];p.y+=1.2;p.rot+=0.05;
    if(ball.shooting&&Math.hypot(ball.x-p.x,ball.y-p.y)<ball.r+22){
      if(p.type==='mag')magnetPow=6;
      else if(p.type==='slow')slowPow=5;
      else if(p.type==='mega')megaPow=4;
      sfxPower();addParticles(p.x,p.y,p.clr,16);
      addScoreText(p.x,p.y-20,p.lbl,p.clr,26);
      powerUps.splice(i,1);updatePwrUI();continue;
    }
    if(p.y>c.height+30)powerUps.splice(i,1);
  }
  if(fr%340===0&&powerUps.length<3){
    const types=[{type:'mag',emoji:'🧲',clr:'#00ccff',lbl:'🧲 ماگنىت!'},{type:'slow',emoji:'⏱',clr:'#aa55ff',lbl:'⏱ ئاستا!'},{type:'mega',emoji:'🔵',clr:'#4488ff',lbl:'🔵 چوڭ توپ!'}];
    const t=types[Math.floor(Math.random()*types.length)];
    powerUps.push({x:80+Math.random()*(c.width-160),y:-28,...t,rot:0});
  }

  drawTrajectory();
  drawHoop();
  if(netAnimating)drawBall(netBX,netBY,ball.r*0.82,netBX*0.08);
  for(const p of powerUps){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.shadowColor=p.clr;ctx.shadowBlur=18;
    ctx.font='26px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.emoji,0,0);ctx.shadowBlur=0;ctx.restore();
  }
  if(!netAnimating)drawBall(ball.x,ball.y,ball.r,ball.angle);

  // Score texts
  for(let i=scoreTexts.length-1;i>=0;i--){
    const s=scoreTexts[i];s.y-=1.4;s.a-=0.018;
    if(s.a<=0){scoreTexts.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=s.a;ctx.fillStyle=s.clr;
    ctx.font='bold '+s.sz+'px sans-serif';ctx.textAlign='center';ctx.fillText(s.t,s.x,s.y);
    ctx.restore();
  }

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.022;
    if(p.life<=0){parts.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.clr;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  drawConfetti();
}

/* ═════════ DRAW ═════════ */
function drawBackground(){
  const rd=ROUNDS[Math.min(round,ROUNDS.length-1)];
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,c.height);
  sky.addColorStop(0,rd.s1);sky.addColorStop(0.65,rd.s2);
  ctx.fillStyle=sky;ctx.fillRect(0,0,c.width,c.height);

  // Stars
  for(let i=0;i<55;i++){
    const sx=(i*177.7)%c.width,sy=(i*89.3)%(c.height*0.5);
    ctx.fillStyle=`rgba(255,220,160,${0.12+Math.sin(fr*0.04+i)*0.1})`;
    ctx.beginPath();ctx.arc(sx,sy,0.6+(i%4)*0.4,0,Math.PI*2);ctx.fill();
  }

  // Moon
  ctx.save();ctx.translate(c.width*0.88,48);
  ctx.shadowColor=rd.ac;ctx.shadowBlur=28;
  ctx.fillStyle=rd.ac;ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=rd.s1;ctx.beginPath();ctx.arc(9,-6,16,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle=rd.ac;ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('✦',19,-19);
  ctx.restore();

  // Mountains
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.beginPath();ctx.moveTo(0,c.height*0.42);
  const mpts=[[0,.42],[.07,.34],[.14,.27],[.21,.34],[.29,.21],[.37,.15],[.45,.27],[.53,.18],[.61,.12],[.69,.21],[.77,.29],[.84,.20],[.91,.30],[.97,.36],[1,.4]];
  for(const[rx,ry]of mpts)ctx.lineTo(c.width*rx,c.height*ry);
  ctx.lineTo(c.width,c.height);ctx.lineTo(0,c.height);ctx.closePath();ctx.fill();

  // City silhouette
  drawCity(rd);

  // Court floor
  const fY=c.height*0.76;
  const fg=ctx.createLinearGradient(0,fY,0,c.height);
  fg.addColorStop(0,'#4a2808');fg.addColorStop(1,'#2a1404');
  ctx.fillStyle=fg;ctx.fillRect(0,fY,c.width,c.height-fY);
  ctx.strokeStyle='rgba(255,200,100,0.06)';ctx.lineWidth=1;
  for(let x=0;x<c.width;x+=28){ctx.beginPath();ctx.moveTo(x,fY);ctx.lineTo(x,c.height);ctx.stroke();}
  // Center circle
  ctx.strokeStyle='rgba(255,200,100,0.09)';ctx.lineWidth=2;ctx.setLineDash([8,8]);
  ctx.beginPath();ctx.arc(c.width/2,fY,70,Math.PI,0);ctx.stroke();
  ctx.setLineDash([]);
  // Court line
  ctx.strokeStyle='rgba(255,200,100,0.12)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,fY);ctx.lineTo(c.width,fY);ctx.stroke();
  // Crowd
  for(let i=0;i<c.width;i+=32){
    ctx.fillStyle=`rgba(0,0,0,${0.2+Math.sin(fr*0.02+i*0.1)*0.04})`;
    ctx.beginPath();ctx.arc(i,fY-4,14,Math.PI,0);ctx.fill();
  }
}

function drawCity(rd){
  const bY=c.height*0.47;
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.beginPath();
  ctx.moveTo(0,bY);
  const W=c.width;
  // Left: flat block
  ctx.lineTo(0,bY-35); ctx.lineTo(W*0.06,bY-35); ctx.lineTo(W*0.06,bY-52);
  // Small minaret left
  ctx.lineTo(W*0.08,bY-52); ctx.lineTo(W*0.08,bY-80); ctx.lineTo(W*0.085,bY-88);
  ctx.arc(W*0.09,bY-88,W*0.005,Math.PI,0,false);
  ctx.lineTo(W*0.095,bY-80); ctx.lineTo(W*0.095,bY-55); ctx.lineTo(W*0.13,bY-55);
  // Dome mosque
  ctx.lineTo(W*0.13,bY-65); ctx.lineTo(W*0.16,bY-65);
  ctx.arc(W*0.195,bY-65,W*0.036,Math.PI,0,false);
  ctx.lineTo(W*0.23,bY-65); ctx.lineTo(W*0.23,bY-55); ctx.lineTo(W*0.26,bY-55);
  // Central big minaret
  ctx.lineTo(W*0.26,bY-40); ctx.lineTo(W*0.33,bY-40); ctx.lineTo(W*0.33,bY-75);
  ctx.lineTo(W*0.335,bY-88); ctx.lineTo(W*0.338,bY-98);
  ctx.arc(W*0.343,bY-98,W*0.005,Math.PI,0,false);
  ctx.lineTo(W*0.348,bY-88); ctx.lineTo(W*0.35,bY-75); ctx.lineTo(W*0.35,bY-40);
  // Central large dome
  ctx.lineTo(W*0.4,bY-40); ctx.lineTo(W*0.4,bY-60); ctx.lineTo(W*0.43,bY-70);
  ctx.arc(W*0.475,bY-70,W*0.045,Math.PI,0,false);
  ctx.lineTo(W*0.52,bY-70); ctx.lineTo(W*0.52,bY-60); ctx.lineTo(W*0.54,bY-60);
  // Right side buildings
  ctx.lineTo(W*0.54,bY-45); ctx.lineTo(W*0.60,bY-45); ctx.lineTo(W*0.60,bY-68);
  ctx.lineTo(W*0.605,bY-78); ctx.arc(W*0.61,bY-78,W*0.005,Math.PI,0,false);
  ctx.lineTo(W*0.615,bY-68); ctx.lineTo(W*0.615,bY-45);
  // Right dome
  ctx.lineTo(W*0.68,bY-45); ctx.lineTo(W*0.68,bY-58);
  ctx.arc(W*0.705,bY-58,W*0.026,Math.PI,0,false);
  ctx.lineTo(W*0.73,bY-58); ctx.lineTo(W*0.73,bY-45);
  // Right edge
  ctx.lineTo(W*0.82,bY-45); ctx.lineTo(W*0.82,bY-55); ctx.lineTo(W,bY-38); ctx.lineTo(W,bY);
  ctx.closePath();ctx.fill();
  // Lantern glow on minarets
  const lanterns=[[0.09,bY-90],[0.343,bY-100],[0.61,bY-80]];
  for(const[rx,ly]of lanterns){
    ctx.save();ctx.shadowColor=rd.ac;ctx.shadowBlur=18+Math.sin(fr*0.12+rx*10)*5;
    ctx.fillStyle=rd.ac;ctx.globalAlpha=0.7;
    ctx.beginPath();ctx.arc(W*rx,ly,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawHoop(){
  const h=hoop;
  netSway*=0.9;
  // Pole
  ctx.fillStyle='#777';
  ctx.fillRect(h.x+h.w/2-4,h.y+h.h,8,c.height-h.y-h.h-Math.floor(c.height*0.24));
  // Backboard with crescent
  const bbX=h.x+h.w+3,bbW=15,bbY=h.y-52,bbH=68;
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(bbX,bbY,bbW,bbH);
  ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=1.5;ctx.strokeRect(bbX,bbY,bbW,bbH);
  // Crescent on backboard
  const rd=ROUNDS[Math.min(round,ROUNDS.length-1)];
  ctx.save();ctx.translate(bbX+bbW/2,h.y-8);
  ctx.fillStyle=rd.ac;ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.arc(3,-2,5,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Rim
  const rg=ctx.createLinearGradient(h.x,h.y,h.x,h.y+h.h);
  rg.addColorStop(0,'#ff5555');rg.addColorStop(1,'#aa1111');
  ctx.shadowBlur=10;ctx.shadowColor='rgba(255,60,60,0.35)';
  ctx.fillStyle=rg;
  ctx.beginPath();ctx.moveTo(h.x+5,h.y);ctx.lineTo(h.x+h.w-5,h.y);
  ctx.quadraticCurveTo(h.x+h.w,h.y,h.x+h.w,h.y+5);
  ctx.lineTo(h.x+h.w,h.y+h.h-5);ctx.quadraticCurveTo(h.x+h.w,h.y+h.h,h.x+h.w-5,h.y+h.h);
  ctx.lineTo(h.x+5,h.y+h.h);ctx.quadraticCurveTo(h.x,h.y+h.h,h.x,h.y+h.h-5);
  ctx.lineTo(h.x,h.y+5);ctx.quadraticCurveTo(h.x,h.y,h.x+5,h.y);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  // Rim connector
  ctx.fillStyle='#777';ctx.fillRect(h.x+h.w,h.y+h.h/2-2,8,4);
  // Net
  const nd=48,ns=8,nw=h.w-8;
  ctx.strokeStyle='rgba(255,255,255,0.42)';ctx.lineWidth=1.1;
  for(let i=0;i<=ns;i++){
    const t=i/ns,tx=h.x+4+t*nw;
    const bx=h.x+4+t*nw+netSway*Math.sin(t*Math.PI)*2.5;
    const by=h.y+h.h+nd+netSway*0.25;
    ctx.beginPath();ctx.moveTo(tx,h.y+h.h);
    for(let s=1;s<=8;s++){const st=s/8;ctx.lineTo(tx+(bx-tx)*st+netSway*Math.sin(st*Math.PI)*1.5,h.y+h.h+st*nd);}
    ctx.stroke();
  }
  for(let j=1;j<=3;j++){
    const st=j/4,yp=h.y+h.h+st*nd,sw=netSway*Math.sin(st*Math.PI)*2.5;
    ctx.beginPath();ctx.moveTo(h.x+4,yp);
    for(let i=0;i<=ns;i++){const t=i/ns;ctx.lineTo(h.x+4+t*nw+sw*Math.sin(t*Math.PI),yp);}ctx.stroke();
  }
}

function drawBall(x,y,r,angle){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.beginPath();ctx.ellipse(x+4,y+r+6,r*0.75,r*0.18,0,0,Math.PI*2);ctx.fill();
  ctx.translate(x,y);ctx.rotate(angle);
  const fire=ball.fire&&ball.shooting;
  const mega=megaPow>0;
  const c1=fire?'#cc4400':mega?'#2255bb':'#cc5500';
  const c2=fire?'#ff8800':mega?'#5588ff':'#ff9933';
  if(fire){ctx.shadowBlur=30;ctx.shadowColor='#ff6600';}
  else if(mega){ctx.shadowBlur=20;ctx.shadowColor='#4488ff';}
  const grad=ctx.createRadialGradient(-r*0.28,-r*0.28,2,0,0,r);
  grad.addColorStop(0,c2);grad.addColorStop(0.7,c1);grad.addColorStop(1,'#5a2200');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,0,0,0.28)';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(0,r);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.stroke();
  ctx.beginPath();ctx.arc(-r*0.3,0,r*0.72,-Math.PI/3,Math.PI/3);ctx.stroke();
  ctx.beginPath();ctx.arc(r*0.3,0,r*0.72,Math.PI*2/3,Math.PI*4/3);ctx.stroke();
  if(fire&&ball.shooting){
    ctx.fillStyle=`rgba(255,180,40,${0.28+Math.random()*0.38})`;
    ctx.beginPath();ctx.arc(-r*0.65,r*0.3,3+Math.random()*4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(r*0.5,-r*0.55,2+Math.random()*3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawTrajectory(){
  if(!dragging)return;
  let tx=ball.x,ty=ball.y;
  const sp=slowPow>0?0.55:1.0;
  let tvx=(dragSX-dragEX)*0.115*sp,tvy=(dragSY-dragEY)*0.115*sp;
  ctx.beginPath();ctx.moveTo(tx,ty);
  for(let i=0;i<55;i++){tx+=tvx;ty+=tvy;tvy+=GRAV;if(i%2===0)ctx.lineTo(tx,ty);}
  ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=2;ctx.setLineDash([5,8]);
  ctx.stroke();ctx.setLineDash([]);
  // Drag arrow from ball
  ctx.save();ctx.globalAlpha=0.45;
  ctx.strokeStyle='#ffd040';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(ball.x,ball.y);ctx.lineTo(dragEX,dragEY);ctx.stroke();
  ctx.restore();
}

function addParticles(x,y,clr,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*8;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,clr,r:2+Math.random()*5});}
}
function addScoreText(x,y,t,clr,sz){scoreTexts.push({x,y,t,clr,sz:sz||26,a:1});}
function addConfetti(n){
  const cols=['#ffd040','#ff4444','#00ccff','#44dd88','#aa55ff','#ff88cc'];
  for(let i=0;i<n;i++){confettis.push({x:Math.random()*c.width,y:-20,vx:(Math.random()-0.5)*5,vy:2+Math.random()*4,life:1,clr:cols[Math.floor(Math.random()*cols.length)],sz:4+Math.random()*8,rot:Math.random()*360,rv:(Math.random()-0.5)*14});}
}
function drawConfetti(){
  for(let i=confettis.length-1;i>=0;i--){
    const p=confettis[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.rot+=p.rv;p.life-=0.006;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
    ctx.globalAlpha=Math.max(p.life,0);ctx.fillStyle=p.clr;
    ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);ctx.restore();
    if(p.life<=0||p.y>c.height+20)confettis.splice(i,1);
  }
  ctx.globalAlpha=1;
}

function updateUI(){
  document.getElementById('score-val').textContent=score;
  const sv=document.getElementById('streak-val');
  sv.textContent=streak;sv.className='val'+(streak>=3?' hot':'');
  const acc=totalShots>0?Math.round(successShots/totalShots*100):'-';
  document.getElementById('acc-val').textContent=acc+(typeof acc==='number'?'%':'');
}
function updatePwrUI(){
  const row=document.getElementById('pwr-bar');
  row.innerHTML='';
  const rd=ROUNDS[Math.min(round,ROUNDS.length-1)];
  if(firePow>0||streak>=3){const d=document.createElement('div');d.className='pwr-tag';d.style.borderColor='#ff6600';d.textContent='🔥 ئوت توپ';row.appendChild(d);}
  if(magnetPow>0){const d=document.createElement('div');d.className='pwr-tag';d.style.borderColor='#00ccff';d.textContent='🧲 ماگنىت ×'+magnetPow;row.appendChild(d);}
  if(megaPow>0){const d=document.createElement('div');d.className='pwr-tag';d.style.borderColor='#4488ff';d.textContent='🔵 چوڭ توپ ×'+megaPow;row.appendChild(d);}
  if(slowPow>0){const d=document.createElement('div');d.className='pwr-tag';d.style.borderColor='#aa55ff';d.textContent='⏱ ئاستا ×'+slowPow;row.appendChild(d);}
}

requestAnimationFrame(loop);
</script>
