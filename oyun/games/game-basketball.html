<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏀 ۋاسكىتبول چولپىنى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(to bottom, #0077b6, #00b4d8, #caf0f8); font-family: 'Tajawal', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
        .ui-box { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); padding: 12px 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        #score-label { font-size: 2.2rem; font-weight: 900; color: #03045e; text-shadow: 2px 2px 0px white; }
        #high-score { font-size: 1rem; color: #023e8a; margin-top: -5px; }
        
        #streak-container { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        #streak-count { font-size: 2rem; font-weight: 900; color: #e63946; text-shadow: 0 0 10px rgba(230, 57, 70, 0.5); }
        #streak-label { font-size: 0.9rem; color: #e63946; font-weight: bold; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0, 119, 182, 0.6) 0%, rgba(2, 62, 138, 0.95) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(12px); color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 40px; padding: 45px; text-align: center; max-width: 85%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        
        .btn { padding: 18px 60px; font-size: 2.2rem; background: linear-gradient(135deg, #ffb703, #fb8500); color: #023e8a; border: none; border-radius: 60px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 900; margin-top: 30px; box-shadow: 0 10px 30px rgba(251, 133, 0, 0.4); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(251, 133, 0, 0.6); }
        
        h1 { font-size: 4rem; margin: 0 0 20px 0; background: linear-gradient(to bottom, #fff, #ffb703); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
        p { font-size: 1.6rem; color: #f1f8e9; line-height: 1.5; margin-bottom: 25px; }
        
        #back-btn { position: absolute; bottom: 30px; right: 30px; padding: 14px 35px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 20px; cursor: pointer; text-decoration: none; font-weight: 800; transition: all 0.3s; z-index: 10; }
        
        #combo-text { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 4.5rem; font-weight: 900; color: #ffb703; display: none; pointer-events: none; text-shadow: 0 0 30px rgba(255, 183, 3, 0.5); z-index: 50; white-space: nowrap; }

        #active-effects { position: absolute; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .effect-timer { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border-radius: 12px; padding: 8px 15px; border-left: 5px solid #fff; font-weight: bold; color: #03045e; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ui-box">
            <div id="score-label">نومۇر: 0</div>
            <div id="high-score">ئەڭ يۇقىرى: 0</div>
        </div>
        <div id="streak-container" class="ui-box">
            <div id="streak-count">X0</div>
            <div id="streak-label">ئۇدا ئۇتۇش</div>
        </div>
    </div>
    <div id="active-effects"></div>
    <div id="combo-text">ئاجايىپ!</div>
    <div id="overlay">
        <div class="glass-panel">
            <h1>🏀 ۋاسكىتبول چولپىنى</h1>
            <p>توپنى گارغا تاشلاپ نومۇر يىغىڭ! <br> ئۇدا ئۇتسىڭىز نومۇرىڭىز كۆپىيىدۇ. <br> سىزىقنى تارتىپ قويۇپ بېرىڭ.</p>
            <div id="final-stats" style="display:none; margin-bottom: 20px;">
                <h2 style="font-size: 2.8rem; color: #ffb703;">ئەزىمەت!</h2>
                <div id="last-score" style="font-size: 2.2rem; color: white;">ئاخىرقى نومۇر: 0</div>
            </div>
            <button class="btn" onclick="startGame()">باشلاش</button>
        </div>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let gameActive = false, score = 0, highScore = localStorage.getItem('basketball_highscore') || 0;
        let audioCtx, streak = 0, particles = [];
        const gravity = 0.45;
        
        let ball = { x: 0, y: 0, r: 25, vx: 0, vy: 0, isShooting: false, isDragging: false, startX: 0, startY: 0, fire: false };
        let hoop = { x: 0, y: 0, w: 100, h: 12, targetY: 0, dir: 1, speed: 2 };
        let effects = { magnet: 0 };

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(f, d, type = 'sine') {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination); let now = audioCtx.currentTime;
            o.type = type; o.frequency.setValueAtTime(f, now); o.frequency.exponentialRampToValueAtTime(f/2, now + d);
            g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + d);
            o.start(now); o.stop(now + d);
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, color });
            }
        }

        function resetRound() {
            ball.x = 150;
            ball.y = canvas.height - 150;
            ball.vx = 0; ball.vy = 0;
            ball.isShooting = false;
            ball.fire = streak >= 3;
            
            hoop.x = canvas.width - 200 - Math.random() * 100;
            hoop.y = canvas.height / 3 + Math.random() * 150;
            hoop.targetY = hoop.y;
            
            if(effects.magnet > 0) effects.magnet--;
            updateUI();
        }

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('final-stats').style.display = 'none';
            score = 0; streak = 0; effects.magnet = 0;
            gameActive = true;
            resetRound();
            animate();
        }

        function updateUI() {
            document.getElementById('score-label').innerText = `نومۇر: ${score}`;
            document.getElementById('streak-count').innerText = `X${streak}`;
            document.getElementById('streak-count').style.color = streak >= 3 ? '#ffb703' : '#e63946';
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('basketball_highscore', highScore);
                document.getElementById('high-score').innerText = `ئەڭ يۇقىرى: ${highScore}`;
            }
            const cont = document.getElementById('active-effects');
            cont.innerHTML = '';
            if(effects.magnet > 0) cont.innerHTML += `<div class="effect-timer">🧲 ماگنىت (${effects.magnet})</div>`;
        }

        function showCombo(txt) {
            const el = document.getElementById('combo-text');
            el.innerText = txt; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 1000);
        }

        let dragEndX = 0, dragEndY = 0;
        const handleStart = (x, y) => {
            if(!gameActive || ball.isShooting) return;
            if(Math.hypot(ball.x - x, ball.y - y) < 150) {
                ball.isDragging = true; ball.startX = x; ball.startY = y; dragEndX = x; dragEndY = y;
            }
        };
        const handleMove = (x, y) => { if(ball.isDragging) { dragEndX = x; dragEndY = y; } };
        const handleEnd = () => {
            if(ball.isDragging) {
                ball.isDragging = false; ball.isShooting = true;
                ball.vx = (ball.startX - dragEndX) * 0.12;
                ball.vy = (ball.startY - dragEndY) * 0.12;
                playSound(300, 0.2);
            }
        };

        window.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', e => { if(e.target.tagName !== 'BUTTON') { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); } }, {passive: false});
        window.addEventListener('touchmove', e => { if(ball.isDragging) { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); } }, {passive: false});
        window.addEventListener('touchend', e => { e.preventDefault(); handleEnd(); });

        function drawStadium() {
            // Court Floor
            ctx.fillStyle = '#023e8a'; ctx.fillRect(0, canvas.height-100, canvas.width, 100);
            // Crowd silhouettes
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.arc(i, canvas.height-100, 20, Math.PI, 0); ctx.fill();
            }
            // Lights
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.beginPath(); ctx.moveTo(100,0); ctx.lineTo(0,200); ctx.lineTo(300,200); ctx.fill();
            ctx.beginPath(); ctx.moveTo(canvas.width-100,0); ctx.lineTo(canvas.width,200); ctx.lineTo(canvas.width-300,200); ctx.fill();
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStadium();

            // Moving Hoop logic
            if(score >= 50) {
                hoop.y += hoop.speed * hoop.dir;
                if(hoop.y > canvas.height - 300 || hoop.y < 100) hoop.dir *= -1;
            }

            // Draw Hoop
            ctx.fillStyle = '#ccc'; ctx.fillRect(hoop.x + hoop.w - 10, hoop.y, 10, canvas.height - hoop.y - 100); // Pole
            ctx.fillStyle = '#fff'; ctx.fillRect(hoop.x + hoop.w, hoop.y - 60, 15, 120); // Backboard
            ctx.fillStyle = '#e63946'; ctx.fillRect(hoop.x, hoop.y, hoop.w, hoop.h); // Rim
            // Net
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(hoop.x, hoop.y+hoop.h); ctx.lineTo(hoop.x+15, hoop.y+hoop.h+45);
            ctx.moveTo(hoop.x+hoop.w, hoop.y+hoop.h); ctx.lineTo(hoop.x+hoop.w-15, hoop.y+hoop.h+45); ctx.stroke();

            // Ball Physics
            if(ball.isShooting) {
                // Magnet powerup
                if(effects.magnet > 0 && Math.hypot(ball.x - (hoop.x + hoop.w/2), ball.y - hoop.y) < 150) {
                    ball.vx += ((hoop.x + hoop.w/2) - ball.x) * 0.05;
                    ball.vy += (hoop.y - ball.y) * 0.05;
                }
                
                ball.vy += gravity; ball.x += ball.vx; ball.y += ball.vy;

                // Fire Particles
                if(ball.fire) createExplosion(ball.x, ball.y, '#ffb703');

                // Hit Rim
                if(ball.vy > 0 && ball.x > hoop.x && ball.x < hoop.x + hoop.w && ball.y + ball.r > hoop.y && ball.y - ball.r < hoop.y + hoop.h) {
                    playSound(800, 0.3, 'sine');
                    let points = 10 + streak * 5;
                    if(ball.fire) points *= 2;
                    score += points; streak++;
                    if(streak % 5 === 0) { effects.magnet = 3; showCombo("🧲 ماگنىت!"); }
                    if(streak === 3) showCombo("🔥 ئوتلۇق توپ!");
                    createExplosion(ball.x, ball.y, '#fff');
                    ball.isShooting = false;
                    setTimeout(resetRound, 500);
                }

                // Missed
                if(ball.y > canvas.height + 100 || ball.x > canvas.width + 100 || ball.x < -100) {
                    streak = 0; ball.isShooting = false;
                    setTimeout(resetRound, 500);
                }
            }

            if(ball.isDragging) {
                let tx = ball.x, ty = ball.y, tvx = (ball.startX - dragEndX) * 0.12, tvy = (ball.startY - dragEndY) * 0.12;
                ctx.beginPath(); ctx.moveTo(tx, ty);
                for(let i=0; i<40; i++) {
                    tx += tvx; ty += tvy; tvy += gravity;
                    if(i % 3 === 0) ctx.lineTo(tx, ty); else ctx.moveTo(tx, ty);
                }
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 3; ctx.stroke();
            }

            // Draw Ball
            ctx.save(); ctx.translate(ball.x, ball.y);
            ctx.fillStyle = ball.fire ? '#fb8500' : '#f4a261';
            ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            // Ball lines
            ctx.beginPath(); ctx.moveTo(-ball.r, 0); ctx.lineTo(ball.r, 0); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -ball.r); ctx.lineTo(0, ball.r); ctx.stroke();
            ctx.restore();

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 4, 4);
                if(p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;
        }
    </script>
</body>
</html>
