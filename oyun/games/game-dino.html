<!DOCTYPE html>
<html lang="ug">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦕 دېنو سەكرەش - Dino Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a2e;font-family:sans-serif;touch-action:none}
canvas{display:block}
#ui{position:absolute;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;pointer-events:none;z-index:5;gap:8px}
#ui>div{background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15);padding:8px 18px;border-radius:14px;text-align:center;color:#fff;min-width:70px}
#ui .l{font-size:0.7rem;color:#94a3b8}
#ui .v{font-size:1.8rem;font-weight:900;color:#fbbf24;text-shadow:0 0 20px rgba(251,191,36,0.3)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(10px)}
#overlay.hidden{display:none}
.obox{background:linear-gradient(145deg,#1e3a1e,#0d2b0d);border:2px solid rgba(34,197,94,0.3);border-radius:30px;padding:2.5rem;text-align:center;max-width:500px;width:90%;animation:popIn 0.5s}
@keyframes popIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
.obox h1{font-size:3rem;margin-bottom:5px}
.obox .title{font-size:2rem;font-weight:900;color:#22c55e;margin:8px 0;text-shadow:0 0 20px rgba(34,197,94,0.3)}
.obox p{color:#94a3b8;font-size:1.1rem;line-height:1.6;margin:10px 0 20px}
.btn{padding:16px 50px;font-size:1.4rem;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;border-radius:50px;cursor:pointer;font-weight:900;box-shadow:0 8px 25px rgba(34,197,94,0.4);transition:transform 0.15s}
.btn:active{transform:scale(0.92)}
.stats{display:flex;justify-content:center;gap:20px;margin:15px 0}
.stats .s{text-align:center}
.stats .s .val{font-size:2rem;font-weight:900;color:#fbbf24}
.stats .s .lbl{font-size:0.8rem;color:#94a3b8}
#back-btn{position:fixed;bottom:20px;left:20px;padding:10px 20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:12px;cursor:pointer;text-decoration:none;font-size:0.9rem;z-index:10;backdrop-filter:blur(8px)}
</style>
</head>
<body>
<div id="ui">
<div><div class="l">نومۇر</div><div class="v" id="score">0</div></div>
<div><div class="l">مۇساپە</div><div class="v" id="dist">0</div></div>
<div><div class="l">سۈرئەت</div><div class="v" id="spd">×1</div></div>
</div>
<div id="overlay">
<div class="obox">
<h1>🦕🌴</h1>
<div class="title">دېنو سەكرەش</div>
<p>دېنو بىلەن يۈگۈرۈڭ! توساقلاردىن سەكرەپ، مىقدارلارنى يىغىڭ! قۇشلاردىن ساقلىنىش ئۈچۈن ئېگىز سەكرەڭ! قانچە يىراققا بارالايسىز؟</p>
<div id="final-stats" class="stats" style="display:none">
<div class="s"><div class="val" id="f-score">0</div><div class="lbl">نومۇر</div></div>
<div class="s"><div class="val" id="f-dist">0</div><div class="lbl">مۇساپە</div></div>
<div class="s"><div class="val" id="f-best">0</div><div class="lbl">ئەڭ ياخشى</div></div>
</div>
<button class="btn" onclick="startGame()">🏃 باشلاش</button>
<p style="color:#64748b;font-size:0.8rem;margin-top:8px">بوئۇت ياكى بارماق چېكىش → سەكرەش</p>
</div>
</div>
<canvas id="c"></canvas>
<a id="back-btn" href="../index.html">← كەينىگە</a>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

let gameActive=false,score=0,distance=0,speedMult=1;
let dino={x:0,y:0,w:50,h:70,vy:0,jumping:false,ducking:false,frame:0};
const GRAVITY=0.8,JUMP_F=-14,GROUND_Y=0;
let obstacles=[],coins=[],clouds=[],particles=[],groundOffset=0,frame=0;
let canJump=true,bestScore=0;
let audioCtx=null;
try{bestScore=parseInt(localStorage.getItem('dinoBest'))||0}catch(e){}

function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function playTone(f,d,t,v){if(!audioCtx)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+d)}catch(e){}}
function playJump(){playTone(300,0.08,'sine',0.1);setTimeout(()=>playTone(500,0.06,'sine',0.08),50)}
function playCoin(){playTone(1200,0.06,'sine',0.08);setTimeout(()=>playTone(1500,0.06,'sine',0.06),50)}
function playHit(){playTone(200,0.2,'sawtooth',0.15);setTimeout(()=>playTone(100,0.3,'sawtooth',0.12),100)}
function playDuck(){playTone(200,0.05,'sine',0.06)}

const COIN_TYPES=[
{emoji:'🪙',color:'#fbbf24',points:10,speed:1},
{emoji:'💎',color:'#10b981',points:30,speed:0.8,rare:true},
{emoji:'🌟',color:'#a855f7',points:20,speed:0.9},
];

const OBSTACLE_TYPES=[
{emoji:'🌵',color:'#22c55e',w:30,h:50},
{emoji:'🌵',color:'#16a34a',w:35,h:60},
{emoji:'🪨',color:'#666',w:40,h:35},
];
const BIRD={emoji:'🐦',color:'#e74c3c',w:40,h:30};

document.addEventListener('keydown',e=>{
if((e.key===' '||e.key==='ArrowUp'||e.key==='w')&&gameActive){e.preventDefault();jump()}
if((e.key==='ArrowDown'||e.key==='s')&&gameActive){duck(true)}
if(!gameActive&&(e.key===' '||e.key==='Enter')){e.preventDefault();startGame()}
})
document.addEventListener('keyup',e=>{
if(e.key==='ArrowDown'||e.key==='s'){duck(false)}
})
c.addEventListener('click',()=>{if(gameActive)jump();else startGame()})
c.addEventListener('touchstart',e=>{if(gameActive&&(e.target.tagName!=='BUTTON'&&e.target.tagName!=='A')){e.preventDefault();jump()}},{passive:false})

function jump(){
if(!dino.jumping&&canJump){
dino.jumping=true;dino.vy=JUMP_F;dino.ducking=false;
playJump();
}
}
function duck(v){
if(dino.jumping)return;
dino.ducking=v;
if(v)playDuck();
}

function startGame(){
initAudio();
document.getElementById('overlay').classList.add('hidden');
score=0;distance=0;speedMult=1;
dino.y=GROUND_Y;dino.jumping=false;dino.vy=0;dino.ducking=false;dino.frame=0;
obstacles=[];coins=[];clouds=[];particles=[];
groundOffset=0;frame=0;canJump=true;
gameActive=true;
// Generate clouds
for(let i=0;i<5;i++)clouds.push({x:Math.random()*c.width,y:30+Math.random()*100,w:80+Math.random()*100,speed:0.2+Math.random()*0.3});
updateUI();
requestAnimationFrame(update);
}

function spawnObstacle(){
// 70% cactus, 30% bird
if(Math.random()<0.3&&obstacles.filter(o=>o.bird).length<2){
obstacles.push({...BIRD,bird:true,x:c.width+50,y:GROUND_Y-50-Math.random()*30,passed:false});
}else{
const t=OBSTACLE_TYPES[Math.floor(Math.random()*OBSTACLE_TYPES.length)];
obstacles.push({...t,bird:false,x:c.width+50,y:GROUND_Y-t.h,passed:false});
}
}

function spawnCoin(){
const t=COIN_TYPES[Math.random()<0.15?Math.floor(Math.random()*COIN_TYPES.length):0];
coins.push({...t,x:c.width+50,y:GROUND_Y-40-Math.random()*60,vy:-2-Math.random()*2,passed:false,glow:0});
}

function update(){
if(!gameActive)return;
requestAnimationFrame(update);
frame++;
speedMult=1+distance*0.002;
if(speedMult>5)speedMult=5;
groundOffset=(groundOffset+6*speedMult)%20;
distance++;

// Dino physics
if(dino.jumping){
dino.vy+=GRAVITY;
dino.y+=dino.vy;
if(dino.y>=GROUND_Y){dino.y=GROUND_Y;dino.jumping=false;dino.vy=0}
}
dino.frame+=0.1;

// Spawn
const spawnRate=Math.max(20,70-distance*0.02);
if(frame%Math.floor(spawnRate)===0)spawnObstacle();
if(frame%8===0)spawnCoin();

// Update obstacles
for(let i=obstacles.length-1;i>=0;i--){
const o=obstacles[i];
o.x-=4*speedMult;
if(o.x+o.w<-50){obstacles.splice(i,1);continue}
// Collision
const dx=dino.x+dino.w/2-(o.x+o.w/2);
const dy=dino.y+dino.h/2-(o.y+o.h/2);
const dw=dino.w/2+(o.bird?o.w/2-10:o.w/2-8);
const dh=(dino.ducking?dino.h*0.6:dino.h)/2+(o.bird?o.h/2-8:o.h/2-8);
if(Math.abs(dx)<dw&&Math.abs(dy)<dh){
playHit();
for(let j=0;j<20;j++)particles.push({x:dino.x+dino.w/2,y:dino.y+dino.h/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,life:1,color:'#ff4444'});
endGame();return;
}
}

// Update coins
for(let i=coins.length-1;i>=0;i--){
const c2=coins[i];
c2.x-=4*speedMult;
c2.y+=c2.vy+Math.sin(frame*0.05+i)*0.5;
c2.vy+=0.05;if(c2.vy>3)c2.vy=3;
c2.glow=Math.sin(frame*0.1+i)*0.3+0.7;
if(c2.x<-30){coins.splice(i,1);continue}
// Collection
const dx=dino.x+dino.w/2-c2.x;
const dy=dino.y+dino.h/2-c2.y;
if(Math.abs(dx)<dino.w/2+15&&Math.abs(dy)<dino.h/2+15){
playCoin();score+=c2.points;
for(let j=0;j<8;j++)particles.push({x:c2.x,y:c2.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:1,color:c2.color});
coins.splice(i,1);
updateUI();
}
}

// Clouds
for(const c2 of clouds){c2.x-=c2.speed*speedMult;if(c2.x+c2.w<0)c2.x=c.width+Math.random()*100}

// Particles
for(let i=particles.length-1;i>=0;i--){
const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.025;
if(p.life<=0)particles.splice(i,1);
}

// Dino running particles
if(!dino.jumping&&frame%3===0){
particles.push({x:dino.x+10,y:dino.y+dino.h,vx:(Math.random()-0.5)*2,vy:-1-Math.random()*2,life:0.5,color:'#94a3b8'});
}

// Update score
score+=Math.floor(speedMult);
updateUI();

// DRAW
const groundY=GROUND_Y;
ctx.clearRect(0,0,c.width,c.height);

// Sky gradient
const skyGrad=ctx.createLinearGradient(0,0,0,c.height);
skyGrad.addColorStop(0,'#87CEEB');skyGrad.addColorStop(0.7,'#b8e6ff');skyGrad.addColorStop(1,'#90d5a0');
ctx.fillStyle=skyGrad;ctx.fillRect(0,0,c.width,c.height);

// Clouds
for(const c2 of clouds){
ctx.fillStyle='rgba(255,255,255,0.7)';
ctx.beginPath();ctx.ellipse(c2.x+c2.w*0.3,c2.y+10,c2.w*0.4,15,0,0,Math.PI*2);
ctx.ellipse(c2.x+c2.w*0.6,c2.y,c2.w*0.35,18,0,0,Math.PI*2);
ctx.ellipse(c2.x+c2.w*0.5,c2.y+12,c2.w*0.3,12,0,0,Math.PI*2);
ctx.fill();
}

// Mountains
ctx.fillStyle='#8b9d6b';
ctx.beginPath();ctx.moveTo(0,groundY);
for(let i=0;i<10;i++){
const mx=i*c.width/10;
const my=groundY-80-Math.sin(i*2.5+frame*0.01)*40-Math.cos(i*1.3)*20;
ctx.lineTo(mx,my);
}
ctx.lineTo(c.width,groundY);ctx.closePath();ctx.fill();

ctx.fillStyle='#6b8a4e';
ctx.beginPath();ctx.moveTo(0,groundY);
for(let i=0;i<12;i++){
const mx=i*c.width/12+20;
const my=groundY-50-Math.sin(i*1.7+frame*0.008)*30-Math.cos(i*0.9)*15;
ctx.lineTo(mx,my);
}
ctx.lineTo(c.width,groundY);ctx.closePath();ctx.fill();

// Ground
ctx.fillStyle='#4a7c3f';
ctx.fillRect(0,groundY,c.width,c.height-groundY);
// Ground line
ctx.strokeStyle='#3a6c2f';ctx.lineWidth=3;
ctx.beginPath();ctx.moveTo(0,groundY);ctx.lineTo(c.width,groundY);
ctx.stroke();
// Ground texture
ctx.fillStyle='#5a8c4f';
for(let i=-groundOffset;i<c.width;i+=15){
ctx.fillRect(i,groundY+5,8,3);
ctx.fillRect(i+7,groundY+12,6,2);
}

// Coins
for(const c2 of coins){
ctx.save();ctx.translate(c2.x,c2.y);
ctx.shadowColor=c2.color;ctx.shadowBlur=20*c2.glow;
ctx.fillStyle=c2.color;
ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0;
ctx.font='12px sans-serif';
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(c2.emoji,0,1);
ctx.restore();
}

// Obstacles
for(const o of obstacles){
ctx.save();ctx.translate(o.x+o.w/2,o.y+o.h/2);
if(o.bird){
ctx.shadowColor='#e74c3c';ctx.shadowBlur=15;
ctx.fillStyle='#c0392b';
ctx.beginPath();ctx.ellipse(0,0,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0;
ctx.font='20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('🐦',0,0);
// Wings
const wingY=Math.sin(frame*0.15)*6;
ctx.fillStyle='rgba(255,255,255,0.3)';
ctx.beginPath();ctx.ellipse(-o.w/2-5,wingY,12,6,0.3,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(o.w/2+5,-wingY,12,6,-0.3,0,Math.PI*2);ctx.fill();
}else{
ctx.fillStyle=o.color;
ctx.shadowColor='#000';ctx.shadowBlur=10;
// Cactus body
ctx.fillRect(-o.w/2,-o.h/2,o.w,o.h);
// Arms
ctx.fillRect(-o.w/2-8,-o.h/4,8,15);
ctx.fillRect(o.w/2,-o.h/3,8,12);
ctx.fillStyle='#2d8a4e';
ctx.fillRect(-o.w/2+4,-o.h/2+4,o.w-8,4);
}
ctx.restore();
}

// Dino
ctx.save();
ctx.translate(dino.x+dino.w/2,dino.y+dino.h/2);
ctx.shadowColor='#22c55e';ctx.shadowBlur=10;
if(dino.ducking){
// Ducking dino
ctx.fillStyle='#22c55e';
ctx.fillRect(-dino.w/2,-dino.h*0.3,dino.w,dino.h*0.6);
ctx.fillRect(dino.w/2-5,-dino.h*0.2,15,15);
ctx.fillStyle='#fff';
ctx.beginPath();ctx.arc(dino.w/4,-dino.h*0.15,5,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';
ctx.beginPath();ctx.arc(dino.w/4+2,-dino.h*0.15,2,0,Math.PI*2);ctx.fill();
}else{
// Normal dino
const legAnim=Math.sin(frame*0.3)*10;
ctx.fillStyle='#22c55e';
// Body
ctx.beginPath();
ctx.moveTo(-dino.w/2,dino.h/2);
ctx.quadraticCurveTo(-dino.w/2-5,0,-dino.w/2+5,-dino.h/2);
ctx.lineTo(dino.w/2-5,-dino.h/2);
ctx.quadraticCurveTo(dino.w/2+5,0,dino.w/2,dino.h/2);
ctx.closePath();ctx.fill();
// Spikes on back
ctx.fillStyle='#16a34a';
for(let i=0;i<4;i++){
const sx=-dino.w/2+8+i*10;
const sy=-dino.h/2+5+i*8;
ctx.beginPath();ctx.moveTo(sx-3,sy);ctx.lineTo(sx,sy-10);ctx.lineTo(sx+3,sy);ctx.fill();
}
// Eye
ctx.fillStyle='#fff';
ctx.beginPath();ctx.arc(dino.w/4,-dino.h/4,7,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';
ctx.beginPath();ctx.arc(dino.w/4+2,-dino.h/4,3.5,0,Math.PI*2);ctx.fill();
// Mouth
ctx.strokeStyle='#16a34a';ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(dino.w/2-5,0);ctx.lineTo(dino.w/2-12,5);ctx.stroke();
// Legs
ctx.fillStyle='#1a8a3e';
ctx.fillRect(-dino.w/2+5,dino.h/2-5,8,5+legAnim*0.5);
ctx.fillRect(dino.w/2-15,dino.h/2-5,8,5-legAnim*0.5);
// Tail
ctx.fillStyle='#16a34a';
ctx.beginPath();ctx.moveTo(-dino.w/2,-dino.h/4);
ctx.quadraticCurveTo(-dino.w/2-20,-dino.h/2+5,-dino.w/2-15,dino.h/4);
ctx.fill();
}
ctx.shadowBlur=0;
ctx.restore();

// Particles
for(const p of particles){
ctx.globalAlpha=p.life;
ctx.fillStyle=p.color;
ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
}
ctx.globalAlpha=1;
}

function updateUI(){
document.getElementById('score').textContent=Math.floor(score);
document.getElementById('dist').textContent=Math.floor(distance);
document.getElementById('spd').textContent=`×${speedMult.toFixed(1)}`;
}

function endGame(){
gameActive=false;
try{if(Math.floor(score)>bestScore){bestScore=Math.floor(score);localStorage.setItem('dinoBest',bestScore)}}catch(e){}
document.getElementById('overlay').classList.remove('hidden');
document.querySelector('.obox .title').textContent='🏆 ئويۇن تۈگدى!';
document.querySelector('.obox p').textContent=`سىز ${Math.floor(distance)} مۇساپە يۈگۈردىڭىز!`;
document.getElementById('final-stats').style.display='flex';
document.getElementById('f-score').textContent=Math.floor(score);
document.getElementById('f-dist').textContent=Math.floor(distance);
document.getElementById('f-best').textContent=bestScore;
document.querySelector('.btn').textContent='🔄 قايتا باشلاش';
}
</script>
</body>
</html>
