<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏓 پىڭپوڭ توپ: چاققانلىق سىنىقى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #0b0c10; font-family: 'Tajawal', sans-serif; color: white; touch-action: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .score-board { display: flex; justify-content: space-between; width: 80%; max-width: 400px; position: absolute; top: 50%; transform: translateY(-50%); opacity: 0.2; font-size: 15rem; font-weight: 900; z-index: -1; }
        #score-ai { color: #ff0055; text-shadow: 0 0 50px #ff0055; }
        #score-player { color: #00f2ff; text-shadow: 0 0 50px #00f2ff; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 12, 16, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .btn { padding: 18px 60px; font-size: 1.8rem; background: linear-gradient(135deg, #00f2ff, #0066cc); color: white; border: none; border-radius: 50px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 900; margin-top: 30px; box-shadow: 0 10px 30px rgba(0, 242, 255, 0.4); }
        h1 { font-size: 4rem; margin-bottom: 10px; color: #00f2ff; text-shadow: 0 0 20px rgba(0, 242, 255, 0.8); }
        p { font-size: 1.4rem; max-width: 600px; text-align: center; line-height: 1.6; color: #c5c6c7; }
        #back-btn { position: absolute; bottom: 20px; left: 20px; padding: 12px 24px; background: rgba(255,255,255,0.1); border: 1px solid #00f2ff; color: #00f2ff; border-radius: 15px; cursor: pointer; text-decoration: none; font-weight: bold; pointer-events: auto; }
        
        .line { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-style: dashed; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="score-board">
            <span id="score-ai">0</span>
            <span id="score-player">0</span>
        </div>
        <div class="line"></div>
    </div>
    
    <div id="overlay">
        <h1>🏓 پىڭپوڭ توپ</h1>
        <p>تاختىنى سۈرۈپ توپنى قايتۇرۇڭ! <br> كىم ئاۋۋال 5 نومۇر ئالسا شۇ ئۇتىدۇ. <br> سىز كۆك، كومپيۇتېر قىزىل رەڭدە.</p>
        <button class="btn" onclick="startGame()">ئويناش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>
    
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let gameActive = false;
        let audioCtx;
        
        const winningScore = 5;
        let player = { x: 0, y: 0, width: 120, height: 15, color: '#00f2ff', score: 0 };
        let ai = { x: 0, y: 0, width: 120, height: 15, color: '#ff0055', score: 0 };
        let ball = { x: 0, y: 0, radius: 12, vx: 0, vy: 0, speed: 5, color: '#fff' };
        
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            let now = audioCtx.currentTime;
            
            if(type === 'hit') {
                o.type = 'square'; o.frequency.setValueAtTime(600, now); o.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.start(now); o.stop(now + 0.1);
            } else if(type === 'wall') {
                o.type = 'triangle'; o.frequency.setValueAtTime(300, now);
                g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.start(now); o.stop(now + 0.1);
            } else if(type === 'score') {
                o.type = 'sine'; o.frequency.setValueAtTime(400, now); o.frequency.linearRampToValueAtTime(800, now + 0.3);
                g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0.01, now + 0.3);
                o.start(now); o.stop(now + 0.3);
            } else if(type === 'win') {
                o.type = 'sine'; o.frequency.setValueAtTime(400, now); o.frequency.linearRampToValueAtTime(600, now+0.2); o.frequency.linearRampToValueAtTime(1000, now+0.4);
                g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now + 0.5);
                o.start(now); o.stop(now + 0.5);
            } else if(type === 'lose') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(300, now); o.frequency.linearRampToValueAtTime(100, now+0.5);
                g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0, now + 0.5);
                o.start(now); o.stop(now + 0.5);
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = 4; // Start very slow for kids
            let dir = Math.random() > 0.5 ? 1 : -1;
            ball.vy = dir * ball.speed;
            ball.vx = (Math.random() - 0.5) * 4;
        }

        function init() {
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - 50;
            ai.x = canvas.width / 2 - ai.width / 2;
            ai.y = 35;
            resetBall();
        }

        function movePlayer(clientX) {
            if(!gameActive) return;
            player.x = clientX - player.width / 2;
            if(player.x < 0) player.x = 0;
            if(player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        }

        window.addEventListener('mousemove', e => movePlayer(e.clientX));
        window.addEventListener('touchmove', e => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
                e.preventDefault();
                movePlayer(e.touches[0].clientX);
            }
        }, {passive: false});

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            player.score = 0;
            ai.score = 0;
            updateScoreUI();
            init();
            gameActive = true;
            animate();
        }

        function updateScoreUI() {
            document.getElementById('score-player').innerText = player.score;
            document.getElementById('score-ai').innerText = ai.score;
        }

        function gameOver(playerWon) {
            gameActive = false;
            playSound(playerWon ? 'win' : 'lose');
            document.getElementById('overlay').style.display = 'flex';
            document.querySelector('#overlay h1').innerText = playerWon ? "🎉 سىز ئۇتتۇڭىز!" : "😔 كومپيۇتېر ئۇتتى!";
            document.querySelector('#overlay p').innerText = `سىز: ${player.score} - كومپيۇتېر: ${ai.score}\nقايتا ئويناپ بېقىڭ!`;
        }

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            
            // Clear screen with trail effect
            ctx.fillStyle = 'rgba(11, 12, 16, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Move ball
            ball.x += ball.vx;
            ball.y += ball.vy;

            // AI Movement - Make it easy (delayed and slow)
            let aiCenter = ai.x + ai.width / 2;
            let targetX = ball.x;
            // AI only moves when ball is coming towards it
            if(ball.vy < 0) {
                if(aiCenter < targetX - 20) ai.x += 3.5;
                else if(aiCenter > targetX + 20) ai.x -= 3.5;
            }
            if(ai.x < 0) ai.x = 0;
            if(ai.x + ai.width > canvas.width) ai.x = canvas.width - ai.width;

            // Wall Collision (Left & Right)
            if(ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                ball.vx *= -1;
                playSound('wall');
            }

            // Paddle Collision function
            function collision(b, p) {
                p.top = p.y;
                p.bottom = p.y + p.height;
                p.left = p.x;
                p.right = p.x + p.width;
                
                b.top = b.y - b.radius;
                b.bottom = b.y + b.radius;
                b.left = b.x - b.radius;
                b.right = b.x + b.radius;
                
                return p.left < b.right && p.top < b.bottom && p.right > b.left && p.bottom > b.top;
            }

            // Hit Player
            if(collision(ball, player)) {
                playSound('hit');
                let collidePoint = (ball.x - (player.x + player.width/2)) / (player.width/2);
                let angleRad = (Math.PI/4) * collidePoint;
                
                let direction = -1; // up
                ball.speed += 0.2; // gradually speed up
                if(ball.speed > 10) ball.speed = 10;
                
                ball.vx = ball.speed * Math.sin(angleRad);
                ball.vy = direction * ball.speed * Math.cos(angleRad);
            }

            // Hit AI
            if(collision(ball, ai)) {
                playSound('hit');
                let collidePoint = (ball.x - (ai.x + ai.width/2)) / (ai.width/2);
                let angleRad = (Math.PI/4) * collidePoint;
                
                let direction = 1; // down
                ball.speed += 0.2;
                if(ball.speed > 10) ball.speed = 10;
                
                ball.vx = ball.speed * Math.sin(angleRad);
                ball.vy = direction * ball.speed * Math.cos(angleRad);
            }

            // Scoring
            if(ball.y - ball.radius < 0) {
                player.score++;
                playSound('score');
                updateScoreUI();
                if(player.score >= winningScore) gameOver(true);
                else resetBall();
            } else if(ball.y + ball.radius > canvas.height) {
                ai.score++;
                playSound('score');
                updateScoreUI();
                if(ai.score >= winningScore) gameOver(false);
                else resetBall();
            }

            // Draw Entities
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);
            drawCircle(ball.x, ball.y, ball.radius, ball.color);
        }
    </script>
</body>
</html>
