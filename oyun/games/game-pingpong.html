<!DOCTYPE html>
<html lang="ug">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ مەيدان توپى</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;touch-action:none;user-select:none;background:#060810}
canvas{display:block}
#score-board{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;display:flex;flex-direction:column;justify-content:space-between;padding:70px 0 24px}
.score-ghost{text-align:center;font-size:22vw;font-weight:900;line-height:1;opacity:0.07;pointer-events:none}
#sg-ai{color:#ff3366}
#sg-pl{color:#00ccff}
#top-bar{position:absolute;top:0;left:0;right:0;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:6;background:rgba(0,0,0,0.72);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06)}
.tb-box{text-align:center;min-width:72px}
.tb-lbl{font-size:0.6rem;color:#666;letter-spacing:1.5px;font-weight:700}
.tb-val{font-size:1.65rem;font-weight:900}
#ai-score-d{color:#ff3366;text-shadow:0 0 18px #ff336655}
#pl-score-d{color:#00ccff;text-shadow:0 0 18px #00ccff55}
#rally-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:7;pointer-events:none;font-size:1.3rem;font-weight:900;color:#ffd040;text-shadow:0 0 22px #ffd04088;opacity:0;transition:opacity 0.25s}
#round-badge{background:linear-gradient(135deg,#1a0028,#330050);color:#cc88ff;padding:5px 18px;border-radius:20px;font-size:0.85rem;font-weight:900;border:1px solid rgba(180,80,255,0.3);white-space:nowrap}
.overlay-dark{position:fixed;inset:0;background:rgba(2,0,8,0.96);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(22px)}
.overlay-dark.hidden{display:none}
.fancy-box{background:linear-gradient(148deg,#08001a,#14003a);border:3px solid rgba(140,60,255,0.5);border-radius:32px;padding:2.3rem;text-align:center;max-width:520px;width:92%;animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);box-shadow:0 22px 70px rgba(100,0,255,0.3)}
@keyframes popIn{from{opacity:0;transform:scale(0.35) rotate(-6deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.fact-icon{font-size:3.8rem;margin-bottom:6px;animation:bncA 1.1s infinite}
@keyframes bncA{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.fact-title{font-size:1.75rem;font-weight:900;color:#cc88ff;margin-bottom:10px;text-shadow:0 0 18px #cc88ff33}
.fact-body{color:#d0b8f0;font-size:1rem;line-height:1.85;direction:rtl;text-align:right;background:rgba(120,0,255,0.1);padding:12px 15px;border-radius:13px;border-right:4px solid #8844cc;margin-bottom:14px}
.big-btn{padding:13px 45px;font-size:1.3rem;background:linear-gradient(135deg,#5500cc,#9922ff);color:#fff;border:none;border-radius:50px;cursor:pointer;font-weight:900;box-shadow:0 8px 26px rgba(120,0,255,0.5);transition:transform 0.15s;display:inline-block;margin:3px}
.big-btn:hover{transform:scale(1.06)}
.big-btn:active{transform:scale(0.93)}
.big-btn.cyan{background:linear-gradient(135deg,#006688,#00ccff);color:#000;box-shadow:0 8px 26px rgba(0,180,255,0.4)}
.game-title{font-size:2.2rem;font-weight:900;color:#cc88ff;margin:6px 0;text-shadow:0 0 20px #cc88ff44}
.game-desc{color:#7755aa;font-size:1rem;line-height:1.85;margin:8px 0 15px;direction:rtl;text-align:right}
.stats-row{display:flex;justify-content:center;gap:10px;margin:10px 0;flex-wrap:wrap}
.stat-c{background:rgba(100,0,200,0.12);border-radius:13px;padding:10px 14px;text-align:center;min-width:73px;border:1px solid rgba(140,60,255,0.22)}
.stat-c .sv{font-size:1.85rem;font-weight:900;color:#cc88ff}
.stat-c .sl{font-size:0.72rem;color:#7755aa;margin-top:2px}
#lose-popup{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(15px)}
#lose-popup.hidden{display:none}
.lose-box{background:linear-gradient(148deg,#1a0005,#2e0008);border:3px solid rgba(255,30,60,0.5);border-radius:28px;padding:2rem;text-align:center;max-width:400px;width:88%;animation:popIn 0.4s ease}
#back-btn{position:fixed;bottom:16px;left:16px;padding:9px 18px;background:rgba(0,0,0,0.72);border:2px solid rgba(255,255,255,0.18);color:#fff;border-radius:13px;text-decoration:none;font-size:0.87rem;z-index:10;backdrop-filter:blur(8px)}
</style>
</head>
<body>
<div id="top-bar">
  <div class="tb-box"><div class="tb-lbl">دۈشمەن</div><div class="tb-val" id="ai-score-d">0</div></div>
  <div id="round-badge">دەۋر 1</div>
  <div class="tb-box"><div class="tb-lbl">سىز</div><div class="tb-val" id="pl-score-d">0</div></div>
</div>
<div id="score-board">
  <div class="score-ghost" id="sg-ai">0</div>
  <div class="score-ghost" id="sg-pl">0</div>
</div>
<div id="rally-badge"></div>

<div id="fact-popup" class="overlay-dark hidden">
  <div class="fancy-box">
    <div class="fact-icon" id="fp-icon">⚔️</div>
    <div class="fact-title" id="fp-title">دەۋر 1</div>
    <div class="fact-body" id="fp-fact"></div>
    <button class="big-btn cyan" id="fp-btn" onclick="startRound()">▶ داۋاملاش!</button>
  </div>
</div>

<div id="lose-popup" class="hidden">
  <div class="lose-box">
    <div style="font-size:3rem">😤</div>
    <div style="font-size:1.6rem;font-weight:900;color:#ff5577;margin:8px 0">مەغلۇپ بولدىڭىز!</div>
    <div style="color:#aa6677;font-size:0.95rem;margin-bottom:18px" id="lose-msg">قايتا سىناپ بەق!</div>
    <button class="big-btn" onclick="retryRound()">🔄 قايتا سىنا!</button>
    <button class="big-btn cyan" style="margin-top:6px" onclick="initGame()">🏠 باشتىن باشلا</button>
  </div>
</div>

<div id="overlay" class="overlay-dark">
  <div class="fancy-box">
    <div style="font-size:3.8rem;animation:bncA 1.1s infinite">⚔️🏟️</div>
    <div class="game-title">مەيدان توپى</div>
    <div class="game-desc" id="ov-desc">قەدىمىي ئۇيغۇر مەيدانىدا دۈشمەنلىرىڭنى يېڭ! 7 دەۋردە گەلسەڭ خانلىق چولپانى بولىسەن! ئاستىدا بارمىقىڭنى سۈرۈپ توپنى قايتۇر!</div>
    <div id="final-stats" class="stats-row" style="display:none">
      <div class="stat-c"><div class="sv" id="f-rally">0</div><div class="sl">ئەڭ ئۇدا</div></div>
      <div class="stat-c"><div class="sv" id="f-rounds">0</div><div class="sl">دەۋر ئۇتتى</div></div>
      <div class="stat-c"><div class="sv" id="f-best">0</div><div class="sl">ئەڭ يۇقىرى</div></div>
    </div>
    <button class="big-btn cyan" id="start-btn" onclick="initGame()">⚔️ مەيدانغا كىر!</button>
  </div>
</div>

<canvas id="c"></canvas>
<a id="back-btn" href="../index.html">← كەينىگە</a>

<script>
const c=document.getElementById('c'), ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
window.addEventListener('resize',resize); resize();

const WIN_TO=5;
const ROUNDS=[
  {name:'قەشقەر رىقابىتى',  aiSpd:2.6,  errRate:0.016, paddleAdj:0.88, ac:'#ff8844'},
  {name:'تۇرپان رىقابىتى',  aiSpd:3.3,  errRate:0.011, paddleAdj:0.90, ac:'#44ffaa'},
  {name:'ئۈرۈمچى رىقابىتى', aiSpd:4.0,  errRate:0.008, paddleAdj:0.92, ac:'#4488ff'},
  {name:'خوتەن رىقابىتى',   aiSpd:4.8,  errRate:0.006, paddleAdj:0.94, ac:'#ff44cc'},
  {name:'ئاقسۇ رىقابىتى',   aiSpd:5.7,  errRate:0.004, paddleAdj:0.96, ac:'#ffdd22'},
  {name:'ئىلى رىقابىتى',    aiSpd:6.6,  errRate:0.002, paddleAdj:0.98, ac:'#22ffff'},
  {name:'خانلىق مەيدانى',   aiSpd:7.8,  errRate:0.001, paddleAdj:1.00, ac:'#cc88ff'},
];
const FACTS=[
  {icon:'📖',title:'مەھمۇد كاشغىرى — ئۇيغۇر ئالىمى',
   fact:'مەھمۇد كاشغىرى 1072-يىلى «دىۋانۇ لۇغاتىت تۈرك» ئەسىرىنى يازغان! بۇ كىتاب ئۇيغۇرچە ۋە تۈركىي تىللارنىڭ ئەڭ قەدىمىي لۇغىتى. كاشغەردىن چىققان بۇ ئالىم ئالەمدە تونۇلغان!'},
  {icon:'🍇',title:'تۇرپان — قولياز نۇسخىلار مەركىزى',
   fact:'تۇرپاندا 1000 يىلدىن ئارتۇق ئۇيغۇر قولياز نۇسخىلىرى بايقالغان! بۇ نۇسخىلار ئۇيغۇر يازمىسىنىڭ غايەت قىممەتلىك مىراسى. ئۇيغۇر تىلى ئۆزىنىڭ ئەدەبىياتى بىلەن دۇنياغا تونۇلغان!'},
  {icon:'🏔️',title:'ئۈرۈمچى — ئۇيغۇر مەدەنىيىتى مەركىزى',
   fact:'ئۈرۈمچى شەھىرىنىڭ نامى ئۇيغۇر تىلىدىن كەلگەن — «گۈزەل يايلاق» دەگەن مەنادە! بۇ شەھەر ئۇيغۇر مۇزىكىسى، رەسسامچىلىق ۋە ھۈنەرمەنچىلىكنىڭ مۇھىم مەركىزى!'},
  {icon:'💎',title:'خوتەن — يۈ تاشى ۋە يىپەك شەھىرى',
   fact:'خوتەن قەدىمىدىن «يۈ تاشى» ئىستېھسالى بىلەن مەشھۇر! «خوتەن يۈ تاشى» دۇنيانىڭ ئەڭ قىممەتلىك تاشلىرىدىن. قەدىمىي خوتەن پادىشاھلىقى ئىپەك يولىنىڭ ئەڭ مۇھىم شەھىرلىرىدىن بىرى ئىدى!'},
  {icon:'🎵',title:'ئاقسۇ — مۇزىكا ۋە ھۈنەرمەنچىلىك',
   fact:'ئاقسۇ ئۇيغۇر خالق مۇزىكىسى ۋە دۇتار ياساشنىڭ مەركىزى! ئاقسۇدا ياسالغان دۇتار پۈتۈن ئۇيغۇر يۇرتىغا تارقالغان. ئاقسۇلۇق ئۇستىلارنىڭ قوللىرىدىن ئۇيغۇر مۇزىكىسى يۈكسەلگەن!'},
  {icon:'🌿',title:'ئىلى — ئۇيغۇرنىڭ بەھىشتى',
   fact:'ئىلى ۋادىسى ئۇيغۇر يۇرتىنىڭ ئەڭ سۇلۇق جايلىرىدىن! ئىلى دەرياسى بويىدىكى ئاپتوچلۇق، سائالار ۋە نورۇزلار ئۇيغۇر مەدەنىيىتىنىڭ جانلىق ئىپادىسى. ئىلى قازاقستانغىچە سوزۇلغان كەڭ يايلاق!'},
  {icon:'🏆',title:'ئۇيغۇر خانلىقى — شانلىق داستان',
   fact:'ئۇيغۇر خانلىقى (744-840 مىلادى) ئورتا ئاسىيانىڭ ئەڭ ئۇلۇغ دۆلىتى ئىدى! ئۇيغۇرلار ئۆزلىرىنىڭ يازمىسى، قانۇن-تۈزۈمى، سەنئىتى، مۇزىكىسى بىلەن تارىخ سەھىپىسىگە ئۆچمەس ئىزنى قالدۇرغان! بۇ شانلىق مىراسنى كۆتۈرۈش ھەر بىر ئۇيغۇرنىڭ ئىشى!'},
];

let aiPad,plPad,ball,trail,parts,confettis,scoreTexts;
let round,aiScore,plScore,rally,bestRally,roundsWon;
let gameState='menu',fr=0,audioCtx=null,bestScore=0;
let shakeX=0,shakeY=0;
try{bestScore=parseInt(localStorage.getItem('pong2_best'))||0;}catch(e){}

const PW=()=>Math.min(c.width*0.38, 180);
const PH=16;

function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tone(f,d,t,v){if(!audioCtx)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d);}catch(e){}}
function sfxHit(spd){const f=300+spd*30;tone(f,0.08,'square',0.09);}
function sfxWall(){tone(220,0.06,'triangle',0.05);}
function sfxScore(win){if(win){[0,120,240,360].forEach((d,i)=>setTimeout(()=>tone([440,550,660,880][i],0.18,'sine',0.12),d));}else{tone(200,0.3,'sawtooth',0.1);}}
function sfxWin(){[0,100,200,300,400].forEach((d,i)=>setTimeout(()=>tone([523,659,784,1047,1318][i],0.22,'sine',0.12),d));}

function initGame(){
  initAudio();
  document.getElementById('overlay').classList.add('hidden');
  round=0; bestRally=0; roundsWon=0;
  document.getElementById('final-stats').style.display='none';
  showFactPopup(0, true);
}

function showFactPopup(r, isFirst){
  gameState='fact';
  const fd=FACTS[r];
  document.getElementById('fp-icon').textContent=fd.icon;
  document.getElementById('fp-title').textContent=ROUNDS[r].name+' — دەۋر '+(r+1);
  document.getElementById('fp-fact').textContent=fd.fact;
  document.getElementById('fp-btn').textContent=isFirst?'⚔️ مەيدانغا كىر!':'▶ كېيىنكى دەۋر!';
  document.getElementById('fact-popup').classList.remove('hidden');
}

function startRound(){
  document.getElementById('fact-popup').classList.add('hidden');
  const rd=ROUNDS[round];
  aiScore=0; plScore=0; rally=0;
  const pw=PW();
  plPad={x:c.width/2-pw/2, y:c.height-68, w:pw, h:PH};
  aiPad={x:c.width/2-pw*rd.paddleAdj/2, y:52, w:pw*rd.paddleAdj, h:PH};
  ball={x:c.width/2,y:c.height/2,r:13,vx:0,vy:0,spd:4.5};
  trail=[]; parts=[]; confettis=[]; scoreTexts=[];
  document.getElementById('round-badge').textContent='دەۋر '+(round+1)+' · '+rd.name;
  updateScoreUI();
  serveBall();
  gameState='playing';
  requestAnimationFrame(loop);
}

function retryRound(){
  document.getElementById('lose-popup').classList.add('hidden');
  startRound();
}

function serveBall(){
  const dir=Math.random()>0.5?1:-1;
  ball.vx=(Math.random()-0.5)*3;
  ball.vy=dir*ball.spd;
  ball.spd=4.5;
  trail=[];
}

function updateScoreUI(){
  document.getElementById('sg-ai').textContent=aiScore;
  document.getElementById('sg-pl').textContent=plScore;
  document.getElementById('ai-score-d').textContent=aiScore;
  document.getElementById('pl-score-d').textContent=plScore;
}

/* ══════ INPUT ══════ */
c.addEventListener('mousemove',e=>{
  if(gameState!=='playing')return;
  plPad.x=e.clientX-plPad.w/2;
  clampPaddle(plPad);
});
c.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(gameState!=='playing')return;
  plPad.x=e.touches[0].clientX-plPad.w/2;
  clampPaddle(plPad);
},{passive:false});
function clampPaddle(p){p.x=Math.max(8,Math.min(c.width-p.w-8,p.x));}

/* ══════ MAIN LOOP ══════ */
function loop(){
  requestAnimationFrame(loop);
  fr++;
  ctx.save();
  shakeX*=0.72; shakeY*=0.72;
  ctx.translate(shakeX,shakeY);
  ctx.clearRect(-20,-20,c.width+40,c.height+40);
  drawBackground();

  if(gameState!=='playing'){
    drawPaddle(plPad,'#00ccff',false);
    drawPaddle(aiPad,'#ff3366',true);
    drawConfetti();
    ctx.restore();
    return;
  }

  // AI movement
  const rd=ROUNDS[Math.min(round,ROUNDS.length-1)];
  if(ball.vy<0){
    const tgt=ball.x-aiPad.w/2+(Math.random()-0.5)*aiPad.w*0.2;
    const diff=tgt-aiPad.x;
    if(Math.abs(diff)>2){aiPad.x+=Math.sign(diff)*Math.min(rd.aiSpd,Math.abs(diff));}
    // Deliberate errors
    if(Math.random()<rd.errRate)aiPad.x+=(Math.random()-0.5)*60;
    clampPaddle(aiPad);
  }

  // Ball movement
  trail.push({x:ball.x,y:ball.y});
  if(trail.length>12)trail.shift();
  ball.x+=ball.vx; ball.y+=ball.vy;

  // Wall bounce
  if(ball.x-ball.r<4){ball.vx=Math.abs(ball.vx);sfxWall();addParts(ball.x,ball.y,'#aaaaff',4);}
  if(ball.x+ball.r>c.width-4){ball.vx=-Math.abs(ball.vx);sfxWall();addParts(ball.x,ball.y,'#aaaaff',4);}

  // Paddle collision helper
  function hitPad(pad,dir){
    if(ball.x+ball.r>pad.x&&ball.x-ball.r<pad.x+pad.w&&ball.y+ball.r>pad.y&&ball.y-ball.r<pad.y+pad.h){
      const cp=(ball.x-(pad.x+pad.w/2))/(pad.w/2);
      const ang=cp*Math.PI*0.38;
      ball.spd=Math.min(ball.spd+0.28,14);
      ball.vx=ball.spd*Math.sin(ang);
      ball.vy=dir*ball.spd*Math.cos(ang);
      rally++;
      if(rally>bestRally)bestRally=rally;
      sfxHit(ball.spd);
      addParts(ball.x,ball.y,dir>0?'#00ccff':'#ff3366',10);
      shakeX=(Math.random()-0.5)*6; shakeY=(Math.random()-0.5)*6;
      showRallyBadge();
      return true;
    }
    return false;
  }
  hitPad(plPad,-1);
  hitPad(aiPad,1);

  // Scoring
  if(ball.y-ball.r<0){
    // Player scores
    plScore++; rally=0; sfxScore(true);
    addParts(ball.x,20,'#00ccff',22);
    shakeX=(Math.random()-0.5)*14; shakeY=8;
    addScoreText(c.width/2,c.height/2,'+1','#00ccff',42);
    updateScoreUI();
    if(plScore>=WIN_TO){roundWon();}
    else{setTimeout(serveBall,600);}
  } else if(ball.y+ball.r>c.height){
    // AI scores
    aiScore++; rally=0; sfxScore(false);
    addParts(ball.x,c.height-20,'#ff3366',22);
    shakeX=(Math.random()-0.5)*14; shakeY=-8;
    addScoreText(c.width/2,c.height/2,'دۈشمەن +1','#ff3366',32);
    updateScoreUI();
    if(aiScore>=WIN_TO){roundLost();}
    else{setTimeout(serveBall,600);}
  }

  // Draw trail
  for(let i=0;i<trail.length;i++){
    const a=i/trail.length;
    const rd2=ROUNDS[Math.min(round,ROUNDS.length-1)];
    ctx.globalAlpha=a*0.35;
    ctx.fillStyle=rd2.ac;
    ctx.beginPath();ctx.arc(trail[i].x,trail[i].y,ball.r*(i/trail.length)*0.8,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  drawPaddle(plPad,'#00ccff',false);
  drawPaddle(aiPad,'#ff3366',true);
  drawBall();

  // Score texts
  for(let i=scoreTexts.length-1;i>=0;i--){
    const s=scoreTexts[i];s.y-=1.6;s.a-=0.02;
    if(s.a<=0){scoreTexts.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=s.a;ctx.fillStyle=s.clr;
    ctx.font='bold '+s.sz+'px sans-serif';ctx.textAlign='center';ctx.fillText(s.t,s.x,s.y);
    ctx.restore();
  }
  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.025;
    if(p.life<=0){parts.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.clr;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  drawConfetti();
  ctx.restore();
}

function roundWon(){
  gameState='between';
  roundsWon++; sfxWin();
  addConfetti(60);
  const total=plScore*80+bestRally*15+roundsWon*50;
  try{if(total>bestScore){bestScore=total;localStorage.setItem('pong2_best',bestScore);}}catch(e){}
  setTimeout(()=>{
    round++;
    if(round>=ROUNDS.length){showFinal();}
    else{showFactPopup(round,false);}
  },800);
}

function roundLost(){
  gameState='paused';
  document.getElementById('lose-msg').textContent='دۈشمەن '+aiScore+' — سىز '+plScore+' يۇتۇلدىڭىز! قايتا سىناڭ!';
  document.getElementById('lose-popup').classList.remove('hidden');
}

function showFinal(){
  gameState='menu';
  document.getElementById('overlay').classList.remove('hidden');
  document.querySelector('.game-title').textContent='🏆 خانلىق چولپانى!';
  document.getElementById('ov-desc').textContent='مۇبارەك! 7 دەۋرنى ئۇتتىڭىز! ئەمەلىي ئۇيغۇر مەيدان باتۇرى!';
  document.getElementById('final-stats').style.display='flex';
  document.getElementById('f-rally').textContent=bestRally;
  document.getElementById('f-rounds').textContent=roundsWon;
  document.getElementById('f-best').textContent=bestScore;
  document.getElementById('start-btn').textContent='🔄 قايتا باشلاش';
}

/* ══════ DRAW ══════ */
function drawBackground(){
  // Dark arena fill
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,c.width,c.height);

  const rd=ROUNDS[Math.min(round,ROUNDS.length-1)];

  // Subtle arc glow at top (AI side) and bottom (player side)
  const topG=ctx.createRadialGradient(c.width/2,40,0,c.width/2,40,c.width*0.5);
  topG.addColorStop(0,'rgba(255,40,80,0.06)');topG.addColorStop(1,'transparent');
  ctx.fillStyle=topG;ctx.fillRect(0,0,c.width,c.height*0.45);

  const botG=ctx.createRadialGradient(c.width/2,c.height-40,0,c.width/2,c.height-40,c.width*0.5);
  botG.addColorStop(0,'rgba(0,180,255,0.06)');botG.addColorStop(1,'transparent');
  ctx.fillStyle=botG;ctx.fillRect(0,c.height*0.55,c.width,c.height*0.45);

  // Left and right stone column strips
  const colW=Math.min(c.width*0.09,55);
  // Column gradient
  const leftG=ctx.createLinearGradient(0,0,colW,0);
  leftG.addColorStop(0,'rgba(8,6,20,0.95)');leftG.addColorStop(1,'rgba(8,6,20,0)');
  ctx.fillStyle=leftG;ctx.fillRect(0,0,colW,c.height);
  const rightG=ctx.createLinearGradient(c.width-colW,0,c.width,0);
  rightG.addColorStop(0,'rgba(8,6,20,0)');rightG.addColorStop(1,'rgba(8,6,20,0.95)');
  ctx.fillStyle=rightG;ctx.fillRect(c.width-colW,0,colW,c.height);

  // Column pillar detail lines
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let y2=0;y2<c.height;y2+=30){
    ctx.beginPath();ctx.moveTo(0,y2);ctx.lineTo(colW*0.6,y2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(c.width,y2);ctx.lineTo(c.width-colW*0.6,y2);ctx.stroke();
  }

  // Torch flames on both sides (top and bottom)
  drawTorch(colW*0.4, 100, rd.ac);
  drawTorch(c.width-colW*0.4, 100, rd.ac);
  drawTorch(colW*0.4, c.height-100, rd.ac);
  drawTorch(c.width-colW*0.4, c.height-100, rd.ac);

  // Center midline
  const midY=c.height/2;
  ctx.strokeStyle=`rgba(255,255,255,0.07)`;ctx.lineWidth=1;ctx.setLineDash([12,10]);
  ctx.beginPath();ctx.moveTo(colW,midY);ctx.lineTo(c.width-colW,midY);ctx.stroke();
  ctx.setLineDash([]);
  // Center Uyghur emblem on midline
  ctx.save();ctx.translate(c.width/2,midY);
  ctx.shadowColor=rd.ac;ctx.shadowBlur=20+Math.sin(fr*0.08)*8;
  ctx.fillStyle=rd.ac;ctx.globalAlpha=0.55;
  ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('☽',0,0);
  ctx.shadowBlur=0;ctx.restore();

  // Outer border glow matching round color
  ctx.strokeStyle=rd.ac+'22';ctx.lineWidth=3;
  ctx.strokeRect(colW*0.7,65,c.width-colW*1.4,c.height-75);
}

function drawTorch(x,y,ac){
  const fh=18+Math.sin(fr*0.18+x)*5;
  for(let i=3;i>=0;i--){
    const fw=(4-i)*4+2,fy=-fh*(0.2+i*0.18);
    ctx.globalAlpha=0.65-i*0.12;
    const fg=ctx.createRadialGradient(x,y,0,x,y-fh*0.4,fh*0.8);
    fg.addColorStop(0,['#fff','#ffe090','#ff8800','#ff3300'][i]);
    fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(x,y+fy,fw,fh*(0.28+i*0.07),0,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Bracket
  ctx.fillStyle='#3a2010';ctx.fillRect(x-3,y,6,16);
  ctx.shadowColor=ac;ctx.shadowBlur=20+Math.sin(fr*0.18+x)*8;
  ctx.fillStyle=ac+'44';ctx.beginPath();ctx.arc(x,y-fh*0.3,22,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawPaddle(pad,clr,isAI){
  const rd=ROUNDS[Math.min(round,ROUNDS.length-1)];
  const pclr=isAI?'#ff3366':clr;
  ctx.save();
  ctx.shadowColor=pclr;ctx.shadowBlur=22+Math.sin(fr*0.12)*5;
  // Main body
  const pg=ctx.createLinearGradient(pad.x,pad.y,pad.x+pad.w,pad.y+pad.h);
  pg.addColorStop(0,pclr+'cc');pg.addColorStop(0.5,pclr+'ff');pg.addColorStop(1,pclr+'88');
  ctx.fillStyle=pg;
  ctx.beginPath();ctx.moveTo(pad.x+8,pad.y);ctx.lineTo(pad.x+pad.w-8,pad.y);
  ctx.quadraticCurveTo(pad.x+pad.w,pad.y,pad.x+pad.w,pad.y+8);
  ctx.lineTo(pad.x+pad.w,pad.y+pad.h-8);ctx.quadraticCurveTo(pad.x+pad.w,pad.y+pad.h,pad.x+pad.w-8,pad.y+pad.h);
  ctx.lineTo(pad.x+8,pad.y+pad.h);ctx.quadraticCurveTo(pad.x,pad.y+pad.h,pad.x,pad.y+pad.h-8);
  ctx.lineTo(pad.x,pad.y+8);ctx.quadraticCurveTo(pad.x,pad.y,pad.x+8,pad.y);ctx.closePath();ctx.fill();
  // Inner shine
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(pad.x+6,pad.y+3,pad.w-12,pad.h-6);
  // Crescent on paddle
  ctx.shadowBlur=0;ctx.globalAlpha=0.55;
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold '+(pad.h*0.9)+'px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('☽ ✦',pad.x+pad.w/2,pad.y+pad.h/2);
  ctx.globalAlpha=1;ctx.restore();
}

function drawBall(){
  const rd=ROUNDS[Math.min(round,ROUNDS.length-1)];
  const spd=Math.hypot(ball.vx,ball.vy);
  const glow=12+spd*1.5;
  ctx.save();
  ctx.shadowColor='#ffffff';ctx.shadowBlur=glow;
  const bg=ctx.createRadialGradient(ball.x-3,ball.y-3,1,ball.x,ball.y,ball.r);
  bg.addColorStop(0,'#ffffff');bg.addColorStop(0.5,rd.ac);bg.addColorStop(1,rd.ac+'88');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
}

function showRallyBadge(){
  if(rally<5)return;
  const rb=document.getElementById('rally-badge');
  rb.textContent=rally+' ئۇدا! 🔥';
  rb.style.opacity='1';
  clearTimeout(rb._t);
  rb._t=setTimeout(()=>rb.style.opacity='0',900);
}

function addParts(x,y,clr,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*7;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,clr,r:2+Math.random()*4});}
}
function addScoreText(x,y,t,clr,sz){scoreTexts.push({x,y,t,clr,sz:sz||28,a:1});}
function addConfetti(n){
  const cols=['#cc88ff','#00ccff','#ff3366','#ffd040','#44ff88','#ff88cc'];
  for(let i=0;i<n;i++){confettis.push({x:Math.random()*c.width,y:-15,vx:(Math.random()-0.5)*4,vy:2+Math.random()*4,life:1,clr:cols[Math.floor(Math.random()*cols.length)],sz:4+Math.random()*7,rot:Math.random()*360,rv:(Math.random()-0.5)*12});}
}
function drawConfetti(){
  for(let i=confettis.length-1;i>=0;i--){
    const p=confettis[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.rot+=p.rv;p.life-=0.007;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
    ctx.globalAlpha=Math.max(p.life,0);ctx.fillStyle=p.clr;
    ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);ctx.restore();
    if(p.life<=0||p.y>c.height+20)confettis.splice(i,1);
  }
  ctx.globalAlpha=1;
}

// init render
parts=[];confettis=[];scoreTexts=[];trail=[];
plPad={x:c.width/2-80,y:c.height-68,w:160,h:PH};
aiPad={x:c.width/2-80,y:52,w:160,h:PH};
ball={x:c.width/2,y:c.height/2,r:13,vx:0,vy:0,spd:4.5};
requestAnimationFrame(loop);
</script>
