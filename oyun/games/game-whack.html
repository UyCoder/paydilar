<!DOCTYPE html>
<html lang="ug">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔨 مول ئۇر - Whack-a-Mole</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#2d1b0e;font-family:sans-serif;touch-action:none;cursor:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><text y="30" font-size="30">🔨</text></svg>') 5 5,auto}
canvas{display:block}
#ui{position:absolute;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;pointer-events:none;z-index:5;gap:8px}
#ui>div{background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15);padding:8px 18px;border-radius:14px;text-align:center;color:#fff;min-width:70px}
#ui .l{font-size:0.7rem;color:#94a3b8}
#ui .v{font-size:1.8rem;font-weight:900;color:#fbbf24}
#ui .v.combo{color:#ff4444;text-shadow:0 0 20px #ff4444}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(10px)}
#overlay.hidden{display:none}
.obox{background:linear-gradient(145deg,#2d1b0e,#1e1e3f);border:2px solid rgba(251,191,36,0.3);border-radius:30px;padding:2.5rem;text-align:center;max-width:500px;width:90%;animation:popIn 0.5s}
@keyframes popIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
.obox h1{font-size:3rem;margin-bottom:5px}
.obox .title{font-size:2rem;font-weight:900;color:#fbbf24;margin:8px 0}
.obox p{color:#94a3b8;font-size:1.1rem;line-height:1.6;margin:10px 0 20px}
.btn{padding:16px 50px;font-size:1.4rem;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;border-radius:50px;cursor:pointer;font-weight:900;box-shadow:0 8px 25px rgba(245,158,11,0.4);transition:transform 0.15s}
.btn:active{transform:scale(0.92)}.btn-gold{background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 8px 25px rgba(5,150,105,0.4)}
.stats{display:flex;justify-content:center;gap:20px;margin:15px 0}
.stats .s{text-align:center}
.stats .s .val{font-size:2rem;font-weight:900;color:#fbbf24}
.stats .s .lbl{font-size:0.8rem;color:#94a3b8}
#back-btn{position:fixed;bottom:20px;left:20px;padding:10px 20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:12px;cursor:pointer;text-decoration:none;font-size:0.9rem;z-index:10;backdrop-filter:blur(8px);cursor:default}
</style>
</head>
<body>
<div id="ui">
<div><div class="l">نومۇر</div><div class="v" id="score">0</div></div>
<div><div class="l">كومبو</div><div class="v" id="combo">0</div></div>
<div><div class="l">ۋاقىت</div><div class="v" id="timer">30</div></div>
</div>
<div id="overlay">
<div class="obox">
<h1>🔨</h1>
<div class="title">مول ئۇر</div>
<p>يەردىن چىقىۋاتقان قاراقچىلارنى ئۇرۇڭ! ئالتۇن چىقىرىلغاندا تېزرەك ئۇرۇڭ، كۆپ نومۇر ئېلىڭ! بومبىدىن ساقلىنىڭ!</p>
<div id="final-stats" class="stats" style="display:none">
<div class="s"><div class="val" id="f-score">0</div><div class="lbl">نومۇر</div></div>
<div class="s"><div class="val" id="f-hit">0</div><div class="lbl">ئۇرۇش</div></div>
<div class="s"><div class="val" id="f-best">0</div><div class="lbl">ئەڭ ياخشى</div></div>
</div>
<button class="btn" onclick="startGame()">🎮 باشلاش</button>
<p style="color:#64748b;font-size:0.8rem;margin-top:8px">چىققان نەرسىلەرنى چېكىڭ!</p>
</div>
</div>
<canvas id="c"></canvas>
<a id="back-btn" href="../index.html">← كەينىگە</a>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

let gameActive=false,score=0,combo=0,timer=30,hits=0,misses=0,bestScore=0;
let moles=[],effects=[],particles=[];
let audioCtx=null;
try{bestScore=parseInt(localStorage.getItem('whackBest'))||0}catch(e){}

function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function playTone(f,d,t,v){if(!audioCtx)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+d)}catch(e){}}
function playHit(){playTone(600,0.1,'sine',0.1);setTimeout(()=>playTone(800,0.08,'sine',0.08),50)}
function playGold(){playTone(800,0.12,'sine',0.12);setTimeout(()=>playTone(1200,0.15,'sine',0.1),100)}
function playBomb(){playTone(150,0.3,'sawtooth',0.2)}
function playMiss(){playTone(200,0.15,'square',0.06)}

const MOLE_TYPES=[
{emoji:'👿',points:10,speed:1,size:1,color:'#e74c3c'},
{emoji:'🤡',points:15,speed:1.2,size:1,color:'#f39c12'},
{emoji:'👾',points:20,speed:1.5,size:0.9,color:'#9b59b6'},
{emoji:'🦊',points:30,speed:1.8,size:0.8,color:'#e67e22'},
];
const GOLD={emoji:'👑',points:100,speed:2,size:1.2,color:'#fbbf24'};

function getGridPos(idx){
const cols=3,rows=2;
const total=cols*rows;
const margin=60;
const gw=c.width-margin*2;
const gh=c.height-margin*2-100;
const cx=margin+gw/cols*(idx%cols+0.5);
const cy=100+margin+gh/rows*(Math.floor(idx/cols)+0.5);
return{x:cx,y:cy};
}

function spawnMole(){
if(moles.length>=2)return;
const idx=Math.floor(Math.random()*6);
let isGold=Math.random()<0.12;
const type=isGold?GOLD:MOLE_TYPES[Math.floor(Math.random()*MOLE_TYPES.length)];
const pos=getGridPos(idx);
moles.push({
...type,x:pos.x,y:pos.y,
isGold:!!isGold,
timer:0,
state:'rising', // rising, visible, hiding
duration:(0.8+Math.random()*1.2)/type.speed,
riseProgress:0,
radius:35*type.size,
idx:idx
});
}

function startGame(){
initAudio();
document.getElementById('overlay').classList.add('hidden');
score=0;combo=0;timer=30;hits=0;misses=0;
moles=[];effects=[];particles=[];
gameActive=true;
updateUI();
requestAnimationFrame(update);

if(window.timerInterval)clearInterval(window.timerInterval);
window.timerInterval=setInterval(()=>{
timer--;
document.getElementById('timer').textContent=timer;
if(timer<=0){endGame();clearInterval(window.timerInterval)}
},1000);
}

c.addEventListener('click',e=>{
if(!gameActive)return;
const rect=c.getBoundingClientRect();
const mx=e.clientX-rect.left,my=e.clientY-rect.top;
handleHit(mx,my);
});

c.addEventListener('touchstart',e=>{
if(!gameActive)return;
if(e.target.tagName==='BUTTON'||e.target.tagName==='A')return;
const rect=c.getBoundingClientRect();
const mx=e.touches[0].clientX-rect.left,my=e.touches[0].clientY-rect.top;
handleHit(mx,my);
},{passive:true});

function handleHit(mx,my){
let hit=false;
for(let i=moles.length-1;i>=0;i--){
const m=moles[i];
if(m.state!=='visible')continue;
const dist=Math.hypot(mx-m.x,my-m.y);
if(dist<m.radius+10){
hit=true;
const pts=m.isGold?100+m.combo*20:m.points+m.combo*5;
score+=pts;combo++;hits++;
if(m.isGold){playGold();spawnParticles(m.x,m.y,m.radius,'#fbbf24',15)}
else{playHit();spawnParticles(m.x,m.y,m.radius,m.color,8)}
effects.push({x:m.x,y:m.y,text:`+${pts}`,alpha:1,color:'#fbbf24',size:1.5});
moles.splice(i,1);
updateUI();
break;
}
}
if(!hit){
// Check if clicked on empty hole
for(let i=0;i<6;i++){
const pos=getGridPos(i);
const dist=Math.hypot(mx-pos.x,my-pos.y);
if(dist<40){
playMiss();combo=0;updateUI();break;
}
}
}
}

function spawnParticles(x,y,radius,color,count){
for(let i=0;i<count;i++){
const angle=Math.random()*Math.PI*2;
const spd=2+Math.random()*5;
particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-2,life:1,color,radius:2+Math.random()*4});
}
}

function updateUI(){
document.getElementById('score').textContent=score;
const ce=document.getElementById('combo');
ce.textContent=combo;
ce.className='v'+(combo>=5?' combo':'');
}

function update(){
if(!gameActive)return;
requestAnimationFrame(update);

// Spawn
if(Math.random()<0.04)spawnMole();

// Update moles
for(let i=moles.length-1;i>=0;i--){
const m=moles[i];
if(m.state==='rising'){
m.riseProgress+=0.04*m.speed;
if(m.riseProgress>=1){m.riseProgress=1;m.state='visible';m.timer=0}
}else if(m.state==='visible'){
m.timer+=0.016;
if(m.timer>=m.duration){m.state='hiding';m.riseProgress=1}
}else if(m.state==='hiding'){
m.riseProgress-=0.04*m.speed;
if(m.riseProgress<=0){moles.splice(i,1);misses++;if(!m.isGold)combo=Math.max(0,combo-1);updateUI()}
}
}

// Update effects
for(let i=effects.length-1;i>=0;i--){
const e=effects[i];
e.y-=2;e.alpha-=0.02;e.size*=0.995;
if(e.alpha<=0)effects.splice(i,1);
}

// Update particles
for(let i=particles.length-1;i>=0;i--){
const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.015;
if(p.life<=0)particles.splice(i,1);
}

// DRAW
ctx.clearRect(0,0,c.width,c.height);

// Background
const bg=ctx.createLinearGradient(0,0,0,c.height);
bg.addColorStop(0,'#3d1f0e');bg.addColorStop(1,'#1a0e05');
ctx.fillStyle=bg;ctx.fillRect(0,0,c.width,c.height);

// Holes
for(let i=0;i<6;i++){
const pos=getGridPos(i);
// Hole shadow
ctx.fillStyle='rgba(0,0,0,0.5)';
ctx.beginPath();ctx.ellipse(pos.x,pos.y,45,20,0,0,Math.PI*2);ctx.fill();
// Hole
ctx.fillStyle='#1a0e05';
ctx.beginPath();ctx.ellipse(pos.x,pos.y,40,18,0,0,Math.PI*2);ctx.fill();
// Hole ring
ctx.strokeStyle='#3d1f0e';ctx.lineWidth=3;
ctx.beginPath();ctx.ellipse(pos.x,pos.y,40,18,0,0,Math.PI*2);ctx.stroke();
}

// Draw moles
for(const m of moles){
let scale=m.state==='rising'?m.riseProgress:m.state==='hiding'?m.riseProgress:1;
if(scale<=0.05)continue;
ctx.save();ctx.translate(m.x,m.y-m.radius*scale*1.5);
ctx.scale(scale,scale);
// Body
ctx.shadowColor=m.color;ctx.shadowBlur=20;
const grd=ctx.createRadialGradient(0,0,0,0,m.radius,m.radius);
grd.addColorStop(0,m.color+'88');grd.addColorStop(1,m.color);
ctx.fillStyle=grd;
ctx.beginPath();ctx.arc(0,0,m.radius,0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0;
// Emoji face
ctx.font=`${m.radius*1.2}px sans-serif`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(m.emoji,0,-m.radius*0.1);
ctx.restore();
}

// Effects (floating +score text)
for(const e of effects){
ctx.globalAlpha=e.alpha;
ctx.fillStyle=e.color;
ctx.font=`bold ${32*e.size}px sans-serif`;
ctx.textAlign='center';ctx.shadowColor=e.color;ctx.shadowBlur=20;
ctx.fillText(e.text,e.x,e.y);
}
ctx.globalAlpha=1;ctx.shadowBlur=0;

// Particles
for(const p of particles){
ctx.globalAlpha=p.life;
ctx.fillStyle=p.color;
ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();
}
ctx.globalAlpha=1;
}

function endGame(){
gameActive=false;
try{if(score>bestScore){bestScore=score;localStorage.setItem('whackBest',bestScore)}}catch(e){}
document.getElementById('overlay').classList.remove('hidden');
document.querySelector('.obox .title').textContent='🎉 ئويۇن تۈگدى!';
document.querySelector('.obox p').textContent=`سىز ${hits} قېتىم ئۇردىڭىز!`;
document.getElementById('final-stats').style.display='flex';
document.getElementById('f-score').textContent=score;
document.getElementById('f-hit').textContent=hits;
document.getElementById('f-best').textContent=bestScore;
document.querySelector('.btn').textContent='🔄 قايتا باشلاش';
}
</script>
</body>
</html>
