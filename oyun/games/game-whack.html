<!DOCTYPE html>
<html lang="ug">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ يۇرتنى قوغدا!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;touch-action:none;user-select:none}
canvas{display:block}
#ui{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none;z-index:5;gap:6px}
#ui>div{background:rgba(0,0,0,0.85);backdrop-filter:blur(14px);border:2px solid rgba(200,50,30,0.55);padding:8px 14px;border-radius:20px;text-align:center;color:#fff;min-width:72px}
.lbl{font-size:0.68rem;color:#ff8844;letter-spacing:1px;font-weight:700}
.val{font-size:2rem;font-weight:900;color:#fff}
.val.fire{color:#ff6600;text-shadow:0 0 28px #ff6600,0 0 55px #ff3300;animation:fA 0.2s infinite alternate}
@keyframes fA{from{transform:scale(1)}to{transform:scale(1.18)}}
.val.danger{color:#ff2222;animation:dng 0.3s infinite}
@keyframes dng{0%,100%{transform:scale(1)}50%{transform:scale(1.22)}}
#round-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:6;pointer-events:none;background:linear-gradient(135deg,#8a0018,#cc2020);color:#ffd040;font-weight:900;padding:8px 28px;border-radius:26px;font-size:1rem;box-shadow:0 4px 24px rgba(180,20,0,0.65);white-space:nowrap;border:2px solid rgba(255,200,60,0.35)}
.overlay-dark{position:fixed;inset:0;background:rgba(4,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(20px)}
.overlay-dark.hidden{display:none}
.fancy-box{background:linear-gradient(148deg,#1c0808,#2e0e0e);border:3px solid rgba(200,50,20,0.6);border-radius:34px;padding:2.5rem;text-align:center;max-width:520px;width:92%;animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);box-shadow:0 22px 70px rgba(180,20,0,0.4)}
@keyframes popIn{from{opacity:0;transform:scale(0.38) rotate(-6deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.fact-icon{font-size:4.2rem;margin-bottom:8px;animation:bncA 1.1s infinite}
@keyframes bncA{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.fact-title{font-size:1.95rem;font-weight:900;color:#ffd040;margin-bottom:12px;text-shadow:0 0 22px #ffd04055}
.fact-body{color:#f5d8b0;font-size:1.05rem;line-height:1.85;direction:rtl;text-align:right;background:rgba(200,50,0,0.1);padding:14px 17px;border-radius:14px;border-right:4px solid #cc3010;margin-bottom:16px}
.big-btn{padding:15px 52px;font-size:1.4rem;background:linear-gradient(135deg,#aa1a00,#ee3a10);color:#fff;border:none;border-radius:50px;cursor:pointer;font-weight:900;box-shadow:0 8px 28px rgba(180,20,0,0.55);transition:transform 0.15s,box-shadow 0.15s;display:inline-block;margin:4px}
.big-btn:hover{transform:scale(1.06);box-shadow:0 14px 38px rgba(220,40,0,0.75)}
.big-btn:active{transform:scale(0.93)}
.big-btn.gold{background:linear-gradient(135deg,#cc8800,#ffcc22);color:#1a0800;box-shadow:0 8px 28px rgba(200,150,0,0.5)}
.game-title{font-size:2.4rem;font-weight:900;color:#ffd040;margin:6px 0;text-shadow:0 0 22px #ffd04044}
.game-desc{color:#b07840;font-size:1.05rem;line-height:1.85;margin:10px 0 20px;direction:rtl;text-align:right}
.stats-row{display:flex;justify-content:center;gap:12px;margin:14px 0;flex-wrap:wrap}
.stat-c{background:rgba(200,50,0,0.12);border-radius:16px;padding:12px 18px;text-align:center;min-width:80px;border:1px solid rgba(200,50,0,0.22)}
.stat-c .sv{font-size:2rem;font-weight:900;color:#ffd040}
.stat-c .sl{font-size:0.78rem;color:#b07840;margin-top:2px}
#back-btn{position:fixed;bottom:18px;left:18px;padding:10px 22px;background:rgba(0,0,0,0.72);border:2px solid rgba(255,255,255,0.22);color:#fff;border-radius:16px;text-decoration:none;font-size:0.9rem;z-index:10;backdrop-filter:blur(8px)}
</style>
</head>
<body>
<div id="ui">
  <div><div class="lbl">نومۇر</div><div class="val" id="score">0</div></div>
  <div><div class="lbl">كومبو</div><div class="val" id="combo">×0</div></div>
  <div><div class="lbl">ۋاقىت</div><div class="val" id="timer">35</div></div>
</div>
<div id="round-badge">دەۋر 1 · قەشقەر قەلئىسى</div>

<div id="round-popup" class="overlay-dark hidden">
  <div class="fancy-box">
    <div class="fact-icon" id="rp-icon">⚔️</div>
    <div class="fact-title" id="rp-title">دەۋر 1!</div>
    <div class="fact-body" id="rp-fact"></div>
    <button class="big-btn gold" id="rp-btn" onclick="startRound()">⚔️ جەڭگە كىر!</button>
  </div>
</div>

<div id="overlay" class="overlay-dark">
  <div class="fancy-box">
    <div style="font-size:4.2rem;animation:bncA 1.1s infinite">⚔️🛡️</div>
    <div class="game-title">يۇرتنى قوغدا!</div>
    <div class="game-desc" id="overlay-desc">دۈشمەنلەرنى ئۇرۇڭ! ئۇيغۇر ئالىمى ۋە نەغمەچىنى ئۇرمىسەق — ئۇلار بىزنىڭ ئۆز كىشىلىرىمىز! 💣 بومبىدىن ساقلىنىڭ! 7 دەۋرنى بېسىپ ئۆتەلەمسىز؟</div>
    <div id="final-stats" class="stats-row" style="display:none">
      <div class="stat-c"><div class="sv" id="f-score">0</div><div class="sl">نومۇر</div></div>
      <div class="stat-c"><div class="sv" id="f-hit">0</div><div class="sl">ئۇرۇش</div></div>
      <div class="stat-c"><div class="sv" id="f-best">0</div><div class="sl">ئەڭ ياخشى</div></div>
    </div>
    <button class="big-btn gold" id="start-btn" onclick="initGame()">⚔️ جەڭگە كىر!</button>
    <div style="color:#6a3010;font-size:0.85rem;margin-top:10px">چىققان نەرسىنى چېكىڭ! كۆك ئادەمنى ئۇرمىسەك!</div>
  </div>
</div>

<canvas id="c"></canvas>
<a id="back-btn" href="../index.html">← كەينىگە</a>

<script>
const c=document.getElementById('c'), ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
window.addEventListener('resize',resize); resize();

// Enemy types to HIT
const ENEMIES=[
  {emoji:'⚔️', name:'باسقۇنچى',  pts:10, spd:0.9, sz:1.0, clr:'#cc3311'},
  {emoji:'🗡️', name:'ئىستىلاچى', pts:15, spd:1.1, sz:1.0, clr:'#aa2200'},
  {emoji:'🏹', name:'ئوقچى',      pts:20, spd:1.3, sz:0.9, clr:'#cc5500'},
  {emoji:'🐴', name:'ئاتلىق',    pts:25, spd:1.5, sz:0.9, clr:'#993300'},
  {emoji:'💀', name:'جەللاد',    pts:35, spd:1.7, sz:0.85,clr:'#dd1133'},
];
// GOLD target — super bonus
const GOLD={emoji:'👑',name:'دۈشمەن خان',pts:120,spd:1.8,sz:1.15,clr:'#ffd040',golden:true};
// BOMB — avoid
const BOMB={emoji:'💣',pts:-30,spd:1.0,sz:1.0,clr:'#ff2222',bomb:true};
// ALLIES — DO NOT HIT
const ALLIES=[
  {emoji:'📜',name:'ئۇيغۇر ئالىمى',pts:-60,sz:1.0,clr:'#3399ff',ally:true,spd:0.8},
  {emoji:'🎵',name:'نەغمەچى',     pts:-60,sz:1.0,clr:'#44aaff',ally:true,spd:0.8},
  {emoji:'🏺',name:'سەنئەتكار',   pts:-60,sz:0.9,clr:'#55ccff',ally:true,spd:0.8},
];

// 7 rounds (دەۋر)
const ROUNDS=[
  {name:'قەشقەر قەلئىسى', dur:38,spd:0.85,maxE:2,bombR:0.04,allyR:0.05},
  {name:'تاريم ئوتلىقى',  dur:35,spd:1.05,maxE:3,bombR:0.06,allyR:0.07},
  {name:'تۇرپان مىراسى',  dur:33,spd:1.25,maxE:3,bombR:0.08,allyR:0.08},
  {name:'تەڭرىتاغ ئاشۇشى',dur:30,spd:1.50,maxE:4,bombR:0.10,allyR:0.09},
  {name:'ئىپەك يولى جەڭگى',dur:28,spd:1.80,maxE:4,bombR:0.11,allyR:0.10},
  {name:'خان ئوردىسى',   dur:25,spd:2.10,maxE:5,bombR:0.12,allyR:0.11},
  {name:'ئۇلۇغ زەپەر',   dur:22,spd:2.40,maxE:5,bombR:0.13,allyR:0.12},
];

// History facts shown BEFORE each round
const ROUND_FACTS=[
  {icon:'🏰',title:'دەۋر 1 — قەشقەر قەلئىسى',
   fact:'قەشقەر شەھىرى 2000 يىلدىن ئارتۇق تارىخقا ئىگە! ئىپەك يولىنىڭ ئەڭ مۇھىم مەركىزى. ئۇيغۇر باتۇرلىرى بۇ شەھەرنى قاتتىق قوغداپ كەلگەن!'},
  {icon:'👑',title:'دەۋر 2 — ئۇيغۇر خانلىقى',
   fact:'ئۇيغۇر خانلىقى مىلادى 744-يىلى قۇرۇلغان! ئورخۇن-ئويغۇر خانلىقى ئورتا ئاسىيانىڭ ئەڭ قۇدرەتلىك دۆلىتى بولۇپ، ئۆزىنىڭ يازمىسى، قانۇن-تۈزۈمى بولغان!'},
  {icon:'🗿',title:'دەۋر 3 — مىڭ ئۆي غارلىرى',
   fact:'تۇرپاندىكى مىڭ ئۆي غارلىرى دۇنيانىڭ ئەڭ گۈزەل قەدىمىي سەنئەت مۇزىيى! ئۇيغۇر رەسسامى ئىشلىگەن مىڭلىغان سۈرەت ئالتۇن دەۋردىن قالغان!'},
  {icon:'📖',title:'دەۋر 4 — ئۇيغۇر يازمىسى',
   fact:'ئۇيغۇر يازمىسى 1500 يىلدىن ئارتۇق تارىخقا ئىگە! بۇ يازما مۇغۇل، مانجۇ قاتارلىق 10 دىن ئارتۇق تىلنىڭ ئاساسى بولۇپ خىزمەت قىلغان!'},
  {icon:'📚',title:'دەۋر 5 — قۇتادغۇبىلىگ',
   fact:'«قۇتادغۇبىلىگ» 1069-يىلى يۇسۇپ خاس ھاجىپ تەرىپىدىن يازىلغان! بۇ كىتاب دۇنيادىكى ئەڭ قەدىمىي تۈركىي ئەدەبىيات شاھئەسىرى! ئۇيغۇر تىلىدا يازىلغان!'},
  {icon:'🎶',title:'دەۋر 6 — ئون ئىككى مۇقام',
   fact:'ئۇيغۇر ئون ئىككى مۇقامى دۇنيانىڭ ئەڭ مۇرەككەپ مۇزىكا مىراسى! ئۇنېسكو تەرىپىدىن «مادىدىسىز مەدەنىيەت مىراسى» دەپ تونۇلغان! ئۇيغۇر مۇزىكىسى ئالەمگە مەشھۇر!'},
  {icon:'🏆',title:'دەۋر 7 — ئۇلۇغ زەپەر',
   fact:'ئۇيغۇر مىللىتى 4000 يىلدىن ئارتۇق تارىخقا ئىگە شانلىق مىللەت! ئۇلار ئىلىم-پەن، سەنئەت، مەدەنىيەت ۋە تىجارەتتە دۇنياغا بەي-بەرەكەت تارتۇ قىلغان! بۇ شانلىق تارىخ ھەر ئۇيغۇر باۋىسىنىڭ قەلبىدە يىشىلىدۇ!'},
];

const COLS=3, ROWS=2;
let active=false, round=0, score=0, combo=0, hits=0, bestScore=0;
let targets=[], effects=[], parts=[];
let timerVal=35, timerInterval=null, audioCtx=null, fr=0;
let shakeX=0, shakeY=0;
try{bestScore=parseInt(localStorage.getItem('whackBest2'))||0;}catch(e){}

function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tone(f,d,t,v){if(!audioCtx)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d);}catch(e){}}
function sfxHit(c2){tone(500+c2*40,0.09,'sine',0.13);setTimeout(()=>tone(700+c2*40,0.08,'sine',0.1),50);}
function sfxGold(){[0,80,160,240].forEach((d,i)=>setTimeout(()=>tone([800,1100,1400,1800][i],0.15,'sine',0.13),d));}
function sfxBomb(){tone(100,0.35,'sawtooth',0.2);setTimeout(()=>tone(70,0.3,'sawtooth',0.15),80);}
function sfxAlly(){tone(400,0.1,'sine',0.1);setTimeout(()=>tone(300,0.12,'sine',0.1),80);setTimeout(()=>tone(200,0.15,'sine',0.1),160);}
function sfxRound(){[0,120,250,380].forEach((d,i)=>setTimeout(()=>tone([660,880,1100,1400][i],0.22,'sine',0.12),d));}

function getGridPos(idx){
  const topArea=c.height*0.42, sidePad=42, botPad=38;
  const gw=c.width-sidePad*2, gh=c.height-topArea-botPad;
  const cx=sidePad+gw/COLS*(idx%COLS+0.5);
  const cy=topArea+gh/ROWS*(Math.floor(idx/COLS)+0.5);
  return {x:cx,y:cy};
}

function initGame(){
  initAudio();
  document.getElementById('overlay').classList.add('hidden');
  score=0; combo=0; hits=0; round=0;
  targets=[]; effects=[]; parts=[];
  document.getElementById('score').textContent='0';
  document.getElementById('final-stats').style.display='none';
  document.querySelector('.game-title').textContent='يۇرتنى قوغدا!';
  showRoundPopup(0);
}

function showRoundPopup(rIdx){
  const fd=ROUND_FACTS[rIdx];
  document.getElementById('rp-icon').textContent=fd.icon;
  document.getElementById('rp-title').textContent=fd.title;
  document.getElementById('rp-fact').textContent=fd.fact;
  document.getElementById('rp-btn').textContent=rIdx===0?'⚔️ جەڭگە كىر!':'▶ كېيىنكى دەۋر!';
  document.getElementById('round-popup').classList.remove('hidden');
}

function startRound(){
  document.getElementById('round-popup').classList.add('hidden');
  if(round>=ROUNDS.length){showFinal();return;}
  sfxRound();
  const rd=ROUNDS[round];
  timerVal=rd.dur; targets=[]; combo=0;
  document.getElementById('timer').textContent=timerVal;
  document.getElementById('round-badge').textContent='دەۋر '+(round+1)+' · '+rd.name;
  active=true;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerVal--;
    const te=document.getElementById('timer');
    te.textContent=timerVal;
    te.className='val'+(timerVal<=6?' danger':'');
    if(timerVal<=0){
      clearInterval(timerInterval); active=false; round++;
      setTimeout(()=>{
        if(round<ROUNDS.length)showRoundPopup(round); else showFinal();
      },600);
    }
  },1000);
  requestAnimationFrame(loop);
}

function spawnTarget(){
  const rd=ROUNDS[Math.min(round,ROUNDS.length-1)];
  const idx=Math.floor(Math.random()*COLS*ROWS);
  if(targets.find(t=>t.idx===idx))return;
  let type;
  const r=Math.random();
  if(r<0.08)type=GOLD;
  else if(r<0.08+rd.bombR)type=BOMB;
  else if(r<0.08+rd.bombR+rd.allyR)type={...ALLIES[Math.floor(Math.random()*ALLIES.length)]};
  else type={...ENEMIES[Math.floor(Math.random()*ENEMIES.length)]};
  const pos=getGridPos(idx);
  const dur=(0.65+Math.random()*1.1)/type.spd;
  targets.push({...type,x:pos.x,y:pos.y,idx,riseP:0,state:'rising',t:0,dur,
    spd2:type.spd*(rd.spd),radius:34*(type.sz||1)});
}

function loop(){
  if(!active)return;
  requestAnimationFrame(loop);
  fr++;
  // Screen shake decay
  shakeX*=0.7; shakeY*=0.7;
  const rd=ROUNDS[Math.min(round,ROUNDS.length-1)];
  if(Math.random()<0.032*rd.spd&&targets.length<rd.maxE)spawnTarget();
  const rs=0.04*Math.max(0.5,rd.spd);
  for(let i=targets.length-1;i>=0;i--){
    const m=targets[i];
    if(m.state==='rising'){m.riseP+=rs*m.spd2;if(m.riseP>=1){m.riseP=1;m.state='visible';m.t=0;}}
    else if(m.state==='visible'){m.t+=0.016;if(m.t>=m.dur)m.state='hiding';}
    else{m.riseP-=rs*m.spd2*1.2;if(m.riseP<=0)targets.splice(i,1);}
  }
  for(let i=effects.length-1;i>=0;i--){const e=effects[i];e.y-=2.2;e.a-=0.022;if(e.a<=0)effects.splice(i,1);}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.018;if(p.life<=0)parts.splice(i,1);}
  draw();
}

c.addEventListener('click',e=>{if(!active)return;const r=c.getBoundingClientRect();handleHit(e.clientX-r.left,e.clientY-r.top);});
c.addEventListener('touchstart',e=>{if(!active)return;e.preventDefault();const r=c.getBoundingClientRect();handleHit(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});

function handleHit(mx,my){
  for(let i=targets.length-1;i>=0;i--){
    const m=targets[i];
    if(m.state!=='visible')continue;
    if(Math.hypot(mx-m.x,my-m.y)>m.radius+16)continue;
    if(m.bomb){
      sfxBomb(); combo=0; score=Math.max(0,score+m.pts);
      shakeX=(Math.random()-0.5)*18; shakeY=(Math.random()-0.5)*18;
      spawnParts(m.x,m.y,'#ff3300',28);
      effects.push({x:m.x,y:m.y-30,text:'💥 ئاگاھلىق!',a:1,sz:1.1,clr:'#ff4400'});
      targets.splice(i,1); updateUI(); return;
    }
    if(m.ally){
      sfxAlly(); combo=Math.max(0,combo-2); score=Math.max(0,score+m.pts);
      spawnParts(m.x,m.y,m.clr,14);
      effects.push({x:m.x,y:m.y-30,text:'⚠️ '+m.name+'!',a:1,sz:1.0,clr:'#44aaff'});
      targets.splice(i,1); updateUI(); return;
    }
    // Enemy hit!
    const pts=m.golden?120+combo*30:m.pts+combo*6;
    score+=pts; combo++; hits++;
    m.golden?sfxGold():sfxHit(combo);
    spawnParts(m.x,m.y,m.clr,m.golden?28:14);
    if(m.golden){
      effects.push({x:m.x,y:m.y-35,text:'👑 +'+pts+' شانلىق!',a:1,sz:1.3,clr:'#ffd040'});
      shakeX=(Math.random()-0.5)*8; shakeY=(Math.random()-0.5)*8;
    }else{
      const labels=['ئۇر!','ياخشى!','ئازامەت!','شاپلا!','قاھرىمان!'];
      const lbl=combo>=5?'🔥 كومبو ×'+combo+'!':'+'+pts+' '+labels[Math.min(combo-1,labels.length-1)];
      effects.push({x:m.x,y:m.y-30,text:lbl,a:1,sz:combo>=5?1.4:1.1,clr:combo>=5?'#ff6600':'#ffffff'});
    }
    targets.splice(i,1); updateUI(); return;
  }
  // Tapped empty hole area — miss (optional soft penalty)
  for(let i=0;i<COLS*ROWS;i++){
    const p=getGridPos(i);
    if(Math.hypot(mx-p.x,my-p.y)<42){combo=Math.max(0,combo-1);updateUI();break;}
  }
}

function spawnParts(x,y,clr,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2.5+Math.random()*7;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,life:1,clr,r:2.5+Math.random()*5});}
}

function updateUI(){
  document.getElementById('score').textContent=score;
  const ce=document.getElementById('combo');
  ce.textContent='×'+combo;
  ce.className='val'+(combo>=8?' fire':combo>=4?' combo':'');
  if(!document.querySelector('#comboCSS')){const s=document.createElement('style');s.id='comboCSS';s.textContent='.val.combo{color:#ff8800;text-shadow:0 0 22px #ff8800;animation:fA 0.3s infinite alternate}';document.head.appendChild(s);}
}

/* ══════════════════ DRAW ══════════════════ */
function draw(){
  ctx.save();
  // Screen shake
  ctx.translate(shakeX,shakeY);
  ctx.clearRect(-20,-20,c.width+40,c.height+40);

  drawBackground();

  // Draw pit holes (stone circles)
  for(let i=0;i<COLS*ROWS;i++){
    const pos=getGridPos(i);
    const r=36;
    // Outer shadow
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.ellipse(pos.x+3,pos.y+5,r+6,r*0.42+4,0,0,Math.PI*2); ctx.fill();
    // Stone pit
    const pg=ctx.createRadialGradient(pos.x-5,pos.y-5,3,pos.x,pos.y,r+4);
    pg.addColorStop(0,'#3a2010'); pg.addColorStop(1,'#1a0808');
    ctx.fillStyle=pg; ctx.beginPath(); ctx.ellipse(pos.x,pos.y,r+4,r*0.4+3,0,0,Math.PI*2); ctx.fill();
    // Stone ring
    ctx.strokeStyle='#4a2810'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(pos.x,pos.y,r+4,r*0.4+3,0,0,Math.PI*2); ctx.stroke();
    // Glow if target about to appear
    const busy=targets.find(t=>t.idx===i);
    if(busy&&busy.state==='rising'){
      ctx.strokeStyle=busy.ally?`rgba(60,150,255,${busy.riseP*0.6})`:`rgba(255,60,0,${busy.riseP*0.5})`;
      ctx.lineWidth=3;
      ctx.beginPath(); ctx.ellipse(pos.x,pos.y,r+8,r*0.45+5,0,0,Math.PI*2); ctx.stroke();
    }
  }

  // Draw targets
  for(const m of targets){
    if(m.riseP<=0.05)continue;
    const sc=m.riseP;
    const yOff=m.radius*(1-sc)*1.6;
    ctx.save(); ctx.translate(m.x,m.y-yOff); ctx.scale(sc,sc);
    ctx.shadowColor=m.clr; ctx.shadowBlur=24+Math.sin(fr*0.18)*8;

    if(m.bomb){
      // Bomb target
      const bs=1+Math.sin(fr*0.2)*0.07; ctx.scale(bs,bs);
      ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(0,0,m.radius,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#cc0000'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,m.radius,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='#666'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,-m.radius); ctx.quadraticCurveTo(6,-m.radius-13,13,-m.radius-19); ctx.stroke();
      ctx.fillStyle='#ff9900'; ctx.shadowColor='#ff9900'; ctx.shadowBlur=16;
      ctx.beginPath(); ctx.arc(13,-m.radius-19,5+Math.sin(fr*0.3)*3,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.font=(m.radius*1.3)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💣',0,3);
    }else if(m.ally){
      // ALLY — blue protective ring, friendly look
      const ag=ctx.createRadialGradient(0,-m.radius*0.2,4,0,0,m.radius);
      ag.addColorStop(0,'#004488cc'); ag.addColorStop(1,'#0066aa');
      ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(0,0,m.radius,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#88ddff'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(0,0,m.radius+5,0,Math.PI*2); ctx.stroke();
      // Pulsing blue ring
      ctx.strokeStyle=`rgba(100,200,255,${0.4+Math.sin(fr*0.12)*0.3})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,m.radius+12,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0; ctx.font=(m.radius*1.3)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(m.emoji,0,-m.radius*0.06);
      // "DO NOT HIT" indicator
      ctx.fillStyle='rgba(100,200,255,0.75)'; ctx.font='bold 11px sans-serif'; ctx.fillText('دوست',0,m.radius*0.75);
    }else if(m.golden){
      // GOLDEN KHAN — super flashy
      const pulse=1+Math.sin(fr*0.22)*0.06; ctx.scale(pulse,pulse);
      for(let r2=3;r2>=0;r2--){
        ctx.globalAlpha=0.25-r2*0.05;
        ctx.fillStyle='#ffd040'; ctx.beginPath(); ctx.arc(0,0,m.radius+r2*10,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;
      const gg=ctx.createRadialGradient(0,-m.radius*0.25,4,0,0,m.radius);
      gg.addColorStop(0,'#fff8a0'); gg.addColorStop(0.5,'#ffd040'); gg.addColorStop(1,'#cc8800');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,0,m.radius,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#fff8a0'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,m.radius,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0; ctx.font=(m.radius*1.4)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('👑',0,-m.radius*0.06);
    }else{
      // Regular enemy
      const eg=ctx.createRadialGradient(0,-m.radius*0.25,4,0,0,m.radius);
      eg.addColorStop(0,m.clr+'ee'); eg.addColorStop(1,m.clr+'88');
      ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(0,0,m.radius,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,m.radius,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0; ctx.font=(m.radius*1.3)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(m.emoji,0,-m.radius*0.06);
    }
    ctx.shadowBlur=0; ctx.restore();
  }

  // Floating score/hit effects
  for(const e of effects){
    ctx.save(); ctx.globalAlpha=e.a;
    ctx.shadowColor=e.clr; ctx.shadowBlur=18;
    ctx.fillStyle=e.clr; ctx.font='bold '+(30*e.sz)+'px sans-serif'; ctx.textAlign='center';
    ctx.fillText(e.text,e.x,e.y);
    ctx.restore();
  }

  // Particles
  for(const p of parts){ctx.globalAlpha=p.life;ctx.fillStyle=p.clr;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;

  // Combo fire bar (bottom of screen)
  if(combo>=3){
    const barW=Math.min(c.width*0.7, combo*28);
    const barX=(c.width-barW)/2, barY=c.height-22;
    for(let fi=0;fi<3;fi++){
      const fw=barW*(1-fi*0.25), fx=(c.width-fw)/2;
      ctx.globalAlpha=0.4-fi*0.1;
      const fg=ctx.createLinearGradient(fx,barY,fx+fw,barY);
      fg.addColorStop(0,'#ff2200'); fg.addColorStop(0.5,'#ff8800'); fg.addColorStop(1,'#ffcc00');
      ctx.fillStyle=fg;
      ctx.beginPath(); ctx.ellipse(fx+fw/2,barY,fw/2,5+fi*2,0,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawBackground(){
  // Night sky
  const sky=ctx.createLinearGradient(0,0,0,c.height);
  sky.addColorStop(0,'#180306'); sky.addColorStop(0.5,'#2a0808'); sky.addColorStop(1,'#0e0404');
  ctx.fillStyle=sky; ctx.fillRect(0,0,c.width,c.height);

  // Stars
  for(let i=0;i<50;i++){
    const sx=(i*173.5)%c.width, sy=(i*91.3)%(c.height*0.38);
    ctx.fillStyle=`rgba(255,220,160,${0.15+Math.sin(fr*0.04+i)*0.12})`;
    ctx.beginPath(); ctx.arc(sx,sy,0.8+(i%3)*0.5,0,Math.PI*2); ctx.fill();
  }

  // Crescent moon
  ctx.save(); ctx.translate(c.width-70,52);
  ctx.shadowColor='#ffd060'; ctx.shadowBlur=30;
  ctx.fillStyle='#ffd060'; ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#180306'; ctx.beginPath(); ctx.arc(9,-6,16,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='#ffd060'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.fillText('✦',18,-17);
  ctx.restore();

  // Mountain silhouette
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.moveTo(0,c.height*0.40);
  const pts=[[0,.4],[.08,.32],[.15,.25],[.22,.33],[.3,.21],[.38,.15],[.46,.28],[.54,.18],[.62,.12],[.7,.22],[.78,.29],[.85,.2],[.92,.3],[1,.35],[1,.4]];
  for(const [rx,ry] of pts)ctx.lineTo(c.width*rx,c.height*ry);
  ctx.closePath(); ctx.fill();

  // Snow on tallest peak
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.moveTo(c.width*0.62,c.height*0.12);
  ctx.lineTo(c.width*0.585,c.height*0.175); ctx.lineTo(c.width*0.655,c.height*0.175); ctx.closePath(); ctx.fill();

  // Fortress wall
  const wallY=c.height*0.38, wallH=48;
  const wg=ctx.createLinearGradient(0,wallY,0,wallY+wallH+18);
  wg.addColorStop(0,'#2e1008'); wg.addColorStop(1,'#180808');
  ctx.fillStyle=wg; ctx.fillRect(0,wallY,c.width,wallH+20);
  // Wall texture lines
  ctx.strokeStyle='rgba(255,150,50,0.06)'; ctx.lineWidth=1;
  for(let wy=wallY+12;wy<wallY+wallH+18;wy+=14){ctx.beginPath();ctx.moveTo(0,wy);ctx.lineTo(c.width,wy);ctx.stroke();}
  for(let wx=0;wx<c.width;wx+=55){ctx.beginPath();ctx.moveTo(wx,wallY);ctx.lineTo(wx,wallY+wallH+18);ctx.stroke();}

  // Battlements (merlons)
  const bW=48, bH=30, bGap=28;
  const bTotal=bW+bGap;
  const startX=((c.width%bTotal)/2);
  ctx.fillStyle='#250e04';
  for(let bx=startX;bx<c.width;bx+=bTotal){
    ctx.fillRect(bx,wallY-bH,bW,bH+4);
  }
  // Battlement highlights
  ctx.fillStyle='rgba(255,150,50,0.06)';
  for(let bx=startX;bx<c.width;bx+=bTotal){ctx.fillRect(bx,wallY-bH,4,bH);}

  // Torches
  drawTorch(c.width*0.18, wallY-8);
  drawTorch(c.width*0.82, wallY-8);

  // Uyghur banner on wall center
  ctx.save(); ctx.translate(c.width/2, wallY+14);
  ctx.shadowColor='#ffd040'; ctx.shadowBlur=18;
  ctx.fillStyle='#ffd040'; ctx.font='bold 22px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('☽',-16,0); ctx.fillText('✦',14,-2);
  ctx.restore();

  // Stone floor
  const floorY=wallY+wallH+20;
  const fg2=ctx.createLinearGradient(0,floorY,0,c.height);
  fg2.addColorStop(0,'#1a0808'); fg2.addColorStop(1,'#100404');
  ctx.fillStyle=fg2; ctx.fillRect(0,floorY,c.width,c.height-floorY);
  // Floor stone tiles
  ctx.strokeStyle='rgba(255,120,40,0.04)'; ctx.lineWidth=1;
  for(let gy=floorY+30;gy<c.height;gy+=58){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(c.width,gy);ctx.stroke();}
  for(let gx=0;gx<c.width;gx+=68){ctx.beginPath();ctx.moveTo(gx,floorY);ctx.lineTo(gx,c.height);ctx.stroke();}
}

function drawTorch(x,y){
  ctx.save(); ctx.translate(x,y);
  // Bracket
  ctx.fillStyle='#4a2010'; ctx.fillRect(-5,0,10,28);
  ctx.fillStyle='#3a1808'; ctx.fillRect(-8,-4,16,10);
  // Flame layers
  const fh=24+Math.sin(fr*0.2+x)*5;
  for(let i=3;i>=0;i--){
    const fw=(4-i)*5+2, fy=-fh*(0.22+i*0.2);
    ctx.globalAlpha=0.8-i*0.12;
    const flg=ctx.createRadialGradient(0,-fh*0.5,0,0,-fh*0.2,fh*0.7);
    flg.addColorStop(0,['#ffffff','#ffe070','#ff8800','#ff3300'][i]);
    flg.addColorStop(1,'transparent');
    ctx.fillStyle=flg;
    ctx.beginPath(); ctx.ellipse(0,fy,fw,fh*(0.3+i*0.08),0,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // Glow on wall
  ctx.shadowColor='#ff8800'; ctx.shadowBlur=30+Math.sin(fr*0.2+x)*10;
  ctx.fillStyle='rgba(255,130,0,0.05)'; ctx.beginPath(); ctx.arc(0,-fh*0.4,35,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
}

function showFinal(){
  clearInterval(timerInterval); active=false;
  try{if(score>bestScore){bestScore=score;localStorage.setItem('whackBest2',bestScore);}}catch(e){}
  document.getElementById('overlay').classList.remove('hidden');
  document.querySelector('.game-title').textContent='🏆 زەپەر قازاندىڭىز!';
  document.getElementById('overlay-desc').textContent='سىز 7 دەۋرنى ئۆتتىڭىز! '+hits+' دۈشمەننى مەغلۇپ قىلدىڭىز! ئەمەلىي ئۇيغۇر باتۇرى!';
  document.getElementById('final-stats').style.display='flex';
  document.getElementById('f-score').textContent=score;
  document.getElementById('f-hit').textContent=hits;
  document.getElementById('f-best').textContent=bestScore;
  document.getElementById('start-btn').textContent='🔄 قايتا باشلاش';
}
</script>
