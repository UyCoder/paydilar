<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌈 ئەخلاق يولى: ياخشى ئەمەللەر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #caf0f8; font-family: 'Tajawal', sans-serif; color: #03045e; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; text-shadow: 0 0 10px white; }
        #score { font-size: 2.8rem; font-weight: 800; color: #0077b6; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(202, 240, 248, 0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); }
        .btn { padding: 18px 60px; font-size: 2rem; background: linear-gradient(135deg, #00b4d8, #0077b6); color: white; border: none; border-radius: 60px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 800; margin-top: 25px; box-shadow: 0 10px 30px rgba(0, 119, 182, 0.3); transition: all 0.3s; }
        .btn:hover { transform: scale(1.1); }
        h1 { font-size: 4rem; margin-bottom: 10px; color: #03045e; text-align: center; }
        p { font-size: 1.5rem; max-width: 700px; text-align: center; line-height: 1.8; color: #023e8a; }
        #back-btn { position: absolute; bottom: 30px; left: 30px; padding: 12px 35px; background: rgba(0, 180, 216, 0.1); border: 2px solid #00b4d8; color: #03045e; border-radius: 20px; cursor: pointer; text-decoration: none; font-weight: 800; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">ئەخلاق: 0</div></div>
    <div id="overlay">
        <h1>🌈 ئەخلاق يولى</h1>
        <p>ياخشى ئەمەللەرگە سەكرەپ ئۆگىنىش قىلىڭ! <br> توپ ئاستا سەكرەيدۇ، بارمىقىڭىز بىلەن ئوڭ-سولغا باشقۇرۇڭ.</p>
        <button class="btn" onclick="startGame()">باشلاش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>

    <script>
        let scene, camera, renderer, platforms = [], player;
        let score = 0, gameActive = false, audioCtx;
        let moveX = 0;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playJump() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function init() {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.background = new THREE.Color(0xade8f4);
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));

            player = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), new THREE.MeshPhongMaterial({ color: 0xffb703 }));
            scene.add(player); player.position.y = 1;

            camera.position.set(0, 5, 18);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            const handleIn = x => { if(gameActive) moveX = (x / window.innerWidth - 0.5) * 0.25; };
            window.addEventListener('mousemove', e => handleIn(e.clientX));
            window.addEventListener('touchmove', e => { handleIn(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
            window.addEventListener('touchend', () => moveX = 0);
        }

        function spawnPlatform(y) {
            const geo = new THREE.BoxGeometry(8, 0.8, 6);
            const mat = new THREE.MeshPhongMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.7, 0.6) });
            const plat = new THREE.Mesh(geo, mat);
            plat.position.set((Math.random() - 0.5) * 15, y, 0);
            scene.add(plat); platforms.push(plat);
        }

        function startGame() {
            initAudio(); document.getElementById('overlay').style.display = 'none';
            score = 0; gameActive = true;
            platforms.forEach(p => scene.remove(p)); platforms = [];
            player.position.set(0, 1, 0);
            player.userData = { velocity: 0.25 }; // Slower jump
            for(let i=0; i<15; i++) spawnPlatform(i * 6);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive) {
                player.position.x += moveX;
                player.position.y += player.userData.velocity;
                player.userData.velocity -= 0.005; // Slower gravity

                if (player.userData.velocity < 0) {
                    platforms.forEach(p => {
                        if (Math.abs(player.position.y - (p.position.y + 0.8)) < 0.4 && Math.abs(player.position.x - p.position.x) < 4) {
                            player.userData.velocity = 0.28; // Slower auto jump
                            playJump();
                            if (p.position.y > score) {
                                score = Math.floor(p.position.y);
                                document.getElementById('score').innerText = `ئەخلاق: ${score}`;
                                spawnPlatform(platforms[platforms.length-1].position.y + 6);
                            }
                        }
                    });
                }

                if (player.position.y < camera.position.y - 18) {
                    gameActive = false; document.getElementById('overlay').style.display = 'flex';
                }

                if (player.position.y > camera.position.y - 5) camera.position.y = player.position.y + 5;
                camera.lookAt(player.position.x * 0.3, player.position.y, 0);
            }
            renderer.render(scene, camera);
        }
        init(); animate();
    </script>
</body>
</html>
