<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شەرقىي تۈركىستان مۇھاپىزەتچىسى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Tajawal', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between; color: white; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #3498db; pointer-events: none; z-index: 5; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; color: white; text-align: center; padding: 20px; box-sizing: border-box; }
        h1 { font-size: 3rem; color: #3498db; text-shadow: 0 0 20px #3498db; margin: 0 0 20px 0; }
        p { font-size: 1.5rem; max-width: 600px; line-height: 1.5; margin-bottom: 30px; }
        .btn { padding: 15px 40px; font-size: 1.8rem; background: #3498db; color: white; border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(52, 152, 219, 0.5); }
        .back-btn { position: absolute; bottom: 20px; right: 20px; color: white; text-decoration: none; font-size: 1.2rem; background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 20px; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui">
        <div>مۇھاپىزەت: <span id="health">100</span>%</div>
        <div>نومۇر: <span id="score">0</span></div>
    </div>
    <div id="overlay">
        <h1>مۇھاپىزەتچى كۆك يۇلتۇز</h1>
        <p>ۋەتىنىمىزنىڭ ئاسمىنىنى تاجاۋۇزچىلاردىن قوغداڭ! كۆك بايرىقىمىزنىڭ يۇلتۇزىنى تۇتۇپ ئېكراننى سىيرىڭ ۋە ئاپتوماتىك ئوق چىقىرىپ دۈشمەنلەرنى يوقىتىڭ!</p>
        <button class="btn" onclick="startGame()">جەڭگە ئاتلىنىش</button>
    </div>
    <a href="../index.html" class="back-btn">← قايتىش</a>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let player, bullets, enemies, particles, score, health, gameActive = false, frameCount = 0;

        function init() {
            player = { x: canvas.width/2, y: canvas.height - 100, radius: 25, speed: 8 };
            bullets = [];
            enemies = [];
            particles = [];
            score = 0;
            health = 100;
            frameCount = 0;
            updateUI();
        }

        let touchX = canvas.width/2;
        window.addEventListener('touchmove', e => { touchX = e.touches[0].clientX; e.preventDefault(); }, {passive: false});
        window.addEventListener('mousemove', e => { touchX = e.clientX; });

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            init();
            gameActive = true;
            animate();
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            // Shield glow
            ctx.beginPath();
            ctx.arc(0, 0, player.radius + 10, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(52, 152, 219, 0.2)';
            ctx.fill();
            // Starship body (Crescent style)
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI*2);
            ctx.fillStyle = '#3498db';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(5, -5, player.radius-5, 0, Math.PI*2);
            ctx.fillStyle = '#111'; // background color to form crescent
            ctx.fill();
            
            // Star
            ctx.fillStyle = 'white';
            ctx.font = '20px sans-serif';
            ctx.fillText('★', 0, 5);
            ctx.restore();
        }

        function spawnEnemy() {
            const radius = Math.random() * 15 + 15;
            const x = Math.random() * (canvas.width - radius*2) + radius;
            const speed = Math.random() * 2 + 2 + (score/500);
            enemies.push({x, y: -radius, radius, speed});
        }

        function createParticles(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1,
                    color
                });
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('health').innerText = Math.max(0, health);
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('overlay').style.display = 'flex';
            document.querySelector('#overlay h1').innerText = "جەڭ ئاخىرلاشتى";
            document.querySelector('#overlay p').innerText = `ئېرىشكەن جەڭ نەتىجىڭىز: ${score}. ۋەتىنىمىز سىزگە ئوخشاش قەھرىمانلارغا موھتاج، قايتا غەيرەت قىلىڭ!`;
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(10, 15, 30, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            frameCount++;
            player.x += (touchX - player.x) * 0.15;

            // Shooting
            if (frameCount % 10 === 0) {
                bullets.push({x: player.x, y: player.y - player.radius, radius: 4, speed: 12});
            }

            // Update Bullets
            for(let i = bullets.length-1; i>=0; i--) {
                let b = bullets[i];
                b.y -= b.speed;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = '#f1c40f';
                ctx.fill();
                if(b.y < 0) bullets.splice(i, 1);
            }

            // Update Enemies
            if(frameCount % 30 === 0) spawnEnemy();
            for(let i = enemies.length-1; i>=0; i--) {
                let e = enemies[i];
                e.y += e.speed;
                
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                ctx.fillStyle = '#e74c3c';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#e74c3c';
                ctx.fill();
                ctx.shadowBlur = 0;

                let dist = Math.hypot(player.x - e.x, player.y - e.y);
                if (dist - e.radius - player.radius < 0) {
                    health -= 20;
                    createParticles(e.x, e.y, '#e74c3c');
                    enemies.splice(i, 1);
                    updateUI();
                    if(health <= 0) gameOver();
                    continue;
                }

                let hit = false;
                for(let j = bullets.length-1; j>=0; j--) {
                    let b = bullets[j];
                    let distToBullet = Math.hypot(b.x - e.x, b.y - e.y);
                    if(distToBullet - e.radius - b.radius < 0) {
                        score += 10;
                        updateUI();
                        createParticles(e.x, e.y, '#e74c3c');
                        bullets.splice(j, 1);
                        enemies.splice(i, 1);
                        hit = true;
                        break;
                    }
                }
                if(hit) continue;

                if(e.y > canvas.height + e.radius) {
                    health -= 5;
                    updateUI();
                    enemies.splice(i, 1);
                    if(health <= 0) gameOver();
                }
            }

            // Update Particles
            for(let i = particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.03;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(p.life, 0);
                ctx.fill();
                ctx.globalAlpha = 1;
                if(p.life <= 0) particles.splice(i, 1);
            }

            drawPlayer();
        }
    </script>
</body>
</html>
