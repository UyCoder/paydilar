<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❌⭕ تىك تاك توپ: زېھىن سىناش</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
            overflow: hidden;
        }

        h1 {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            text-align: center;
        }

        .status {
            font-size: 1.8rem;
            color: #fff;
            background: rgba(255,255,255,0.3);
            padding: 10px 30px;
            border-radius: 30px;
            margin-bottom: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: rgba(255, 255, 255, 0.4);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .cell {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }

        .cell:active {
            transform: scale(0.9);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.1);
        }

        .cell.x { color: #ff4757; text-shadow: 0 0 15px rgba(255, 71, 87, 0.5); }
        .cell.o { color: #1e90ff; text-shadow: 0 0 15px rgba(30, 144, 255, 0.5); }

        .btn-restart {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff6b81, #ff4757);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 800;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: transform 0.2s;
        }

        .btn-restart:hover { transform: scale(1.05); }

        #back-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.5);
            border: 2px solid #fff;
            color: #333;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .win-anim {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) alternate 3;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            100% { transform: scale(1.2) rotate(5deg); }
        }
    </style>
</head>
<body>

    <h1>❌⭕ تىك تاك توپ</h1>
    <div class="status" id="status">سىزنىڭ نۆۋىتىڭىز (❌)</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button class="btn-restart" onclick="restartGame()">قايتا ئويناش</button>
    <a id="back-btn" href="../index.html">← كەينىگە</a>

    <script>
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        let boardState = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let playerTurn = true; // true = X (player), false = O (AI)
        let audioCtx;

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // cols
            [0, 4, 8], [2, 4, 6]             // diagonals
        ];

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            let now = audioCtx.currentTime;

            if (type === 'click') {
                o.type = 'sine';
                o.frequency.setValueAtTime(600, now);
                o.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                g.gain.setValueAtTime(0.1, now);
                g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.start(now); o.stop(now + 0.1);
            } else if (type === 'win') {
                o.type = 'triangle';
                o.frequency.setValueAtTime(400, now);
                o.frequency.linearRampToValueAtTime(800, now + 0.2);
                o.frequency.linearRampToValueAtTime(1200, now + 0.4);
                g.gain.setValueAtTime(0.2, now);
                g.gain.linearRampToValueAtTime(0, now + 0.5);
                o.start(now); o.stop(now + 0.5);
            } else if (type === 'lose') {
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(300, now);
                o.frequency.linearRampToValueAtTime(100, now + 0.5);
                g.gain.setValueAtTime(0.2, now);
                g.gain.linearRampToValueAtTime(0, now + 0.5);
                o.start(now); o.stop(now + 0.5);
            } else if (type === 'draw') {
                o.type = 'square';
                o.frequency.setValueAtTime(200, now);
                g.gain.setValueAtTime(0.1, now);
                g.gain.linearRampToValueAtTime(0, now + 0.3);
                o.start(now); o.stop(now + 0.3);
            }
        }

        cells.forEach(cell => cell.addEventListener('click', () => {
            initAudio();
            const idx = cell.getAttribute('data-index');
            if (boardState[idx] !== '' || !gameActive || !playerTurn) return;

            makeMove(idx, 'X');
            if (gameActive) {
                playerTurn = false;
                statusText.innerText = "كومپيۇتېر ئويلىنىۋاتىدۇ...";
                setTimeout(aiMove, 600);
            }
        }));

        function makeMove(idx, player) {
            boardState[idx] = player;
            cells[idx].innerText = player === 'X' ? '❌' : '⭕';
            cells[idx].classList.add(player.toLowerCase());
            
            // Animation
            cells[idx].style.transform = 'scale(0.5)';
            setTimeout(() => cells[idx].style.transform = 'scale(1)', 50);

            playSound('click');
            checkWinner();
        }

        function checkWinner() {
            let roundWon = false;
            let winningCells = [];

            for (let i = 0; i < winConditions.length; i++) {
                const [a, b, c] = winConditions[i];
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    roundWon = true;
                    winningCells = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                gameActive = false;
                winningCells.forEach(i => cells[i].classList.add('win-anim'));
                if (playerTurn) {
                    statusText.innerText = "🎉 سىز ئۇتتۇڭىز!";
                    statusText.style.background = "#2ed573";
                    playSound('win');
                } else {
                    statusText.innerText = "😔 كومپيۇتېر ئۇتتى!";
                    statusText.style.background = "#ff4757";
                    playSound('lose');
                }
                return;
            }

            if (!boardState.includes('')) {
                statusText.innerText = "🤝 تەڭ بولدى!";
                statusText.style.background = "#ffa502";
                gameActive = false;
                playSound('draw');
                return;
            }
        }

        function aiMove() {
            if (!gameActive) return;

            let available = boardState.map((val, idx) => val === '' ? idx : null).filter(val => val !== null);
            
            // Easy AI logic: 
            // 1. Try to win if possible
            // 2. Block player ONLY 50% of the time (makes it easy for kids)
            // 3. Otherwise pick random

            let bestMove = -1;

            // 1. Can AI win?
            bestMove = findWinningMove('O');

            // 2. Can player win? Block them (only 50% chance to be nice to kids)
            if (bestMove === -1 && Math.random() < 0.5) {
                bestMove = findWinningMove('X');
            }

            // 3. Pick random
            if (bestMove === -1) {
                bestMove = available[Math.floor(Math.random() * available.length)];
            }

            makeMove(bestMove, 'O');
            if (gameActive) {
                playerTurn = true;
                statusText.innerText = "سىزنىڭ نۆۋىتىڭىز (❌)";
            }
        }

        function findWinningMove(player) {
            for (let i = 0; i < winConditions.length; i++) {
                const [a, b, c] = winConditions[i];
                if (boardState[a] === player && boardState[b] === player && boardState[c] === '') return c;
                if (boardState[a] === player && boardState[c] === player && boardState[b] === '') return b;
                if (boardState[b] === player && boardState[c] === player && boardState[a] === '') return a;
            }
            return -1;
        }

        function restartGame() {
            initAudio();
            boardState = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            playerTurn = true;
            statusText.innerText = "سىزنىڭ نۆۋىتىڭىز (❌)";
            statusText.style.background = "rgba(255,255,255,0.3)";
            
            cells.forEach(cell => {
                cell.innerText = '';
                cell.classList.remove('x', 'o', 'win-anim');
            });
        }
    </script>
</body>
</html>
