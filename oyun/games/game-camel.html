<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐫 قۇتلۇق كارۋان: بىلىم سەپىرى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #f4a261; font-family: 'Tajawal', sans-serif; color: white; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; text-shadow: 0 0 10px #e76f51; }
        #score { font-size: 2.8rem; font-weight: 800; color: #e76f51; }
        #lives { font-size: 1.5rem; color: #ff4444; }
        #combo-text { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: 900; color: #ffffff; display: none; pointer-events: none; text-shadow: 0 0 20px #e76f51; z-index: 50; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 162, 97, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); }
        .btn { padding: 18px 60px; font-size: 2rem; background: linear-gradient(135deg, #e76f51, #264653); color: white; border: none; border-radius: 60px; cursor: pointer; }
        h1 { font-size: 4rem; margin-bottom: 10px; color: #264653; }
        p { font-size: 1.5rem; max-width: 700px; text-align: center; line-height: 1.8; }
        #back-btn { position: absolute; bottom: 30px; left: 30px; padding: 12px 35px; background: rgba(38, 70, 83, 0.1); border: 2px solid #264653; color: #264653; border-radius: 20px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">مۇساپە: 0m</div><div id="lives">❤️❤️❤️❤️❤️</div></div>
    <div id="combo-text">داۋاملاشتۇرۇڭ!</div>
    <div id="overlay">
        <h1>🐫 قۇتلۇق كارۋان</h1>
        <p>تۆگىنى باشقۇرۇڭ! <br> "سۇ" يىغىپ قوغدىنىشقا ئىرىشىڭ. <br> ئېكراننىڭ سول ياكى ئوڭ تەرىپىنى چىكىڭ. بەك ئاسان!</p>
        <button class="btn" onclick="startGame()">باشلاش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>

    <script>
        let scene, camera, renderer, camel, obstacles = [];
        let score = 0, lives = 5, gameActive = false, speed = 0.3, invTime = 0, audioCtx;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playStep() { if (!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'triangle'; o.frequency.setValueAtTime(150, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); }

        function init() {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            camel = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 2.5), new THREE.MeshPhongMaterial({ color: 0xbc6c25 }));
            scene.add(camel); camel.position.y = 0.6; camera.position.set(0, 6, 12); camera.lookAt(0, 1, -5);
            const move = dir => { if (gameActive) { if (dir === 'L' && camel.position.x > -8) camel.position.x -= 4; if (dir === 'R' && camel.position.x < 8) camel.position.x += 4; playStep(); } };
            window.addEventListener('keydown', e => { if (e.key === 'ArrowLeft') move('L'); if (e.key === 'ArrowRight') move('R'); });
            window.addEventListener('touchstart', e => { const x = e.touches[0].clientX / window.innerWidth; move(x < 0.5 ? 'L' : 'R'); e.preventDefault(); }, { passive: false });
        }

        function showCombo(txt) { const el = document.getElementById('combo-text'); el.innerText = txt; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 800); }

        function spawnObstacle() {
            const isOasis = Math.random() < 0.25;
            const obj = new THREE.Mesh(new THREE.DodecahedronGeometry(1.5, 0), new THREE.MeshPhongMaterial({ color: isOasis ? 0x00d4ff : 0x264653 }));
            const lanes = [-8, -4, 0, 4, 8]; obj.position.set(lanes[Math.floor(Math.random() * 5)], 1, -120);
            obj.userData = { isOasis: isOasis }; scene.add(obj); obstacles.push(obj);
        }

        function startGame() {
            initAudio(); document.getElementById('overlay').style.display = 'none';
            score = 0; lives = 5; speed = 0.35; invTime = 0; gameActive = true; updateUI();
            obstacles.forEach(o => scene.remove(o)); obstacles = []; camel.position.x = 0;
        }

        function updateUI() { document.getElementById('score').innerText = `مۇساپە: ${Math.floor(score)}m`; document.getElementById('lives').innerText = '❤️'.repeat(lives); }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive) {
                score += speed; if (invTime > 0) invTime--; updateUI();
                if (Math.random() < 0.015) spawnObstacle();
                camel.material.opacity = (invTime > 0 && Math.floor(Date.now()/100)%2 === 0) ? 0.3 : 1;
                camel.material.transparent = true;
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const o = obstacles[i]; o.position.z += speed;
                    if (o.position.distanceTo(camel.position) < 2.5) {
                        if (o.userData.isOasis) { invTime = 400; showCombo("سۇ ئىچتىڭىز!"); scene.remove(o); obstacles.splice(i, 1); beep(800, 0.2); }
                        else if (invTime <= 0) { lives--; updateUI(); beep(200, 0.3, 'sawtooth'); scene.remove(o); obstacles.splice(i, 1); if (lives <= 0) { gameActive = false; document.getElementById('overlay').style.display = 'flex'; } }
                        else { scene.remove(o); obstacles.splice(i, 1); showCombo("كارۋان ئالغا!"); }
                        continue;
                    }
                    if (o.position.z > 15) { scene.remove(o); obstacles.splice(i, 1); }
                }
            }
            renderer.render(scene, camera);
        }
        init(); animate();
    </script>
</body>
</html>
