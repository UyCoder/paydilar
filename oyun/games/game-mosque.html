<!DOCTYPE html>
<html lang="ug">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مەسچىت ئەسلىمىسى - Mosque Memory</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Amiri', serif;
    background: #0a0a1a;
    color: #e8d5b0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* ---- Background ---- */
.bg-stars {
    position: fixed; inset: 0;
    background:
        radial-gradient(1px 1px at 10% 20%, #fff5, transparent),
        radial-gradient(1px 1px at 30% 60%, #fff4, transparent),
        radial-gradient(2px 2px at 50% 10%, #fff6, transparent),
        radial-gradient(1px 1px at 70% 40%, #fff3, transparent),
        radial-gradient(2px 2px at 85% 70%, #fff5, transparent),
        radial-gradient(1px 1px at 20% 80%, #fff4, transparent),
        radial-gradient(2px 2px at 45% 90%, #fff3, transparent),
        radial-gradient(1px 1px at 95% 15%, #fff5, transparent),
        radial-gradient(1.5px 1.5px at 60% 5%, #fff4, transparent),
        radial-gradient(1px 1px at 5% 50%, #fff3, transparent),
        radial-gradient(2px 2px at 40% 35%, #fff6, transparent),
        radial-gradient(1px 1px at 80% 85%, #fff4, transparent);
    background-size: 200px 200px;
    z-index: 0;
    pointer-events: none;
}

/* ---- Wrapper ---- */
.game-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 820px;
    padding: 20px;
}

/* ---- Title Screen ---- */
.screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fadeIn 0.5s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }

.title-logo {
    font-size: 3.5em;
    margin-bottom: 5px;
    text-shadow: 0 0 40px #f0c06088, 0 0 80px #f0a03044;
    animation: pulse 2s ease-in-out infinite;
}
.title-mosque {
    font-size: 5em;
    margin: 10px 0;
    filter: drop-shadow(0 0 20px #f0c06066);
}
.title-text {
    font-size: 2.2em;
    font-weight: 700;
    color: #f0d080;
    text-shadow: 0 0 20px #f0a03055;
    margin-bottom: 5px;
}
.title-sub {
    font-size: 1em;
    color: #a09070;
    margin-bottom: 25px;
    letter-spacing: 2px;
}

/* ---- Buttons ---- */
.btn {
    font-family: 'Amiri', serif;
    padding: 12px 40px;
    font-size: 1.2em;
    border: 2px solid #c8a050;
    background: linear-gradient(135deg, #1a1a2e 0%, #2a1a0e 100%);
    color: #f0d080;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin: 6px;
    min-width: 160px;
    position: relative;
    overflow: hidden;
}
.btn:hover {
    background: linear-gradient(135deg, #2a2a4e 0%, #3a2a1e 100%);
    border-color: #f0d080;
    box-shadow: 0 0 30px #f0a03044;
    transform: translateY(-2px);
}
.btn:active { transform: translateY(0); }
.btn-sm { padding: 8px 24px; font-size: 1em; min-width: 100px; }
.btn-gold {
    background: linear-gradient(135deg, #8a6a20 0%, #c8a040 100%);
    color: #1a0a00;
    border-color: #f0d080;
    font-weight: 700;
}
.btn-gold:hover {
    background: linear-gradient(135deg, #a08030 0%, #e8c060 100%);
    box-shadow: 0 0 40px #f0a03066;
}

.diff-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 15px 0; }

/* ---- Game Board ---- */
#game-screen {
    padding: 10px 0;
}

.stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    margin-bottom: 15px;
    border-radius: 15px;
    background: linear-gradient(135deg, #12122a88, #1a0e0888);
    border: 1px solid #c8a05033;
    backdrop-filter: blur(10px);
    flex-wrap: wrap;
    gap: 8px;
}
.stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 1.1em;
}
.stat-icon { font-size: 1.3em; }
.stat-value { color: #f0d080; font-weight: 700; min-width: 30px; display: inline-block; }
.stat-value.danger { color: #ff6040; animation: pulse 0.5s ease-in-out infinite; }
.stat-label { color: #908060; font-size: 0.85em; }

/* Combo display */
.combo-display {
    font-size: 1em;
    color: #f0d080;
    min-width: 60px;
    text-align: center;
    transition: all 0.3s ease;
}
.combo-display.active { color: #ffd040; text-shadow: 0 0 20px #ffa03088; }
.combo-display.fire { color: #ff6040; text-shadow: 0 0 30px #ff400088; animation: pulse 0.3s ease; }

/* ---- Card Grid ---- */
.card-grid {
    display: grid;
    gap: 10px;
    justify-content: center;
    margin: 0 auto;
    max-width: 700px;
    perspective: 1000px;
}
.card-grid.easy { grid-template-columns: repeat(4, 1fr); }
.card-grid.medium { grid-template-columns: repeat(4, 1fr); }
.card-grid.hard { grid-template-columns: repeat(6, 1fr); }

/* ---- Card ---- */
.card {
    aspect-ratio: 1;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
    border-radius: 12px;
}
.card.flipped { transform: rotateY(180deg); }
.card.matched { transform: rotateY(180deg); }
.card.matched .card-front {
    box-shadow: 0 0 20px #f0c06066, 0 0 40px #f0a03033;
    border-color: #f0d080;
}
.card.matched .card-back {
    box-shadow: 0 0 20px #f0c06066, 0 0 40px #f0a03033;
}
.card.disabled { pointer-events: none; }

.card-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5em;
    border: 2px solid #c8a05055;
    transition: all 0.3s ease;
}

.card-back {
    background: linear-gradient(145deg, #1a1a3e 0%, #2a1a0e 100%);
    z-index: 2;
}
.card-back::before {
    content: '☪';
    font-size: 1.8em;
    opacity: 0.6;
}
.card-back-pattern {
    position: absolute;
    inset: 8px;
    border: 1px solid #c8a05022;
    border-radius: 8px;
    background: repeating-conic-gradient(#c8a05011 0% 25%, transparent 0% 50%) 0 0 / 20px 20px;
}

.card-front {
    background: linear-gradient(145deg, #0e0e1a 0%, #1a0e08 100%);
    transform: rotateY(180deg);
    border-color: #c8a05044;
}

.card:hover:not(.flipped):not(.matched) .card-back {
    border-color: #f0d08088;
    box-shadow: 0 0 20px #f0a03033;
}

/* ---- Mosque Progress ---- */
.mosque-progress {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 12px 0;
    padding: 8px 16px;
    border-radius: 12px;
    background: linear-gradient(135deg, #12122a44, #1a0e0844);
    border: 1px solid #c8a05022;
}
.mosque-progress .icon {
    font-size: 1.5em;
    opacity: 0.15;
    transition: all 0.5s ease;
    filter: grayscale(1);
}
.mosque-progress .icon.lit {
    opacity: 1;
    filter: grayscale(0);
    text-shadow: 0 0 20px #f0c06088, 0 0 40px #f0a03044;
    animation: pulse 2s ease-in-out infinite;
}

/* ---- Complete Screen ---- */
#complete-screen .final-score { font-size: 3em; color: #f0d080; margin: 10px 0; }
#complete-screen .final-stars { font-size: 2.5em; margin: 10px 0; }
#complete-screen .final-stat {
    font-size: 1em;
    color: #b0a080;
    margin: 3px 0;
}
.star-icon {
    display: inline-block;
    opacity: 0.2;
    transition: all 0.5s ease;
    filter: grayscale(1);
}
.star-icon.got {
    opacity: 1;
    filter: grayscale(0);
    text-shadow: 0 0 30px #f0d060;
    animation: pulse 1s ease-in-out infinite;
}
.best-score {
    font-size: 0.9em;
    color: #c8a050;
    margin-top: 10px;
}
.new-record {
    color: #ffd040;
    animation: pulse 0.5s ease-in-out infinite;
    font-weight: 700;
}

/* ---- Effects ---- */
.match-burst {
    position: fixed;
    pointer-events: none;
    font-size: 2em;
    animation: floatUp 0.8s ease-out forwards;
    z-index: 100;
}
.wrong-flash {
    position: fixed; inset: 0;
    background: radial-gradient(circle at center, #ff202033, transparent);
    pointer-events: none;
    z-index: 50;
    animation: fadeIn 0.2s ease-out reverse;
}

/* ---- Responsive ---- */
@media (max-width: 600px) {
    .game-wrapper { padding: 10px; }
    .title-mosque { font-size: 3.5em; }
    .title-text { font-size: 1.6em; }
    .title-logo { font-size: 2.5em; }
    .card-face { font-size: 1.8em; }
    .card-grid { gap: 6px; }
    .stats-bar { font-size: 0.85em; padding: 8px 10px; }
    .btn { padding: 10px 24px; font-size: 1em; min-width: 120px; }
    .diff-buttons { gap: 6px; }
}

/* ---- Audio Toggle ---- */
.audio-toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid #c8a05044;
    background: #0a0a1acc;
    color: #e8d5b0;
    font-size: 1.2em;
    cursor: pointer;
    z-index: 200;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}
.audio-toggle:hover {
    border-color: #f0d080;
    background: #1a1a3ecc;
}
</style>
</head>
<body>

<div class="bg-stars"></div>

<button class="audio-toggle" id="audioToggle" title="ئاۋاز">🔊</button>

<div class="game-wrapper">

    <!-- Title Screen -->
    <div class="screen active" id="title-screen">
        <div class="title-logo">🏮</div>
        <div class="title-mosque">🕌</div>
        <div class="title-text">مەسچىت ئەسلىمىسى</div>
        <div class="title-sub">— ماس كەلگەن كارتىلارنى تېپىڭ —</div>
        <div style="margin:10px 0 5px;color:#908060;font-size:0.9em;">قىيىنلىق دەرىجىسىنى تاللاڭ:</div>
        <div class="diff-buttons">
            <button class="btn btn-sm" onclick="startGame('easy')">🌙 ئاسان (4×3)</button>
            <button class="btn btn-sm btn-gold" onclick="startGame('medium')">⭐ ئوتتۇرا (4×4)</button>
            <button class="btn btn-sm" onclick="startGame('hard')">🔥 قىيىن (6×4)</button>
        </div>
        <div id="hs-display" style="margin-top:15px;font-size:0.9em;color:#c8a05088;"></div>
    </div>

    <!-- Game Screen -->
    <div class="screen" id="game-screen">
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-icon">⏱️</span>
                <span class="stat-value" id="timer-display">0</span>
                <span class="stat-label">س</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">👆</span>
                <span class="stat-value" id="flip-display">0</span>
                <span class="stat-label">قېتىم</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">✅</span>
                <span class="stat-value" id="match-display">0</span>
                <span class="stat-label">/ <span id="total-pairs">0</span></span>
            </div>
            <div class="combo-display" id="combo-display">🔥 ×<span id="combo-count">0</span></div>
        </div>

        <div class="card-grid" id="card-grid"></div>

        <div class="mosque-progress" id="mosque-progress"></div>
    </div>

    <!-- Complete Screen -->
    <div class="screen" id="complete-screen">
        <div style="font-size:3em;margin:10px 0;" id="result-icon">🎉</div>
        <div class="final-stars" id="final-stars">⭐⭐⭐</div>
        <div class="final-score" id="final-score">0</div>
        <div style="font-size:1.1em;color:#b0a080;">نومۇر</div>
        <div class="final-stat">👆 <span id="final-flips">0</span> قېتىم ئايلاندى</div>
        <div class="final-stat">⏱️ <span id="final-time">0</span> سېكۇنت</div>
        <div class="best-score" id="best-score"></div>
        <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
            <button class="btn btn-sm" onclick="showTitle()">🏠 باش بەت</button>
            <button class="btn btn-sm btn-gold" onclick="restartGame()">🔄 قايتا</button>
        </div>
    </div>

</div>

<script>
// ============================================================
//  STATE
// ============================================================
let gameState = 'title'; // 'title' | 'playing' | 'complete'
let difficulty = 'easy';
let cards = [];
let flippedCards = [];
let matchedPairs = 0;
let totalPairs = 0;
let flipCount = 0;
let comboCount = 0;
let score = 0;
let timer = 0;
let timerInterval = null;
let isProcessing = false;
let canFlip = true;
let gameId = 0;

// Audio
let audioCtx = null;
let soundEnabled = true;

// Settings per difficulty
const DIFF = {
    easy:   { cols:4, rows:3, pairs:6, totalCards:12, time:120, label:'ئاسان', icon:'🌙' },
    medium: { cols:4, rows:4, pairs:8, totalCards:16, time:150, label:'ئوتتۇرا', icon:'⭐' },
    hard:   { cols:6, rows:4, pairs:12, totalCards:24, time:200, label:'قىيىن', icon:'🔥' }
};

// Card icons (Islamic themed)
const ICONS = [
    { icon:'🌙', name:'ئاي' },
    { icon:'⭐', name:'يۇلتۇز' },
    { icon:'🕌', name:'مەسچىت' },
    { icon:'🏮', name:'فانۇس' },
    { icon:'☪', name:'ئاي-يۇلتۇز' },
    { icon:'📖', name:'قۇرئان' },
    { icon:'💎', name:'ئالماس' },
    { icon:'🌺', name:'گۈل' },
    { icon:'🔮', name:'چىراغ' },
    { icon:'🕋', name:'كەئبە' },
    { icon:'💧', name:'زەمزەم' },
    { icon:'🌿', name:'زەيتۇن' },
    { icon:'✨', name:'نۇر' },
    { icon:'🍃', name:'ياقۇت' },
    { icon:'🔱', name:'تەسبىھ' },
    { icon:'🏺', name:'سۇپا' },
    { icon:'🌟', name:'سىر' },
    { icon:'🍊', name:'خورما' }
];


// ============================================================
//  HIGH SCORE (localStorage)
// ============================================================
function getHighScores() {
    try { return JSON.parse(localStorage.getItem('mosqueMemoryHS')) || {}; }
    catch { return {}; }
}
function setHighScore(diff, s) {
    const hs = getHighScores();
    if (!hs[diff] || s > hs[diff]) { hs[diff] = s; localStorage.setItem('mosqueMemoryHS', JSON.stringify(hs)); return true; }
    return false;
}
function displayHighScores() {
    const hs = getHighScores();
    let html = '';
    for (const d of ['easy','medium','hard']) {
        if (hs[d]) html += `${DIFF[d].icon} ${DIFF[d].label}: ${hs[d]} &nbsp; `;
    }
    document.getElementById('hs-display').innerHTML = html || '';
}

// ============================================================
//  AUDIO
// ============================================================
function initAudio() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function playTone(freq, duration, type='sine', vol=0.15) {
    if (!soundEnabled || !audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}
function playFlip() { playTone(600, 0.1, 'sine', 0.1); }
function playMatch() { playTone(880, 0.15, 'sine', 0.15); setTimeout(() => playTone(1100, 0.2, 'sine', 0.12), 100); }
function playWrong() { playTone(300, 0.15, 'square', 0.08); }
function playWin() {
    [0,100,200,300,400].forEach((d, i) => setTimeout(() => playTone([880,1100,1320,1100,880][i], 0.25, 'sine', 0.12), d));
}
function playCombo() { playTone(1320, 0.1, 'sine', 0.15); }

// ============================================================
//  CARD SHUFFLE (Fisher-Yates)
// ============================================================
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// ============================================================
//  GAME LOGIC
// ============================================================
function startGame(diff) {
    initAudio();
    difficulty = diff;
    const cfg = DIFF[diff];
    totalPairs = cfg.pairs;
    matchedPairs = 0;
    flipCount = 0;
    comboCount = 0;
    score = 0;
    flippedCards = [];
    isProcessing = false;
    canFlip = true;
    timer = cfg.time;
    gameId++;

    // Generate cards
    const selectedIcons = shuffle([...ICONS]).slice(0, totalPairs);
    cards = [];
    selectedIcons.forEach((ic, idx) => {
        cards.push({ id: idx*2, icon: ic.icon, name: ic.name, pairId: idx, matched: false });
        cards.push({ id: idx*2+1, icon: ic.icon, name: ic.name, pairId: idx, matched: false });
    });
    shuffle(cards);

    gameState = 'playing';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('game-screen').classList.add('active');

    renderBoard();

    // Timer
    if (timerInterval) clearInterval(timerInterval);
    updateTimerDisplay();
    timerInterval = setInterval(() => {
        timer--;
        updateTimerDisplay();
        if (timer <= 0) { endGame(false); }
    }, 1000);

    audioToggle.textContent = soundEnabled ? '🔊' : '🔇';
}

function renderBoard() {
    const cfg = DIFF[difficulty];
    const grid = document.getElementById('card-grid');
    grid.className = 'card-grid ' + difficulty;
    grid.innerHTML = '';

    cards.forEach((card, idx) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.dataset.index = idx;
        div.innerHTML = `
            <div class="card-face card-back">
                <div class="card-back-pattern"></div>
            </div>
            <div class="card-face card-front">${card.icon}</div>
        `;
        div.addEventListener('click', () => onCardClick(idx));
        grid.appendChild(div);
    });

    // Mosque progress
    renderMosqueProgress();

    // Update stats
    document.getElementById('flip-display').textContent = '0';
    document.getElementById('match-display').textContent = '0';
    document.getElementById('total-pairs').textContent = totalPairs;
    updateComboDisplay();
}

function renderMosqueProgress() {
    const container = document.getElementById('mosque-progress');
    container.innerHTML = '';
    for (let i = 0; i < totalPairs; i++) {
        const span = document.createElement('span');
        span.className = 'icon';
        span.textContent = '🏮';
        if (i < matchedPairs) span.classList.add('lit');
        container.appendChild(span);
    }
}

function onCardClick(index) {
    if (!canFlip || isProcessing || gameState !== 'playing') return;
    const card = cards[index];
    if (card.matched) return;
    const el = document.querySelector(`.card[data-index="${index}"]`);
    if (el.classList.contains('flipped')) return;

    // Flip card
    el.classList.add('flipped');
    flippedCards.push(index);
    flipCount++;
    document.getElementById('flip-display').textContent = flipCount;
    playFlip();

    if (flippedCards.length === 2) {
        isProcessing = true;
        checkMatch();
    }
}

function checkMatch() {
    const idxA = flippedCards[0];
    const idxB = flippedCards[1];
    const cardA = cards[idxA];
    const cardB = cards[idxB];

    const currentGameId = gameId;

    if (cardA.pairId === cardB.pairId) {
        // Match!
        setTimeout(() => {
            if (gameId !== currentGameId) return;
            cardA.matched = true;
            cardB.matched = true;
            matchedPairs++;
            comboCount++;
            updateComboDisplay();

            // Score: base 100 * combo multiplier
            const comboMult = Math.min(comboCount, 5);
            const matchScore = 100 * comboMult;
            score += matchScore;

            const elA = document.querySelector(`.card[data-index="${idxA}"]`);
            const elB = document.querySelector(`.card[data-index="${idxB}"]`);
            if (elA) elA.classList.add('matched');
            if (elB) elB.classList.add('matched');

            document.getElementById('match-display').textContent = matchedPairs;
            renderMosqueProgress();

            if (elB) createBurst(elB);

            playMatch();
            if (comboCount >= 2) playCombo();

            flippedCards = [];
            isProcessing = false;

            if (matchedPairs === totalPairs) {
                setTimeout(() => endGame(true), 600);
            }
        }, 400);
    } else {
        // Wrong
        setTimeout(() => {
            if (gameId !== currentGameId) return;
            comboCount = 0;
            updateComboDisplay();
            playWrong();

            // Wrong flash
            const flash = document.createElement('div');
            flash.className = 'wrong-flash';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 300);

            const elA = document.querySelector(`.card[data-index="${idxA}"]`);
            const elB = document.querySelector(`.card[data-index="${idxB}"]`);
            if (elA) elA.classList.remove('flipped');
            if (elB) elB.classList.remove('flipped');

            flippedCards = [];
            isProcessing = false;
        }, 700);
    }
}

function createBurst(refEl) {
    const burst = document.createElement('div');
    burst.className = 'match-burst';
    burst.textContent = '✨';
    const rect = refEl.getBoundingClientRect();
    burst.style.left = (rect.left + rect.width/2 - 15) + 'px';
    burst.style.top = (rect.top + rect.height/2 - 15) + 'px';
    document.body.appendChild(burst);
    setTimeout(() => burst.remove(), 900);
}

function updateComboDisplay() {
    const el = document.getElementById('combo-display');
    const countEl = document.getElementById('combo-count');
    countEl.textContent = comboCount;
    el.className = 'combo-display';
    if (comboCount >= 2) el.classList.add('active');
    if (comboCount >= 4) el.classList.add('fire');
}

function updateTimerDisplay() {
    const el = document.getElementById('timer-display');
    el.textContent = timer;
    el.className = 'stat-value' + (timer <= 10 ? ' danger' : '');
}

function endGame(won) {
    if (timerInterval) clearInterval(timerInterval);
    gameState = 'complete';
    canFlip = false;

    if (won) playWin();

    // Calculate stars
    const cfg = DIFF[difficulty];
    const efficiency = Math.max(0, 1 - (flipCount - totalPairs) / (totalPairs * 3));
    let stars = 1;
    if (efficiency > 0.5) stars = 2;
    if (efficiency > 0.75) stars = 3;
    if (difficulty === 'hard') stars = Math.min(3, stars + 1); // bonus star for hard

    // Time bonus
    const timeUsed = cfg.time - timer;
    const timeEfficiency = Math.max(0, 1 - timeUsed / cfg.time);
    if (timeEfficiency > 0.5 && stars < 3) stars = Math.min(3, stars + 1);

    // Final score
    const finalScore = score + (won ? 500 * stars : 0);
    score = finalScore;

    const isNewRecord = setHighScore(difficulty, finalScore);

    // Show complete screen
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('complete-screen').classList.add('active');

    document.getElementById('result-icon').textContent = won ? '🎉' : '⏰';
    document.getElementById('final-stars').innerHTML = won
        ? Array.from({length:3}, (_,i) => `<span class="star-icon${i<stars?' got':''}">⭐</span>`).join('')
        : '💔';
    document.getElementById('final-score').textContent = finalScore;
    document.getElementById('final-flips').textContent = flipCount;
    document.getElementById('final-time').textContent = timeUsed;

    const bestEl = document.getElementById('best-score');
    const hs = getHighScores();
    bestEl.innerHTML = hs[difficulty]
        ? (isNewRecord
            ? `<span class="new-record">🏆 يېڭى رېكورد! ${hs[difficulty]} نومۇر</span>`
            : `🏆 ئەڭ يۇقىرى: ${hs[difficulty]}`)
        : `🏆 ${finalScore} نومۇر (يېڭى)`;
}

function showTitle() {
    if (timerInterval) clearInterval(timerInterval);
    gameState = 'title';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('title-screen').classList.add('active');
    displayHighScores();
}

function restartGame() {
    startGame(difficulty);
}

// ============================================================
//  AUDIO TOGGLE
// ============================================================
document.getElementById('audioToggle').addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    document.getElementById('audioToggle').textContent = soundEnabled ? '🔊' : '🔇';
    if (soundEnabled) initAudio();
});

// ============================================================
//  INIT
// ============================================================
displayHighScores();
</script>
