<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💥 توپ قۇرال قىسىمى: جەڭ مەيدانى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; font-family: 'Tajawal', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
        .ui-box { background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); padding: 10px 18px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .ui-box .label { font-size: 0.7rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
        .ui-box .value { font-size: 1.5rem; font-weight: 900; }
        #score-val { color: #ffb703; text-shadow: 0 0 15px rgba(255,183,3,0.3); }
        #ammo-val { color: #e94560; }
        #wave-val { color: #00d4ff; }
        #combo-val { color: #8b5cf6; font-size: 1rem; }
        #wind-box { text-align: center; min-width: 100px; }
        #wind-arrow { font-size: 1.8rem; display: inline-block; transition: transform 0.5s ease; }
        #wind-val { font-size: 1rem; color: rgba(255,255,255,0.7); }
        #weapon-display { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 10px; pointer-events: none; }
        .wpn-btn { pointer-events: auto; padding: 8px 16px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border: 2px solid rgba(255,255,255,0.15); border-radius: 30px; color: white; font-family: 'Tajawal', sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .wpn-btn.active { border-color: #ffb703; background: rgba(255,183,3,0.2); box-shadow: 0 0 20px rgba(255,183,3,0.3); }
        .wpn-btn:active { transform: scale(0.95); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, rgba(15,12,41,0.6) 0%, rgba(0,0,0,0.95) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); }
        .glass-panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 2.5rem; text-align: center; max-width: 480px; width: 90%; animation: popIn 0.5s ease-out; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        @keyframes popIn { from{opacity:0;transform:scale(0.8)translateY(30px)} to{opacity:1;transform:scale(1)translateY(0)} }
        .glass-panel h1 { font-size: 3rem; margin: 0 0 10px; background: linear-gradient(135deg, #e94560, #ffb703); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
        .glass-panel p { font-size: 1.1rem; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 1rem; }
        .final-stats { display: flex; justify-content: center; gap: 20px; margin: 1rem 0; }
        .final-stat { text-align: center; }
        .final-stat .v { font-size: 1.8rem; font-weight: 900; color: #ffb703; }
        .final-stat .l { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
        .btn { padding: 15px 50px; font-size: 1.5rem; background: linear-gradient(135deg, #e94560, #950740); color: white; border: none; border-radius: 60px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 900; box-shadow: 0 10px 30px rgba(233,69,96,0.4); transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
        #back-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; cursor: pointer; text-decoration: none; font-size: 0.9rem; z-index: 10; }
        @media (max-width: 768px) { .glass-panel { padding: 1.5rem; } .glass-panel h1 { font-size: 2rem; } .btn { padding: 14px 36px; font-size: 1.2rem; } .wpn-btn { font-size: 0.75rem; padding: 6px 12px; } }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ui-box"><div class="label">نىشان</div><div class="value" id="score-val">0</div></div>
        <div class="ui-box" id="wind-box"><div class="label">شامال</div><div id="wind-arrow">➡</div><div id="wind-val">0</div></div>
        <div class="ui-box"><div class="label">دۈشمەن</div><div class="value" id="wave-val">0</div></div>
    </div>
    <div id="weapon-display">
        <button class="wpn-btn active" data-wpn="normal" onclick="setWeapon('normal')">💣 ئادەتتىكى</button>
        <button class="wpn-btn" data-wpn="cluster" onclick="setWeapon('cluster')">💥 تارماق</button>
        <button class="wpn-btn" data-wpn="piercing" onclick="setWeapon('piercing')">🔥 تېشىش</button>
        <button class="wpn-btn" data-wpn="fire" onclick="setWeapon('fire')">🌋 ئوت</button>
    </div>
    <div id="overlay">
        <div class="glass-panel">
            <h1 id="end-title">💥 توپ قۇرال قىسىمى</h1>
            <p id="end-desc">توسالغۇلارنى پارتلىتىپ دۈشمەن ئەسكەرلىرىنى يوقىتىڭ!<br>4 خىل ئوق، 4 خىل دۈشمەن، 3 خىل كۈچەيتىش.<br>ئېكراننى بېسىپ تارتىڭ ۋە قويۇپ بېرىڭ.</p>
            <div class="final-stats" id="final-stats" style="display:none">
                <div class="final-stat"><div class="v" id="f-score">0</div><div class="l">نىشان</div></div>
                <div class="final-stat"><div class="v" id="f-wave">0</div><div class="l">دۈشمەن دولقۇنى</div></div>
                <div class="final-stat"><div class="v" id="f-combo">0</div><div class="l">ئەڭ ياخشى كومبو</div></div>
                <div class="final-stat"><div class="v" id="f-accuracy">0%</div><div class="l">توغرىلىق</div></div>
            </div>
            <button class="btn" onclick="startGame()">جەڭگە كىرىش</button>
        </div>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // Audio
        let audioCtx;
        function initAudio() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
        function playSound(type) {
            if(!audioCtx) return;
            const o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=audioCtx.currentTime;
            o.connect(g); g.connect(audioCtx.destination);
            if(type==='shoot'){o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(40,t+0.3);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.3);}
            else if(type==='explode'){o.type='square';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(20,t+0.5);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.5);}
            else if(type==='hit'){o.type='triangle';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(100,t+0.15);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.15);}
            else if(type==='powerup'){o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.setValueAtTime(600,t+0.12);o.frequency.setValueAtTime(800,t+0.24);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.35);}
            else if(type==='combo'){o.type='sine';o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+0.1);o.frequency.setValueAtTime(784,t+0.2);o.frequency.setValueAtTime(1047,t+0.3);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.4);}
            else if(type==='cluster'){o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(800,t+0.2);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.2);}
            o.start(t); o.stop(t+0.5);
        }

        // Game state
        let gameActive = false, score = 0, wave = 0, combo = 0, bestCombo = 0;
        let shots = 0, hits = 0;
        let currentWeapon = 'normal', activePowerUp = null, powerUpTimer = 0;
        let frameCount = 0, screenShake = 0;
        let highScore = parseInt(localStorage.getItem('artilleryScore')||'0');

        // WEAPONS
        const WEAPONS = {
            normal: { name: '💣 ئادەتتىكى', color: '#e94560', speed: 7, damage: 40, radius: 35, spread: 0, count: 1, trailColor: 'rgba(233,69,96,0.3)' },
            cluster: { name: '💥 تارماق', color: '#ffb703', speed: 6, damage: 25, radius: 25, spread: 0, count: 5, trailColor: 'rgba(255,183,3,0.3)' },
            piercing: { name: '🔥 تېشىش', color: '#00d4ff', speed: 12, damage: 80, radius: 20, spread: 0, count: 1, trailColor: 'rgba(0,212,255,0.3)' },
            fire: { name: '🌋 ئوت', color: '#ff6b35', speed: 5, damage: 15, radius: 50, spread: 0.2, count: 1, trailColor: 'rgba(255,107,53,0.3)' }
        };
        const ENEMIES = [
            { name: 'پىيادە', w: 30, h: 40, hp: 40, color: '#c0392b', score: 10, icon: '🚶' },
            { name: 'ھەربىي ماشىنا', w: 50, h: 30, hp: 80, color: '#1e8449', score: 20, icon: '🚗' },
            { name: 'تانكا', w: 60, h: 40, hp: 150, color: '#7f8c8d', score: 30, icon: '🪖' },
            { name: 'بۇنكېر', w: 70, h: 50, hp: 250, color: '#2c3e50', score: 50, icon: '🏠' }
        ];

        let terrainPoints = [];
        let enemies = [], shells = [], particles = [], floatingTexts = [], powerUps = [];
        let cannon = { x: 80, y: 0, angle: -Math.PI/4 };
        let isDragging = false, dragStartX = 0, dragStartY = 0, dragEndX = 0, dragEndY = 0;
        let wind = 0, windTimer = 0;

        function generateTerrain() {
            terrainPoints = [];
            const groundY = canvas.height - 60;
            for(let x = 0; x <= canvas.width; x += 10) {
                let y = groundY;
                // Create hilly terrain with a valley in the middle
                const midDist = Math.abs(x - canvas.width/2) / (canvas.width/2);
                if(x > 150) {
                    y -= Math.sin(x * 0.008) * 40 + Math.sin(x * 0.02) * 15 + Math.sin(x * 0.005) * 25;
                    y -= (1 - midDist) * 30; // valley
                }
                terrainPoints.push({ x, y: Math.min(y, groundY - 20) });
            }
        }

        function drawBackground() {
            // Night sky
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#0a0a2e');
            grad.addColorStop(0.3, '#16163a');
            grad.addColorStop(0.6, '#1a1a30');
            grad.addColorStop(1, '#2a1a10');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            for(let i = 0; i < 80; i++) {
                const sx = (i * 137.5 + 50) % canvas.width;
                const sy = (i * 97.3 + 20) % (canvas.height * 0.5);
                const size = 1 + (i % 3);
                const twinkle = 0.5 + Math.sin(frameCount * 0.02 + i) * 0.5;
                ctx.globalAlpha = twinkle * 0.8;
                ctx.fillRect(sx, sy, size, size);
            }
            ctx.globalAlpha = 1;

            // Moon
            ctx.fillStyle = 'rgba(255,250,220,0.15)';
            ctx.beginPath();
            ctx.arc(canvas.width - 80, 60, 50, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,250,200,0.9)';
            ctx.beginPath();
            ctx.arc(canvas.width - 80, 60, 30, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#0a0a2e';
            ctx.beginPath();
            ctx.arc(canvas.width - 70, 52, 22, 0, Math.PI*2);
            ctx.fill();

            // Far mountains
            ctx.fillStyle = 'rgba(20,20,40,0.5)';
            ctx.beginPath(); ctx.moveTo(0, canvas.height - 100);
            for(let x = 0; x <= canvas.width; x += 5) {
                ctx.lineTo(x, canvas.height - 100 - Math.sin(x*0.003)*60 - Math.sin(x*0.007)*25);
            }
            ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height);
            ctx.fill();
        }

        function drawTerrain() {
            // Main terrain
            ctx.beginPath(); ctx.moveTo(0, canvas.height);
            terrainPoints.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.lineTo(canvas.width, canvas.height);
            const tg = ctx.createLinearGradient(0, canvas.height-80, 0, canvas.height);
            tg.addColorStop(0, '#2d1f0e');
            tg.addColorStop(0.3, '#1a120a');
            tg.addColorStop(1, '#0a0705');
            ctx.fillStyle = tg;
            ctx.fill();

            // Terrain top edge highlight
            ctx.strokeStyle = 'rgba(200,170,100,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            terrainPoints.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
            ctx.stroke();

            // Grass tufts on terrain
            ctx.strokeStyle = 'rgba(80,140,60,0.3)';
            ctx.lineWidth = 1.5;
            for(let i = 0; i < terrainPoints.length; i += 3) {
                const p = terrainPoints[i];
                const h = 4 + Math.sin(i * 0.5 + frameCount * 0.01) * 3;
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y - h); ctx.stroke();
            }
        }

        function spawnWave() {
            wave++;
            enemies = [];
            const count = 2 + wave;
            const groundY = canvas.height - 60;
            
            for(let i = 0; i < count; i++) {
                let typeIdx;
                if(wave <= 2) typeIdx = 0;
                else if(wave <= 4) typeIdx = Math.random() < 0.6 ? 0 : 1;
                else if(wave <= 7) typeIdx = Math.random() < 0.5 ? Math.floor(Math.random()*2) : 2;
                else typeIdx = Math.min(3, Math.floor(Math.random() * 4));
                
                const e = ENEMIES[typeIdx];
                const ex = canvas.width - 100 - Math.random() * (canvas.width * 0.35);
                
                // Find terrain Y at this x
                let terrainY = groundY;
                for(let t = 0; t < terrainPoints.length - 1; t++) {
                    if(ex >= terrainPoints[t].x && ex <= terrainPoints[t+1].x) {
                        const frac = (ex - terrainPoints[t].x) / (terrainPoints[t+1].x - terrainPoints[t].x);
                        terrainY = terrainPoints[t].y + (terrainPoints[t+1].y - terrainPoints[t].y) * frac;
                        break;
                    }
                }
                
                enemies.push({
                    x: ex, y: terrainY - e.h, w: e.w, h: e.h,
                    hp: e.hp, maxHp: e.hp, type: typeIdx,
                    color: e.color, score: e.score, icon: e.icon,
                    name: e.name, vy: 0
                });
            }
            
            document.getElementById('wave-val').textContent = `${wave} (${enemies.length})`;
        }

        function setWeapon(type) {
            if(!WEAPONS[type]) return;
            currentWeapon = type;
            document.querySelectorAll('.wpn-btn').forEach(b => b.classList.toggle('active', b.dataset.wpn === type));
        }

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('final-stats').style.display = 'none';
            document.getElementById('end-title').innerText = '💥 توپ قۇرال قىسىمى';
            
            gameActive = true; score = 0; wave = 0; combo = 0; bestCombo = 0;
            shots = 0; hits = 0; frameCount = 0; screenShake = 0;
            activePowerUp = null; powerUpTimer = 0;
            shells = []; particles = []; floatingTexts = []; powerUps = [];
            cannon.x = 80; cannon.y = canvas.height - 60;
            wind = (Math.random() - 0.5) * 0.6;
            windTimer = 0;
            
            generateTerrain();
            resize();
            spawnWave();
            setWeapon('normal');
            document.getElementById('score-val').textContent = '0';
            if(!animateStarted) { animateStarted = true; animate(); }
        }

        function addParticles(x, y, color, count=20, big=false) {
            for(let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * (big ? 8 : 4);
                const colors = [color, '#ffb703', '#ffffff', '#ff6b35'];
                particles.push({
                    x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 2,
                    life: 20 + Math.random() * 20, maxLife: 40,
                    color: colors[Math.floor(Math.random()*colors.length)],
                    size: 2 + Math.random() * (big ? 5 : 3)
                });
            }
        }

        function addFloatingText(x, y, text, color='#ffffff', size=24) {
            floatingTexts.push({ x, y, text, color, life: 30, maxLife: 30, vy: -2, size });
        }

        function createExplosion(x, y, radius) {
            playSound('explode');
            screenShake = Math.min(screenShake + radius * 0.2, 20);
            addParticles(x, y, '#ff6b35', Math.floor(radius * 0.8), true);
            addParticles(x, y, '#ffb703', Math.floor(radius * 0.5), false);
            addParticles(x, y, '#fff', Math.floor(radius * 0.3), false);
            
            // Deal damage to nearby enemies
            enemies.forEach(e => {
                const dist = Math.hypot(e.x + e.w/2 - x, e.y + e.h/2 - y);
                if(dist < radius + 20) {
                    const dmg = WEAPONS[currentWeapon].damage * (1 - dist / (radius + 20));
                    damageEnemy(e, Math.floor(dmg));
                }
            });
        }

        function damageEnemy(e, dmg) {
            e.hp -= dmg;
            if(e.hp <= 0) {
                // Enemy destroyed
                hits++;
                combo++;
                if(combo > bestCombo) bestCombo = combo;
                const bonus = Math.floor(combo / 3);
                const pts = e.score + bonus * 5;
                score += pts;
                
                const comboText = combo >= 3 ? ` 🔥${combo}×` : '';
                addFloatingText(e.x + e.w/2, e.y - 20, `+${pts}${comboText}`, combo >= 3 ? '#ff6b6b' : '#ffd700', combo >= 3 ? 36 : 24);
                if(combo >= 3) playSound('combo');
                
                addParticles(e.x + e.w/2, e.y + e.h/2, e.color, 25, true);
                document.getElementById('score-val').textContent = score;
                if(score > highScore) { highScore = score; localStorage.setItem('artilleryScore', highScore); }
                
                e.dead = true;
                
                // Chance to spawn power-up
                if(Math.random() < 0.2 && powerUps.length < 3) {
                    const types = ['ammo', 'power', 'slow'];
                    const type = types[Math.floor(Math.random() * 3)];
                    powerUps.push({ x: e.x + e.w/2, y: e.y, vy: -3, type, rot: 0, color: type==='ammo'?'#e94560':type==='power'?'#8b5cf6':'#00d4ff' });
                }
                
                // Check wave cleared
                if(enemies.every(en => en.hp <= 0)) {
                    const bonus = wave * 20;
                    score += bonus;
                    addFloatingText(canvas.width/2, canvas.height/2, `✨ دولقۇن ${wave} تامام! +${bonus} بونۇس`, '#ffb703', 36);
                    setTimeout(() => { if(gameActive) spawnWave(); }, 1500);
                }
            } else {
                addParticles(e.x + e.w/2, e.y + e.h/2, '#ffb703', 8, false);
                playSound('hit');
            }
        }

        // Input
        const handleStart = (x, y) => {
            if(!gameActive || shells.length > 0) return;
            isDragging = true; dragStartX = x; dragStartY = y; dragEndX = x; dragEndY = y;
        };
        const handleMove = (x, y) => { if(isDragging) { dragEndX = x; dragEndY = y; } };
        const handleEnd = () => {
            if(!isDragging || !gameActive) return;
            isDragging = false;
            const dx = dragStartX - dragEndX, dy = dragStartY - dragEndY;
            const power = Math.hypot(dx, dy);
            if(power < 10) return;
            
            shots++;
            const wpn = WEAPONS[currentWeapon];
            const spd = power * 0.08;
            
            playSound('shoot');
            
            if(currentWeapon === 'cluster') {
                // Fire multiple shells in spread
                for(let i = 0; i < 5; i++) {
                    const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.4;
                    const s = Math.cos(angle) * dx + Math.sin(angle) * dy;
                    shells.push({
                        x: cannon.x, y: cannon.y,
                        vx: Math.cos(angle) * spd + wind * 0.5, vy: Math.sin(angle) * spd,
                        active: true, weapon: currentWeapon,
                        trail: []
                    });
                }
                playSound('cluster');
            } else {
                shells.push({
                    x: cannon.x, y: cannon.y,
                    vx: dx * 0.08 + wind * 0.3, vy: dy * 0.08,
                    active: true, weapon: currentWeapon,
                    trail: []
                });
            }
        };

        window.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', e => { if(e.target.tagName!=='BUTTON'&&e.target.tagName!=='A'){e.preventDefault();handleStart(e.touches[0].clientX,e.touches[0].clientY)} }, {passive:false});
        window.addEventListener('touchmove', e => { if(isDragging){e.preventDefault();handleMove(e.touches[0].clientX,e.touches[0].clientY)} }, {passive:false});
        window.addEventListener('touchend', e => { e.preventDefault(); handleEnd(); });

        function drawTrajectory() {
            if(!isDragging) return;
            const wpn = WEAPONS[currentWeapon];
            const dx = dragStartX - dragEndX, dy = dragStartY - dragEndY;
            const spd = Math.hypot(dx, dy) * 0.08;
            
            let tx = cannon.x, ty = cannon.y;
            let tvx = dx * 0.08 + wind * 0.3, tvy = dy * 0.08;
            
            ctx.beginPath(); ctx.moveTo(tx, ty);
            for(let i = 0; i < 50; i++) {
                tvx += wind * 0.02; tvy += 0.25; tx += tvx; ty += tvy;
                if(i % 2 === 0) ctx.lineTo(tx, ty);
            }
            ctx.strokeStyle = wpn.trailColor;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            frameCount++;
            
            // Screen shake decay
            if(screenShake > 0) screenShake *= 0.9;
            if(screenShake < 0.5) screenShake = 0;
            
            ctx.save();
            if(screenShake > 1) {
                ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
            }
            
            ctx.clearRect(-50, -50, canvas.width+100, canvas.height+100);
            drawBackground();
            drawTerrain();
            
            // Wind
            windTimer++;
            if(windTimer > 300) { wind = (Math.random() - 0.5) * 0.8; windTimer = 0; }
            document.getElementById('wind-arrow').textContent = wind > 0.1 ? '➡' : (wind < -0.1 ? '⬅' : '⬆');
            document.getElementById('wind-val').textContent = Math.abs(Math.floor(wind * 100));
            
            // Cannon
            const groundY = canvas.height - 60;
            cannon.y = groundY;
            
            // Cannon base
            ctx.fillStyle = '#2d1f0e';
            ctx.beginPath();
            ctx.arc(cannon.x, cannon.y, 30, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cannon.x, cannon.y, 30, 0, Math.PI*2);
            ctx.stroke();
            
            // Cannon barrel - aim toward drag direction
            let barrelAngle = cannon.angle;
            if(isDragging) {
                barrelAngle = Math.atan2(dragStartY - dragEndY, dragStartX - dragEndX);
            }
            barrelAngle = Math.max(-Math.PI/2, Math.min(-0.1, barrelAngle));
            
            ctx.save();
            ctx.translate(cannon.x, cannon.y);
            ctx.rotate(barrelAngle);
            
            // Barrel
            const barrelGrad = ctx.createLinearGradient(0, -8, 0, 8);
            barrelGrad.addColorStop(0, '#4a4a4a');
            barrelGrad.addColorStop(0.5, '#2a2a2a');
            barrelGrad.addColorStop(1, '#1a1a1a');
            ctx.fillStyle = barrelGrad;
            ctx.fillRect(0, -8, 55, 16);
            
            // Barrel tip
            ctx.fillStyle = '#333';
            ctx.fillRect(50, -10, 8, 20);
            
            // Barrel highlight
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(10, -6); ctx.lineTo(50, -6); ctx.stroke();
            
            ctx.restore();
            
            // Draw trajectory
            drawTrajectory();
            
            // Draw enemies
            enemies.forEach(e => {
                if(e.dead) return;
                e.vy = (e.vy || 0) + 0.5;
                e.y = Math.min(e.y + e.vy, (()=>{
                    let ty = groundY;
                    for(let t = 0; t < terrainPoints.length - 1; t++) {
                        if(e.x >= terrainPoints[t].x && e.x <= terrainPoints[t+1].x) {
                            const frac = (e.x - terrainPoints[t].x) / (terrainPoints[t+1].x - terrainPoints[t].x);
                            ty = terrainPoints[t].y + (terrainPoints[t+1].y - terrainPoints[t].y) * frac;
                            break;
                        }
                    }
                    return ty - e.h;
                })());
                if(e.vy > 0 && e.y >= groundY - e.h) e.vy = 0;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.ellipse(e.x + e.w/2, groundY + 5, e.w * 0.6, 8, 0, 0, Math.PI*2);
                ctx.fill();
                
                // Body
                const hpPct = e.hp / e.maxHp;
                ctx.fillStyle = e.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                
                if(e.type === 3) {
                    // Bunker - draw as square structure
                    ctx.fillRect(e.x, e.y, e.w, e.h);
                    ctx.fillStyle = '#34495e';
                    ctx.fillRect(e.x + 5, e.y + 5, e.w - 10, e.h - 10);
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(e.x + 10, e.y + 10, 15, 15); // window
                    ctx.fillRect(e.x + e.w - 25, e.y + 10, 15, 15);
                } else if(e.type === 2) {
                    // Tank
                    ctx.fillRect(e.x, e.y + 10, e.w, e.h - 10);
                    ctx.fillStyle = '#95a5a6';
                    ctx.fillRect(e.x + 5, e.y, e.w - 10, 15);
                    ctx.fillRect(e.x + e.w - 15, e.y - 5, 20, 12); // turret
                } else if(e.type === 1) {
                    // Vehicle
                    ctx.fillRect(e.x, e.y + 5, e.w, e.h - 5);
                    ctx.fillStyle = '#27ae60';
                    ctx.beginPath();
                    ctx.arc(e.x + 12, e.y + e.h, 8, 0, Math.PI*2);
                    ctx.arc(e.x + e.w - 12, e.y + e.h, 8, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    // Infantry - draw as soldier
                    ctx.fillRect(e.x + e.w/3, e.y, e.w/3, e.h * 0.6);
                    ctx.beginPath();
                    ctx.arc(e.x + e.w/2, e.y - 3, 10, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                
                // HP bar
                const barW = e.w + 10;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(e.x - 5, e.y - 12, barW, 6);
                ctx.fillStyle = hpPct > 0.5 ? '#2ecc71' : (hpPct > 0.25 ? '#f39c12' : '#e74c3c');
                ctx.fillRect(e.x - 5, e.y - 12, barW * hpPct, 6);
                
                // Icon
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(e.icon, e.x + e.w/2, e.y - 18);
            });
            
            // Remove dead enemies
            enemies = enemies.filter(e => !e.dead);
            
            // Shells
            for(let i = shells.length - 1; i >= 0; i--) {
                const s = shells[i];
                if(!s.active) { shells.splice(i, 1); continue; }
                
                s.vy += 0.25;
                s.vx += wind * 0.02;
                s.x += s.vx;
                s.y += s.vy;
                
                // Trail
                s.trail.push({x:s.x, y:s.y});
                if(s.trail.length > 15) s.trail.shift();
                
                // Draw trail
                s.trail.forEach((t, idx) => {
                    const alpha = idx / s.trail.length * 0.5;
                    ctx.fillStyle = WEAPONS[s.weapon]?.trailColor || 'rgba(255,255,255,0.3)';
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2 + idx * 0.2, 0, Math.PI*2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
                
                // Draw shell
                const wpnColor = WEAPONS[s.weapon]?.color || '#ffb703';
                if(s.weapon === 'fire') {
                    // Fire shell with flame effect
                    ctx.fillStyle = '#ff6b35';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ff6b35';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 10, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#ffb703';
                    ctx.beginPath();
                    ctx.arc(s.x + (Math.random()-0.5)*6, s.y + (Math.random()-0.5)*6, 6, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if(s.weapon === 'piercing') {
                    ctx.fillStyle = '#00d4ff';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00d4ff';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 6, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    ctx.fillStyle = wpnColor;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = wpnColor;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 8, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                
                // Terrain collision
                let hitTerrain = false;
                for(let t = 0; t < terrainPoints.length - 1; t++) {
                    if(s.x >= terrainPoints[t].x && s.x <= terrainPoints[t+1].x) {
                        const frac = (s.x - terrainPoints[t].x) / (terrainPoints[t+1].x - terrainPoints[t].x);
                        const terrainY = terrainPoints[t].y + (terrainPoints[t+1].y - terrainPoints[t].y) * frac;
                        if(s.y >= terrainY) { hitTerrain = true; break; }
                    }
                }
                
                if(hitTerrain) {
                    const wpn = WEAPONS[s.weapon];
                    if(s.weapon === 'piercing') {
                        // Piercing goes through terrain, creates small explosion
                        addParticles(s.x, s.y, '#00d4ff', 10, false);
                        // Continue moving but slower
                        s.vx *= 0.5;
                        s.vy = -s.vy * 0.3;
                        s.y -= 15;
                        // Still damage enemies nearby
                        enemies.forEach(e => {
                            const dist = Math.hypot(e.x+e.w/2 - s.x, e.y+e.h/2 - s.y);
                            if(dist < 40) damageEnemy(e, wpn.damage * 0.5);
                        });
                    } else {
                        createExplosion(s.x, s.y, wpn.radius);
                        s.active = false;
                        shells.splice(i, 1);
                        
                        if(shells.length === 0) {
                            // Check if enemies remain
                            if(enemies.filter(e => !e.dead).length > 0) {
                                if(combo > 0 && combo < 3) combo = 0;
                            }
                        }
                    }
                }
                
                // Out of bounds
                if(s.y > canvas.height + 50 || s.x < -50 || s.x > canvas.width + 50) {
                    if(s.weapon !== 'piercing') {
                        createExplosion(s.x, Math.min(s.y, canvas.height - 10), 20);
                    }
                    s.active = false;
                    shells.splice(i, 1);
                }
            }
            
            // Power-ups
            for(let i = powerUps.length - 1; i >= 0; i--) {
                const pu = powerUps[i];
                pu.vy += 0.1;
                pu.y += pu.vy;
                pu.rot += 0.05;
                
                // Ground collision
                if(pu.y > groundY - 15) { pu.y = groundY - 15; pu.vy = -pu.vy * 0.3; }
                
                // Draw
                ctx.save();
                ctx.translate(pu.x, pu.y);
                ctx.rotate(pu.rot);
                ctx.shadowBlur = 15;
                ctx.shadowColor = pu.color;
                
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = pu.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI*2);
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                ctx.font = '20px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(pu.type === 'ammo' ? '💣' : (pu.type === 'power' ? '⚡' : '⏱'), 0, 0);
                ctx.restore();
                
                // Cannon collision
                if(Math.hypot(pu.x - cannon.x, pu.y - cannon.y) < 35) {
                    playSound('powerup');
                    addParticles(pu.x, pu.y, pu.color, 15, false);
                    if(pu.type === 'ammo') {
                        // Extra damage for next shot
                        addFloatingText(pu.x, pu.y - 20, '🔋 كۈچەيگەن ئوق!', '#e94560', 20);
                    } else if(pu.type === 'power') {
                        // Destroy all enemies
                        enemies.forEach(e => damageEnemy(e, 999));
                        addFloatingText(canvas.width/2, canvas.height/2, '⚡ ھەممىنى پارچىلا!', '#8b5cf6', 36);
                    } else if(pu.type === 'slow') {
                        // Slow wind
                        wind *= 0.3;
                        addFloatingText(pu.x, pu.y - 20, '⏱ شامال ئاستىدى!', '#00d4ff', 20);
                    }
                    powerUps.splice(i, 1);
                }
                
                if(pu.y > canvas.height + 50) powerUps.splice(i, 1);
            }
            
            // Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.1;
                p.life--;
                if(p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // Floating texts
            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                const f = floatingTexts[i];
                f.y += f.vy; f.vy *= 0.95; f.life--;
                if(f.life <= 0) { floatingTexts.splice(i, 1); continue; }
                ctx.fillStyle = f.color;
                ctx.globalAlpha = f.life / f.maxLife;
                ctx.font = `bold ${f.size}px 'Tajawal', Arial`;
                ctx.textAlign = 'center';
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.fillText(f.text, f.x, f.y);
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1;
            
            ctx.restore(); // undo screen shake
        }

        let animateStarted = false;
    </script>
</body>
</html>
