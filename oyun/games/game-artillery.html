<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>⚡ خانلىق توپخانىسى</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#04060f;display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;overflow:hidden;touch-action:none;
  font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;
}
#canvas{display:block;border-radius:10px;max-width:100vw;}
#hud{
  display:flex;gap:14px;align-items:center;justify-content:center;
  padding:6px 14px;background:rgba(0,0,0,0.65);border-radius:9px;
  margin-bottom:5px;flex-wrap:wrap;
  border:1px solid rgba(180,130,50,0.35);color:#f0d090;font-size:14px;
  font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;
}
.hv{color:#ffd700;font-weight:bold;font-size:17px;}
#weapons{display:flex;gap:7px;margin-bottom:5px;flex-wrap:wrap;justify-content:center;}
.wb{
  padding:5px 12px;border:2px solid rgba(180,130,50,0.4);border-radius:7px;
  background:rgba(0,0,0,0.5);color:#f0d090;cursor:pointer;font-size:12px;
  font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;
  transition:all .2s;
}
.wb.active{background:rgba(180,130,50,0.35);border-color:#ffd700;color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,.35);}
.wb:hover{border-color:#ffd700;}
#wind-box{
  display:flex;align-items:center;gap:5px;padding:3px 10px;
  background:rgba(0,0,80,.5);border:1px solid rgba(100,150,255,.35);
  border-radius:7px;color:#aaccff;font-size:12px;
  font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;
}
.ov{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.87);z-index:100;
  font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;
}
.ob{
  background:linear-gradient(160deg,#1a1200,#0d0800);
  border:2px solid rgba(180,130,50,.55);border-radius:16px;
  padding:32px 40px;text-align:center;max-width:470px;width:90%;
  box-shadow:0 0 40px rgba(180,130,50,.18);
}
.ot{font-size:30px;color:#ffd700;margin-bottom:8px;text-shadow:0 0 18px rgba(255,215,0,.5);}
.os{font-size:15px;color:#c8a050;margin-bottom:18px;}
.obtn{
  padding:11px 34px;background:linear-gradient(135deg,#c8a050,#ffd700);
  border:none;border-radius:9px;color:#1a0800;font-weight:bold;
  font-size:17px;cursor:pointer;margin-top:12px;
  font-family:'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif;
  transition:transform .15s;
}
.obtn:hover{transform:scale(1.05);}
#fact-ov .ob{background:linear-gradient(160deg,#0d1a00,#060d00);border-color:rgba(80,180,50,.55);box-shadow:0 0 40px rgba(80,180,50,.12);}
.fw{font-size:20px;color:#90ee90;margin-bottom:7px;}
.ft{font-size:18px;color:#7ddc7d;margin-bottom:12px;font-weight:bold;}
.fb{font-size:14px;color:#c8e8c8;line-height:1.8;margin-bottom:16px;direction:rtl;text-align:right;}
.life-i{font-size:20px;transition:opacity .3s;}
.life-i.lost{opacity:.2;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div id="hud">
  <div style="display:flex;align-items:center;gap:4px;">
    🏰 <span id="li0" class="life-i">🏯</span><span id="li1" class="life-i">🏯</span><span id="li2" class="life-i">🏯</span>
  </div>
  <div>🏆 <span id="sc" class="hv">0</span></div>
  <div>⚔️ دولقۇن: <span id="wv" class="hv">1/7</span></div>
  <div>🔥 <span id="cv" class="hv">0</span>×</div>
  <div id="wind-box">💨 <span id="wa">⬆</span> <span id="wn">0</span></div>
</div>

<div id="weapons">
  <button class="wb active" data-wpn="normal"   onclick="setW('normal')">💣 ئادەتتىكى</button>
  <button class="wb"        data-wpn="cluster"  onclick="setW('cluster')">💥 تارماق</button>
  <button class="wb"        data-wpn="piercing" onclick="setW('piercing')">🔥 تېشىش</button>
  <button class="wb"        data-wpn="fire"     onclick="setW('fire')">🌋 ئوت توپى</button>
</div>

<canvas id="canvas"></canvas>

<!-- Menu -->
<div class="ov" id="menu-ov">
  <div class="ob">
    <div class="ot">⚡ خانلىق توپخانىسى</div>
    <div class="os">قەلئەنى قوغدا — باسقۇنچىلارنى قايتار!</div>
    <div style="font-size:12px;color:#907030;margin-bottom:14px;direction:rtl;text-align:right;line-height:1.7">
      سۆرەش يۆنىلىشنى بەلگىلەيدۇ · قولنى كۆتۈرسىڭ ئاتىدۇ<br>
      شامالغا دىققەت قىلىڭ · باسقۇنچىلار قەلئەگە يەتسە جان يوقىلىدۇ
    </div>
    <button class="obtn" onclick="startGame()">🎮 ئويۇنغا باشلا</button>
    <div style="font-size:12px;color:#604020;margin-top:12px;">ئەڭ يۇقىرى نەتىجە: <span id="hiv">0</span></div>
  </div>
</div>

<!-- Fact popup -->
<div class="ov hidden" id="fact-ov">
  <div class="ob">
    <div class="fw" id="fwb"></div>
    <div class="ft" id="ftit"></div>
    <div class="fb" id="fbdy"></div>
    <button class="obtn" onclick="nextWave()" style="background:linear-gradient(135deg,#4a9050,#7ddc7d);color:#0a1800;">
      ▶ كېيىنكى دولقۇن
    </button>
  </div>
</div>

<!-- Game over -->
<div class="ov hidden" id="go-ov">
  <div class="ob">
    <div class="ot" id="go-t"></div>
    <div class="os" id="go-s"></div>
    <div style="font-size:14px;color:#a08040;margin:10px 0;line-height:2;">
      نەتىجىڭىز: <span class="hv" id="go-sc"></span><br>
      دولقۇن: <span class="hv" id="go-w"></span>/7 &nbsp; ئەڭ يۇقىرى كومبو: <span class="hv" id="go-cb"></span>
    </div>
    <button class="obtn" onclick="startGame()">🔄 قايتا ئويناش</button>
    <a href="../index.html" style="display:block;margin-top:11px;color:#7a6030;font-size:13px;">⬅ ئاساسى بەتكە</a>
  </div>
</div>

<script>
const C=document.getElementById('canvas'), ctx=C.getContext('2d');
const F="'UKIJ Tuz Tom','UKIJ Tuz','Alkatip Tor','Microsoft Uighur',Arial,sans-serif";
const GRAV=0.27;

function resize(){
  C.width=Math.min(window.innerWidth,800);
  C.height=Math.min(window.innerHeight*0.70,490);
}
resize();
window.addEventListener('resize',()=>{resize();genTerrain();});

// ---- Data ----
const ROUNDS=[
  {name:'قەشقەر دەرۋازىسى', cnt:3, spd:0.75, ac:'#d4a020', types:[0]},
  {name:'تاريم جەڭگى',       cnt:4, spd:0.90, ac:'#c85020', types:[0,1]},
  {name:'تۇرپان ئاشۇشى',    cnt:5, spd:1.05, ac:'#2090c0', types:[0,1]},
  {name:'تەڭرىتاغ سۈپەسى', cnt:5, spd:1.20, ac:'#8040c0', types:[0,1,2]},
  {name:'ئىپەك يولى توسۇشى', cnt:6, spd:1.35, ac:'#20a050', types:[0,1,2]},
  {name:'ئورخۇن دەريا',     cnt:7, spd:1.52, ac:'#c04080', types:[1,2,3]},
  {name:'خانلىق مۇداپىئەسى', cnt:8, spd:1.70, ac:'#ffd700', types:[1,2,3]}
];

const FACTS=[
  {t:'قەشقەر — ئىپەك يولىنىڭ گۇلى',
   b:'قەشقەر شەھىرى 2000 يىلدىن ئارتۇق تارىخقا ئىگە بولۇپ، ئىپەك يولىنىڭ ئەڭ مۇھىم ئۈگەتلىرىدىن بىرى ئىدى. ئۇيغۇر ئالىملىرى، سودىگەرلىرى ۋە ئۇستىلارى بۇ شەھەردە ئالەمگە مەشھۇر ئەسەرلەر يارىتىپ كەلگەن.'},
  {t:'تاريم ئويمانلىقى — ئۇيغۇر يۇرتى',
   b:'تاريم ئويمانلىقى دۇنيادىكى ئەڭ چوڭ قۇملۇق رايونلاردىن بىرى. ئۇيغۇرلار مىڭ يىللاردىن بۇيان بۇ رايوندا ئابادانچىلىق بىنا قىلىپ، تاكلىماكاننى كېسىپ ئۆتكەن.'},
  {t:'تۇرپان — تارىخ گەنجىنىسى',
   b:'تۇرپان ئاچىقى دۇنيانىڭ ئەڭ پەس ئورۇنلىرىدىن بىرى (دېڭىز يۈزىدىن 154 مېتىر تۆۋەن). بۇ يەردىن ئۇيغۇرلارنىڭ قەدىمكى يازمىلىرى ۋە كىتابلىرى ھازىرغا قەدەر ساقلانمىقتا.'},
  {t:'تەڭرىتاغ — مۇقەددەس تاغ',
   b:'تەڭرىتاغ تاغ سىلسىلىسى ئۇيغۇرلار ئۈچۈن مۇقەددەس ئورۇن. «تەڭرىتاغ» دېگەن سۆز «ئاسمانلىق تاغ» مەنىسىنى بىلدۈرىدۇ. ئۇيغۇرلار بۇ تاغلاردا ماللىرىنى يايلاپ ياشاپ كەلگەن.'},
  {t:'ئىپەك يولى — دۇنيا كۆۋرۈكى',
   b:'ئىپەك يولى ئۇيغۇر يۇرتى ئارقىلىق ئۆتكەن، خىتاي، ئوتتۇرا ئاسىيا ۋە ئەۋروپانى باغلىغان. ئۇيغۇر سودىگەرلىرى ئىپەك، ئاشلىق، ئالتۇن ۋە بىلىمنى بۇ يول بىلەن ئالماشتۇرغان.'},
  {t:'ئۇيغۇر خانلىقى (744 مىلادى)',
   b:'ئۇيغۇر خانلىقى 744-يىلى قۇرۇلۇپ، ئورخۇن دەريا بويىدا پايتەخت قۇرغان. بۇ خانلىق مەركىزى ئاسىيادىكى ئەڭ كۈچلۈك دۆلەتلەردىن بولۇپ، ئاتاقلىق سارايلار ۋە مەدەنىيەت مەركەزلىرى بىنا قىلىنغان.'},
  {t:'ئۇيغۇر يازمىسى — مىراسىمىز',
   b:'ئۇيغۇر يازمىسى 1500 يىلدىن ئارتۇق تارىخقا ئىگە بولۇپ، موڭغۇل ۋە ماچۇرىيا يازمىلىرىغا ئاساس بولغان. ئۇيغۇر يازمىچىلىرى ئىلىم-پەن، پەلسەپە ۋە سەنئىتنى ئۆز ئىچىگە ئالغان ئەسەرلەر قالدۇرغان.'}
];

const WPN={
  normal:  {name:'💣 ئادەتتىكى',color:'#e94560',spd:8,  dmg:45,rad:38,cnt:1,trail:'rgba(233,69,96,0.45)'},
  cluster: {name:'💥 تارماق',  color:'#ffb703',spd:6,  dmg:28,rad:26,cnt:5,trail:'rgba(255,183,3,0.45)'},
  piercing:{name:'🔥 تېشىش',  color:'#00d4ff',spd:13, dmg:90,rad:18,cnt:1,trail:'rgba(0,212,255,0.45)'},
  fire:    {name:'🌋 ئوت توپى',color:'#ff6b35',spd:5,  dmg:18,rad:55,cnt:1,trail:'rgba(255,107,53,0.45)'}
};

const ET=[
  {name:'پىيادە',     w:28,h:38,hp:45, color:'#c0392b',score:10,icon:'⚔️', spd:0.9},
  {name:'ئاتلىق',    w:42,h:36,hp:80, color:'#1e6849',score:20,icon:'🏇', spd:1.3},
  {name:'قالقانلىق', w:50,h:42,hp:160,color:'#7f6020',score:30,icon:'🛡️', spd:0.55},
  {name:'ھۇجۇم مىنارە',w:58,h:54,hp:280,color:'#4a2060',score:50,icon:'🏰',spd:0.32}
];

// ---- State ----
let gs='menu', score=0, hs=+localStorage.getItem('art3hs')||0;
let round=0, lives=3, combo=0, bc=0, fc=0;
let wind=0, wt=0, shake=0, curW='normal';
let terrain=[], enemies=[], shells=[], parts=[], floats=[];
let cannon={x:80,y:0,ang:-Math.PI/4};
let drag=false, dx0=0, dy0=0, dx1=0, dy1=0;
let running=false;

document.getElementById('hiv').textContent=hs;

// ---- Audio ----
let aCtx;
function initAudio(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();}
function tone(freq,type,dur,vol=0.3){
  if(!aCtx)return;
  const g=aCtx.createGain();g.gain.setValueAtTime(vol,aCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,aCtx.currentTime+dur);
  const o=aCtx.createOscillator();o.type=type;o.frequency.value=freq;
  o.connect(g);g.connect(aCtx.destination);o.start();o.stop(aCtx.currentTime+dur);
}
function sBoom(){tone(80,'sawtooth',0.5,0.6);tone(55,'square',0.3,0.4);}
function sShoot(){tone(200,'square',0.14,0.25);}
function sHit(){tone(400,'sawtooth',0.18,0.28);}
function sCombo(){[600,800,1000].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.2,0.4),i*80));}
function sLose(){[300,220,160,100].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',0.28,0.5),i*100));}
function sWin(){[400,500,600,700,800].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.28,0.3),i*110));}

// ---- Terrain ----
function genTerrain(){
  terrain=[];
  const gy=C.height-54;
  for(let x=0;x<=C.width;x+=10){
    let y=gy;
    if(x>180){
      y-=Math.sin(x*0.008)*32+Math.sin(x*0.02)*11+Math.sin(x*0.005)*18;
      const m=Math.abs(x-C.width/2)/(C.width/2);
      y-=(1-m)*18;
    }
    terrain.push({x,y:x>180?Math.max(y,gy-52):gy});
  }
}

function tY(x){
  for(let i=0;i<terrain.length-1;i++){
    if(x>=terrain[i].x&&x<=terrain[i+1].x){
      const f=(x-terrain[i].x)/(terrain[i+1].x-terrain[i].x);
      return terrain[i].y+(terrain[i+1].y-terrain[i].y)*f;
    }
  }
  return C.height-54;
}

// ---- Draw helpers ----
function drawTorch(x,y,color){
  ctx.fillStyle='#6a4a20';
  ctx.fillRect(x-2,y,4,14);
  const ph=fc*0.13;
  ctx.shadowBlur=14;ctx.shadowColor=color;
  const fg=ctx.createRadialGradient(x,y-2,0,x,y-2,10);
  fg.addColorStop(0,'rgba(255,255,200,0.95)');
  fg.addColorStop(0.45,color+'cc');
  fg.addColorStop(1,'transparent');
  ctx.fillStyle=fg;
  ctx.beginPath();
  ctx.moveTo(x-5,y);
  ctx.quadraticCurveTo(x+Math.sin(ph)*4-6,y-7,x,y-15);
  ctx.quadraticCurveTo(x+6+Math.sin(ph)*4,y-7,x+5,y);
  ctx.fill();
  ctx.shadowBlur=0;
}

function drawBG(ri){
  const ac=ROUNDS[ri]?ROUNDS[ri].ac:'#d4a020';
  const sky=ctx.createLinearGradient(0,0,0,C.height);
  sky.addColorStop(0,'#04060f');sky.addColorStop(0.4,'#0a0e1f');
  sky.addColorStop(0.7,'#150f08');sky.addColorStop(1,'#200f05');
  ctx.fillStyle=sky;ctx.fillRect(0,0,C.width,C.height);

  // Stars
  for(let i=0;i<88;i++){
    const sx=(i*137.5+50)%C.width, sy=(i*97.3+15)%(C.height*0.48);
    const tw=0.35+Math.sin(fc*0.022+i)*0.45;
    ctx.fillStyle=`rgba(255,255,255,${tw*0.75})`;
    const sz=1+(i%3===0?1.4:0.4);
    ctx.fillRect(sx,sy,sz,sz);
  }

  // Crescent moon
  ctx.save();ctx.translate(C.width-68,52);
  ctx.fillStyle='rgba(255,245,200,0.95)';ctx.shadowBlur=22;ctx.shadowColor='rgba(255,230,150,.5)';
  ctx.beginPath();ctx.arc(0,0,23,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#04060f';ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(8,-4,18,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.font='15px sans-serif';ctx.fillStyle='rgba(255,230,150,0.85)';
  ctx.fillText('✦',C.width-39,36);

  // Far mountains
  ctx.fillStyle='rgba(14,14,32,.7)';
  ctx.beginPath();ctx.moveTo(0,C.height-75);
  for(let x=0;x<=C.width;x+=5)
    ctx.lineTo(x,C.height-75-Math.sin(x*0.003)*65-Math.sin(x*0.007)*26);
  ctx.lineTo(C.width,C.height);ctx.lineTo(0,C.height);ctx.fill();

  // Snow caps
  ctx.fillStyle='rgba(255,255,255,0.14)';
  [[C.width*0.3,C.height-118,C.width*0.34,C.height-144,C.width*0.38,C.height-118],
   [C.width*0.62,C.height-122,C.width*0.66,C.height-150,C.width*0.70,C.height-122]
  ].forEach(p=>{
    ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(p[2],p[3]);ctx.lineTo(p[4],p[5]);ctx.fill();
  });

  // Fortress
  drawFortress(ac);
}

function drawFortress(ac){
  const gy=C.height-54, fw=138, fTop=gy*0.28;
  const tg=ctx.createLinearGradient(0,0,fw,0);
  tg.addColorStop(0,'#3a2a10');tg.addColorStop(.5,'#2a1e0c');tg.addColorStop(1,'#1e1508');
  ctx.fillStyle=tg;
  ctx.fillRect(0,fTop,fw,gy-fTop);

  // Battlements along top
  ctx.fillStyle='#3a2a10';
  for(let i=0;i<8;i++) if(i%2===0) ctx.fillRect(i*18,fTop-20,15,20);

  // Main tower
  ctx.fillStyle='#4a3418';
  ctx.fillRect(32,fTop-85,74,85);
  for(let i=0;i<5;i++) if(i%2===0) ctx.fillRect(32+i*16,fTop-85-17,14,17);

  // Gate arch
  ctx.fillStyle='#0a0a18';
  ctx.beginPath();ctx.arc(fw/2-8,gy*0.74,21,Math.PI,0);
  ctx.fillRect(fw/2-29,gy*0.74,42,38);ctx.fill();

  // Stone texture
  ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=1;
  for(let r=0;r<8;r++){
    const ry=fTop+r*30;
    ctx.beginPath();ctx.moveTo(0,ry);ctx.lineTo(fw,ry);ctx.stroke();
    for(let c=0;c<5;c++){
      const ox=(r%2)*17;
      ctx.beginPath();ctx.moveTo(c*30+ox,ry);ctx.lineTo(c*30+ox,ry+30);ctx.stroke();
    }
  }

  // Torches
  drawTorch(fw-16,fTop-8,ac);
  drawTorch(34,fTop-88,ac);
  drawTorch(104,fTop-88,ac);

  // HP bar
  const hx=26,hy=fTop+10,hw=82;
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(hx-2,hy-2,hw+4,11);
  ctx.fillStyle=lives>=2?'#50e050':(lives===1?'#f0a020':'#e03030');
  ctx.fillRect(hx,hy,hw*(lives/3),7);
  ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;ctx.strokeRect(hx,hy,hw,7);
}

function drawTerrain(){
  ctx.beginPath();ctx.moveTo(0,C.height);
  terrain.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(C.width,C.height);
  const tg=ctx.createLinearGradient(0,C.height-68,0,C.height);
  tg.addColorStop(0,'#2a1a08');tg.addColorStop(.5,'#160e04');tg.addColorStop(1,'#080402');
  ctx.fillStyle=tg;ctx.fill();
  ctx.strokeStyle='rgba(180,140,60,.14)';ctx.lineWidth=1.5;
  ctx.beginPath();terrain.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
}

function drawCannon(){
  const gy=C.height-54;cannon.y=gy;
  // Wheels
  ctx.strokeStyle='#2a1a08';ctx.lineWidth=3;
  [-15,15].forEach(ox=>{
    ctx.fillStyle='#4a3010';
    ctx.beginPath();ctx.arc(cannon.x+ox,cannon.y,11,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle='#6a5020';ctx.lineWidth=1;
    for(let a=0;a<4;a++){
      const ang=a*Math.PI/2+fc*0.05;
      ctx.beginPath();
      ctx.moveTo(cannon.x+ox+Math.cos(ang)*4,cannon.y+Math.sin(ang)*4);
      ctx.lineTo(cannon.x+ox+Math.cos(ang)*10,cannon.y+Math.sin(ang)*10);
      ctx.stroke();
    }
  });
  // Body platform
  ctx.fillStyle='#5a4020';ctx.fillRect(cannon.x-19,cannon.y-15,38,15);
  // Barrel
  let ba=cannon.ang;
  if(drag){ba=Math.max(-Math.PI*0.84,Math.min(-0.08,Math.atan2(dy1-dy0,dx1-dx0)));}
  cannon.ang=ba;
  ctx.save();ctx.translate(cannon.x,cannon.y-7);ctx.rotate(ba);
  const bg=ctx.createLinearGradient(0,-9,0,9);
  bg.addColorStop(0,'#6a5030');bg.addColorStop(.5,'#3a2810');bg.addColorStop(1,'#2a1808');
  ctx.fillStyle=bg;ctx.fillRect(0,-9,56,18);
  ctx.fillStyle='#4a3020';ctx.fillRect(50,-11,9,22);
  ctx.strokeStyle='rgba(255,200,100,.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(8,-7);ctx.lineTo(51,-7);ctx.stroke();
  ctx.restore();
}

function drawTraj(){
  if(!drag)return;
  const pw=Math.min(Math.hypot(dx1-dx0,dy1-dy0)*0.08,50);
  const fa=Math.max(-Math.PI*0.84,Math.min(-0.08,Math.atan2(dy1-dy0,dx1-dx0)));
  let tx=cannon.x,ty=cannon.y-7,tvx=Math.cos(fa)*pw+wind*0.3,tvy=Math.sin(fa)*pw;
  ctx.beginPath();ctx.moveTo(tx,ty);
  for(let i=0;i<55;i++){
    tvx+=wind*0.022;tvy+=GRAV;tx+=tvx;ty+=tvy;
    if(i%2===0)ctx.lineTo(tx,ty);
    if(ty>C.height)break;
  }
  ctx.strokeStyle=WPN[curW].trail;ctx.lineWidth=2;
  ctx.setLineDash([5,6]);ctx.stroke();ctx.setLineDash([]);
}

// ---- Game logic ----
function spawnWave(){
  enemies=[];
  const rd=ROUNDS[round];
  for(let i=0;i<rd.cnt;i++){
    const ti=rd.types[Math.floor(Math.random()*rd.types.length)];
    const et=ET[ti];
    const ex=C.width-55-Math.random()*210;
    enemies.push({x:ex,y:tY(ex)-et.h,w:et.w,h:et.h,hp:et.hp,mhp:et.hp,type:ti,spd:et.spd*rd.spd,dead:false,stag:0});
  }
}

function addP(x,y,col,n=20,big=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*(big?9:5);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life:18+Math.random()*22,maxL:40,
      col:[col,'#ffb703','#fff','#ff6b35'][Math.floor(Math.random()*4)],sz:2+Math.random()*(big?5:3)});
  }
}

function addFl(x,y,txt,col='#fff',sz=22){
  floats.push({x,y,txt,col,life:38,maxL:38,vy:-2.2,sz});
}

function explode(x,y,radius){
  sBoom();shake=Math.min(shake+radius*0.2,22);
  addP(x,y,'#ff6b35',Math.floor(radius*0.9),true);
  addP(x,y,'#ffb703',Math.floor(radius*0.5));
  addP(x,y,'#fff',Math.floor(radius*0.25));
  enemies.forEach(e=>{
    if(e.dead)return;
    const d=Math.hypot(e.x+e.w/2-x,e.y+e.h/2-y);
    if(d<radius+22){dmgE(e,Math.floor(WPN[curW].dmg*(1-d/(radius+22))));}
  });
}

function dmgE(e,dmg){
  if(e.dead)return;
  e.hp-=dmg;e.stag=8;
  if(e.hp<=0){
    e.dead=true;combo++;if(combo>bc)bc=combo;
    const pts=ET[e.type].score+Math.floor(combo/3)*5;
    score+=pts;
    addFl(e.x+e.w/2,e.y-18,`+${pts}${combo>=3?' 🔥'+combo+'×':''}`,combo>=3?'#ff6b6b':'#ffd700',combo>=3?32:20);
    if(combo>=3)sCombo();else sHit();
    addP(e.x+e.w/2,e.y+e.h/2,ET[e.type].color,28,true);
    document.getElementById('sc').textContent=score;
    document.getElementById('cv').textContent=combo;
    if(score>hs){hs=score;localStorage.setItem('art3hs',hs);document.getElementById('hiv').textContent=hs;}
    chkWave();
  } else {
    addP(e.x+e.w/2,e.y+e.h/2,'#ffb703',8);sHit();
  }
}

function chkWave(){
  if(enemies.every(e=>e.dead)){
    const bon=(round+1)*25;score+=bon;
    document.getElementById('sc').textContent=score;
    sWin();addFl(C.width/2,C.height/2-28,`✨ +${bon} بونۇس!`,'#ffd700',32);
    gs='fact';setTimeout(showFact,1100);
  }
}

function showFact(){
  const f=FACTS[round];
  document.getElementById('fwb').textContent=`⚔️ دولقۇن ${round+1}/7 — ${ROUNDS[round].name} تامام!`;
  document.getElementById('ftit').textContent=`📜 ${f.t}`;
  document.getElementById('fbdy').textContent=f.b;
  document.getElementById('fact-ov').classList.remove('hidden');
}

function nextWave(){
  document.getElementById('fact-ov').classList.add('hidden');
  round++;
  if(round>=7){endGame(true);return;}
  document.getElementById('wv').textContent=`${round+1}/7`;
  wind=(Math.random()-0.5)*0.7;wt=0;
  combo=0;document.getElementById('cv').textContent='0';
  spawnWave();gs='playing';
}

function loseLife(){
  sLose();lives--;shake=20;
  for(let i=0;i<3;i++) document.getElementById(`li${i}`).classList.toggle('lost',i>=lives);
  addFl(140,C.height/2-18,'⚠️ قەلئە زەربە يەدى!','#ff4444',26);
  if(lives<=0)endGame(false);
}

function endGame(won){
  gs='gameover';
  document.getElementById('go-t').textContent=won?'🏆 غەلبە!':'💥 قەلئە يىقىلدى!';
  document.getElementById('go-s').textContent=won?'بارلىق باسقۇنچىلارنى قايتاردىڭ!':'قەلئە مۇداپىئەسى چۈشتى.';
  document.getElementById('go-sc').textContent=score;
  document.getElementById('go-w').textContent=round+1;
  document.getElementById('go-cb').textContent=bc;
  document.getElementById('go-ov').classList.remove('hidden');
}

function setW(t){
  if(!WPN[t])return;curW=t;
  document.querySelectorAll('.wb').forEach(b=>b.classList.toggle('active',b.dataset.wpn===t));
}

function doFire(){
  if(gs!=='playing'||shells.length>2)return;
  const pw=Math.min(Math.hypot(dx1-dx0,dy1-dy0)*0.08,50);
  if(pw<4)return;
  const fa=Math.max(-Math.PI*0.84,Math.min(-0.08,Math.atan2(dy1-dy0,dx1-dx0)));
  sShoot();
  if(curW==='cluster'){
    for(let i=0;i<5;i++){
      const a=fa+(Math.random()-0.5)*0.44;
      shells.push({x:cannon.x,y:cannon.y-7,vx:Math.cos(a)*pw+wind*0.5,vy:Math.sin(a)*pw,active:true,wpn:curW,trail:[]});
    }
  } else {
    shells.push({x:cannon.x,y:cannon.y-7,vx:Math.cos(fa)*pw+wind*0.3,vy:Math.sin(fa)*pw,active:true,wpn:curW,trail:[]});
  }
}

// ---- Input ----
const hS=(x,y)=>{if(gs!=='playing')return;drag=true;dx0=x;dy0=y;dx1=x;dy1=y;};
const hM=(x,y)=>{if(drag){dx1=x;dy1=y;}};
const hE=()=>{if(!drag)return;drag=false;doFire();};

window.addEventListener('mousedown',e=>hS(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>hM(e.clientX,e.clientY));
window.addEventListener('mouseup',hE);
window.addEventListener('touchstart',e=>{
  if(e.target.tagName!=='BUTTON'&&e.target.tagName!=='A'){e.preventDefault();hS(e.touches[0].clientX,e.touches[0].clientY);}
},{passive:false});
window.addEventListener('touchmove',e=>{if(drag){e.preventDefault();hM(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
window.addEventListener('touchend',e=>{e.preventDefault();hE();});

// ---- Start / Loop ----
function startGame(){
  initAudio();
  ['menu-ov','go-ov','fact-ov'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  score=0;round=0;lives=3;combo=0;bc=0;fc=0;shake=0;
  wind=(Math.random()-0.5)*0.5;wt=0;curW='normal';
  shells=[];parts=[];floats=[];enemies=[];
  for(let i=0;i<3;i++) document.getElementById(`li${i}`).classList.remove('lost');
  document.getElementById('sc').textContent='0';
  document.getElementById('wv').textContent='1/7';
  document.getElementById('cv').textContent='0';
  document.querySelectorAll('.wb').forEach(b=>b.classList.toggle('active',b.dataset.wpn==='normal'));
  genTerrain();spawnWave();gs='playing';
  if(!running){running=true;requestAnimationFrame(loop);}
}

function loop(){
  requestAnimationFrame(loop);fc++;
  ctx.save();
  if(shake>0.5){ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);shake*=0.84;}else shake=0;
  ctx.clearRect(-30,-30,C.width+60,C.height+60);

  const ri=Math.min(round,6);
  drawBG(ri);drawTerrain();drawCannon();drawTraj();

  if(gs==='playing'){
    // Wind update
    wt++;if(wt>280){wind=(Math.random()-0.5)*0.82;wt=0;}
    document.getElementById('wa').textContent=wind>0.1?'➡':(wind<-0.1?'⬅':'⬆');
    document.getElementById('wn').textContent=Math.abs(Math.floor(wind*100));

    // Enemies
    enemies.forEach(e=>{
      if(e.dead)return;
      e.x-=e.spd;e.stag=Math.max(0,e.stag-1);e.y=tY(e.x)-e.h;
      // Draw enemy
      ctx.save();if(e.stag>0)ctx.translate((Math.random()-0.5)*3,0);
      const hp=e.hp/e.mhp;
      ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(e.x-2,e.y-13,e.w+4,7);
      ctx.fillStyle=hp>0.5?'#3ecc71':(hp>0.25?'#f39c12':'#e74c3c');ctx.fillRect(e.x-2,e.y-13,(e.w+4)*hp,7);
      ctx.font=`${e.type===3?22:18}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowBlur=8;ctx.shadowColor=ET[e.type].color;
      ctx.fillText(ET[e.type].icon,e.x+e.w/2,e.y+e.h/2);
      ctx.shadowBlur=0;ctx.textBaseline='alphabetic';ctx.restore();
      // Reached fortress
      if(e.x+e.w<128&&!e.rf){e.rf=true;e.dead=true;loseLife();}
    });
    enemies=enemies.filter(e=>!e.dead);

    // Shells
    for(let i=shells.length-1;i>=0;i--){
      const s=shells[i];
      if(!s.active){shells.splice(i,1);continue;}
      s.vy+=GRAV;s.vx+=wind*0.022;s.x+=s.vx;s.y+=s.vy;
      s.trail.push({x:s.x,y:s.y});if(s.trail.length>15)s.trail.shift();
      // Trail
      s.trail.forEach((t,idx)=>{
        ctx.globalAlpha=idx/s.trail.length*0.5;
        ctx.fillStyle=WPN[s.wpn]?.trail||'rgba(255,255,255,0.3)';
        ctx.beginPath();ctx.arc(t.x,t.y,2+idx*0.14,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=1;
      // Shell glow
      const wc=WPN[s.wpn]?.color||'#fff';
      ctx.shadowBlur=s.wpn==='piercing'?20:12;ctx.shadowColor=wc;ctx.fillStyle=wc;
      const sr=s.wpn==='fire'?11:(s.wpn==='piercing'?6:9);
      ctx.beginPath();ctx.arc(s.x,s.y,sr,0,Math.PI*2);ctx.fill();
      if(s.wpn==='fire'){ctx.fillStyle='#ffb703';ctx.beginPath();ctx.arc(s.x+(Math.random()-0.5)*5,s.y+(Math.random()-0.5)*5,6,0,Math.PI*2);ctx.fill();}
      ctx.shadowBlur=0;
      // Terrain hit
      if(s.y>=tY(s.x)){
        if(s.wpn==='piercing'){
          addP(s.x,s.y,'#00d4ff',10);s.vx*=0.4;s.vy=-Math.abs(s.vy)*0.25;s.y-=10;
          enemies.forEach(e=>{if(!e.dead&&Math.hypot(e.x+e.w/2-s.x,e.y+e.h/2-s.y)<38)dmgE(e,WPN[s.wpn].dmg*0.4);});
          if(Math.abs(s.vx)<0.5&&Math.abs(s.vy)<0.5){s.active=false;shells.splice(i,1);}
        } else {explode(s.x,s.y,WPN[s.wpn].rad);s.active=false;shells.splice(i,1);}
      }
      if(s.y>C.height+50||s.x<-50||s.x>C.width+50){
        if(s.wpn!=='piercing')explode(s.x,Math.min(s.y,C.height-10),20);
        s.active=false;shells.splice(i,1);
      }
    }
  }

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life--;
    if(p.life<=0){parts.splice(i,1);continue;}
    ctx.fillStyle=p.col;ctx.globalAlpha=p.life/p.maxL;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.maxL),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Floating texts
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i];f.y+=f.vy;f.vy*=0.95;f.life--;
    if(f.life<=0){floats.splice(i,1);continue;}
    ctx.fillStyle=f.col;ctx.globalAlpha=f.life/f.maxL;
    ctx.font=`bold ${f.sz}px ${F}`;ctx.textAlign='center';
    ctx.shadowBlur=8;ctx.shadowColor='rgba(0,0,0,.6)';
    ctx.fillText(f.txt,f.x,f.y);ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // Round name on canvas
  if(gs==='playing'||gs==='fact'){
    ctx.font=`bold 13px ${F}`;ctx.textAlign='center';
    ctx.fillStyle='rgba(255,215,0,.65)';
    ctx.fillText(ROUNDS[ri].name,C.width/2,20);
  }

  ctx.restore();
}
</script>
