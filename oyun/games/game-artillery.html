<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💥 توپ قۇرال قىسىمى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e); font-family: 'Tajawal', sans-serif; touch-action: none; color: white;}
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
        .ui-box { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); padding: 12px 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        #score { font-size: 2.2rem; font-weight: 900; color: #e94560; text-shadow: 0 0 10px rgba(233, 69, 96, 0.5); }
        #high-score { font-size: 1rem; color: #aaa; margin-top: -5px; }
        
        #wind-display { font-size: 1.5rem; color: #00d4ff; display: flex; align-items: center; gap: 10px; }
        .wind-arrow { display: inline-block; transition: transform 0.3s; font-size: 2rem; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(26, 26, 46, 0.7) 0%, rgba(10, 10, 20, 0.95) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(12px); }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 45px; text-align: center; max-width: 85%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        
        .btn { padding: 18px 60px; font-size: 2rem; background: linear-gradient(135deg, #e94560, #950740); color: white; border: none; border-radius: 50px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 900; margin-top: 25px; box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(233, 69, 96, 0.6); }
        
        h1 { font-size: 3.8rem; margin: 0 0 20px 0; background: linear-gradient(to bottom, #fff, #e94560); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
        p { font-size: 1.6rem; color: #eee; max-width: 650px; line-height: 1.6; margin-bottom: 25px; }
        
        #back-btn { position: absolute; bottom: 30px; right: 30px; padding: 14px 35px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: #e94560; border-radius: 20px; cursor: pointer; text-decoration: none; font-weight: 800; transition: all 0.3s; z-index: 10; }
        #back-btn:hover { background: rgba(255,255,255,0.15); }

        #weapon-hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 30px; font-weight: bold; border: 1px solid #e94560; color: #ffeb3b; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ui-box">
            <div id="score">نىشان: 0</div>
            <div id="high-score">ئەڭ يۇقىرى: 0</div>
        </div>
        <div id="wind-display" class="ui-box">
            <span>شامال:</span>
            <span class="wind-arrow" id="wind-arrow">➔</span>
            <span id="wind-value">0</span>
        </div>
    </div>
    <div id="weapon-hint">ئېكراننى بېسىپ پارچىلاڭ!</div>
    <div id="overlay">
        <div class="glass-panel">
            <h1>💥 توپ قۇرال قىسىمى</h1>
            <p>توسالغۇلارنى پارتلىتىپ تاجاۋۇزچىلارنى يوقىتىڭ! <br> شامالنىڭ يۆنىلىشىگە دىققەت قىلىڭ. <br> ئېتىلغاندا يەنە بىر قېتىم چەكسىڭىز پارچىلىنىدۇ!</p>
            <div id="final-stats" style="display:none; margin-bottom: 20px;">
                <h2 style="font-size: 2.5rem; color: #ffeb3b;">غەلىبە بىزنىڭ!</h2>
                <div id="last-score" style="font-size: 2rem;">يوقىتىلغان نىشان: 0</div>
            </div>
            <button class="btn" onclick="startGame()">جەڭگە كىرىش</button>
        </div>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let terrainCanvas, terrainCtx;
        
        function resize() { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
            initTerrain();
        }
        window.addEventListener('resize', resize);

        let gameActive = false, score = 0, highScore = localStorage.getItem('artillery_highscore') || 0;
        let audioCtx, particles = [], shells = [];
        const gravity = 0.25;
        let wind = 0;

        let cannon = { x: 80, y: 0, angle: -Math.PI/4 };
        let target = { x: 0, y: 0, w: 80, h: 60, hp: 100 };
        let isDragging = false, dragStartX = 0, dragStartY = 0, dragEndX = 0, dragEndY = 0;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(f, d, type = 'sine') {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination); let now = audioCtx.currentTime;
            o.type = type; o.frequency.setValueAtTime(f, now); o.frequency.exponentialRampToValueAtTime(f/10, now + d);
            g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + d);
            o.start(now); o.stop(now + d);
        }

        function initTerrain() {
            terrainCanvas = document.createElement('canvas');
            terrainCanvas.width = canvas.width;
            terrainCanvas.height = canvas.height;
            terrainCtx = terrainCanvas.getContext('2d');
            
            terrainCtx.fillStyle = '#16213e';
            terrainCtx.beginPath();
            const mid = canvas.width / 2;
            const h = 250 + Math.random() * 200;
            terrainCtx.moveTo(mid - 200, canvas.height);
            terrainCtx.lineTo(mid, canvas.height - h);
            terrainCtx.lineTo(mid + 200, canvas.height);
            terrainCtx.fill();
            
            // Add some base ground
            terrainCtx.fillRect(0, canvas.height - 50, canvas.width, 50);
        }

        function destroyTerrain(x, y, radius) {
            terrainCtx.globalCompositeOperation = 'destination-out';
            terrainCtx.beginPath();
            terrainCtx.arc(x, y, radius, 0, Math.PI * 2);
            terrainCtx.fill();
            terrainCtx.globalCompositeOperation = 'source-over';
        }

        function spawnTarget() {
            cannon.y = canvas.height - 50;
            target.x = canvas.width / 2 + 200 + Math.random() * (canvas.width - canvas.width/2 - 350);
            target.y = canvas.height - 50 - target.h;
            target.hp = 100;
            wind = (Math.random() - 0.5) * 0.4;
            updateUI();
        }

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            score = 0; document.getElementById('score').innerText = `نىشان: 0`;
            document.getElementById('high-score').innerText = `ئەڭ يۇقىرى: ${highScore}`;
            gameActive = true;
            resize();
            spawnTarget();
            animate();
        }

        function updateUI() {
            document.getElementById('score').innerText = `نىشان: ${score}`;
            document.getElementById('wind-value').innerText = Math.abs(Math.floor(wind * 100));
            document.getElementById('wind-arrow').style.transform = `rotate(${wind > 0 ? 0 : 180}deg)`;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('artillery_highscore', highScore);
                document.getElementById('high-score').innerText = `ئەڭ يۇقىرى: ${highScore}`;
            }
        }

        const handleStart = (x, y) => { 
            if(!gameActive) return; 
            if(shells.length > 0) {
                // Cluster split
                const s = shells[0];
                if(s.active && !s.split) {
                    s.split = true;
                    for(let i=0; i<3; i++) {
                        shells.push({
                            x: s.x, y: s.y, 
                            vx: s.vx + (Math.random()-0.5)*5, 
                            vy: s.vy + (Math.random()-0.5)*5, 
                            active: true, split: true 
                        });
                    }
                    playSound(400, 0.2);
                    document.getElementById('weapon-hint').style.display = 'none';
                }
                return;
            }
            isDragging = true; dragStartX = x; dragStartY = y; dragEndX = x; dragEndY = y; 
        };

        const handleMove = (x, y) => { if(isDragging) { dragEndX = x; dragEndY = y; cannon.angle = Math.atan2(dragStartY - y, dragStartX - x); } };

        const handleEnd = () => {
            if(isDragging) {
                isDragging = false;
                let dx = dragStartX - dragEndX; let dy = dragStartY - dragEndY;
                shells.push({ 
                    x: cannon.x, y: cannon.y, 
                    vx: dx * 0.1, vy: dy * 0.1, 
                    active: true, split: false 
                });
                playSound(100, 0.5, 'sawtooth');
                document.getElementById('weapon-hint').style.display = 'block';
            }
        };

        window.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchend', e => { e.preventDefault(); handleEnd(); });

        function createExplosion(x, y, size = 30) {
            playSound(150, 0.5, 'square');
            for(let i=0; i<size; i++) {
                particles.push({ 
                    x: x, y: y, 
                    vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, 
                    life: 1, color: Math.random() > 0.5 ? '#e94560' : '#ffeb3b' 
                });
            }
            destroyTerrain(x, y, size + 10);
        }

        function drawTrajectory() {
            let dx = dragStartX - dragEndX; let dy = dragStartY - dragEndY;
            let tx = cannon.x, ty = cannon.y;
            let tvx = dx * 0.1, tvy = dy * 0.1;
            ctx.beginPath(); ctx.moveTo(tx, ty);
            for(let i=0; i<60; i++) {
                tvx += wind; tvy += gravity; tx += tvx; ty += tvy;
                if(i % 3 === 0) ctx.lineTo(tx, ty); else ctx.moveTo(tx, ty);
            }
            ctx.strokeStyle = 'rgba(233, 69, 96, 0.4)'; ctx.lineWidth = 3; ctx.stroke();
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(terrainCanvas, 0, 0);

            // Target
            ctx.fillStyle = '#333'; ctx.fillRect(target.x, target.y, target.w, target.h);
            ctx.fillStyle = '#e94560'; ctx.fillRect(target.x, target.y - 15, target.w * (target.hp/100), 8);
            ctx.fillStyle = '#fff'; ctx.font = '24px Arial'; ctx.fillText('🏴‍☠️', target.x + 25, target.y + 40);

            // Cannon
            ctx.save(); ctx.translate(cannon.x, cannon.y); ctx.rotate(cannon.angle);
            ctx.fillStyle = '#4caf50'; ctx.fillRect(0, -12, 50, 24);
            ctx.restore();
            ctx.fillStyle = '#2e7d32'; ctx.beginPath(); ctx.arc(cannon.x, cannon.y, 25, 0, Math.PI*2); ctx.fill();

            if(isDragging) drawTrajectory();

            // Shells
            for(let i = shells.length - 1; i >= 0; i--) {
                let s = shells[i];
                if(s.active) {
                    s.vx += wind; s.vy += gravity; s.x += s.vx; s.y += s.vy;
                    ctx.fillStyle = '#ffb703'; ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, Math.PI*2); ctx.fill();
                    
                    // Shell Trail
                    if(Math.random() < 0.4) particles.push({ x: s.x, y: s.y, vx: -s.vx*0.2, vy: -s.vy*0.2, life: 0.5, color: '#fff' });

                    // Hit Target
                    if(s.x > target.x && s.x < target.x + target.w && s.y > target.y && s.y < target.y + target.h) {
                        s.active = false; createExplosion(s.x, s.y, 50);
                        target.hp -= 40;
                        if(target.hp <= 0) { score++; updateUI(); setTimeout(spawnTarget, 1000); }
                        shells.splice(i, 1);
                        document.getElementById('weapon-hint').style.display = 'none';
                        continue;
                    }

                    // Hit Terrain
                    const pixel = terrainCtx.getImageData(s.x, s.y, 1, 1).data;
                    if(pixel[3] > 0) {
                        s.active = false; createExplosion(s.x, s.y);
                        shells.splice(i, 1);
                        if(shells.length === 0) {
                            document.getElementById('weapon-hint').style.display = 'none';
                            setTimeout(() => { if(target.hp > 0 && shells.length === 0) wind = (Math.random()-0.5)*0.4; updateUI(); }, 1000);
                        }
                        continue;
                    }

                    if(s.y > canvas.height || s.x > canvas.width || s.x < 0) {
                        s.active = false; shells.splice(i, 1);
                        if(shells.length === 0) {
                            document.getElementById('weapon-hint').style.display = 'none';
                            setTimeout(() => { if(target.hp > 0 && shells.length === 0) wind = (Math.random()-0.5)*0.4; updateUI(); }, 1000);
                        }
                    }
                }
            }

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
                if(p.life <= 0) particles.splice(i, 1);
            }
        }
    </script>
</body>
</html>
