<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🕊 كۆك كەپتەر: ئەركىنلىك ساداسى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #87CEEB; font-family: 'Tajawal', sans-serif; touch-action: none; color: #333; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; right: 0; padding: 15px 20px; z-index: 5; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        #score { font-size: 2rem; font-weight: 900; color: white; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
        #combo-text { font-size: 1.5rem; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); transition: transform 0.2s; }
        #level-text { font-size: 1.2rem; color: rgba(255,255,255,0.8); }
        #powerup-indicator { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); z-index: 5; font-size: 1.5rem; font-weight: 900; color: #fbbf24; text-shadow: 0 0 15px rgba(251,191,36,0.6); transition: all 0.3s; pointer-events: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(135,206,235,0.95), rgba(30,144,255,0.95)); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .btn { padding: 15px 50px; font-size: 2rem; background: linear-gradient(135deg, #1e90ff, #1565C0); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; font-family: inherit; box-shadow: 0 10px 30px rgba(30,144,255,0.4); margin-top: 20px; transition: transform 0.1s; pointer-events: auto; }
        .btn:active { transform: scale(0.95); }
        h1 { font-size: 3rem; color: white; text-shadow: 3px 3px 0 rgba(0,0,0,0.2); }
        .subtitle { font-size: 1.2rem; color: rgba(255,255,255,0.8); margin: 10px 0; text-align: center; max-width: 500px; line-height: 1.6; }
        #back-btn { position: absolute; bottom: 20px; right: 20px; padding: 12px 24px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); color: white; border-radius: 15px; cursor: pointer; text-decoration: none; font-weight: bold; z-index: 5; backdrop-filter: blur(5px); }
        #overlay-stats { font-size: 1.3rem; color: white; margin: 10px 0; }
        .bird-bg { position: absolute; font-size: 2rem; opacity: 0.3; animation: flyAcross 15s linear infinite; z-index: 0; }
        @keyframes flyAcross { 0% { left: -50px; top: 20%; } 100% { left: 110%; top: 10%; } }
    </style>
</head>
<body>
    <div id="ui">
        <div>
            <div id="score">قۇتقۇزۇلغان: 0</div>
            <div id="level-text">باسقۇچ 1</div>
        </div>
        <div id="combo-text"></div>
    </div>
    <div id="powerup-indicator" class="hidden"></div>
    <div id="overlay">
        <h1>🕊 كۆك كەپتەر</h1>
        <p class="subtitle">كەپتەرنى ئېتىپ، تاش-ياغاچ بىنالارنى بۇزۇپ، قەپەستىكى كەپتەرلەرنى قۇتقۇزۇڭ!</p>
        <button class="btn" onclick="startGame()">ئۇچۇش 🚀</button>
        <div id="overlay-stats">ئەڭ يۇقىرى: <span id="high-score">0</span></div>
    </div>
    <div id="game-over">
        <h1>🎯 ئويۇن تامام!</h1>
        <p class="subtitle" id="final-msg"></p>
        <button class="btn" onclick="startGame()">قايتا ئويناش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        
        // Audio
        let audioCtx = null;
        function initAudio() { if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)(); }
        function playSound(t) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination); const n = audioCtx.currentTime;
            if(t==='fly'){o.type='triangle';o.frequency.setValueAtTime(400,n);o.frequency.exponentialRampToValueAtTime(800,n+0.3);g.gain.setValueAtTime(0.3,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.3);o.start(n);o.stop(n+0.3);}
            else if(t==='break'){o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(50,n+0.4);g.gain.setValueAtTime(0.5,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.4);o.start(n);o.stop(n+0.4);}
            else if(t==='hit'){o.type='square';o.frequency.setValueAtTime(100,n);g.gain.setValueAtTime(0.2,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.1);o.start(n);o.stop(n+0.1);}
            else if(t==='coin'){o.type='sine';o.frequency.setValueAtTime(800,n);o.frequency.linearRampToValueAtTime(1200,n+0.1);g.gain.setValueAtTime(0.15,n);g.gain.linearRampToValueAtTime(0.01,n+0.1);o.start(n);o.stop(n+0.1);}
            else if(t==='powerup'){o.type='sine';o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+0.08);o.frequency.setValueAtTime(784,n+0.16);g.gain.setValueAtTime(0.2,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.25);o.start(n);o.stop(n+0.25);}
            else if(t==='combo'){o.type='sine';o.frequency.setValueAtTime(659,n);o.frequency.setValueAtTime(880,n+0.1);o.frequency.setValueAtTime(1047,n+0.2);g.gain.setValueAtTime(0.2,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.3);o.start(n);o.stop(n+0.3);}
            else if(t==='explode'){o.type='sawtooth';o.frequency.setValueAtTime(100,n);o.frequency.exponentialRampToValueAtTime(20,n+0.5);g.gain.setValueAtTime(0.4,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.5);o.start(n);o.stop(n+0.5);}
        }

        // Game state
        let gameActive = false, score = 0, combo = 0, level = 1, arrowsLeft = 5;
        const gravity = 0.35;
        let groundY = canvas.height - 80;
        let sling = {};
        let dove = { x:0, y:0, r:18, vx:0, vy:0, active:false, powerup:null };
        let multiDoves = [];
        let blocks = [], particles = [], floatingTexts = [], bgBirds = [], clouds = [];
        let isDragging = false, dragX, dragY;
        let highScore = parseInt(localStorage.getItem('doveHighScore')) || 0;
        let screenShake = 0, frameCount = 0, isDay = true, dayTimer = 0;
        let enemyBirds = [], freedDoves = 0, starsEarned = 0;
        let scoreMilestones = [50, 100, 150, 200, 300, 500];
        
        document.getElementById('high-score').textContent = highScore;
        
        // Power-up types
        const powerups = {
            bomb: { name: 'بومبا 🧨', color: '#ef4444', duration: 0 },
            multi: { name: '3 كەپتەر 🐦', color: '#8b5cf6', duration: 0 },
            magnet: { name: 'ماگنىت 🧲', color: '#fbbf24', duration: 0 }
        };
        
        function generateClouds() {
            clouds = [];
            for(let i = 0; i < 6; i++) {
                clouds.push({ x: Math.random() * canvas.width, y: 20 + Math.random() * 150, w: 60 + Math.random() * 100, speed: 0.1 + Math.random() * 0.3 });
            }
        }
        
        function spawnLevel() {
            blocks = []; particles = []; floatingTexts = []; enemyBirds = [];
            multiDoves = []; confetti = [];
            arrowsLeft = 5 + level;
            freedDoves = 0;
            groundY = canvas.height - 80;
            sling = { x: 120, y: groundY - 40 };
            dove.x = sling.x; dove.y = sling.y; dove.active = false; dove.powerup = null;
            
            document.getElementById('level-text').textContent = `باسقۇچ ${level} | ئوق: ${'🏹'.repeat(arrowsLeft)}`;
            
            // Build fortress structure
            const baseX = canvas.width - 300;
            const baseY = groundY;
            
            // Base platform
            blocks.push({ x: baseX - 40, y: baseY - 20, w: 240, h: 20, type: 'stone', hp: Math.min(3+level,6), maxHp: Math.min(3+level,6), vx: 0, vy: 0 });
            
            // Left tower
            for(let i = 0; i < 3; i++) {
                blocks.push({ x: baseX, y: baseY - 60 - i * 60, w: 50, h: 60, type: 'wood', hp: 2, maxHp: 2, vx: 0, vy: 0 });
            }
            // Right tower
            for(let i = 0; i < 3; i++) {
                blocks.push({ x: baseX + 140, y: baseY - 60 - i * 60, w: 50, h: 60, type: 'wood', hp: 2, maxHp: 2, vx: 0, vy: 0 });
            }
            // Top bridge
            blocks.push({ x: baseX + 10, y: baseY - 200, w: 180, h: 20, type: 'stone', hp: 2, maxHp: 2, vx: 0, vy: 0 });
            
            // Cages with doves - sometimes a golden (boss) cage at higher levels
            const cages = [
                { x: baseX + 45, y: baseY - 130 },
                { x: baseX + 10, y: baseY - 70 },
                { x: baseX + 140, y: baseY - 130 }
            ];
            cages.forEach((c, i) => {
                const isBoss = level >= 3 && i === 0 && Math.random() < 0.4;
                blocks.push({ 
                    x: c.x, y: c.y, w: 55, h: 55, 
                    type: 'cage', hp: isBoss ? 3 : 1, maxHp: isBoss ? 3 : 1, 
                    vx: 0, vy: 0, freed: false, doveIdx: i,
                    boss: isBoss
                });
            });
            
            // Extra decorative blocks
            for(let i = 0; i < 3 + level; i++) {
                const x = 40 + Math.random() * (canvas.width - 500);
                const y = groundY - 30 - Math.random() * 200;
                if(x > baseX - 40 && x < baseX + 210) continue;
                blocks.push({
                    x, y, w: 30 + Math.random() * 30, h: 30 + Math.random() * 30,
                    type: ['wood','stone','wood','wood'][Math.floor(Math.random()*4)],
                    hp: Math.floor(Math.random() * 3) + 1, maxHp: 3, vx: 0, vy: 0
                });
            }
            
            // Spawn power-up
            if(Math.random() < 0.4) {
                const types = ['bomb','multi','magnet'];
                const type = types[Math.floor(Math.random() * types.length)];
                blocks.push({
                    x: 60 + Math.random() * (canvas.width - 400),
                    y: groundY - 150 - Math.random() * 100,
                    w: 30, h: 30, type: 'powerup', hp: 1, maxHp: 1,
                    vx: 0, vy: 0, powerType: type
                });
            }
        }
        
        function startGame() {
            initAudio(); playSound('fly');
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            score = 0; combo = 0; level = 1;
            multiDoves = [];
            confetti = [];
            document.getElementById('score').textContent = `قۇتقۇزۇلغان: 0`;
            document.getElementById('combo-text').textContent = '';
            gameActive = true;
            generateClouds();
            spawnLevel();
            animate();
        }
        
        // Input
        window.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', e => { if(e.target.tagName!=='BUTTON'&&e.target.tagName!=='A'){e.preventDefault();handleStart(e.touches[0].clientX,e.touches[0].clientY)} }, {passive:false});
        window.addEventListener('touchmove', e => { if(isDragging){e.preventDefault();handleMove(e.touches[0].clientX,e.touches[0].clientY)} }, {passive:false});
        window.addEventListener('touchend', handleEnd);
        
        function handleStart(x, y) {
            if(!gameActive || dove.active || arrowsLeft <= 0) return;
            const dist = Math.hypot(dove.x - x, dove.y - y);
            if(dist < 60) { isDragging = true; dragX = x; dragY = y; }
        }
        function handleMove(x, y) {
            if(!isDragging) return;
            const dx = sling.x - x, dy = sling.y - y;
            const dist = Math.min(Math.hypot(dx, dy), 120);
            const angle = Math.atan2(dy, dx);
            dragX = sling.x - Math.cos(angle) * dist;
            dragY = sling.y - Math.sin(angle) * dist;
            dove.x = dragX; dove.y = dragY;
        }
        function handleEnd() {
            if(isDragging && arrowsLeft > 0) {
                const power = Math.hypot(sling.x - dove.x, sling.y - dove.y);
                if(power < 15) { dove.x = sling.x; dove.y = sling.y; isDragging = false; return; }
                isDragging = false; dove.active = true;
                arrowsLeft--;
                document.getElementById('level-text').textContent = `باسقۇچ ${level} | ئوق: ${'🏹'.repeat(arrowsLeft)}${'.'.repeat(Math.max(0, 5+level-arrowsLeft))}`;
                dove.vx = (sling.x - dove.x) * 0.3;
                dove.vy = (sling.y - dove.y) * 0.3;
                
                // Magnet power-up: attract toward nearest cage
                if(dove.powerup === 'magnet') {
                    let nearestCage = null, minDist = Infinity;
                    blocks.forEach(b => { if(b.type==='cage' && !b.freed) { const d = Math.hypot(b.x+b.w/2 - sling.x, b.y+b.h/2 - sling.y); if(d < minDist) { minDist = d; nearestCage = b; } } });
                    if(nearestCage) {
                        const angle = Math.atan2(nearestCage.y+nearestCage.h/2 - dove.y, nearestCage.x+nearestCage.w/2 - dove.x);
                        dove.vx += Math.cos(angle) * 3;
                        dove.vy += Math.sin(angle) * 3;
                    }
                    dove.powerup = null;
                }
                playSound('fly');
            } else {
                dove.x = sling.x; dove.y = sling.y;
            }
        }
        
        function addParticles(x, y, color, count, big) {
            for(let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * (big ? 6 : 3);
                const colors = [color, '#ffffff', '#fbbf24'];
                particles.push({
                    x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 2,
                    life: 20 + Math.random() * 20, maxLife: 40,
                    color: colors[Math.floor(Math.random()*colors.length)],
                    size: 2 + Math.random() * (big ? 4 : 2)
                });
            }
        }
        
        let confetti = [];
        function addConfetti(count) {
            count = count || 30;
            const colors = ['#ffb703','#e63946','#00f2ff','#10b981','#a855f7','#ec4899','#fbbf24'];
            for(let i = 0; i < count; i++) {
                confetti.push({
                    x: Math.random() * canvas.width, y: -20,
                    vx: (Math.random()-0.5)*6, vy: Math.random() * 5 + 2,
                    life: 1, color: colors[Math.floor(Math.random()*colors.length)],
                    size: 4 + Math.random()*8, rot: Math.random()*360, rv: (Math.random()-0.5)*15
                });
            }
        }
        
        function addFloatingText(x, y, text, color, size) {
            floatingTexts.push({ x, y, text, color: color || '#ffffff', life: 30, maxLife: 30, vy: -2, size: size || 24 });
        }
        
        function checkLevelComplete() {
            const hasCages = blocks.some(b => b.type === 'cage' && !b.freed);
            if(!hasCages) {
                // All doves freed!
                playSound('combo');
                const bonus = level * 10;
                score += bonus;
                document.getElementById('score').textContent = `قۇتقۇزۇلغان: ${score}`;
                addFloatingText(canvas.width/2, canvas.height/2, `✨ ${bonus} بونۇس!`, '#ffd700');
                
                // Calculate stars based on remaining arrows
                const totalArrows = 5 + level;
                const usedArrows = totalArrows - arrowsLeft;
                const pct = 1 - (usedArrows / totalArrows);
                starsEarned = pct > 0.75 ? 3 : (pct > 0.5 ? 2 : 1);
                const starStr = '⭐'.repeat(starsEarned) + '☆'.repeat(3 - starsEarned);
                addFloatingText(canvas.width/2, canvas.height/2 + 50, starStr, '#ffd700', 32);
                
                level++;
                setTimeout(() => {
                    if(gameActive) spawnLevel();
                }, 1500);
            } else if(arrowsLeft <= 0 && !dove.active) {
                // Game over - calculate stars from score
                if(level > 1) starsEarned = score > level * 30 ? 3 : (score > level * 15 ? 2 : 1);
                else starsEarned = 1;
                gameActive = false;
                const starStr = '⭐'.repeat(starsEarned) + '☆'.repeat(3 - starsEarned);
                document.getElementById('final-msg').innerHTML = `${score} كەپتەر قۇتقۇزدىڭىز!<br>باسقۇچ ${level}<br>${starStr}<br>ئەڭ يۇقىرى: ${Math.max(score, highScore)}`;
                if(score > highScore) { highScore = score; localStorage.setItem('doveHighScore', highScore); }
                document.getElementById('high-score').textContent = highScore;
                document.getElementById('game-over').style.display = 'flex';
            }
        }
        
        function drawBackground(time) {
            // Day/night cycle
            dayTimer++;
            if(dayTimer > 900) { isDay = !isDay; dayTimer = 0; }
            const sunAngle = Math.sin(dayTimer * 0.003) * 0.5 + 0.5;
            
            // Sky gradient
            let skyColor1, skyColor2, skyColor3;
            if(isDay) {
                skyColor1 = `hsl(210, 80%, ${50 + sunAngle * 30}%)`;
                skyColor2 = `hsl(205, 70%, ${60 + sunAngle * 25}%)`;
                skyColor3 = `hsl(140, 50%, ${70 + sunAngle * 20}%)`;
            } else {
                skyColor1 = '#0a0a2e';
                skyColor2 = '#1a1a3e';
                skyColor3 = '#1a2a1a';
            }
            const skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
            skyGrad.addColorStop(0, skyColor1);
            skyGrad.addColorStop(0.5, skyColor2);
            skyGrad.addColorStop(1, skyColor3);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, groundY);
            
            // Clouds
            clouds.forEach((c, i) => {
                c.x += c.speed;
                if(c.x > canvas.width + 100) c.x = -c.w - 50;
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.ellipse(c.x, c.y, c.w/2, 20, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(c.x - c.w/4, c.y + 5, c.w/3, 15, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(c.x + c.w/4, c.y + 3, c.w/3, 15, 0, 0, Math.PI*2);
                ctx.fill();
            });
            
            if(isDay) {
                // Sun
                ctx.fillStyle = '#fff3b0';
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#fff3b0';
                ctx.beginPath();
                ctx.arc(canvas.width - 100, 60, 40, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else {
                // Moon & stars
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                for(let i = 0; i < 60; i++) {
                    const sx = (i * 137.5 + 50) % canvas.width;
                    const sy = (i * 97.3 + 20) % (groundY * 0.6);
                    const twinkle = 0.3 + Math.sin(time * 0.002 + i * 1.5) * 0.7;
                    ctx.globalAlpha = twinkle * 0.8;
                    ctx.fillRect(sx, sy, 1+(i%3), 1+(i%3));
                }
                ctx.globalAlpha = 1;
                ctx.fillStyle = 'rgba(200,200,180,0.1)';
                ctx.beginPath();
                ctx.arc(canvas.width - 80, 50, 35, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'rgba(220,220,200,0.8)';
                ctx.beginPath();
                ctx.arc(canvas.width - 80, 50, 22, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = skyColor1;
                ctx.beginPath();
                ctx.arc(canvas.width - 72, 44, 16, 0, Math.PI*2);
                ctx.fill();
            }
            
            // Background birds
            bgBirds.forEach(b => {
                b.x += b.speed;
                b.y += Math.sin(time * 0.001 + b.idx) * 0.3;
                if(b.x > canvas.width + 50) b.x = -50;
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(b.x + 8, b.y - 2, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Ground
            const grassColor1 = isDay ? '#4caf50' : '#1a3a1a';
            const grassColor2 = isDay ? '#388e3c' : '#0f2f0f';
            const grassColor3 = isDay ? '#2e7d32' : '#0a1f0a';
            const grassGrad = ctx.createLinearGradient(0, groundY, 0, canvas.height);
            grassGrad.addColorStop(0, grassColor1);
            grassGrad.addColorStop(0.1, grassColor2);
            grassGrad.addColorStop(1, grassColor3);
            ctx.fillStyle = grassGrad;
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            
            // Grass blades
            ctx.strokeStyle = isDay ? '#43a047' : '#1a4a1a';
            ctx.lineWidth = 2;
            for(let i = 0; i < canvas.width; i += 8) {
                const h = 5 + Math.sin(i * 0.3 + time * 0.001) * 3;
                ctx.beginPath();
                ctx.moveTo(i, groundY);
                ctx.lineTo(i, groundY - h);
                ctx.stroke();
            }
        }
        
        function drawTrajectory() {
            let tx = dove.x, ty = dove.y;
            const tvx = (sling.x - dove.x) * 0.3, tvy = (sling.y - dove.y) * 0.3;
            ctx.beginPath(); ctx.moveTo(tx, ty);
            let lvx = tvx, lvy = tvy;
            for(let i = 0; i < 40; i++) {
                tx += lvx; ty += lvy; lvy += gravity;
                ctx.lineTo(tx, ty);
            }
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);
        }
        function spawnEnemyBird() {
            const side = Math.random() > 0.5 ? 1 : -1;
            enemyBirds.push({
                x: side > 0 ? -50 : canvas.width + 50,
                y: 50 + Math.random() * (groundY - 200),
                speed: 2 + Math.random() * 2 + level * 0.3,
                size: 12 + Math.random() * 6,
                vx: side * (2 + Math.random() * 2),
                alive: true, color: '#4a3728'
            });
        }
        
        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            const time = Date.now();
            frameCount++;
            
            // Score milestone check
            for(let mi = 0; mi < scoreMilestones.length; mi++) {
                if(score >= scoreMilestones[mi]) {
                    addFloatingText(canvas.width/2, canvas.height/3, `🎉 ${scoreMilestones[mi]} نومۇر!`, '#ffd700', 36);
                    addConfetti();
                    scoreMilestones.splice(mi, 1);
                    break;
                }
            }
            
            // Spawn enemy birds
            if(frameCount % 120 === 0 && level >= 2) {
                spawnEnemyBird();
            }
            
            // Screen shake
            if(screenShake > 0) screenShake *= 0.9;
            if(screenShake < 0.5) screenShake = 0;
            
            ctx.save();
            if(screenShake > 1) {
                ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground(time);
            
            // Slingshot base
            ctx.strokeStyle = '#5d4037';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(sling.x - 8, groundY);
            ctx.lineTo(sling.x - 8, sling.y - 10);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(sling.x + 8, groundY);
            ctx.lineTo(sling.x + 8, sling.y - 10);
            ctx.stroke();
            
            // Rubber band
            if(!dove.active) {
                if(isDragging) {
                    ctx.strokeStyle = '#8d6e63';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(sling.x - 8, sling.y - 10);
                    ctx.lineTo(dove.x, dove.y - 5);
                    ctx.lineTo(sling.x + 8, sling.y - 10);
                    ctx.stroke();
                    
                    // Power indicator
                    const power = Math.hypot(sling.x - dove.x, sling.y - dove.y);
                    const pct = Math.min(power / 120, 1);
                    ctx.fillStyle = `hsl(${(1-pct)*120}, 100%, 50%)`;
                    ctx.fillRect(sling.x - 40, groundY + 10, 80, 8);
                    ctx.fillStyle = 'white';
                    ctx.fillRect(sling.x - 40, groundY + 10, 80 * pct, 8);
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(sling.x - 40, groundY + 10, 80, 8);
                    
                    drawTrajectory();
                } else if(arrowsLeft > 0) {
                    ctx.strokeStyle = '#8d6e63';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(sling.x - 8, sling.y - 10);
                    ctx.lineTo(sling.x, sling.y + 5);
                    ctx.lineTo(sling.x + 8, sling.y - 10);
                    ctx.stroke();
                }
            }
            
            // Blocks physics & draw
            for(let i = blocks.length - 1; i >= 0; i--) {
                const b = blocks[i];
                
                if(b.type === 'cage' && b.freed) {
                    // Free dove flies up
                    b.vy -= 0.05;
                    b.y += b.vy;
                    ctx.fillStyle = '#fff';
                    ctx.font = '30px Arial';
                    ctx.fillText('🕊', b.x + 15, b.y + 30);
                    ctx.globalAlpha = Math.max(0, 1 + b.vy * 0.1);
                    ctx.fillStyle = 'rgba(30,144,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(b.x + 25, b.y + 10, 20, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    if(b.y < -100) blocks.splice(i, 1);
                    continue;
                }
                
                if(b.type === 'powerup') {
                    const pulse = 1 + Math.sin(time * 0.005) * 0.1;
                    ctx.save();
                    ctx.translate(b.x + b.w/2, b.y + b.h/2);
                    ctx.scale(pulse, pulse);
                    ctx.fillStyle = '#1e293b';
                    ctx.beginPath();
                    ctx.arc(0, 0, 18, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = b.powerType === 'bomb' ? '#ef4444' : b.powerType === 'multi' ? '#8b5cf6' : '#fbbf24';
                    ctx.strokeStyle = b.powerType === 'bomb' ? '#ef4444' : b.powerType === 'multi' ? '#8b5cf6' : '#fbbf24';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 18, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'white';
                    ctx.font = '18px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(b.powerType === 'bomb' ? '💣' : b.powerType === 'multi' ? '🐦' : '🧲', 0, 0);
                    ctx.restore();
                    
                    // Collision with dove
                    if(dove.active && Math.abs(dove.x - (b.x+b.w/2)) < 25 && Math.abs(dove.y - (b.y+b.h/2)) < 25) {
                        dove.powerup = b.powerType;
                        addParticles(b.x+b.w/2, b.y+b.h/2, '#ffd700', 20, false);
                        playSound('powerup');
                        const names = {bomb:'🧨 بومبا كەپتەر!', multi:'🐦 3 كەپتەر!', magnet:'🧲 ماگنىت!'};
                        addFloatingText(b.x+b.w/2, b.y-20, names[b.powerType], '#ffd700');
                        blocks.splice(i, 1);
                        document.getElementById('powerup-indicator').textContent = names[b.powerType];
                        document.getElementById('powerup-indicator').classList.remove('hidden');
                        setTimeout(() => document.getElementById('powerup-indicator').classList.add('hidden'), 2000);
                    }
                    continue;
                }
                
                b.vy += gravity;
                b.x += b.vx; b.y += b.vy;
                b.vx *= 0.98;
                
                // Floor
                if(b.y + b.h > groundY) { b.y = groundY - b.h; b.vy *= -0.3; b.vx *= 0.8; }
                
                // Block-block collision
                for(let j = 0; j < blocks.length; j++) {
                    if(i === j || blocks[j].type === 'powerup' || blocks[j].type === 'cage') continue;
                    const o = blocks[j];
                    if(b.x < o.x + o.w && b.x + b.w > o.x && b.y < o.y + o.h && b.y + b.h > o.y) {
                        if(b.y + b.h - b.vy <= o.y) {
                            b.y = o.y - b.h; b.vy = 0;
                        } else if(b.y - b.vy >= o.y + o.h) {
                            b.y = o.y + o.h; b.vy = 0;
                        } else {
                            const push = (b.vx - o.vx) * 0.3;
                            b.vx -= push; o.vx += push;
                        }
                    }
                }
                
                // Draw block
                const hpPct = b.hp / b.maxHp;
                ctx.save();
                
                if(b.type === 'wood') {
                    ctx.fillStyle = `hsl(30, ${60+hpPct*20}%, ${30+hpPct*20}%)`;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(b.x, b.y, b.w, b.h);
                    // Wood grain
                    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    ctx.lineWidth = 1;
                    for(let r = 0; r < 2; r++) {
                        ctx.beginPath();
                        ctx.moveTo(b.x + 5, b.y + 5 + r * 20);
                        ctx.lineTo(b.x + b.w - 5, b.y + 5 + r * 20);
                        ctx.stroke();
                    }
                } else if(b.type === 'stone') {
                    ctx.fillStyle = `hsl(0, 0%, ${50+hpPct*30}%)`;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.fillStyle = `hsl(0, 0%, ${60+hpPct*20}%)`;
                    ctx.beginPath();
                    ctx.ellipse(b.x + b.w/3, b.y + b.h/3, b.w/4, b.h/4, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = '#374151';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(b.x, b.y, b.w, b.h);
                } else if(b.type === 'cage') {
                    ctx.fillStyle = 'rgba(100, 116, 139, 0.8)';
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.strokeStyle = '#64748b';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(b.x, b.y, b.w, b.h);
                    // Cage bars
                    ctx.strokeStyle = '#94a3b8';
                    ctx.lineWidth = 2;
                    for(let bar = 0; bar < 3; bar++) {
                        ctx.beginPath();
                        ctx.moveTo(b.x + 10 + bar * 18, b.y + 5);
                        ctx.lineTo(b.x + 10 + bar * 18, b.y + b.h - 5);
                        ctx.stroke();
                    }
                    for(let bar = 0; bar < 2; bar++) {
                        ctx.beginPath();
                        ctx.moveTo(b.x + 5, b.y + 10 + bar * 18);
                        ctx.lineTo(b.x + b.w - 5, b.y + 10 + bar * 18);
                        ctx.stroke();
                    }
                    // Trapped dove
                    ctx.fillStyle = '#fff';
                    ctx.font = '25px Arial';
                    ctx.fillText('🕊', b.x + 15, b.y + 38);
                }
                
                ctx.restore();
            }
            
            // Multi doves
            for(let mi = multiDoves.length - 1; mi >= 0; mi--) {
                const md = multiDoves[mi];
                if(!md.active) { multiDoves.splice(mi, 1); continue; }
                md.vy += gravity * 0.8;
                md.x += md.vx;
                md.y += md.vy;
                
                // Collision with blocks (same as dove but smaller hitbox)
                for(let bi = blocks.length - 1; bi >= 0; bi--) {
                    const b = blocks[bi];
                    if(b.type === 'powerup') continue;
                    if(md.x + md.r > b.x && md.x - md.r < b.x + b.w && md.y + md.r > b.y && md.y - md.r < b.y + b.h) {
                        if(b.type === 'cage' && !b.freed) {
                            b.freed = true;
                            b.vy = -5;
                            score += 15;
                            combo++;
                            addFloatingText(b.x + b.w/2, b.y - 20, `+15 ${combo >= 3 ? '🔥' : '🐦'}`, '#8b5cf6');
                            document.getElementById('score').textContent = `قۇتقۇزۇلغان: ${score}`;
                            playSound('coin');
                            addParticles(b.x + b.w/2, b.y + b.h/2, '#8b5cf6', 15, false);
                            if(combo >= 3) playSound('combo');
                            md.active = false;
                            setTimeout(checkLevelComplete, 200);
                            break;
                        } else {
                            b.hp--;
                            b.vx += md.vx * 0.3;
                            b.vy += md.vy * 0.3;
                            playSound('hit');
                            addParticles(md.x, md.y, '#94a3b8', 4, false);
                            if(b.hp <= 0 && b.type !== 'cage') {
                                addParticles(b.x + b.w/2, b.y + b.h/2, b.type === 'wood' ? '#d35400' : '#6b7280', 12, true);
                                playSound('break');
                                blocks.splice(bi, 1);
                            }
                            md.vx *= -0.4;
                            md.vy *= -0.4;
                        }
                    }
                }
                
                // OOB
                if(md.y > canvas.height + 50 || md.x > canvas.width + 50 || md.x < -50) {
                    md.active = false;
                }
                
                // Draw multi dove (smaller purple dove)
                if(md.active) {
                    ctx.fillStyle = '#8b5cf6';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(139,92,246,0.5)';
                    ctx.beginPath();
                    ctx.arc(md.x, md.y, md.r, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#a78bfa';
                    const wY = Math.sin(time * 0.025 + mi) * 4;
                    ctx.beginPath();
                    ctx.ellipse(md.x - 10, md.y - 2 + wY, 7, 4, -0.2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(md.x + 10, md.y - 2 - wY, 7, 4, 0.2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    ctx.moveTo(md.x + 13, md.y - 1);
                    ctx.lineTo(md.x + 20, md.y);
                    ctx.lineTo(md.x + 13, md.y + 1);
                    ctx.fill();
                }
            }
            
            // Enemy birds
            enemyBirds.forEach(eb => {
                if(!eb.alive) return;
                eb.x += eb.vx;
                eb.y += Math.sin(frameCount * 0.05 + eb.x * 0.01) * 0.5;
                // Draw hawk
                ctx.fillStyle = eb.color;
                ctx.beginPath();
                ctx.arc(eb.x, eb.y, eb.size, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#2d1f0e';
                ctx.beginPath();
                ctx.moveTo(eb.x - eb.size - 8, eb.y - 2);
                ctx.lineTo(eb.x - eb.size + 2, eb.y);
                ctx.lineTo(eb.x - eb.size - 8, eb.y + 2);
                ctx.fill();
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(eb.x - 3, eb.y - 3, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(eb.x - 2, eb.y - 3, 1.5, 0, Math.PI*2);
                ctx.fill();
                // Check collision with dove
                if(dove.active && Math.hypot(eb.x - dove.x, eb.y - dove.y) < eb.size + dove.r) {
                    // Dove hit by enemy bird!
                    playSound('hit');
                    addParticles(dove.x, dove.y, '#ef4444', 15, true);
                    screenShake = 8;
                    dove.active = false;
                    eb.alive = false;
                    combo = 0;
                    setTimeout(checkLevelComplete, 500);
                }
                if(eb.x < -100 || eb.x > canvas.width + 100) eb.alive = false;
            });
            enemyBirds = enemyBirds.filter(eb => eb.alive);
            
            // Doves - main
            if(dove.active && arrowsLeft >= 0) {
                dove.vy += gravity;
                dove.x += dove.vx;
                dove.y += dove.vy;
                
                // Collision with blocks
                for(let i = blocks.length - 1; i >= 0; i--) {
                    const b = blocks[i];
                    if(b.type === 'powerup') continue;
                    if(dove.x + dove.r > b.x && dove.x - dove.r < b.x + b.w && dove.y + dove.r > b.y && dove.y - dove.r < b.y + b.h) {
                        if(b.type === 'cage' && !b.freed) {
                            // Free the dove!
                            b.freed = true;
                            b.vy = -5;
                            score += 10 + combo * 5;
                            combo++;
                            const comboText = combo >= 3 ? ` 🔥${combo}× كومبو!` : '';
                            addFloatingText(b.x + b.w/2, b.y - 20, `+${10 + (combo-1) * 5}${comboText}`, combo >= 3 ? '#ff6b6b' : '#ffd700');
                            document.getElementById('score').textContent = `قۇتقۇزۇلغان: ${score}`;
                            playSound('coin');
                            addParticles(b.x + b.w/2, b.y + b.h/2, '#ffd700', 20, false);
                            
                            if(combo >= 3) playSound('combo');
                            
                            // Check all doves freed for level complete
                            setTimeout(checkLevelComplete, 200);
                            
                            // Bomb power-up: explode nearby blocks
                            if(dove.powerup === 'bomb') {
                                playSound('explode');
                                blocks.forEach(other => {
                                    if(other.type !== 'cage' || other.freed) {
                                        const dist = Math.hypot((b.x+b.w/2) - (other.x+other.w/2), (b.y+b.h/2) - (other.y+other.h/2));
                                        if(dist < 120) {
                                            other.hp = 0;
                                            addParticles(other.x+other.w/2, other.y+other.h/2, '#ef4444', 10, true);
                                        }
                                    }
                                });
                                dove.powerup = null;
                            }
                            // Multi power-up: spawn 2 more doves
                            if(dove.powerup === 'multi') {
                                for(let m = 0; m < 2; m++) {
                                    setTimeout(() => {
                                        if(gameActive) {
                                            multiDoves.push({
                                                x: dove.x, y: dove.y, r: 14,
                                                vx: dove.vx + (Math.random()-0.5)*5,
                                                vy: dove.vy - 3 + (Math.random()-0.5)*2,
                                                active: true, powerup: null
                                            });
                                        }
                                    }, 200 + m * 100);
                                }
                                addFloatingText(dove.x, dove.y-30, '🐦+2 قوشۇمچە!', '#8b5cf6', 28);
                                dove.powerup = null;
                            }
                        } else {
                            // Hit block
                            b.hp--;
                            const spd = Math.hypot(dove.vx, dove.vy);
                            b.vx += dove.vx * 0.3;
                            b.vy += dove.vy * 0.3;
                            playSound('hit');
                            addParticles(dove.x, dove.y, '#94a3b8', 5, false);
                            
                            if(b.hp <= 0 && b.type !== 'cage') {
                                addParticles(b.x + b.w/2, b.y + b.h/2, b.type === 'wood' ? '#d35400' : '#6b7280', 15, true);
                                playSound('break');
                                blocks.splice(i, 1);
                            }
                        }
                        dove.vx *= -0.4;
                        dove.vy *= -0.4;
                    }
                }
                
                // Out of bounds
                if(dove.y > canvas.height + 50 || dove.x > canvas.width + 50 || dove.x < -50) {
                    dove.active = false;
                    setTimeout(checkLevelComplete, 500);
                }
                
                // Draw dove with wing animation
                const wingY = Math.sin(time * 0.02) * 5;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(30,144,255,0.5)';
                ctx.fillStyle = '#1e90ff';
                ctx.beginPath();
                ctx.arc(dove.x, dove.y, dove.r, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
                // Wings
                ctx.fillStyle = '#4db8ff';
                ctx.beginPath();
                ctx.ellipse(dove.x - 15, dove.y - 3 + wingY, 10, 5, -0.3, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(dove.x + 15, dove.y - 3 - wingY, 10, 5, 0.3, 0, Math.PI*2);
                ctx.fill();
                // Eye
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(dove.x + 8, dove.y - 4, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(dove.x + 10, dove.y - 4, 2.5, 0, Math.PI*2);
                ctx.fill();
                // Beak
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.moveTo(dove.x + 18, dove.y - 2);
                ctx.lineTo(dove.x + 28, dove.y);
                ctx.lineTo(dove.x + 18, dove.y + 2);
                ctx.fill();
                // Tail
                ctx.fillStyle = '#1565C0';
                ctx.beginPath();
                ctx.moveTo(dove.x - 16, dove.y);
                ctx.lineTo(dove.x - 28, dove.y - 5);
                ctx.lineTo(dove.x - 28, dove.y + 5);
                ctx.fill();
                
                // Power-up glow
                if(dove.powerup === 'bomb') {
                    ctx.strokeStyle = `rgba(239,68,68,${0.3+Math.sin(time*0.01)*0.2})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(dove.x, dove.y, dove.r + 8, 0, Math.PI*2);
                    ctx.stroke();
                } else if(dove.powerup === 'multi') {
                    ctx.fillStyle = `rgba(139,92,246,${0.2+Math.sin(time*0.01)*0.1})`;
                    ctx.beginPath();
                    ctx.arc(dove.x, dove.y, dove.r + 5, 0, Math.PI*2);
                    ctx.fill();
                }
                
                // Trail
                if(Math.random() < 0.3) {
                    ctx.fillStyle = `rgba(30,144,255,${0.2+Math.random()*0.2})`;
                    ctx.beginPath();
                    ctx.arc(dove.x - 10 + Math.random()*10, dove.y - 5 + Math.random()*10, 3 + Math.random()*3, 0, Math.PI*2);
                    ctx.fill();
                }
            } else if(!dove.active && arrowsLeft > 0) {
                // Draw dove on sling
                ctx.fillStyle = '#1e90ff';
                ctx.beginPath();
                ctx.arc(dove.x, dove.y, dove.r, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(dove.x + 8, dove.y - 4, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.moveTo(dove.x + 18, dove.y - 2);
                ctx.lineTo(dove.x + 25, dove.y);
                ctx.lineTo(dove.x + 18, dove.y + 2);
                ctx.fill();
            }
            
            // Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.1;
                p.life--;
                if(p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // Floating texts
            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                const f = floatingTexts[i];
                f.y += f.vy;
                f.vy *= 0.95;
                f.life--;
                if(f.life <= 0) { floatingTexts.splice(i, 1); continue; }
                ctx.fillStyle = f.color;
                ctx.globalAlpha = f.life / f.maxLife;
                ctx.font = 'bold 24px Tajawal, Arial';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.fillText(f.text, f.x, f.y);
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1;
            
            // Confetti
            for(let i = confetti.length - 1; i >= 0; i--) {
                const c = confetti[i];
                c.x += c.vx; c.y += c.vy; c.vy += 0.08; c.rot += c.rv;
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(c.rot * Math.PI / 180);
                ctx.fillStyle = c.color;
                ctx.globalAlpha = c.life;
                ctx.fillRect(-c.size/2, -c.size/4, c.size, c.size/2);
                ctx.restore();
                c.life -= 0.008;
                if(c.life <= 0 || c.y > canvas.height + 20) confetti.splice(i, 1);
            }
            ctx.globalAlpha = 1;
        }
        
        // Init background birds
        for(let i = 0; i < 4; i++) {
            bgBirds.push({ x: Math.random() * canvas.width, y: 40 + Math.random() * 80, speed: 0.3 + Math.random() * 0.5, idx: i });
        }
        generateClouds();
