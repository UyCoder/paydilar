<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🕊 كۆك كەپتەر: ئەركىنلىك ساداسى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(to bottom, #87CEEB, #e0f6ff); font-family: 'Tajawal', sans-serif; touch-action: none; color: #333;}
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 5; text-shadow: 0 0 5px white;}
        #score { font-size: 3rem; font-weight: 900; color: #1e90ff; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(135, 206, 235, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .btn { padding: 15px 50px; font-size: 2rem; background: #1e90ff; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; box-shadow: 0 10px 20px rgba(30, 144, 255, 0.4); margin-top: 20px; }
        h1 { font-size: 3.5rem; margin-bottom: 10px; color: #1e90ff; text-align: center; text-shadow: 2px 2px 0 white;}
        p { font-size: 1.5rem; text-align: center; max-width: 600px; line-height: 1.6; }
        #back-btn { position: absolute; bottom: 20px; right: 20px; padding: 12px 24px; background: white; border: 2px solid #1e90ff; color: #1e90ff; border-radius: 15px; cursor: pointer; text-decoration: none; font-weight: bold; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">قۇتقۇزۇلغان كەپتەر: 0</div></div>
    <div id="overlay">
        <h1>🕊 كۆك كەپتەر</h1>
        <p>ئەركىنلىك كەپتىرىنى ئېتىپ، تاش، ياغاچ بىنالارنى ۋە قەپەزنى ئۇرۇپ يىقىتىڭ! <br> باشقا كەپتەرلەرنى قۇتقۇزۇڭ.</p>
        <button class="btn" onclick="startGame()">ئۇچۇش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let gameActive = false, score = 0, audioCtx;
        const gravity = 0.4;
        const groundY = canvas.height - 100;
        
        let sling = { x: 150, y: groundY - 50 };
        let dove = { x: 0, y: 0, r: 20, vx: 0, vy: 0, active: false };
        let blocks = [];
        let isDragging = false, dragX = 0, dragY = 0;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination); let now = audioCtx.currentTime;
            if(type === 'fly') {
                o.type = 'triangle'; o.frequency.setValueAtTime(400, now); o.frequency.exponentialRampToValueAtTime(800, now + 0.3);
                g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                o.start(now); o.stop(now + 0.3);
            } else if(type === 'break') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(200, now); o.frequency.exponentialRampToValueAtTime(50, now + 0.4);
                g.gain.setValueAtTime(0.5, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                o.start(now); o.stop(now + 0.4);
            } else if(type === 'hit') {
                o.type = 'square'; o.frequency.setValueAtTime(100, now); g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.start(now); o.stop(now + 0.1);
            }
        }

        function spawnLevel() {
            sling.y = groundY - 50;
            dove.x = sling.x; dove.y = sling.y; dove.active = false;
            blocks = [];
            
            let startX = canvas.width - 400;
            // Build a pyramid or stacked blocks
            for(let i=0; i<3; i++) {
                blocks.push({ x: startX, y: groundY - 60 - i*60, w: 40, h: 60, type: 'wood', vx: 0, vy: 0 });
                blocks.push({ x: startX + 150, y: groundY - 60 - i*60, w: 40, h: 60, type: 'wood', vx: 0, vy: 0 });
                if(i < 2) {
                    blocks.push({ x: startX - 20, y: groundY - 100 - i*60, w: 230, h: 20, type: 'stone', vx: 0, vy: 0 });
                }
            }
            // Cage on top
            blocks.push({ x: startX + 55, y: groundY - 300, w: 80, h: 80, type: 'cage', vx: 0, vy: 0, broken: false });
        }

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            score = 0; document.getElementById('score').innerText = `قۇتقۇزۇلغان كەپتەر: ${score}`;
            gameActive = true;
            spawnLevel();
            animate();
        }

        window.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        
        window.addEventListener('touchstart', e => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); } }, {passive: false});
        window.addEventListener('touchmove', e => { if(isDragging) { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); } }, {passive: false});
        window.addEventListener('touchend', handleEnd);

        function handleStart(x, y) { 
            if(!gameActive || dove.active) return; 
            let dist = Math.hypot(dove.x - x, dove.y - y);
            if(dist < 50) { isDragging = true; dragX = x; dragY = y; }
        }
        function handleMove(x, y) { 
            if(isDragging) { 
                let dx = sling.x - x, dy = sling.y - y;
                let angle = Math.atan2(dy, dx);
                let dist = Math.min(Math.hypot(dx, dy), 100);
                dragX = sling.x - Math.cos(angle) * dist;
                dragY = sling.y - Math.sin(angle) * dist;
                dove.x = dragX; dove.y = dragY;
            } 
        }
        function handleEnd() {
            if(isDragging) {
                isDragging = false; dove.active = true;
                dove.vx = (sling.x - dove.x) * 0.25;
                dove.vy = (sling.y - dove.y) * 0.25;
                playSound('fly');
            }
        }

        function drawTrajectory() {
            let tx = dove.x, ty = dove.y;
            let tvx = (sling.x - dove.x) * 0.25, tvy = (sling.y - dove.y) * 0.25;
            ctx.beginPath(); ctx.moveTo(tx, ty);
            for(let i=0; i<30; i++) {
                tx += tvx; ty += tvy; tvy += gravity;
                if(i % 2 === 0) ctx.lineTo(tx, ty); else ctx.moveTo(tx, ty);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 3; ctx.stroke();
        }

        function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = '#81c784'; ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

            // Slingshot
            ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 10;
            ctx.beginPath(); ctx.moveTo(sling.x, groundY); ctx.lineTo(sling.x, sling.y); ctx.stroke();
            if(isDragging) {
                ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(sling.x, sling.y); ctx.lineTo(dove.x, dove.y); ctx.stroke();
                drawTrajectory();
            }

            // Blocks physics & draw
            for(let i=0; i<blocks.length; i++) {
                let b = blocks[i];
                if(b.type === 'cage' && b.broken) {
                    b.vy -= 1; // free dove flies up!
                    b.y += b.vy;
                    ctx.fillStyle = '#fff'; ctx.font = '40px Arial'; ctx.fillText('🕊', b.x + 20, b.y + 40);
                    continue;
                }

                b.vy += gravity;
                b.x += b.vx; b.y += b.vy;
                
                // Floor collision
                if(b.y + b.h > groundY) { b.y = groundY - b.h; b.vy = 0; b.vx *= 0.5; }

                // Basic block vs block collision (fake tumbling)
                for(let j=0; j<blocks.length; j++) {
                    if(i===j) continue;
                    let o = blocks[j];
                    if(rectIntersect(b.x, b.y, b.w, b.h, o.x, o.y, o.w, o.h)) {
                        if(b.y < o.y && b.vy > 0) { b.y = o.y - b.h; b.vy = 0; b.vx *= 0.8;} // Resting on top
                        else {
                            // Push apart slightly
                            let push = (b.vx - o.vx) * 0.2;
                            b.vx -= push; o.vx += push;
                        }
                    }
                }

                if(b.type === 'wood') {
                    ctx.fillStyle = '#d35400'; ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.strokeStyle = '#873600'; ctx.lineWidth = 2; ctx.strokeRect(b.x, b.y, b.w, b.h);
                } else if (b.type === 'stone') {
                    ctx.fillStyle = '#7f8c8d'; ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2; ctx.strokeRect(b.x, b.y, b.w, b.h);
                } else if (b.type === 'cage') {
                    ctx.fillStyle = '#7f8c8d'; ctx.fillRect(b.x, b.y, b.w, b.h); 
                    ctx.fillStyle = '#bdc3c7'; ctx.fillRect(b.x+10, b.y+10, b.w-20, b.h-20); 
                    ctx.fillStyle = '#fff'; ctx.font = '30px Arial'; ctx.fillText('🕊', b.x + 20, b.y + 50); 
                }
            }

            // Dove
            if(dove.active) {
                dove.vy += gravity; dove.x += dove.vx; dove.y += dove.vy;
                
                // Dove vs Blocks
                for(let i=0; i<blocks.length; i++) {
                    let b = blocks[i];
                    if(dove.x + dove.r > b.x && dove.x - dove.r < b.x + b.w && dove.y + dove.r > b.y && dove.y - dove.r < b.y + b.h) {
                        if(b.type === 'cage' && !b.broken) {
                            b.broken = true; playSound('break');
                            score++; document.getElementById('score').innerText = `قۇتقۇزۇلغان كەپتەر: ${score}`;
                            setTimeout(spawnLevel, 2000);
                        } else {
                            // Hit wood/stone
                            b.vx += dove.vx * 0.5;
                            b.vy += dove.vy * 0.5;
                            playSound('hit');
                        }
                        dove.vx *= -0.5; // bounce back slightly
                    }
                }

                if(dove.y > canvas.height || dove.x > canvas.width) { 
                    setTimeout(spawnLevel, 1000); dove.active = false;
                }
            }
            
            // Draw Blue Dove
            ctx.fillStyle = '#1e90ff'; ctx.beginPath(); ctx.arc(dove.x, dove.y, dove.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(dove.x + 10, dove.y - 5, 5, 0, Math.PI*2); ctx.fill(); // eye
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.moveTo(dove.x+20, dove.y-5); ctx.lineTo(dove.x+30, dove.y); ctx.lineTo(dove.x+20, dove.y+5); ctx.fill(); // beak
        }
    </script>
</body>
</html>
