<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐺 كۆك بۆرەنىڭ تەۋەككۈلچىلىكى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Tajawal', sans-serif; color: white; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #score { font-size: 2.8rem; font-weight: 800; color: #ffeb3b; }
        #lives { font-size: 1.5rem; color: #ff4444; }
        #combo-text { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: 900; color: #ffeb3b; display: none; pointer-events: none; text-shadow: 0 0 20px #ff5722; z-index: 50; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .btn { padding: 18px 60px; font-size: 1.8rem; background: linear-gradient(135deg, #f44336, #ff5722); color: white; border: none; border-radius: 50px; cursor: pointer; }
        h1 { font-size: 4rem; margin-bottom: 10px; color: #ffeb3b; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        p { font-size: 1.4rem; max-width: 650px; text-align: center; line-height: 1.6; }
        #back-btn { position: absolute; bottom: 20px; left: 20px; padding: 12px 24px; background: rgba(255,255,255,0.4); border: 2px solid #f44336; color: #b71c1c; border-radius: 15px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">مۇساپە: 0m</div><div id="lives">❤️❤️❤️❤️❤️</div></div>
    <div id="combo-text">چاققان!</div>
    <div id="overlay">
        <h1>🐺 كۆك بۆرە</h1>
        <p>تاشلاردىن ساقلىنىڭ! يۇلتۇزنى تۇتسىڭىز قوغدىنىشقا ئىرىشىسىز. <br> ئېكراننىڭ سول ياكى ئوڭ تەرىپىنى چىكىڭ. بەك ئاسان!</p>
        <button class="btn" onclick="startGame()">باشلاش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>

    <script>
        let scene, camera, renderer, wolf, obstacles = [];
        let score = 0, lives = 5, gameActive = false, speed = 0.3, invTime = 0, audioCtx;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playJump() { if (!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(400, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.2); }

        function init() {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            new THREE.TextureLoader().load('pics/wolf_runner_bg.png', (t) => scene.background = t);
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            wolf = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 2), new THREE.MeshPhongMaterial({ color: 0x4a90e2 }));
            scene.add(wolf); wolf.position.y = 0.5; camera.position.set(0, 5, 10); camera.lookAt(0, 1, -5);

            const move = dir => { if (gameActive) { if (dir === 'L' && wolf.position.x > -5) wolf.position.x -= 3; if (dir === 'R' && wolf.position.x < 5) wolf.position.x += 3; playJump(); } };
            window.addEventListener('keydown', e => { if (e.key === 'ArrowLeft') move('L'); if (e.key === 'ArrowRight') move('R'); });
            window.addEventListener('touchstart', e => { const x = e.touches[0].clientX / window.innerWidth; move(x < 0.5 ? 'L' : 'R'); e.preventDefault(); }, { passive: false });
        }

        function spawnObstacle() {
            const isStar = Math.random() < 0.2;
            const geo = isStar ? new THREE.TorusKnotGeometry(0.7, 0.2, 64, 8) : new THREE.DodecahedronGeometry(1.2, 0);
            const obj = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: isStar ? 0xffeb3b : 0x795548 }));
            const lanes = [-3, 0, 3]; obj.position.set(lanes[Math.floor(Math.random() * 3)], 0.5, -120);
            obj.userData = { isStar: isStar }; scene.add(obj); obstacles.push(obj);
        }

        function showCombo(txt) { const el = document.getElementById('combo-text'); el.innerText = txt; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 800); }

        function startGame() {
            initAudio(); document.getElementById('overlay').style.display = 'none';
            score = 0; lives = 5; speed = 0.35; invTime = 0; gameActive = true; updateUI();
            obstacles.forEach(o => scene.remove(o)); obstacles = []; wolf.position.x = 0;
        }

        function updateUI() { document.getElementById('score').innerText = `مۇساپە: ${Math.floor(score)}m`; document.getElementById('lives').innerText = '❤️'.repeat(lives); }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive) {
                score += speed; if (invTime > 0) invTime--; updateUI();
                if (Math.random() < 0.015) spawnObstacle();
                wolf.material.opacity = (invTime > 0 && Math.floor(Date.now()/100)%2 === 0) ? 0.3 : 1;
                wolf.material.transparent = true;

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const o = obstacles[i]; o.position.z += speed;
                    if (o.position.distanceTo(wolf.position) < 2.2) {
                        if (o.userData.isStar) { invTime = 400; showCombo("كۆكرەك كەر!"); scene.remove(o); obstacles.splice(i, 1); beep(800, 0.2); }
                        else if (invTime <= 0) { lives--; updateUI(); beep(200, 0.3, 'sawtooth'); scene.remove(o); obstacles.splice(i, 1); if (lives <= 0) { gameActive = false; document.getElementById('overlay').style.display = 'flex'; } }
                        else { scene.remove(o); obstacles.splice(i, 1); showCombo("تاشنى چاقتىڭ!"); }
                        continue;
                    }
                    if (o.position.z > 15) { scene.remove(o); obstacles.splice(i, 1); }
                }
            }
            renderer.render(scene, camera);
        }
        init(); animate();
    </script>
</body>
</html>
