<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥟 ھالال خەزىنە: مەززىلىك تائاملار</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #fdf0d5; font-family: 'Tajawal', sans-serif; color: #669bbc; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        #score { font-size: 2.8rem; font-weight: 800; color: #780000; }
        #lives { font-size: 1.5rem; color: #ff4444; }
        #combo-text { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: 900; color: #780000; display: none; pointer-events: none; text-shadow: 0 0 20px #ffffff; z-index: 50; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(253, 240, 213, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); }
        .btn { padding: 18px 60px; font-size: 2rem; background: linear-gradient(135deg, #780000, #c1121f); color: white; border: none; border-radius: 60px; cursor: pointer; }
        h1 { font-size: 4rem; margin-bottom: 10px; color: #780000; }
        p { font-size: 1.5rem; max-width: 700px; text-align: center; line-height: 1.8; }
        #back-btn { position: absolute; bottom: 30px; left: 30px; padding: 12px 35px; background: rgba(102, 155, 188, 0.2); border: 2px solid #669bbc; color: #003049; border-radius: 20px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">ئۇتۇق: 0</div><div id="lives">❤️❤️❤️❤️❤️</div></div>
    <div id="combo-text">مەززىلىك!</div>
    <div id="overlay">
        <h1>🥟 ھالال خەزىنە</h1>
        <p>تائاملارنى يىغىڭ! <br> "ئالتۇن سامسا" 200 نومۇر بېرىدۇ. <br> سېۋەتنى سۆرەپ تۇتۇڭ. بەك ئاسان!</p>
        <button class="btn" onclick="startGame()">باشلاش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>

    <script>
        let scene, camera, renderer, basket, items = [];
        let score = 0, lives = 5, gameActive = false, audioCtx;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playCollect(isGolden) { if (!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(isGolden ? 800 : 500, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.2); }

        function init() {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            basket = new THREE.Mesh(new THREE.BoxGeometry(6, 1.5, 4), new THREE.MeshPhongMaterial({ color: 0x669bbc })); // Huge basket
            scene.add(basket); basket.position.y = -5; camera.position.z = 12;
            const handleMove = x => { if (gameActive) basket.position.x = (x / window.innerWidth - 0.5) * 22; };
            window.addEventListener('mousemove', e => handleMove(e.clientX));
            window.addEventListener('touchmove', e => { handleMove(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
        }

        function showCombo(txt) { const el = document.getElementById('combo-text'); el.innerText = txt; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 800); }

        function spawnItem() {
            const isGolden = Math.random() < 0.2; const types = [{ color: 0xe9c46a, name: 'naan' }, { color: 0xe76f51, name: 'samsa' }];
            const t = types[Math.floor(Math.random() * types.length)];
            const item = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshPhongMaterial({ color: isGolden ? 0xffd700 : t.color }));
            item.position.set((Math.random() - 0.5) * 18, 10, 0); item.userData = { isGolden: isGolden }; scene.add(item); items.push(item);
        }

        function startGame() {
            initAudio(); document.getElementById('overlay').style.display = 'none';
            score = 0; lives = 5; gameActive = true; updateUI();
            items.forEach(i => scene.remove(i)); items = [];
        }

        function updateUI() { document.getElementById('score').innerText = `ئۇتۇق: ${score}`; document.getElementById('lives').innerText = '❤️'.repeat(lives); }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive) {
                if (Math.random() < 0.025) spawnItem();
                for (let i = items.length - 1; i >= 0; i--) {
                    const item = items[i]; item.position.y -= 0.08 + (score / 5000);
                    if (item.position.y < -4.5 && item.position.y > -6.5 && Math.abs(item.position.x - basket.position.x) < 3.5) {
                        score += item.userData.isGolden ? 200 : 50; updateUI(); showCombo(item.userData.isGolden ? "بەك مەززىلىك!" : "مەززىلىك!");
                        playCollect(item.userData.isGolden); scene.remove(item); items.splice(i, 1);
                    } else if (item.position.y < -10) { scene.remove(item); items.splice(i, 1); }
                }
            }
            renderer.render(scene, camera);
        }
        init(); animate();
    </script>
</body>
</html>
