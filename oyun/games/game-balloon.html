<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎈 ئۇچار شارلار: شار پارتلىتىش</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(to bottom, #87CEEB, #e0f6ff); font-family: 'Tajawal', sans-serif; color: white; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 5; }
        #score { font-size: 2.8rem; font-weight: 800; color: #ff006e; text-shadow: 2px 2px 0px white; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(135, 206, 235, 0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .btn { padding: 18px 60px; font-size: 1.8rem; background: linear-gradient(135deg, #ff006e, #ff85a1); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(255,0,110,0.4); }
        h1 { font-size: 4rem; margin-bottom: 10px; color: #ff006e; text-shadow: 0 0 20px white; }
        p { font-size: 1.4rem; max-width: 650px; text-align: center; line-height: 1.6; color: #333; }
        #back-btn { position: absolute; bottom: 20px; left: 20px; padding: 12px 24px; background: rgba(255,255,255,0.8); border: 2px solid #ff006e; color: #ff006e; border-radius: 15px; cursor: pointer; text-decoration: none; font-weight: bold; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">ئۇتۇق: 0</div></div>
    <div id="overlay">
        <h1>🎈 ئۇچار شارلار</h1>
        <p>شارلارنى پارتلىتىڭ! <br> ئېكراننى چېكىپ ئوقيا ئېتىڭ. <br> شارلارنىڭ ئىچىدە كۆپلىگەن مۇكاپاتلار بار!</p>
        <button class="btn" onclick="startGame()">باشلاش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let balloons = [], arrows = [], texts = [];
        let score = 0, gameActive = false, audioCtx;

        const colors = ['#ff006e', '#3a86ff', '#8338ec', '#ffbe0b', '#fb5607'];
        const rewards = ['مۇكاپات!', 'ئەقىللىق!', 'بەكمۇ ياخشى!', 'ئىتتىك!', 'ھەيران قالارلىق!'];

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            let now = audioCtx.currentTime;
            if(type === 'shoot') {
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(300, now);
                o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                g.gain.setValueAtTime(0.1, now);
                g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.start(now); o.stop(now + 0.1);
            } else if(type === 'pop') {
                o.type = 'sine';
                o.frequency.setValueAtTime(800, now);
                o.frequency.exponentialRampToValueAtTime(1500, now + 0.1);
                g.gain.setValueAtTime(0.2, now);
                g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.start(now); o.stop(now + 0.1);
            }
        }

        function shoot(tx, ty) {
            if(!gameActive) return;
            initAudio(); playSound('shoot');
            
            let startX = canvas.width / 2;
            let startY = canvas.height - 50;
            
            let angle = Math.atan2(ty - startY, tx - startX);
            let speed = 25; // Arrow speed
            
            arrows.push({
                x: startX, y: startY,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                angle: angle
            });
        }

        window.addEventListener('mousedown', e => shoot(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => { 
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
                shoot(e.touches[0].clientX, e.touches[0].clientY); 
            }
        }, {passive: false});

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            score = 0; document.getElementById('score').innerText = `ئۇتۇق: 0`;
            balloons = []; arrows = []; texts = [];
            gameActive = true;
            animate();
        }

        function spawnBalloon() {
            let r = 30 + Math.random() * 20;
            balloons.push({
                x: Math.random() * (canvas.width - 100) + 50,
                y: canvas.height + r,
                r: r,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: 1 + Math.random() * 2,
                wiggle: Math.random() * Math.PI * 2
            });
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw clouds
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(canvas.width*0.2, canvas.height*0.2, 50, 0, Math.PI*2);
            ctx.arc(canvas.width*0.25, canvas.height*0.15, 60, 0, Math.PI*2);
            ctx.arc(canvas.width*0.3, canvas.height*0.2, 50, 0, Math.PI*2);
            ctx.fill();

            // Spawn balloons sparingly
            if(Math.random() < 0.015 && balloons.length < 8) spawnBalloon();

            // Draw Bow
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height - 50);
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(0, 0, 40, Math.PI, 0);
            ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(40, 0);
            ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1; ctx.stroke();
            ctx.restore();

            // Update and Draw Arrows
            for(let i=arrows.length-1; i>=0; i--) {
                let a = arrows[i];
                a.vy += 0.5; // gravity
                a.x += a.vx;
                a.y += a.vy;
                a.angle = Math.atan2(a.vy, a.vx);

                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.angle);
                // Shaft
                ctx.fillStyle = '#654321';
                ctx.fillRect(-20, -2, 40, 4);
                // Tip
                ctx.fillStyle = '#bdc3c7';
                ctx.beginPath(); ctx.moveTo(20, -5); ctx.lineTo(30, 0); ctx.lineTo(20, 5); ctx.fill();
                // Feathers
                ctx.fillStyle = '#fff';
                ctx.fillRect(-20, -5, 10, 3); ctx.fillRect(-20, 2, 10, 3);
                ctx.restore();

                if(a.x < 0 || a.x > canvas.width || a.y > canvas.height) {
                    arrows.splice(i, 1);
                    continue;
                }

                // Collision
                for(let j=balloons.length-1; j>=0; j--) {
                    let b = balloons[j];
                    let dist = Math.hypot(a.x - b.x, a.y - b.y);
                    if(dist < b.r) {
                        playSound('pop');
                        score += 50;
                        document.getElementById('score').innerText = `ئۇتۇق: ${score}`;
                        
                        let text = rewards[Math.floor(Math.random()*rewards.length)];
                        texts.push({x: b.x, y: b.y, text: text, alpha: 1, color: b.color});
                        
                        balloons.splice(j, 1);
                        arrows.splice(i, 1);
                        break;
                    }
                }
            }

            // Update and Draw Balloons
            for(let i=balloons.length-1; i>=0; i--) {
                let b = balloons[i];
                b.y -= b.speed;
                b.x += Math.sin(b.wiggle) * 0.5;
                b.wiggle += 0.05;

                // String
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.r);
                ctx.lineTo(b.x, b.y + b.r + 40);
                ctx.stroke();

                // Balloon
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.ellipse(b.x, b.y, b.r, b.r * 1.2, 0, 0, Math.PI*2);
                ctx.fill();

                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.ellipse(b.x - b.r*0.3, b.y - b.r*0.4, b.r*0.2, b.r*0.4, Math.PI/4, 0, Math.PI*2);
                ctx.fill();

                if(b.y < -100) balloons.splice(i, 1);
            }

            // Floating Texts
            for(let i=texts.length-1; i>=0; i--) {
                let t = texts[i];
                t.y -= 2;
                t.alpha -= 0.02;
                ctx.fillStyle = t.color;
                ctx.globalAlpha = t.alpha;
                ctx.font = 'bold 30px Tajawal';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'white'; ctx.shadowBlur = 10;
                ctx.fillText(t.text, t.x, t.y);
                ctx.globalAlpha = 1; ctx.shadowBlur = 0;

                if(t.alpha <= 0) texts.splice(i, 1);
            }
        }
    </script>
</body>
</html>
