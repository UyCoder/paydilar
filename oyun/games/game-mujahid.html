<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🪖 مىللىي ئارمىيە مۇجاھىدى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: 'Tajawal', sans-serif; touch-action: none; color: white;}
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 5; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        #score { font-size: 3rem; font-weight: 900; color: #e74c3c; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .btn { padding: 15px 50px; font-size: 2rem; background: #e74c3c; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; box-shadow: 0 10px 20px rgba(231, 76, 60, 0.4); margin-top: 20px; }
        h1 { font-size: 3.5rem; margin-bottom: 10px; color: #e74c3c; text-align: center; }
        p { font-size: 1.5rem; text-align: center; max-width: 600px; line-height: 1.6; }
        #back-btn { position: absolute; bottom: 20px; right: 20px; padding: 12px 24px; background: rgba(255,255,255,0.2); border: 2px solid #fff; color: #fff; border-radius: 15px; cursor: pointer; text-decoration: none; font-weight: bold; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">يوقىتىلغان: 0</div></div>
    <div id="overlay">
        <h1>🪖 مىللىي ئارمىيە مۇجاھىدى</h1>
        <p>ئېكراننى چېكىپ ئەسكەرنى ماڭدۇرۇڭ. يېقىنلاشقان تاجاۋۇزچىلارنى ئاپتوماتىك ئاتىدۇ. <br> ۋەتەننى قوغداڭ!</p>
        <button class="btn" onclick="startGame()">جەڭگە كىرىش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let gameActive = false, score = 0, audioCtx;
        
        let player = { x: 0, y: 0, targetX: 0, targetY: 0, speed: 2.5, r: 20, lastShot: 0 };
        let camera = { x: 0, y: 0 };
        let enemies = [];
        let bullets = [];

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination); let now = audioCtx.currentTime;
            if(type === 'shoot') {
                o.type = 'square'; o.frequency.setValueAtTime(400, now); o.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                o.start(now); o.stop(now + 0.1);
            } else if(type === 'hit') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, now); o.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                o.start(now); o.stop(now + 0.2);
            }
        }

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            score = 0; document.getElementById('score').innerText = `يوقىتىلغان: 0`;
            gameActive = true;
            player.x = 0; player.y = 0; player.targetX = 0; player.targetY = 0;
            enemies = []; bullets = [];
            animate();
        }

        window.addEventListener('mousedown', e => setTarget(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => { 
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') { 
                e.preventDefault(); setTarget(e.touches[0].clientX, e.touches[0].clientY); 
            } 
        }, {passive: false});
        window.addEventListener('touchmove', e => { 
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') { 
                e.preventDefault(); setTarget(e.touches[0].clientX, e.touches[0].clientY); 
            } 
        }, {passive: false});

        function setTarget(cx, cy) {
            if(!gameActive) return;
            player.targetX = cx + camera.x;
            player.targetY = cy + camera.y;
        }

        function spawnEnemy() {
            if(Math.random() < 0.015) {
                let angle = Math.random() * Math.PI * 2;
                let dist = canvas.width/2 + 200;
                enemies.push({
                    x: player.x + Math.cos(angle) * dist,
                    y: player.y + Math.sin(angle) * dist,
                    r: 20, speed: 0.8, dead: false
                });
            }
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);

            // Move player
            let pdx = player.targetX - player.x;
            let pdy = player.targetY - player.y;
            let pdist = Math.hypot(pdx, pdy);
            if(pdist > player.speed) {
                player.x += (pdx / pdist) * player.speed;
                player.y += (pdy / pdist) * player.speed;
            }

            // Camera follow
            camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
            camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Draw Ground Grid
            ctx.strokeStyle = '#34495e';
            ctx.lineWidth = 2;
            let startCol = Math.floor(camera.x / 100) * 100;
            let startRow = Math.floor(camera.y / 100) * 100;
            ctx.beginPath();
            for(let x = startCol; x < camera.x + canvas.width + 100; x+=100) {
                ctx.moveTo(x, camera.y); ctx.lineTo(x, camera.y + canvas.height);
            }
            for(let y = startRow; y < camera.y + canvas.height + 100; y+=100) {
                ctx.moveTo(camera.x, y); ctx.lineTo(camera.x + canvas.width, y);
            }
            ctx.stroke();

            spawnEnemy();

            // Auto Shoot nearest enemy
            let now = Date.now();
            let nearestEnemy = null;
            let minDist = 400; // range
            for(let e of enemies) {
                let d = Math.hypot(e.x - player.x, e.y - player.y);
                if(d < minDist) { minDist = d; nearestEnemy = e; }
            }

            if(nearestEnemy && now - player.lastShot > 600) {
                playSound('shoot');
                let angle = Math.atan2(nearestEnemy.y - player.y, nearestEnemy.x - player.x);
                bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*8, vy: Math.sin(angle)*8, life: 100 });
                player.lastShot = now;
            }

            // Update Bullets
            for(let i=bullets.length-1; i>=0; i--) {
                let b = bullets[i];
                b.x += b.vx; b.y += b.vy; b.life--;
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();

                // Hit Enemy
                for(let j=enemies.length-1; j>=0; j--) {
                    let e = enemies[j];
                    if(Math.hypot(b.x - e.x, b.y - e.y) < e.r + 4) {
                        e.dead = true;
                        bullets.splice(i, 1);
                        score++; document.getElementById('score').innerText = `يوقىتىلغان: ${score}`;
                        playSound('hit');
                        break;
                    }
                }
                if(b.life <= 0 && bullets[i]) bullets.splice(i, 1);
            }

            // Update Enemies
            for(let i=enemies.length-1; i>=0; i--) {
                let e = enemies[i];
                if(e.dead) {
                    enemies.splice(i, 1);
                    continue;
                }
                let angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * e.speed;
                e.y += Math.sin(angle) * e.speed;

                ctx.fillStyle = '#c0392b';
                ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = '20px Arial'; ctx.fillText('😠', e.x - 10, e.y + 7);
            }

            // Draw Player
            ctx.fillStyle = '#2980b9';
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = '20px Arial'; ctx.fillText('😎', player.x - 10, player.y + 7);
            
            // Aim line if nearest enemy
            if(nearestEnemy) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(nearestEnemy.x, nearestEnemy.y); ctx.stroke();
            }

            ctx.restore();
        }
    </script>
</body>
</html>
