<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏗️ ئەقىللىق قۇرۇلۇشچى: مۇنار سېلىش</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Tajawal', sans-serif; color: white; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #score { font-size: 2.8rem; font-weight: 800; color: #ff8c00; }
        #lives { font-size: 1.5rem; color: #ff4444; }
        #combo-text { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: 900; color: #ffffff; display: none; pointer-events: none; text-shadow: 0 0 20px #ff8c00; z-index: 50; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .btn { padding: 18px 60px; font-size: 1.8rem; background: linear-gradient(135deg, #ff8c00, #ffc300); color: #1a1000; border: none; border-radius: 50px; cursor: pointer; }
        h1 { font-size: 4rem; margin-bottom: 10px; color: #ffc300; }
        p { font-size: 1.4rem; max-width: 650px; text-align: center; line-height: 1.6; }
        #back-btn { position: absolute; bottom: 20px; left: 20px; padding: 12px 24px; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; border-radius: 15px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">قەۋەت: 0</div><div id="lives">❤️❤️❤️❤️❤️</div></div>
    <div id="combo-text">ئىنتايىن ياخشى!</div>
    <div id="overlay">
        <h1>🏗️ ئەقىللىق قۇرۇلۇشچى</h1>
        <p>مۇنار سېلىڭ! تاشلارنى بىر-بىرىنىڭ ئۈستىگە قويۇڭ. <br> "ئالتۇن تاش" ئاپتوماتىك توغرىلىنىدۇ. <br> سىزگە 5 پۇرسەت بېرىلىدۇ، بەك ئاسان!</p>
        <button class="btn" onclick="startGame()">باشلاش</button>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>

    <script>
        let scene, camera, renderer, blocks = [], currentBlock;
        let score = 0, lives = 5, gameActive = false, speed = 0.08, dir = 1, audioCtx;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function beep(f, d) { if (!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }

        function init() {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.background = new THREE.Color(0x87CEEB); scene.add(new THREE.AmbientLight(0xffffff, 1));
            const ground = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 8), new THREE.MeshPhongMaterial({ color: 0x555555 })); // Huge base
            ground.position.y = -0.5; scene.add(ground); blocks.push(ground);
            camera.position.set(10, 10, 10); camera.lookAt(0, 0, 0);
            window.addEventListener('mousedown', placeBlock);
            window.addEventListener('touchstart', e => { placeBlock(); e.preventDefault(); }, { passive: false });
        }

        function showCombo(txt) { const el = document.getElementById('combo-text'); el.innerText = txt; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 800); }

        function spawnBlock() {
            const last = blocks[blocks.length - 1]; const isGolden = Math.random() < 0.25;
            const geo = new THREE.BoxGeometry(last.geometry.parameters.width, 1, last.geometry.parameters.depth);
            currentBlock = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: isGolden ? 0xffd700 : new THREE.Color().setHSL(score * 0.1 % 1, 0.7, 0.5) }));
            currentBlock.userData = { isGolden: isGolden };
            currentBlock.position.set(dir === 1 ? -12 : last.position.x, score, dir === 1 ? last.position.z : -12);
            scene.add(currentBlock);
        }

        function placeBlock() {
            if (!gameActive) return;
            initAudio(); const last = blocks[blocks.length - 1];
            if (currentBlock.userData.isGolden) { currentBlock.position.x = last.position.x; currentBlock.position.z = last.position.z; }
            const diffX = currentBlock.position.x - last.position.x;
            const diffZ = currentBlock.position.z - last.position.z;
            
            if (Math.abs(diffX) > last.geometry.parameters.width || Math.abs(diffZ) > last.geometry.parameters.depth) {
                lives--; updateUI(); beep(100, 0.5, 'sawtooth');
                if (lives <= 0) { gameActive = false; document.getElementById('overlay').style.display = 'flex'; }
                else { scene.remove(currentBlock); spawnBlock(); }
                return;
            }

            score++; updateUI(); showCombo("ئىنتايىن ياخشى!"); beep(400 + score * 20, 0.1);
            blocks.push(currentBlock); dir = Math.random() > 0.5 ? 1 : 2;
            speed += 0.002; spawnBlock();
            camera.position.y = 10 + score; camera.lookAt(0, score, 0);
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            score = 0; lives = 5; gameActive = true; speed = 0.08; updateUI();
            blocks.slice(1).forEach(b => scene.remove(b)); blocks = [blocks[0]];
            camera.position.set(10, 10, 10); camera.lookAt(0, 0, 0); spawnBlock();
        }

        function updateUI() { document.getElementById('score').innerText = `قەۋەت: ${score}`; document.getElementById('lives').innerText = '❤️'.repeat(lives); }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive && currentBlock) {
                if (dir === 1) { currentBlock.position.x += speed; if (Math.abs(currentBlock.position.x) > 12) speed *= -1; }
                else { currentBlock.position.z += speed; if (Math.abs(currentBlock.position.z) > 12) speed *= -1; }
            }
            renderer.render(scene, camera);
        }
        init(); animate();
    </script>
</body>
</html>
