<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏗️ ئەقىللىق قۇرۇلۇشچى: مۇنار سېلىش</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0f172a; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
        #score { font-size: 2.2rem; font-weight: 800; color: #f59e0b; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        #lives { font-size: 1.5rem; color: #ff4757; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        #combo-text { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: 900; color: #f59e0b; display: none; pointer-events: none; text-shadow: 0 0 30px rgba(245,158,11,0.8); z-index: 50; }
        #hint { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); font-size: 1.2rem; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 5; text-align: center; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(12px); }
        .overlay-box { background: rgba(30,41,59,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2.5rem; text-align: center; max-width: 440px; width: 90%; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from{opacity:0;transform:scale(0.9)translateY(20px)} to{opacity:1;transform:scale(1)translateY(0)} }
        .overlay-box h1 { font-size: 2.8rem; margin-bottom: 10px; color: #f59e0b; }
        .overlay-box p { font-size: 1.1rem; color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
        .final-stats { display: flex; justify-content: center; gap: 20px; margin: 1rem 0 1.5rem; }
        .final-stat { text-align: center; }
        .final-stat .v { font-size: 2rem; font-weight: 800; color: #f59e0b; }
        .final-stat .l { font-size: 0.8rem; color: #94a3b8; }
        .btn { padding: 12px 40px; font-size: 1.3rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(245,158,11,0.4); transition: transform 0.2s; font-family: inherit; }
        .btn:active { transform: scale(0.95); }
        #back-btn { position: absolute; bottom: 20px; left: 20px; padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 12px; cursor: pointer; text-decoration: none; font-size: 0.9rem; z-index: 10; backdrop-filter: blur(8px); }
        
        @media (max-width: 768px) { .overlay-box { padding: 1.5rem; } .overlay-box h1 { font-size: 2rem; } .btn { padding: 12px 36px; font-size: 1.2rem; } #score { font-size: 1.6rem; } }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">🏗️ قەۋەت: 0</div>
        <div id="lives">❤️❤️❤️❤️❤️</div>
    </div>
    <div id="combo-text">🏗️ ئىنتايىن ياخشى!</div>
    <div id="hint">◀ چىكىپ تاش قويۇڭ ▶</div>
    <div id="overlay">
        <div class="overlay-box">
            <h1>🏗️ ئەقىللىق قۇرۇلۇشچى</h1>
            <p>مۇنار سېلىڭ! تاشلارنى بىر-بىرىنىڭ ئۈستىگە قويۇڭ.<br>🥇 ئالتۇن تاش ئاپتوماتىك توغرىلىنىدۇ.</p>
            <div class="final-stats" id="final-stats" style="display:none">
                <div class="final-stat"><div class="v" id="f-score">0</div><div class="l">قەۋەت</div></div>
            </div>
            <button class="btn" onclick="startGame()">باشلاش</button>
        </div>
    </div>
    <a id="back-btn" href="../index.html">← كەينىگە</a>

    <script>
        let scene, camera, renderer, blocks = [], currentBlock;
        let score = 0, lives = 5, gameActive = false, speed = 0.08, dir = 1;
        let particles = [];
        let audioCtx;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(type) {
            if (!audioCtx) return; try {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); g.gain.value = 0.08;
                const t = audioCtx.currentTime;
                if (type==='place') { o.type='sine'; o.frequency.setValueAtTime(400+score*20,t); o.frequency.exponentialRampToValueAtTime(500+score*20,t+0.08); g.gain.exponentialRampToValueAtTime(0.001,t+0.1); }
                else if (type==='gold') { o.type='sine'; o.frequency.setValueAtTime(600,t); o.frequency.setValueAtTime(900,t+0.1); o.frequency.setValueAtTime(1200,t+0.2); g.gain.exponentialRampToValueAtTime(0.001,t+0.25); }
                else if (type==='fail') { o.type='sawtooth'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(50,t+0.2); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); }
                else if (type==='gameover') { o.type='sawtooth'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(100,t+0.5); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); }
                o.start(t); o.stop(t+0.5);
            } catch(e) {}
        }

        function addParticles(x,y,z,color,count=12) {
            for (let i=0; i<count; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.06+Math.random()*0.08, 3,3), new THREE.MeshBasicMaterial({color, transparent:true, opacity:1}));
                p.position.set(x+(Math.random()-0.5)*0.5, y+Math.random()*0.3, z+(Math.random()-0.5)*0.5);
                p.userData = {vx:(Math.random()-0.5)*0.2, vy:Math.random()*0.15+0.05, vz:(Math.random()-0.5)*0.2, life:1};
                scene.add(p); particles.push(p);
            }
        }
        function updateParticles() {
            for (let i=particles.length-1; i>=0; i--) {
                const p=particles[i]; p.position.x+=p.userData.vx; p.position.y+=p.userData.vy; p.position.z+=p.userData.vz;
                p.userData.vy-=0.005; p.userData.life-=0.03; p.material.opacity=Math.max(0,p.userData.life);
                if (p.userData.life<=0) { scene.remove(p); p.geometry.dispose(); p.material.dispose(); particles.splice(i,1); }
            }
        }

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x0f172a); scene.fog = new THREE.Fog(0x0f172a, 20, 60);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({antialias:true}); renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; document.body.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const dl = new THREE.DirectionalLight(0xffffff, 0.6); dl.position.set(10,20,10); dl.castShadow = true; scene.add(dl);
            const hl = new THREE.HemisphereLight(0x87CEEB, 0x2d4c1e, 0.3); scene.add(hl);
            
            // Ground grid
            const gridHelper = new THREE.GridHelper(10, 10, 0x444466, 0x333355);
            gridHelper.position.y = -0.5; scene.add(gridHelper);
            
            const ground = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 10), new THREE.MeshStandardMaterial({color:0x1a1a3a, roughness:0.9}));
            ground.position.y = -0.5; ground.receiveShadow = true; scene.add(ground);
            blocks.push(ground);
            
            camera.position.set(8, 8, 8); camera.lookAt(0, 0, 0);
            
            document.addEventListener('mousedown', placeBlock);
            document.addEventListener('touchstart', e => { placeBlock(); e.preventDefault(); }, {passive:false});
            window.addEventListener('resize', ()=>{camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight);});
        }

        function showCombo(txt) { const el = document.getElementById('combo-text'); el.innerText = txt; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 700); }

        function spawnBlock() {
            const last = blocks[blocks.length-1];
            const isGolden = Math.random() < 0.2;
            const w = last.geometry.parameters.width;
            const d = last.geometry.parameters.depth;
            const hue = (score * 0.08) % 1;
            const color = isGolden ? 0xffd700 : new THREE.Color().setHSL(hue, 0.7, 0.5);
            
            const geo = new THREE.BoxGeometry(w, 0.8, d);
            const mat = new THREE.MeshPhongMaterial({ color, emissive: isGolden ? 0xffd700 : color, emissiveIntensity: isGolden ? 0.3 : 0.05 });
            currentBlock = new THREE.Mesh(geo, mat);
            currentBlock.userData = { isGolden };
            currentBlock.castShadow = true;
            
            if (dir === 1) {
                currentBlock.position.set(dir === 1 ? -10 : last.position.x, score * 0.8 + 0.4, last.position.z);
            } else {
                currentBlock.position.set(last.position.x, score * 0.8 + 0.4, dir === 2 ? -10 : last.position.z);
            }
            scene.add(currentBlock);
            document.getElementById('hint').style.display = 'block';
        }

        function placeBlock() {
            if (!gameActive || !currentBlock) return;
            initAudio();
            const last = blocks[blocks.length-1];
            
            if (currentBlock.userData.isGolden) {
                currentBlock.position.x = last.position.x;
                currentBlock.position.z = last.position.z;
            }
            
            const diffX = Math.abs(currentBlock.position.x - last.position.x);
            const diffZ = Math.abs(currentBlock.position.z - last.position.z);
            const maxW = last.geometry.parameters.width * 0.5 + currentBlock.geometry.parameters.width * 0.5;
            const maxD = last.geometry.parameters.depth * 0.5 + currentBlock.geometry.parameters.depth * 0.5;
            
            if (diffX > maxW || diffZ > maxD) {
                lives--;
                playSound('fail');
                scene.remove(currentBlock);
                updateUI();
                if (lives <= 0) {
                    gameActive = false; playSound('gameover');
                    document.getElementById('hint').style.display = 'none';
                    document.getElementById('overlay').style.display = 'flex';
                    document.getElementById('final-stats').style.display = 'flex';
                    document.getElementById('f-score').innerText = score;
                    document.getElementById('overlay').querySelector('h1').innerText = '🏗️ ئويۇن تۈگىدى';
                    document.getElementById('overlay').querySelector('p').innerText = `سىز ${score} قەۋەتلىك مۇنار سالدىڭىز!`;
                } else {
                    spawnBlock();
                }
                return;
            }

            // Success
            score++;
            updateUI();
            showCombo(`🏗️ قەۋەت ${score}!`);
            playSound(currentBlock.userData.isGolden ? 'gold' : 'place');
            addParticles(currentBlock.position.x, currentBlock.position.y, currentBlock.position.z, currentBlock.userData.isGolden ? 0xffd700 : 0x4ade80, 15);
            blocks.push(currentBlock);
            dir = Math.random() > 0.5 ? 1 : 2;
            speed += 0.002;
            
            // Camera animation
            const targetY = 8 + score * 0.3;
            const targetCamZ = 8 + score * 0.2;
            camera.position.y += (targetY - camera.position.y) * 0.1;
            camera.position.z += (targetCamZ - camera.position.z) * 0.1;
            camera.lookAt(0, score * 0.4, 0);
            
            setTimeout(() => {
                if (gameActive) spawnBlock();
            }, 300);
            document.getElementById('hint').style.display = 'none';
        }

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('overlay').querySelector('h1').innerText = '🏗️ ئەقىللىق قۇرۇلۇشچى';
            document.getElementById('overlay').querySelector('p').innerText = 'مۇنار سېلىڭ! تاشلارنى بىر-بىرىنىڭ ئۈستىگە قويۇڭ.';
            document.getElementById('final-stats').style.display = 'none';
            score = 0; lives = 5; gameActive = true; speed = 0.08;
            updateUI();
            
            // Clear blocks (keep ground)
            blocks.slice(1).forEach(b => { scene.remove(b); b.geometry.dispose(); b.material.dispose(); });
            blocks = [blocks[0]];
            particles.forEach(p => { scene.remove(p); p.geometry.dispose(); p.material.dispose(); }); particles = [];
            
            camera.position.set(8, 8, 8); camera.lookAt(0, 0, 0);
            setTimeout(() => { if (gameActive) spawnBlock(); }, 500);
        }

        function updateUI() { document.getElementById('score').innerText = `🏗️ قەۋەت: ${score}`; document.getElementById('lives').innerText = '❤️'.repeat(Math.max(0,lives)); }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive && currentBlock) {
                // Recycle speed sign based on current axis
                const s = speed < 0 ? -Math.abs(speed) : Math.abs(speed);
                if (dir === 1) {
                    currentBlock.position.x += s;
                    if (currentBlock.position.x > 8) speed = -Math.abs(speed);
                    if (currentBlock.position.x < -8) speed = Math.abs(speed);
                } else {
                    currentBlock.position.z += s;
                    if (currentBlock.position.z > 8) speed = -Math.abs(speed);
                    if (currentBlock.position.z < -8) speed = Math.abs(speed);
                }
                currentBlock.rotation.y += 0.005;
            }
            updateParticles();
            
            // Smooth camera
            if (gameActive) {
                const targetY = 8 + score * 0.3;
                const targetZ = 8 + score * 0.2;
                camera.position.y += (targetY - camera.position.y) * 0.05;
                camera.position.z += (targetZ - camera.position.z) * 0.05;
                camera.lookAt(0, score * 0.4, 0);
            }
            
            renderer.render(scene, camera);
        }
        init(); animate();
    </script>
</body>
</html>
