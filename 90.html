<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بىلىك ماقالە تەرجىمە ۋە خۇلاسە قۇرالى v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'UKIJ Ekran'; src: local('UKIJ Ekran'), local('UKIJ_Ekran'); }
        @font-face { font-family: 'UKIJ Tuz'; src: local('UKIJ Tuz'), local('UKIJ_Tuz'); }
        body { font-family: "UKIJ Ekran", "Noto Naskh Arabic", sans-serif; background: #0f172a; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Global Tools Navigation -->
    <nav id="bilik-global-nav" dir="rtl" style="background:#020617;border-bottom:1px solid #1e293b;padding:6px 14px;z-index:9999;width:100%;box-sizing:border-box;">
        <style>
            #bilik-global-nav-wrap{display:flex;flex-wrap:wrap;align-items:center;gap:5px;}
            #bilik-global-nav .bgl{font-size:10px;font-weight:700;color:#f59e0b;letter-spacing:.1em;white-space:nowrap;}
            #bilik-global-nav a.bgn{display:inline-block;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;border:1px solid #334155;background:#0f172a;color:#94a3b8;white-space:nowrap;text-decoration:none;transition:background .2s,color .2s;}
            #bilik-global-nav a.bgn:hover{background:#1e293b;color:#fff;}
            #bilik-global-nav a.bgn.active{background:#d97706;color:#fff;border-color:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.35);}
        </style>
        <div id="bilik-global-nav-wrap">
            <span class="bgl">بىلىك قۇراللىرى:</span>
            <a href="01.html" data-page="01.html" class="bgn">01 · v8.5</a>
            <a href="02.html" data-page="02.html" class="bgn">02 · ماقالە</a>
            <a href="80.html" data-page="80.html" class="bgn">80 · v10</a>
            <a href="85.html" data-page="85.html" class="bgn">85 · 19 دۆلەت</a>
            <a href="86.html" data-page="86.html" class="bgn">86 · 4 قاتلام</a>
            <a href="87.html" data-page="87.html" class="bgn">87 · 6 مۇتەخەسسىس</a>
            <a href="88.html" data-page="88.html" class="bgn">88 · خىتاي</a>
            <a href="89.html" data-page="89.html" class="bgn">89 · مۇستەقىللىق</a>
            <a href="90.html" data-page="90.html" class="bgn">90 · تەرجىمە</a>
        </div>
    </nav>
    <script>(function(){var p=window.location.pathname.split('/').pop();document.querySelectorAll('#bilik-global-nav a.bgn').forEach(function(a){if(a.getAttribute('data-page')===p)a.classList.add('active');});}());</script>

    <!-- Header -->
    <header class="h-14 border-b border-slate-700 bg-slate-900 flex items-center justify-between px-6 z-50 shadow-2xl flex-none">
        <div class="flex items-center gap-4">
            <div class="bg-sky-500 text-slate-900 w-9 h-9 rounded-lg flex items-center justify-center font-bold text-xl">📰</div>
            <div>
                <h1 class="text-lg font-bold text-white">ماقالە تەرجىمە ۋە خۇلاسە قۇرالى <span class="text-sky-400 text-xs">v1.0</span></h1>
                <p class="text-[9px] text-slate-400 font-mono uppercase tracking-widest">Article Translation · Summary · PDF Export</p>
            </div>
        </div>
        <div id="clock" class="text-xs text-sky-400 font-mono"></div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Control Panel -->
        <aside class="w-[480px] border-l border-slate-700 bg-slate-800/50 flex flex-col z-40 flex-none">

            <div class="p-3 bg-slate-900/50 border-b border-slate-700">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] text-slate-400 font-bold">AI غا بېرىدىغان بۇيرۇق:</span>
                    <button onclick="copyPrompt()" class="bg-sky-600 hover:bg-sky-500 text-white text-[10px] px-3 py-1 rounded-full transition shadow-lg">كۆچۈرۈش 📋</button>
                </div>
                <textarea id="promptArea" readonly class="w-full h-44 bg-slate-900 border border-slate-700 rounded-xl p-2 text-[9px] font-mono text-slate-300 resize-none outline-none leading-relaxed border-dashed" dir="ltr"></textarea>
            </div>

            <div class="p-3 bg-slate-900/80 border-b border-slate-700 flex-1 flex flex-col min-h-0">
                <label class="block text-[10px] font-bold text-emerald-500 mb-1">JSON نەتىجىسىنى چاپلاڭ:</label>
                <textarea id="jsonInput" class="w-full flex-1 bg-slate-950 border border-slate-700 rounded-xl p-2 text-[9px] font-mono text-emerald-400 outline-none focus:border-emerald-500 transition-all resize-none" placeholder='{"article_url":"...","article_original_title":"..."}' dir="ltr"></textarea>
            </div>

            <div class="p-3 bg-slate-900/80 border-t border-slate-700 grid grid-cols-2 gap-2">
                <button onclick="renderReport()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-xl text-sm transition shadow-lg flex items-center justify-center gap-2">⚡ كۆرسەت</button>
                <button onclick="saveHTML()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-xl text-sm transition shadow-lg flex items-center justify-center gap-2">💾 HTML</button>
            </div>
        </aside>

        <!-- Preview -->
        <div class="flex-1 bg-slate-950 overflow-hidden">
            <iframe id="reportPreview" class="w-full h-full border-none bg-white"></iframe>
        </div>
    </main>

    <script>
    const PROMPT = `مەن ساڭا بىر ماقالە بېرىمەن. سەن تۆۋەندىكى بارلىق ئۇچۇرلارنى چوقۇم تولۇق، ئۇزۇن ۋە ئەتراپلىق يېزىپ، پەقەت JSON شەكلىدىلا قايتۇر. ھەرگىز قىسقارتما!

1. article_url: ماقالىنىڭ ئەسلى ئۇلانمىسى
2. article_original_title: ئەسلى ماقالە ئىسمى (ئۆزگەرتمە)
3. article_uyghur_title: ماقالە ئىسمىنىڭ ئۇيغۇرچە تەرجىمىسى
4. publication_name: ماقالىنى ئېلان قىلغان توربەت/گازىتا/ژۇرنال ئىسمى
5. publication_intro: شۇ توربەت/نەشرىيات ھەققىدە 3-4 جۈملىلىك تونۇشتۇرۇش (قاچان قۇرۇلغان، قانداق توربەت، قانچىلىك ئوقۇرمىنى بار ۋ.ب)
6. author_name: ئاپتورنىڭ تولۇق ئىسمى
7. author_bio: ئاپتور ھەققىدە ئەڭ ئاز 200 سۆزلۈك ئۇزۇن تەرجىمىھال — كىمدۇ، قەيەردىن، قانداق تەگلىككە ئىگە، ئىلمىي ئۇنۋانى، قانداق ئورگانلاردا ئىشلىگەن، داڭلىق ئەسەرلىرى، نۇقتىئىنەزىرى، ئالىي ئۈگىنىش تارىخى
8. article_images: ماقالىدىكى بارلىق رەسىملەرنىڭ URL ئۇلانمىسى تىزىملىكى (بوش بولسا [])
9. long_summary: پۈتۈن ماقالىنىڭ ئەڭ ئاز 600 سۆزلۈك ئۇيغۇرچە چوڭقۇر خۇلاسىسى — ماقالىنىڭ ئاساسلىق ئىدىيىسى، دەلىللىرى، خۇلاسىسى ۋە مۇھىملىقى ھەققىدە تەپسىلىي يازغىن
10. full_translation: پۈتۈن ماقالىنىڭ تولۇق تەرجىمىسى (ھەر بىر ئابزاسنى بىر قۇر قىلىپ ئايرىپ، تولۇق ۋە راۋان ئۇيغۇرچە تەرجىمە قىلىپ بەر)

نەتىجىنى پەقەت مۇشۇ JSON قېلىپىدىلا قايتۇر:
{
  "article_url": "...",
  "article_original_title": "...",
  "article_uyghur_title": "...",
  "publication_name": "...",
  "publication_intro": "...",
  "author_name": "...",
  "author_bio": "...",
  "article_images": ["url1", "url2"],
  "long_summary": "...",
  "full_translation": [
    "بىرىنچى ئابزاس تەرجىمىسى تۇلۇق يېزىلىدۇ...",
    "ئىككىنچى ئابزاس..."
  ]
}`;

        document.getElementById('promptArea').value = PROMPT;

        function copyPrompt() {
            navigator.clipboard.writeText(PROMPT);
            alert('پىرومپت كۆچۈرۈلدى! Gemini غا چاپلاڭ.');
        }

        let generatedHTML = '';

        function renderReport() {
            const raw = document.getElementById('jsonInput').value.trim();
            if (!raw) return;
            try {
                const data = JSON.parse(raw.replace(/```json/g,'').replace(/```/g,'').trim());
                generatedHTML = buildHTML(data);
                document.getElementById('reportPreview').srcdoc = generatedHTML;
            } catch(e) { alert('JSON خاتا: ' + e.message); }
        }

        function saveHTML() {
            if (!generatedHTML) { alert('ئالدى كۆرسەتسىڭىز!'); return; }
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([generatedHTML], {type:'text/html;charset=utf-8'}));
            a.download = `BilikTranslation_${Date.now()}.html`;
            a.click();
        }

        function buildHTML(data) {
            const fp = t => t ? t.split(/\\n+/).filter(p=>p.trim()).map(p=>`<p class="para">${p}</p>`).join('') : '';
            const fpArray = arr => (arr && Array.isArray(arr)) ? arr.filter(p=>p.trim()).map(p=>`<p class="para">${p}</p>`).join('') : '';

            const imagesHtml = (data.article_images && data.article_images.length > 0)
                ? `<div class="img-grid">${data.article_images.map(url=>`<div class="img-wrap"><img src="${url}" onerror="this.parentElement.style.display='none'" crossorigin="anonymous"/></div>`).join('')}</div>`
                : '';

            const translationHtml = data.full_translation ? fpArray(data.full_translation) : (data.translation ? '<p>تەرجىمە قۇرۇلمىسى كونىكەن. يېڭىدىن ئەۋەتىڭ.</p>' : '');

            const d = new Date();
            const months = ['يانۋار', 'فېۋرال', 'مارت', 'ئاپرېل', 'ماي', 'ئىيۇن', 'ئىيۇل', 'ئاۋغۇست', 'سېنتەبىر', 'ئۆكتەبىر', 'نويابىر', 'دېكابىر'];
            const fPad = n => n.toString().padStart(2, '0');
            const ugDate = `ياسالغان ۋاقتى: ${d.getFullYear()}-يىلى ${d.getDate()}-${months[d.getMonth()]}، سائەت ${fPad(d.getHours())}:${fPad(d.getMinutes())}`;

            return `<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${data.article_uyghur_title || 'ماقالە تەرجىمىسى'}</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script>
<style>
@font-face{font-family:'UKIJ Ekran';src:local('UKIJ Ekran'),local('UKIJ_Ekran');}
@font-face{font-family:'UKIJ Tuz';src:local('UKIJ Tuz'),local('UKIJ_Tuz');}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'UKIJ Tuz','Noto Naskh Arabic',sans-serif;background:#f0f4f8;color:#1a202c;direction:rtl;padding:20px;padding-bottom:100px;font-size:15px;line-height:2;}
.page{max-width:800px;margin:0 auto;}
.doc-header{background:transparent;padding:20px 0 30px;margin-bottom:20px;border-bottom:2px solid #e2e8f0;text-align:center;}
.main-title{font-family:'UKIJ Tuz',serif;font-size:32px;font-weight:700;line-height:1.4;color:#000;margin-bottom:12px;text-align:center;}
.original-title{font-size:15px;color:#64748b;margin-bottom:20px;direction:ltr;text-align:center;font-style:italic;}
.url-link{display:block;text-align:left;color:#94a3b8;font-size:12px;text-decoration:none;direction:ltr;word-break:break-all;}
.url-link:hover{color:#64748b;}
.section{margin-bottom:32px;}
.section-title{font-family:'UKIJ Tuz',sans-serif;font-size:20px;font-weight:700;color:#0f172a;padding-bottom:8px;margin-bottom:16px;border-bottom:2px solid #0284c7;display:flex;align-items:center;gap:8px;}
.para{text-indent:2.5em;text-align:justify;margin-bottom:14px;line-height:1.8;font-size:16px;color:#000;font-family:'UKIJ Tuz',sans-serif;}
.pub-name{font-weight:700;font-size:16px;color:#0f172a;margin-bottom:10px;font-family:'UKIJ Tuz',sans-serif;}
.img-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:20px;}
.img-wrap{border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;background:#f8fafc;}
.img-wrap img{width:100%;height:auto;object-fit:cover;display:block;}
.doc-footer{text-align:center;padding:30px 20px;color:#64748b;font-size:13px;font-family:'UKIJ Tuz',sans-serif;}
.float-btn{position:fixed;bottom:20px;left:20px;z-index:9999;display:flex;gap:8px;}
.btn{padding:8px 16px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.2);}
.btn-pdf{background:#dc2626;color:#fff;}.btn-pdf:hover{background:#b91c1c;}
.btn-print{background:#0369a1;color:#fff;}.btn-print:hover{background:#075985;}
@media print{.float-btn{display:none!important;}.page{max-width:100%;}body{background:#fff;padding:0;}}
@page{size:A4;margin:18mm 18mm 18mm 18mm;}
</style>
</head>
<body>
<div class="page" id="report-content">

  <div class="doc-header">
    <div class="main-title">${data.article_uyghur_title || 'ماقالە تەرجىمىسى'}</div>
    <div class="original-title">${data.article_original_title || ''}</div>
    ${data.article_url && data.article_url !== '...' ? `<a class="url-link" href="${data.article_url}" target="_blank">🔗 ئەسلى مەنبە ئۇلانمىسى</a>` : ''}
  </div>

  <div class="section">
    <div class="section-title">🌐 نەشرىيات ھەققىدە</div>
    <div class="pub-name">${data.publication_name || ''}</div>
    <div>${fp(data.publication_intro)}</div>
  </div>

  <div class="section">
    <div class="section-title">✍️ ئاپتور تەرجىمىھالى</div>
    <div class="pub-name">${data.author_name || ''}</div>
    <div>${fp(data.author_bio)}</div>
  </div>

  ${imagesHtml ? `<div class="section"><div class="section-title">🖼️ ماقالىدىكى رەسىملەر</div>${imagesHtml}</div>` : ''}

  <div class="section">
    <div class="section-title">📋 ماقالىنىڭ ئۇزۇن خۇلاسىسى</div>
    ${fp(data.long_summary)}
  </div>

  <div class="section">
    <div class="section-title">🔤 ماقالىنىڭ تولۇق تەرجىمىسى</div>
    ${translationHtml}
  </div>

  <div class="doc-footer">
    <img src="https://uycoder.github.io/paydilar/Biliklogo.png" alt="Bilik Logo" style="width:60px;height:60px;object-fit:contain;margin:0 auto 12px;display:block;" crossorigin="anonymous" onerror="this.style.display='none'">
    <div style="font-weight:700;font-size:16px;color:#1e293b;margin-bottom:6px;">بىلىك تەتقىقات مەركىزى</div>
    <div style="color:#64748b;">${ugDate}</div>
  </div>
</div>

<div class="float-btn" data-html2canvas-ignore="true">
  <button class="btn btn-pdf" onclick="savePDF()">📄 PDF ساقلاش</button>
  <button class="btn btn-print" onclick="window.print()">🖨️ بېسىش</button>
</div>

<script>
function savePDF(){
  const el=document.getElementById('report-content');
  const d=new Date();
  const f=n=>n.toString().padStart(2,'0');
  const fname=\`BilikTranslation_\${d.getFullYear()}-\${f(d.getMonth()+1)}-\${f(d.getDate())}_\${f(d.getHours())}-\${f(d.getMinutes())}.pdf\`;
  const opt={
    margin:[15,15,15,15],
    filename:fname,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,allowTaint:true},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  };
  document.querySelector('.float-btn').style.display='none';
  html2pdf().set(opt).from(el).save().then(()=>{
    document.querySelector('.float-btn').style.display='flex';
  });
}
<\/script>
</body>
</html>`;
        }

        // Update nav for 90.html in all files — just update prompt area
        document.getElementById('promptArea').value = PROMPT;

        // Clock
        setInterval(()=>{
            const d=new Date();
            document.getElementById('clock').innerText=d.toLocaleDateString('ug-CN')+' '+d.toLocaleTimeString('ug-CN');
        },1000);
    </script>
</body>
</html>
