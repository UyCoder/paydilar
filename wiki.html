<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UyCoder بىلىم ئامبىرى</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --surface: #ffffff;
            --text-main: #334155;
            --text-light: #64748b;
            --primary: #0284c7;
            --primary-light: #e0f2fe;
            --border: #e2e8f0;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        body {
            margin: 0; padding: 0;
            font-family: 'UKIJ Tuz','UKIJ Tuz Tom','ALKATIP Tor','Microsoft Uighur',sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 320px;
            background-color: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 15px rgba(0,0,0,0.03);
            z-index: 10;
        }
        .sidebar-header {
            padding: 20px 15px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .sidebar-logo { max-height: 55px; width: auto; object-fit: contain; }

        .article-list {
            list-style: none;
            padding: 10px;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }
        .article-list li {
            padding: 14px 18px;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--text-main);
        }
        .article-list li:hover { background-color: #f8fafc; transform: translateX(-3px); }
        .article-list li.active {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: bold;
            border-right: 4px solid var(--primary);
            border-radius: 8px 0 0 8px;
        }

        /* Pagination controls */
        .pagination-bar {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: #f8fafc;
        }
        .pagination-bar button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 7px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s, transform 0.15s;
            font-family: inherit;
        }
        .pagination-bar button:hover:not(:disabled) { transform: scale(1.1); }
        .pagination-bar button:disabled { opacity: 0.3; cursor: default; }
        .pagination-bar .page-info {
            font-size: 0.95rem;
            color: var(--text-light);
            font-weight: bold;
            min-width: 55px;
            text-align: center;
        }

        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            background-color: var(--bg-color);
            padding: 40px 20px;
            scroll-behavior: smooth;
        }
        .markdown-body {
            background-color: var(--surface);
            padding: 60px 70px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            max-width: 850px;
            margin: 0 auto;
            min-height: calc(100% - 120px);
            line-height: 1.7;
            font-size: 1.25rem;
            text-align: justify;
        }
        .markdown-body h1 { color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-top: 0; font-size: 2.2rem; }
        .markdown-body h2 { color: #1e293b; margin-top: 40px; font-size: 1.7rem; }
        .markdown-body h3 { color: #334155; font-size: 1.4rem; }
        .markdown-body p { margin-bottom: 20px; color: #475569; text-indent: 1.5em; }
        .markdown-body a { color: var(--primary); text-decoration: none; font-weight: bold; }
        .markdown-body a:hover { text-decoration: underline; color: #0369a1; }
        .markdown-body img { max-width: 100%; height: auto; border-radius: 8px; margin: 30px auto; display: block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .markdown-body blockquote { border-right: 5px solid var(--primary); margin: 30px 0; padding: 15px 25px; background-color: #f8fafc; color: var(--text-light); border-radius: 8px; font-style: italic; }
        .markdown-body pre { background-color: #1e293b; color: #e2e8f0; padding: 20px; border-radius: 10px; overflow-x: auto; direction: ltr; text-align: left; font-family: 'Courier New',Courier,monospace; }
        .markdown-body code { background-color: #f1f5f9; color: #be185d; padding: 3px 6px; border-radius: 4px; font-family: 'Courier New',Courier,monospace; font-size: 1rem; }

        .navbar { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .navbar a { text-decoration: none; color: var(--text-main); font-size: 1.15rem; font-weight: bold; padding: 10px 25px; border-radius: 8px; background-color: var(--surface); box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.3s; }
        .navbar a.active { background-color: var(--primary); color: white; box-shadow: 0 4px 15px rgba(2,132,199,0.3); }
        .navbar a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }

        .loader { text-align: center; font-size: 1.4rem; color: var(--text-light); margin-top: 100px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

        .menu-btn { display: none; }
        .overlay { display: none; }

        @media (max-width: 768px) {
            body { flex-direction: row; }
            .sidebar { position: fixed; top: 0; left: 0; width: 280px; height: 100vh; transform: translateX(-100%); transition: transform 0.3s ease; z-index: 1000; border-left: none; border-right: 1px solid var(--border); box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
            .sidebar.open { transform: translateX(0); }
            .main-content { padding: 15px; height: 100vh; width: 100%; }
            .navbar { margin-top: 50px; gap: 8px; }
            .navbar a { padding: 8px 12px; font-size: 0.95rem; text-align: center; flex: 1; }
            .markdown-body { padding: 25px; font-size: 1.15rem; margin: 0 auto; border-radius: 12px; }
            .menu-btn { display: block; position: absolute; top: 15px; right: 20px; background-color: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; z-index: 900; font-family: inherit; }
            .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; opacity: 0; transition: opacity 0.3s ease; }
            .overlay.open { display: block; opacity: 1; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="https://raw.githubusercontent.com/UyCoder/paydilar/master/Biliklogo.png" alt="Bilik Logo" class="sidebar-logo">
        ۋىكى مۇندەرىجىسى
    </div>
    <ul class="article-list" id="articleList">
        <li class="loader" style="margin-top:50px;">يۈكلىنىۋاتىدۇ...</li>
    </ul>
    <div class="pagination-bar" id="paginationBar">
        <button id="prevBtn" onclick="prevPage()" disabled>◀</button>
        <span class="page-info" id="pageInfo">1 / 1</span>
        <button id="nextBtn" onclick="nextPage()">▶</button>
    </div>
</div>

<div class="main-content" id="mainContentScroll">
    <button id="menuBtn" class="menu-btn">☰ مۇندەرىجە</button>
    <div class="navbar">
        <a href="wiki.html" class="nav-link active">ۋىكى ئامبىرى</a>
        <a href="relations.html" class="nav-link">خىتاي مۇناسىۋىتى</a>
        <a href="countries.html" class="nav-link">دۆلەتلەر</a>
    </div>
    <div class="markdown-body" id="contentArea">
        <div class="loader">سول تەرەپتىن بىر ماقالە تاللاڭ...</div>
    </div>
</div>

<script>
    const GITHUB_API_URL = "https://api.github.com/repos/UyCoder/2ndBrain/contents/wiki";
    const RAW_BASE_URL   = "https://raw.githubusercontent.com/UyCoder/2ndBrain/master/wiki/";
    const PAGE_SIZE = 20;

    let allFiles    = [];
    let currentPage = 0;

    const articleListEl     = document.getElementById('articleList');
    const contentAreaEl     = document.getElementById('contentArea');
    const mainContentScroll = document.getElementById('mainContentScroll');
    const sidebar           = document.getElementById('sidebar');
    const overlay           = document.getElementById('overlay');
    const menuBtn           = document.getElementById('menuBtn');
    const paginationBar     = document.getElementById('paginationBar');
    const prevBtn           = document.getElementById('prevBtn');
    const nextBtn           = document.getElementById('nextBtn');
    const pageInfo          = document.getElementById('pageInfo');

    // Sidebar toggle
    function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    if (menuBtn) menuBtn.addEventListener('click', toggleSidebar);
    if (overlay) overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

    // Swipe
    let touchStartX = 0, touchEndX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive:true});
    document.addEventListener('touchend',   e => { touchEndX   = e.changedTouches[0].screenX; handleSwipe(); }, {passive:true});
    function handleSwipe() {
        if (touchEndX - touchStartX > 50 && touchStartX < 50) { sidebar.classList.add('open'); overlay.classList.add('open'); }
        if (touchStartX - touchEndX > 50) { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
    }

    // Fetch file list
    async function fetchFileList() {
        try {
            const res = await fetch(GITHUB_API_URL);
            if (res.status === 403) {
                articleListEl.innerHTML = `<li style="color:#f59e0b;padding:20px;text-align:center;">GitHub API تىزمىسى چەكتىن ئاشتى. بىر ئازدىن كېيىن سىنىپ بېقىڭ.</li>`;
                return;
            }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!Array.isArray(data)) throw new Error("ئۇچۇر ئاندىزىسى خاتا");
            allFiles = data.filter(f => f.name.endsWith('.md'));
            renderPage(0);
            if (allFiles.length > 0) loadArticle(allFiles[0].name, null);
        } catch (err) {
            articleListEl.innerHTML = `<li style="color:#ef4444;padding:20px;text-align:center;">خاتالىق: ${err.message}</li>`;
            console.error(err);
        }
    }

    function cleanName(raw) {
        let n = decodeURIComponent(raw.replace('.md',''))
            .replace(/بىرىكمە/g,'').replace(/چۈشەنچە/g,'').replace(/ئورۇن/g,'')
            .replace(/-/g,' ').replace(/\s+/g,' ').trim();
        return n || decodeURIComponent(raw.replace('.md',''));
    }

    function renderPage(page) {
        currentPage = page;
        const total = Math.ceil(allFiles.length / PAGE_SIZE);
        const start = page * PAGE_SIZE;
        const slice = allFiles.slice(start, start + PAGE_SIZE);

        articleListEl.innerHTML = "";
        slice.forEach((file, idx) => {
            const li = document.createElement('li');
            li.textContent = cleanName(file.name);
            li.onclick = e => loadArticle(file.name, e.currentTarget);
            articleListEl.appendChild(li);
        });

        // Pagination UI
        if (total > 1) {
            paginationBar.style.display = 'flex';
            pageInfo.textContent = `${page + 1} / ${total}`;
            prevBtn.disabled = page === 0;
            nextBtn.disabled = page >= total - 1;
        } else {
            paginationBar.style.display = 'none';
        }
    }

    function prevPage() { if (currentPage > 0) renderPage(currentPage - 1); }
    function nextPage() {
        const total = Math.ceil(allFiles.length / PAGE_SIZE);
        if (currentPage < total - 1) renderPage(currentPage + 1);
    }

    async function loadArticle(fileName, clickedElement) {
        if (clickedElement) {
            document.querySelectorAll('.article-list li').forEach(el => el.classList.remove('active'));
            clickedElement.classList.add('active');
        }
        if (window.innerWidth <= 768 && sidebar) { sidebar.classList.remove('open'); if (overlay) overlay.classList.remove('open'); }
        contentAreaEl.innerHTML = `<div class="loader">ئۇچۇرلار ئېلىنىۋاتىدۇ...</div>`;
        mainContentScroll.scrollTop = 0;
        try {
            const res = await fetch(RAW_BASE_URL + encodeURIComponent(fileName));
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            let md = await res.text();
            md = md.replace(/^---[\s\S]*?---\n*/, '').replace(/^title:[\s\S]*?tags:[\s\S]*?\n\n/, '');
            contentAreaEl.innerHTML = marked.parse(md);
        } catch (err) {
            contentAreaEl.innerHTML = `<h3 style="color:#ef4444;text-align:center;margin-top:50px;">يۈكلەش مەغلۇپ بولدى: ${err.message}</h3>`;
            console.error(err);
        }
    }

    fetchFileList();
</script>
</body>
</html>
