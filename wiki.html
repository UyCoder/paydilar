<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UyCoder بىلىم ئامبىرى</title>
    <!-- Markdown نى HTML گە ئايلاندۇرغۇچ قورال -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- PDF چىقىرىش قورالى -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* ئاساسىي رەڭلەر ۋە تەڭشەكلەر */
        :root {
            --bg-color: #f1f5f9; 
            --surface: #ffffff;
            --text-main: #334155;
            --text-light: #64748b;
            --primary: #0284c7;
            --primary-light: #e0f2fe;
            --border: #e2e8f0;
        }

        /* گۈزەللەشتۈرۈلگەن سىيرىغۇچ (Scrollbar) */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'UKIJ Tuz', 'UKIJ Tuz Tom', 'ALKATIP Tor', 'Microsoft Uighur', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* سول تەرەپ تىزىملىك رايونى */
        .sidebar {
            width: 320px;
            background-color: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 15px rgba(0,0,0,0.03);
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 25px 20px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 2;
        }

        .article-list {
            list-style: none;
            padding: 10px;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .article-list li {
            padding: 14px 18px;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--text-main);
        }

        .article-list li:hover {
            background-color: #f8fafc;
            transform: translateX(-3px); 
        }

        .article-list li.active {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: bold;
            border-right: 4px solid var(--primary);
            border-radius: 8px 0 0 8px;
        }

        /* ئوڭ تەرەپ ئاساسىي رايون */
        .main-content {
            flex-grow: 1;
            overflow-y: auto; 
            background-color: var(--bg-color);
            padding: 40px 20px;
            scroll-behavior: smooth;
        }

        /* ئاق قەغەز (ماقالە ئوقۇش گەۋدىسى) */
        .markdown-body {
            background-color: var(--surface);
            padding: 60px 70px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
            max-width: 850px;
            margin: 0 auto; 
            min-height: calc(100% - 120px); 
            line-height: 2.2;
            font-size: 1.25rem;
            text-align: justify;
        }

        /* Markdown زىننەتلىرى */
        .markdown-body h1 { 
            color: var(--primary); 
            border-bottom: 2px solid var(--border); 
            padding-bottom: 15px; 
            margin-top: 0;
            font-size: 2.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        .markdown-body h2 { color: #1e293b; margin-top: 40px; font-size: 1.7rem;}
        .markdown-body h3 { color: #334155; font-size: 1.4rem;}
        .markdown-body p { margin-bottom: 20px; color: #475569;}
        .markdown-body a { color: var(--primary); text-decoration: none; font-weight: bold;}
        .markdown-body a:hover { text-decoration: underline; color: #0369a1;}
        .markdown-body img { max-width: 100%; height: auto; border-radius: 8px; margin: 30px auto; display: block; box-shadow: 0 4px 15px rgba(0,0,0,0.1);}
        
        .markdown-body blockquote {
            border-right: 5px solid var(--primary);
            margin: 30px 0;
            padding: 15px 25px;
            background-color: #f8fafc;
            color: var(--text-light);
            border-radius: 8px;
            font-style: italic;
        }

        .markdown-body pre {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            direction: ltr; 
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .markdown-body code {
            background-color: #f1f5f9;
            color: #be185d;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
        }

        .loader {
            text-align: center;
            font-size: 1.4rem;
            color: var(--text-light);
            margin-top: 100px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* TTS Controls Styling */
        .fixed-controls { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; align-items: flex-end; gap: 10px; }
        .toggle-btn { background: #1e293b; color: white; width: 45px; height: 45px; border-radius: 50%; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: background 0.2s; }
        .toggle-btn:hover { background: #334155; }
        .control-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); padding: 12px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 280px; display: flex; flex-direction: column; gap: 10px; }
        .control-panel.hidden { display: none; }
        .control-row { display: flex; gap: 8px; }
        .control-select { background: #334155; color: white; border: none; border-radius: 8px; padding: 8px; flex: 1; font-size: 14px; outline: none; appearance: none; cursor: pointer; }
        .control-select-small { background: #334155; color: white; border: none; border-radius: 8px; padding: 8px; width: 70px; font-size: 14px; text-align: center; outline: none; cursor: pointer; }
        .control-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .btn-ctrl { background: #475569; color: white; border: none; border-radius: 8px; padding: 10px 5px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .btn-ctrl:hover { opacity: 0.8; }
        .btn-primary-ctrl { background: #0ea5e9; }
        .btn-indigo-ctrl { background: #6366f1; }
        .btn-danger-ctrl { background: #ef4444; }
        .btn-pink-ctrl { background: #ec4899; }

        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1001;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 9;
        }

        /* يانفونلار ئۈچۈن ماسلىشىشچانلىق */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                position: fixed;
                top: 0; bottom: 0; right: 0;
                width: 280px; 
                transform: translateX(100%);
                box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            }
            .sidebar.active { transform: translateX(0); }
            .overlay.active { display: block; }
            .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
            .main-content { padding: 80px 15px 40px; height: 100vh; }
            .markdown-body { padding: 30px 20px; font-size: 1.15rem; border-radius: 12px;}
            .fixed-controls { bottom: 20px; left: 20px; }
        }
    </style>
</head>
<body>

    <button id="sidebarToggle" class="sidebar-toggle">☰</button>
    <div id="overlay" class="overlay"></div>

    <!-- تىزىملىك رايونى -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            ۋىكى مۇندەرىجىسى
        </div>
        <ul class="article-list" id="articleList">
            <li class="loader" style="margin-top: 50px;">يۈكلىنىۋاتىدۇ...</li>
        </ul>
    </div>

    <!-- ئاساسىي كۆرسىتىش رايونى -->
    <div class="main-content" id="mainContentScroll">
        <div id="report-content">
            <div class="markdown-body" id="contentArea">
                <div class="loader">سول تەرەپتىن بىر ماقالە تاللاڭ...</div>
            </div>
        </div>
    </div>

    <!-- Compact Floating Controls (TTS) -->
    <div id="controlsContainer" class="fixed-controls">
        <button onclick="toggleControls()" id="toggleBtn" class="toggle-btn">⚙️</button>
        <div id="controlPanelMain" class="control-panel hidden">
            <div class="control-row">
                <select id="voiceSelect" class="control-select">
                    <option value="ug-UG0">ئۇيغۇرچە (ئەر)</option>
                    <option value="ug-UG">ئۇيغۇرچە (ئايال)</option>
                    <option value="ar-SA">العربية (ئەرەبچە)</option>
                    <option value="en-US">English (ئېنگلىزچە)</option>
                </select>
                <select id="rateSelect" class="control-select-small">
                    <option value="1.0">1.0x</option>
                    <option value="1.5" selected>1.5x</option>
                    <option value="2.0">2.0x</option>
                </select>
            </div>
            <div class="control-grid">
                <button onclick="prevChunk()" class="btn-ctrl" title="ئالدىنقى">⏮</button>
                <button onclick="startReading()" class="btn-ctrl btn-primary-ctrl" title="ئوقۇش">▶</button>
                <button onclick="nextChunk()" class="btn-ctrl btn-indigo-ctrl" title="كېيىنكى">⏭</button>
                <button onclick="stopReading()" class="btn-ctrl btn-danger-ctrl" title="توختا">■</button>
                <button onclick="savePDF()" class="btn-ctrl btn-pink-ctrl" title="PDF">📄</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_API_URL = "https://api.github.com/repos/UyCoder/2ndBrain/contents/wiki";
        const RAW_BASE_URL = "https://raw.githubusercontent.com/UyCoder/2ndBrain/master/wiki/";

        const articleListEl = document.getElementById('articleList');
        const contentAreaEl = document.getElementById('contentArea');
        const mainContentScroll = document.getElementById('mainContentScroll');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const sidebarToggle = document.getElementById('sidebarToggle');

        // Mobile Sidebar Logic
        sidebarToggle.onclick = () => {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        };
        overlay.onclick = () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        };

        async function fetchFileList() {
            try {
                const response = await fetch(GITHUB_API_URL);
                if (!response.ok) throw new Error("API error");
                const files = await response.json();
                const mdFiles = files.filter(file => file.name.endsWith('.md'));
                renderList(mdFiles);
                if(mdFiles.length > 0) loadArticle(mdFiles[0].name, null);
            } catch (error) {
                articleListEl.innerHTML = `<li style="color:#ef4444; padding:20px; text-align:center;">تورغا ئۇلىنىش مەغلۇپ بولدى.</li>`;
            }
        }

        function renderList(files) {
            articleListEl.innerHTML = ""; 
            files.forEach((file, index) => {
                let cleanName = decodeURIComponent(file.name.replace('.md', '')).replace(/-/g, ' ').trim();
                const li = document.createElement('li');
                li.textContent = cleanName;
                if(index === 0) li.classList.add('active');
                li.onclick = () => {
                    loadArticle(file.name, li);
                    if(window.innerWidth <= 768) {
                        sidebar.classList.remove('active');
                        overlay.classList.remove('active');
                    }
                };
                articleListEl.appendChild(li);
            });
        }

        async function loadArticle(fileName, clickedElement) {
            if(clickedElement) {
                document.querySelectorAll('.article-list li').forEach(el => el.classList.remove('active'));
                clickedElement.classList.add('active');
            }
            contentAreaEl.innerHTML = `<div class="loader">ئۇچۇرلار ئېلىنىۋاتىدۇ...</div>`;
            mainContentScroll.scrollTop = 0; 
            try {
                const response = await fetch(RAW_BASE_URL + encodeURIComponent(fileName));
                let markdownText = await response.text();
                markdownText = markdownText.replace(/^---[\s\S]*?---\n*/, '');
                contentAreaEl.innerHTML = marked.parse(markdownText);
            } catch (error) {
                contentAreaEl.innerHTML = `<h3 style="color:#ef4444; text-align:center;">ماقالىنى يۈكلەشتە خاتالىق كۆرۈلدى.</h3>`;
            }
        }

        fetchFileList();

        // ─── TTS Mapping & Logic ───
        const UY_TO_ULY_MAP = {'ا':'a','ە':'e','ب':'b','پ':'p','ت':'t','ج':'j','چ':'ch','خ':'x','د':'d','ر':'r','ز':'z','ژ':'zh','س':'s','ش':'sh','غ':'gh','ف':'f','ق':'q','ك':'k','گ':'g','ڭ':'ng','ل':'l','م':'m','ن':'n','ھ':'h','و':'o','ۇ':'u','ۆ':'o','ۈ':'u','ي':'y','ۋ':'v','ې':'e','ى':'i','ئ':'','؟':'?'};
        const UY_TO_ULY_MAPT = {'ا':'a','ە':'e','ب':'b','پ':'p','ت':'t','ج':'c','چ':'ç','خ':'hh','د':'d','ر':'r','ز':'z','ژ':'j','س':'s','ش':'ş','غ':'gh','f':'f','ق':'k','ك':'k','گ':'g','ڭ':'n','ل':'l','م':'m','ن':'n','ھ':'h','و':'o','ۇ':'u','ۆ':'ö','ۈ':'ü','ي':'y','ۋ':'v','ې':'e','ى':'i','ئ':'','؟':'?'};

        function convertForTTS(text, map) { return text.split('').map(c => map[c] || c).join(''); }
        let chunks = [];
        let chunkIndex = 0;
        let isReading = false;

        function toggleControls() {
            const panel = document.getElementById('controlPanelMain');
            const btn = document.getElementById('toggleBtn');
            panel.classList.toggle('hidden');
            btn.innerHTML = panel.classList.contains('hidden') ? '⚙️' : '▼';
        }

        function startReading() {
            stopReading();
            isReading = true;
            const voiceVal = document.getElementById('voiceSelect').value;
            const reportEl = document.getElementById('contentArea');
            let clone = reportEl.cloneNode(true);
            const noTts = clone.querySelectorAll('script, style, button, .loader');
            noTts.forEach(el => el.remove());
            let fullText = clone.innerText;
            let rawChunks = fullText.split(/\n+/);
            chunks = [];
            let lastChunk = "";
            for (let i = 0; i < rawChunks.length; i++) {
                let clean = rawChunks[i].trim();
                if (clean.length > 0 && clean !== lastChunk) { chunks.push(clean); lastChunk = clean; }
            }
            if (chunks.length === 0) { alert('ئوقۇيدىغان تېكىست تېپىلمىدى.'); isReading = false; return; }
            chunkIndex = 0;
            speakNextChunk();
        }

        function speakNextChunk() {
            if (!isReading || chunkIndex >= chunks.length) { isReading = false; return; }
            const voiceVal = document.getElementById('voiceSelect').value;
            const rateVal = parseFloat(document.getElementById('rateSelect').value);
            let chunkText = chunks[chunkIndex];
            let finalText = (voiceVal === 'ug-UG0') ? convertForTTS(chunkText, UY_TO_ULY_MAPT) : (voiceVal === 'ug-UG') ? convertForTTS(chunkText, UY_TO_ULY_MAP) : chunkText;
            const utterance = new SpeechSynthesisUtterance(finalText);
            const voices = window.speechSynthesis.getVoices();
            let chosenVoice = null;
            if(voiceVal === 'ug-UG0') chosenVoice = voices.find(v => v.lang === 'tr-TR');
            else if (voiceVal === 'ug-UG') chosenVoice = voices.find(v => v.lang === 'uz-UZ' && v.name.includes('Madina')) || voices.find(v => v.lang.includes('tr'));
            else chosenVoice = voices.find(v => v.lang === voiceVal);
            if(chosenVoice) utterance.voice = chosenVoice;
            utterance.rate = rateVal;
            utterance.onend = () => { if(isReading) { chunkIndex++; speakNextChunk(); } };
            utterance.onerror = () => { if(isReading) { chunkIndex++; speakNextChunk(); } };
            window.speechSynthesis.speak(utterance);
        }

        function nextChunk() { if(isReading && chunks.length) window.speechSynthesis.cancel(); }
        function prevChunk() { if(isReading && chunks.length && chunkIndex > 0) { chunkIndex -= 2; if(chunkIndex < -1) chunkIndex = -1; window.speechSynthesis.cancel(); } }
        function stopReading() { isReading = false; window.speechSynthesis.cancel(); }

        function savePDF() {
            const el = document.getElementById('contentArea');
            const d = new Date();
            const fname = `Wiki_Article_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}.pdf`;
            const opt = { margin: 15, filename: fname, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
            html2pdf().set(opt).from(el).save();
        }
    </script>
</body>
</html>
