<!DOCTYPE html>
<html lang="ug" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بىلىك تەتقىقات مەركىزى - ئانالىز قۇرالى</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&family=Noto+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"ALKATIP Basma"', '"UKIJ Nasq"', '"Noto Sans Arabic"', 'sans-serif'],
                        serif: ['"ALKATIP Tor"', '"UKIJ Tuz"', '"Noto Naskh Arabic"', 'serif'],
                    },
                    colors: {
                        bilik: { primary: '#0ea5e9', accent: '#2563eb', dark: '#1e293b', light: '#e0f2fe' }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'ALKATIP Basma', 'UKIJ Nasq', 'Noto Sans Arabic', sans-serif; 
            /* Yoruq mesh gradient arka ko'rinishi (98.html style) */
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 40% 20%, #e2e8f0 0px, transparent 50%),
                radial-gradient(at 80% 0%, #bfdbfe 0px, transparent 50%),
                radial-gradient(at 0% 50%, #dbeafe 0px, transparent 50%),
                radial-gradient(at 80% 50%, #e0e7ff 0px, transparent 50%),
                radial-gradient(at 0% 100%, #eff6ff 0px, transparent 50%),
                radial-gradient(at 80% 100%, #ccfbf1 0px, transparent 50%),
                radial-gradient(at 0% 0%, #f1f5f9 0px, transparent 50%) !important;
            background-attachment: fixed !important;
            color: #1e293b;
        }
        
        /* Glass Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.7) !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06) !important;
        }

        .header-glass {
            background: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.7) !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05) !important;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }

        .timeline-line::before { content: ''; position: absolute; top: 0; bottom: 0; right: 23px; width: 3px; background: rgba(14, 165, 233, 0.3); z-index: 0; }
        @media print { 
            .no-print { display: none !important; } 
            .page-break { page-break-inside: avoid; } 
            body { background: white !important; } 
            .glass-panel { background: white !important; border: none !important; box-shadow: none !important; } 
        }
        .editor-only { display: block; }
        
        .control-scroll {
            -webkit-overflow-scrolling: touch;
        }
        .control-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen pb-24">

    <header class="header-glass sticky top-0 z-40">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white/50 p-2 rounded-lg backdrop-blur-sm border border-white/80 shadow-sm"><span class="text-2xl">🏛️</span></div>
                <div><h1 class="text-xl font-bold tracking-wide font-serif bg-gradient-to-r from-sky-600 to-blue-700 bg-clip-text text-transparent">بىلىك تەتقىقات مەركىزى</h1></div>
            </div>
            <div class="text-left text-xs md:text-sm font-bold text-slate-500 bg-white/60 px-3 py-1.5 rounded-lg border border-white/60" id="headerDateTime"></div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-2 md:px-4 py-8 flex gap-8 relative">
        
        <!-- Desktop TOC -->
        <aside class="hidden lg:block w-1/4 sticky top-28 h-[calc(100vh-9rem)] overflow-y-auto glass-panel p-5 rounded-2xl no-print">
            <h3 class="text-lg font-bold text-bilik-accent mb-4 border-b-2 border-white/60 pb-3">📑 مۇندەرىجە</h3>
            <ul class="space-y-2 text-sm font-bold" id="tocList"></ul>
        </aside>

        <!-- MOBILE TOC BUTTON & DRAWER (Matched Premium Style) -->
        <div class="lg:hidden no-print">
            <button onclick="toggleMobileTOC()" class="fixed right-4 bottom-24 z-40 bg-gradient-to-r from-blue-600 to-sky-500 text-white p-4 rounded-full shadow-[0_4px_20px_rgba(14,165,233,0.5)] hover:scale-105 transition flex items-center justify-center text-xl">
                📑
            </button>
            
            <div id="mobileTOC" class="fixed inset-0 z-[60] hidden">
                <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="toggleMobileTOC()"></div>
                <div class="absolute right-0 top-0 bottom-0 w-4/5 max-w-sm glass-panel !rounded-none !rounded-l-2xl shadow-2xl p-5 overflow-y-auto transition-transform duration-300 transform translate-x-full" id="mobileTOCContent">
                    <div class="flex justify-between items-center mb-6 border-b-2 border-white/60 pb-3">
                        <h3 class="font-bold text-lg text-bilik-primary">ۋەقەلەر مۇندەرىجىسى</h3>
                        <button onclick="toggleMobileTOC()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 w-8 h-8 rounded-full flex justify-center items-center font-bold">✕</button>
                    </div>
                    <ul class="space-y-3 font-bold" id="mobileTocList"></ul>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-3/4 flex flex-col gap-8">
            
            <!-- EDITOR SECTION -->
            <section id="editorSection" class="editor-only glass-panel p-6 rounded-2xl no-print relative" data-html2canvas-ignore="true">
                <div class="absolute -top-1 left-0 w-full h-1.5 bg-gradient-to-r from-bilik-primary to-bilik-accent rounded-t-2xl"></div>
                <div class="flex flex-col md:flex-row justify-between items-center mt-2 mb-6 border-b-2 border-white/60 pb-4 gap-4">
                    <h2 class="text-xl font-bold text-slate-800">✍️ مەزمۇن تەھرىرلەش</h2>
                    
                    <!-- 1. JSON BUTTONS -->
                    <div class="flex gap-3 flex-wrap justify-center">
                        <button onclick="importJSON()" class="text-sm bg-white/70 hover:bg-white text-slate-700 border border-slate-300 px-4 py-2 rounded-full flex items-center gap-1 shadow-sm transition font-bold">
                            📥 JSON ئەكىرىش
                        </button>
                        <button onclick="exportJSON()" class="text-sm bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white px-4 py-2 rounded-full flex items-center gap-1 shadow-md transition font-bold">
                            💾 JSON ساقلاش
                        </button>
                        <button onclick="saveFinalHTML()" class="text-sm bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white px-5 py-2 rounded-full font-bold shadow-md transition flex items-center gap-1">
                            🌐 بەتنى ساقلاش (Publish)
                        </button>
                    </div>
                </div>

                <!-- Input Fields -->
                <div class="bg-white/50 backdrop-blur-sm p-5 rounded-xl border border-white/80 mb-6 shadow-sm">
                    <label class="block text-sm font-bold text-bilik-accent mb-2">دوكلات تېمىسى (ئەڭ ئۈستىدىكى چوڭ تېما)</label>
                    <input type="text" id="reportMainTitleInput" class="w-full bg-white/80 border border-slate-200 p-3 rounded-lg focus:ring-2 focus:ring-bilik-primary focus:border-transparent text-xl font-bold text-slate-800 shadow-inner transition" oninput="updateReportHeader()">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-1">ۋەقە ۋاقتى</label>
                        <input type="date" id="inputDate" class="w-full bg-white/80 border border-slate-200 p-2.5 rounded-lg focus:ring-2 focus:ring-bilik-primary shadow-inner">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-1">ۋەقە تېمىسى</label>
                        <input type="text" id="inputTitle" class="w-full bg-white/80 border border-slate-200 p-2.5 rounded-lg focus:ring-2 focus:ring-bilik-primary shadow-inner">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold text-slate-600 mb-1">مەنبە (Source)</label>
                    <input type="url" id="inputSource" class="w-full bg-white/80 border border-slate-200 p-2.5 rounded-lg focus:ring-2 focus:ring-bilik-primary shadow-inner dir-ltr">
                </div>

                <div id="contentBlocksArea" class="space-y-4 mb-6 p-5 bg-white/40 rounded-xl border-2 border-dashed border-slate-300"></div>
                
                <div class="flex flex-wrap gap-3 mb-8">
                    <button onclick="addTextBlock('normal')" class="bg-white hover:bg-slate-50 border border-slate-200 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm transition">📝 تېكىست</button>
                    <button onclick="addTextBlock('ltr')" class="bg-orange-50 hover:bg-orange-100 border border-orange-200 text-orange-800 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm transition">E English</button>
                    <button onclick="addImageBlock()" class="bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-800 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm transition">🖼️ رەسىم</button>
                    <button onclick="addVideoBlock()" class="bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-800 px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm transition">▶️ YouTube</button>
                </div>
                <button onclick="submitEvent()" class="w-full bg-gradient-to-r from-bilik-dark to-bilik-primary text-white font-bold py-3.5 rounded-xl hover:shadow-lg transition transform hover:-translate-y-0.5 text-lg">تىزىمغا قوشۇش</button>
                <input type="file" id="jsonFileInput" class="hidden" accept=".json" onchange="loadJSONFile(this)">
            </section>

            <!-- REPORT VIEW -->
            <section id="report-content" class="relative pl-0 md:pl-2">
                <div class="mb-10 text-center border-b-2 border-slate-200 pb-8 page-break">
                    <h1 id="reportMainTitleDisplay" class="text-3xl md:text-4xl font-bold text-slate-800 font-serif mb-3">ۋەقەلەر خاتىرىسى</h1>
                    <p class="text-sm text-slate-500 flex justify-center items-center gap-2"><span>🕒 يېڭىلانغان ۋاقىت:</span><span id="lastUpdatedTime" class="font-bold text-slate-600 dir-ltr text-sm md:text-base"></span></p>
                </div>
                <div class="timeline-line relative space-y-14" id="timelineContainer"></div>
                <div class="mt-20 pt-8 border-t border-slate-300 text-center pb-10">
                    <p class="text-bilik-primary font-bold text-lg mb-1">بىلىك تەتقىقات مەركىزى</p>
                    <p class="text-slate-500 text-sm">Bilik Research Center © <span id="footerYear"></span></p>
                </div>
            </section>
        </div>
    </main>

    <!-- Controls (Pill matched to 98.html) -->
    <div id="controlsContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center bg-white/85 backdrop-blur-xl border border-white/80 p-1.5 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.15)] transition-all duration-300" data-html2canvas-ignore="true">
        
        <button onclick="toggleControls()" id="toggleBtn" title="ئوقۇش بالدىقىنى ئېچىش/يېپىش" class="bg-gradient-to-br from-blue-600 to-sky-500 text-white w-[50px] h-[50px] rounded-full shadow-lg flex items-center justify-center text-2xl hover:scale-105 transition flex-shrink-0 z-10 m-0">🎧</button>

        <div id="controlPanelMain" class="control-scroll flex items-center gap-2 overflow-x-auto overflow-y-hidden transition-all duration-500 max-w-0 opacity-0 px-0 pointer-events-none">
            
            <div class="flex items-center gap-2 whitespace-nowrap pl-2">
                <select id="voiceSelect" class="bg-slate-50 text-slate-800 border border-slate-300 rounded-full pl-8 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 font-bold hover:border-sky-400 cursor-pointer transition">
                    <option value="ug-UG0">ئۇيغۇرچە (ئەر)</option>
                    <option value="ug-UG">ئۇيغۇرچە (ئايال)</option>
                    <option value="ar-SA">العربية</option>
                    <option value="en-US">English</option>
                    <option value="tr-TR">تۈركچە</option>
                    <option value="zh-CN">خىتايچە</option>
                </select>

                <select id="rateSelect" class="bg-slate-50 text-slate-800 border border-slate-300 rounded-full px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 font-bold hover:border-sky-400 cursor-pointer transition text-center">
                    <option value="1.0">1.0x نورمال</option>
                    <option value="1.5" selected>1.5x تېز</option>
                    <option value="2.0">2.0x ئۇچقۇر</option>
                </select>

                <button onclick="prevChunk()" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-300 px-4 py-2 rounded-full text-sm font-bold transition shadow-sm">⏮</button>
                <button onclick="startReading()" class="bg-gradient-to-r from-blue-600 to-sky-500 hover:from-blue-700 hover:to-sky-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md transition whitespace-nowrap">▶ ئوقۇتىش</button>
                <button onclick="nextChunk()" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-300 px-4 py-2 rounded-full text-sm font-bold transition shadow-sm">⏭</button>
                <button onclick="stopReading()" class="bg-gradient-to-r from-red-500 to-rose-400 hover:from-red-600 hover:to-rose-500 text-white px-5 py-2 rounded-full text-sm font-bold shadow-md transition whitespace-nowrap">■ توختا</button>
                <button onclick="savePDF()" class="bg-gradient-to-r from-amber-500 to-orange-400 hover:from-amber-600 hover:to-orange-500 text-white px-5 py-2 rounded-full text-sm font-bold shadow-md transition flex items-center gap-1 whitespace-nowrap">📄 PDF</button>
            </div>
        </div>
    </div>

    <script>
        let eventsData = [];
        const UY_TO_ULY_MAP = {'ا':'a','ە':'e','ب':'b','پ':'p','ت':'t','ج':'j','چ':'ch','خ':'x','د':'d','ر':'r','ز':'z','ژ':'zh','س':'s','ش':'sh','غ':'gh','ف':'f','ق':'q','ك':'k','گ':'g','ڭ':'ng','ل':'l','م':'m','ن':'n','ھ':'h','و':'o','ۇ':'u','ۆ':'o','ۈ':'u','ي':'y','ۋ':'v','ې':'e','ى':'i','ئ':'','؟':'?'};
        const UY_TO_ULY_MAPT = {'ا':'a','ە':'e','ب':'b','پ':'p','ت':'t','ج':'c','چ':'ç','خ':'hh','د':'d','ر':'r','ز':'z','ژ':'j','س':'s','ش':'ş','غ':'gh','f':'f','ق':'k','ك':'k','گ':'g','ڭ':'n','ل':'l','م':'m','ن':'n','ھ':'h','و':'o','ۇ':'u','ۆ':'ö','ۈ':'ü','ي':'y','ۋ':'v','ې':'e','ى':'i','ئ':'','؟':'?'};

        document.addEventListener('DOMContentLoaded', () => {
            updateDateTime();
            document.getElementById('footerYear').textContent = new Date().getFullYear();
            document.getElementById('inputDate').valueAsDate = new Date();
            const now = new Date();
            document.getElementById('lastUpdatedTime').textContent = now.toLocaleString('ug-CN');
            if(!document.getElementById('editorSection') && window.initialEvents) {
                eventsData = window.initialEvents;
                // Automatically display control bar player if it's the saved layout
                setTimeout(() => { toggleControls(); }, 500);
                renderTimeline();
            }
        });

        function updateDateTime() { document.getElementById('headerDateTime').textContent = new Date().toLocaleDateString('ug-CN', {weekday:'long', year:'numeric', month:'long', day:'numeric'}); }
        function updateReportHeader() { 
            document.getElementById('reportMainTitleDisplay').textContent = document.getElementById('reportMainTitleInput').value || "ۋەقەلەر خاتىرىسى";
            document.getElementById('lastUpdatedTime').textContent = new Date().toLocaleString('ug-CN');
        }

        // --- Mobile TOC Logic ---
        function toggleMobileTOC() {
            const drawer = document.getElementById('mobileTOC');
            const content = document.getElementById('mobileTOCContent');
            if(drawer.classList.contains('hidden')) {
                drawer.classList.remove('hidden');
                setTimeout(() => content.classList.remove('translate-x-full'), 10);
            } else {
                content.classList.add('translate-x-full');
                setTimeout(() => drawer.classList.add('hidden'), 300);
            }
        }

        function addTextBlock(type) {
            const w = document.createElement('div'); 
            w.className = "glass-panel !p-4 relative mb-4"; w.dataset.type = type;
            w.innerHTML = `<textarea class="w-full p-3 bg-white/70 border border-slate-200 rounded-lg outline-none text-base focus:bg-white focus:ring-2 focus:ring-bilik-primary transition" rows="3" placeholder="مەزمۇن كىرگۈزۈڭ..." dir="${type==='ltr'?'ltr':'rtl'}"></textarea><button onclick="this.parentElement.remove()" class="absolute top-2 left-2 bg-red-100 hover:bg-red-200 text-red-600 rounded-full w-7 h-7 flex items-center justify-center font-bold transition">✕</button>`;
            document.getElementById('contentBlocksArea').appendChild(w);
        }
        function addImageBlock() { 
            const w = document.createElement('div'); 
            w.className="glass-panel !p-4 relative mb-4"; w.dataset.type="image";
            w.innerHTML = `<input type="file" class="text-sm mb-3 w-full"><input type="text" placeholder="رەسىم ئىزاھاتى" class="w-full text-base border-b-2 border-slate-200 bg-transparent p-2 focus:outline-none focus:border-bilik-primary transition"><button onclick="this.parentElement.remove()" class="absolute top-2 left-2 bg-red-100 hover:bg-red-200 text-red-600 rounded-full w-7 h-7 flex items-center justify-center font-bold transition">✕</button>`;
            document.getElementById('contentBlocksArea').appendChild(w);
        }
        function addVideoBlock() { 
            const w = document.createElement('div'); 
            w.className="glass-panel !p-4 relative mb-4"; w.dataset.type="video";
            w.innerHTML = `<input type="url" placeholder="YouTube URL يېزىپ يۆتكەڭ" class="w-full text-base border-b-2 border-slate-200 bg-transparent p-2 focus:outline-none focus:border-bilik-primary transition dir-ltr"><button onclick="this.parentElement.remove()" class="absolute top-2 left-2 bg-red-100 hover:bg-red-200 text-red-600 rounded-full w-7 h-7 flex items-center justify-center font-bold transition">✕</button>`;
            document.getElementById('contentBlocksArea').appendChild(w);
        }

        async function submitEvent() {
            const date = document.getElementById('inputDate').value;
            const title = document.getElementById('inputTitle').value;
            const source = document.getElementById('inputSource').value;
            if(!date || !title) return alert("ۋاقتى ۋە تېمىسى كەم!");
            let blocks = [];
            for(let d of document.getElementById('contentBlocksArea').children) {
                const type = d.dataset.type;
                let content="", extra="";
                if(type==='image'){
                    const f = d.querySelector('input[type=file]');
                    if(f.files[0]) {
                        content = await new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.readAsDataURL(f.files[0])});
                        extra = d.querySelector('input[type=text]').value;
                    }
                } else if (type==='video') content = d.querySelector('input').value;
                else content = d.querySelector('textarea').value;
                if(content) blocks.push({type, content, extra});
            }
            eventsData.push({id:Date.now(), date, title, source, blocks});
            document.getElementById('contentBlocksArea').innerHTML = '';
            document.getElementById('inputTitle').value = '';
            renderTimeline();
        }

        function renderTimeline() {
            const c = document.getElementById('timelineContainer');
            const toc = document.getElementById('tocList');
            const mobToc = document.getElementById('mobileTocList'); 
            c.innerHTML = ''; toc.innerHTML = ''; mobToc.innerHTML = '';
            
            eventsData.sort((a,b) => new Date(b.date) - new Date(a.date));

            eventsData.forEach(e => {
                const div = document.createElement('div');
                div.className = "relative pr-8 page-break event-item";
                div.dataset.title = e.title;
                div.dataset.date = e.date;
                div.id = `evt-${e.id}`;
                
                let bHtml = '';
                e.blocks.forEach(b => {
                    if(b.type==='normal') bHtml += `<p class="mb-4 text-justify">${b.content}</p>`;
                    else if(b.type==='ltr') bHtml += `<div class="bg-white/70 p-4 rounded-xl text-base dir-ltr text-left mb-4 border-l-4 border-bilik-accent shadow-sm">${b.content}</div>`;
                    else if(b.type==='image') bHtml += `<div class="text-center mb-6"><img src="${b.content}" class="max-w-full mx-auto rounded-xl shadow-[0_4px_15px_rgba(0,0,0,0.1)] border border-white/80"><p class="text-sm text-slate-500 mt-3 font-bold">${b.extra||''}</p></div>`;
                    else if(b.type==='video') {
                         let vid = b.content.split('v=')[1] || b.content.split('/').pop();
                         bHtml += `<div class="aspect-video mb-6 rounded-xl overflow-hidden shadow-lg border border-white/50"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}" frameborder="0"></iframe></div>`;
                    }
                });

                div.innerHTML = `
                    <div class="absolute top-2 right-0 w-5 h-5 bg-gradient-to-br from-sky-400 to-blue-600 rounded-full border-2 border-white translate-x-[11px] z-10 shadow-sm"></div>
                    <div class="flex gap-2 mb-3">
                        <span class="bg-white/80 backdrop-blur text-bilik-primary text-sm font-bold px-3 py-1 rounded-full shadow-sm border border-white/60">${e.date}</span>
                        ${e.source ? `<a href="${e.source}" class="text-xs text-blue-500 hover:text-blue-700 hover:underline bg-white/50 px-3 py-1 rounded-full border border-white/50 no-print flex items-center transition shadow-sm">[مەنبە]</a>` : ''}
                    </div>
                    <h3 class="text-2xl font-bold text-slate-800 mb-4 font-serif leading-relaxed">${e.title}</h3>
                    <div class="glass-panel p-6 read-content text-lg text-slate-700 leading-[2.1]">${bHtml}</div>
                `;
                c.appendChild(div);

                // Populate TOCs
                const linkHtml = `<a href="#evt-${e.id}" class="block hover:bg-white/60 p-3 rounded-lg border-b border-white/40 transition"><span class="text-xs font-bold text-bilik-primary block mb-0.5">${e.date}</span><span class="block text-slate-700 hover:text-bilik-accent">${e.title}</span></a>`;
                
                // Desktop
                const li = document.createElement('li'); li.innerHTML = linkHtml;
                toc.appendChild(li);

                // Mobile
                const liMob = document.createElement('li'); 
                liMob.innerHTML = linkHtml.replace('href="#"', `href="#evt-${e.id}" onclick="toggleMobileTOC()"`);
                mobToc.appendChild(liMob);
            });
        }

        // --- JSON IMPORT/EXPORT (RESTORED) ---
        function exportJSON() {
            const blob = new Blob([JSON.stringify(eventsData, null, 2)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `bilik_data_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importJSON() { document.getElementById('jsonFileInput').click(); }
        function loadJSONFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                eventsData = JSON.parse(e.target.result);
                renderTimeline();
            };
            reader.readAsText(file);
        }

        function saveFinalHTML() {
            const titleVal = document.getElementById('reportMainTitleInput').value;
            const updatedTime = document.getElementById('lastUpdatedTime').textContent;
            const clone = document.documentElement.cloneNode(true);
            const editor = clone.querySelector('#editorSection');
            if(editor) editor.remove();
            
            // Re-collapse the control bar for neatest download
            const cPanel = clone.querySelector('#controlPanelMain');
            if (cPanel && !cPanel.classList.contains('max-w-0')) {
                cPanel.classList.add('max-w-0', 'opacity-0', 'px-0', 'pointer-events-none');
                cPanel.classList.remove('max-w-[1000px]', 'px-3');
            }

            const script = document.createElement('script');
            script.textContent = `window.initialEvents = ${JSON.stringify(eventsData)}; window.initialMainTitle = "${titleVal}"; window.initialUpdateTime = "${updatedTime}"; document.addEventListener('DOMContentLoaded', () => { document.getElementById('reportMainTitleDisplay').innerText = window.initialMainTitle; document.getElementById('lastUpdatedTime').innerText = window.initialUpdateTime; });`;
            clone.querySelector('body').appendChild(script);
            const blob = new Blob(["<!DOCTYPE html>\n" + clone.outerHTML], {type: "text/html"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Page_${new Date().toISOString().slice(0,10)}.html`;
            a.click();
        }

        // --- TTS ---
        function convertForTTS(text, map) { return text.split('').map(c => map[c] || c).join(''); }
        function dateToSpeech(dateStr) {
            try { const d = new Date(dateStr); return `${d.getFullYear()} yili, ${d.getMonth()+1} ayning, ${d.getDate()} kuni.`; } catch(e) { return dateStr; }
        }

        let chunks = []; let chunkIndex = 0; let isReading = false;
        function toggleControls() {
            const panel = document.getElementById('controlPanelMain');
            panel.classList.toggle('max-w-0');
            panel.classList.toggle('opacity-0');
            panel.classList.toggle('px-0');
            panel.classList.toggle('pointer-events-none');
            panel.classList.toggle('max-w-[1000px]');
            // Add px-3 when opened based on if it has max-w-0
            if (panel.classList.contains('max-w-0')) {
                panel.classList.remove('px-3');
            } else {
                panel.classList.add('px-3');
            }
        }

        function startReading() {
            stopReading(); isReading = true; chunks = [];
            const voiceVal = document.getElementById('voiceSelect').value;
            chunks.push(document.getElementById('reportMainTitleDisplay').innerText);
            
            document.querySelectorAll('.event-item').forEach(item => {
                chunks.push(item.dataset.title || "");
                chunks.push(dateToSpeech(item.dataset.date));
                if (voiceVal === 'en-US') {
                    item.querySelectorAll('[dir="ltr"]').forEach(b => chunks.push(b.innerText));
                } else if (voiceVal.startsWith('ug')) {
                    const contentDiv = item.querySelector('.read-content');
                    if(contentDiv) contentDiv.querySelectorAll('p').forEach(p => chunks.push(p.innerText));
                } else {
                    chunks.push(item.querySelector('.read-content').innerText);
                }
                chunks.push("... ... ..."); 
            });

            if(chunks.length === 0) { isReading=false; return alert("ئوقۇيدىغان مەزمۇن يوق"); }
            chunkIndex = 0; speakNextChunk();
        }

        function speakNextChunk() {
            if (!isReading || chunkIndex >= chunks.length) { isReading = false; return; }
            const voiceVal = document.getElementById('voiceSelect').value;
            const rateVal = parseFloat(document.getElementById('rateSelect').value);
            let txt = chunks[chunkIndex];
            if(voiceVal === 'ug-UG0') txt = convertForTTS(txt, UY_TO_ULY_MAPT);
            else if (voiceVal === 'ug-UG') txt = convertForTTS(txt, UY_TO_ULY_MAP);

            const u = new SpeechSynthesisUtterance(txt);
            const vs = window.speechSynthesis.getVoices();
            let v = null;
            if(voiceVal === 'ug-UG0') v = vs.find(x => x.lang === 'tr-TR');
            else if (voiceVal === 'ug-UG') v = vs.find(x => x.lang === 'uz-UZ') || vs.find(x => x.lang.includes('tr'));
            else v = vs.find(x => x.lang.startsWith(voiceVal.split('-')[0]));
            
            if(v) u.voice = v;
            u.rate = rateVal;
            u.onend = () => { if(isReading) { chunkIndex++; speakNextChunk(); } };
            u.onerror = () => { if(isReading) { chunkIndex++; speakNextChunk(); } };
            window.speechSynthesis.speak(u);
        }

        function nextChunk() { if(isReading && chunks.length) window.speechSynthesis.cancel(); }
        function prevChunk() { if(isReading && chunks.length) { chunkIndex = Math.max(-1, chunkIndex - 2); window.speechSynthesis.cancel(); } }
        function stopReading() { isReading = false; window.speechSynthesis.cancel(); }
        
        function savePDF() {
            const d = new Date();
            const f = (n) => n.toString().padStart(2, '0');
            const fname = `Bilik_Timeline_${d.getFullYear()}-${f(d.getMonth()+1)}-${f(d.getDate())}.pdf`;
            const opt = { margin: [15,15,15,15], filename: fname, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
            html2pdf().set(opt).from(document.getElementById('report-content')).save();
        }
        
        // Ensure voices load
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    </script>
</body>
</html>
